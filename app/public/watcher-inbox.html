<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Smart Inbox — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
</head>
<body>
<script>window.GH_PAGE = { module:'watcher', title:'Smart Inbox' };</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-messages.js"></script>
<div id="app">
  <div style="max-width:800px;margin:0 auto;padding:0 16px 80px">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 0 16px">
      <div class="sum-card"><div class="sum-val" id="pendingCount" style="color:var(--amber)">—</div><div class="sum-lbl">Pending</div></div>
      <div class="sum-card"><div class="sum-val" id="failedCount" style="color:var(--red)">—</div><div class="sum-lbl">Failed</div></div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-ghost" style="flex:1" onclick="load()">🔄 Refresh</button>
      <a href="/settings.html" class="btn btn-ghost" style="flex:1;text-align:center">⚙️ Configure Rules</a>
    </div>

    <div id="inboxList"><div class="spinner"><div class="spin"></div>Loading…</div></div>
  </div>
</div>

<script>
const MODULE_ICONS = { eob:'📋', statement:'🏦', document:'📄', receipt:'🧾' };
const FILE_ICONS   = { pdf:'📄', csv:'📊', xlsx:'📈', ofx:'💱', qfx:'💱', txt:'📝' };

function fileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  return FILE_ICONS[ext] || '📎';
}

function suggest(filePath) {
  const f = filePath.toLowerCase();
  if (/eob|explanation/.test(f)) return { module:'eob', label:'EOB Statement' };
  if (/statement|chase|schwab|navy|usaa/.test(f)) return { module:'statement', label:'Bank Statement' };
  if (/receipt|pharmacy|cvs|walgreen/.test(f)) return { module:'receipt', label:'Receipt' };
  return null;
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1048576) return (bytes/1024).toFixed(0)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  try {
    const data = await window.api('GET', '/watcher/pending?limit=100');
    const stats = await window.api('GET', '/watcher/status');
    document.getElementById('pendingCount').textContent = data.total || 0;
    document.getElementById('failedCount').textContent  = stats.stats?.failed || 0;
    const el = document.getElementById('inboxList');

    if (!data.files?.length) {
      el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)"><div style="font-size:48px;margin-bottom:16px">📭</div><h3 style="margin-bottom:8px">Inbox Zero!</h3><p style="font-size:13px">All files processed. New files will appear here automatically.</p></div>';
      return;
    }

    el.innerHTML = data.files.map(f => {
      const fname   = f.file_path.split('/').pop();
      const folder  = f.file_path.split('/').slice(0,-1).join('/');
      const hint    = suggest(f.file_path);
      return `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
            <span style="font-size:24px;flex-shrink:0">${fileIcon(fname)}</span>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;color:var(--text);word-break:break-all">${esc(fname)}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(folder)}">${esc(folder)}</div>
              ${f.file_size?`<div style="font-size:11px;color:var(--text3)">${fmtSize(f.file_size)}</div>`:''}
            </div>
          </div>
          ${hint?`
          <div style="background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;color:var(--accent)">💡 Looks like: ${hint.label}</span>
            <button class="btn btn-primary" style="padding:4px 12px;font-size:12px" onclick="accept(${f.id})">✓ Accept</button>
          </div>`:''}
          <div style="display:flex;gap:8px">
            <select class="form-select" id="mod_${f.id}" style="flex:1;font-size:13px">
              <option value="">— Choose module —</option>
              <option value="eob"       ${hint?.module==='eob'      ?'selected':''}>📋 EOB Statement</option>
              <option value="statement" ${hint?.module==='statement'?'selected':''}>🏦 Bank Statement</option>
              <option value="document"                                            >📄 Document</option>
              <option value="ignore"                                              >🚫 Ignore</option>
            </select>
            <button class="btn btn-primary" onclick="process(${f.id})">Import</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('inboxList').innerHTML = `<div style="color:var(--red);padding:20px">${esc(e.message)}</div>`;
  }
}

async function accept(id) {
  await process(id);
}

async function process(id) {
  const mod = document.getElementById(`mod_${id}`)?.value;
  if (!mod) { toast('Select a module first','err'); return; }
  try {
    await window.api('POST', '/watcher/process', { file_id: id, action: mod === 'ignore' ? 'ignore' : 'import' });
    toast(mod === 'ignore' ? 'Ignored' : 'Processing…');
    load();
  } catch(e) { toast(e.message,'err'); }
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
