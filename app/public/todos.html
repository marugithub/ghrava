<style>
/* ── Todos-specific styles (layout + todo item) ── */

/* Section divider */
.todo-section-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px 6px;
  grid-column: 1 / -1;
  cursor: pointer;
  user-select: none;
}
.todo-section-head:hover .todo-section-title { color: var(--text2); }
.todo-section-title {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text3);
  transition: color .12s;
}
.todo-section-count { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.todo-section-chevron { font-size: 10px; color: var(--text3); opacity: .5; transition: transform .2s; }
.todo-section-line { flex: 1; height: 1px; background: var(--border); }
.todo-grid-wrap { grid-column: 1 / -1; }
.todo-grid-wrap.sec-collapsed .todo-grid { display: none; }

/* 2-column grid layout */
.todo-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 0 16px 4px;
}
@media (max-width: 700px) { .todo-grid { grid-template-columns: 1fr; } }
#todoList { padding-bottom: 100px; }

/* Todo item — has checkbox + priority stripe, justified specialization */
.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 11px 12px;
  cursor: pointer; transition: border-color .15s, background .15s;
  position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.todo-item:hover { border-color: var(--border2); background: var(--bg3); }
.todo-item.selected { border-color: var(--accent) !important; background: var(--accent-bg); }
.todo-item.done-item { opacity: .5; }
.todo-item.done-item .td-name { text-decoration: line-through; color: var(--text3); }

/* Priority stripe */
.todo-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 3px 0 0 3px;
}
.todo-item.prio-urgent::before  { background: var(--red); }
.todo-item.prio-high::before    { background: var(--amber); }
.todo-item.prio-medium::before  { background: var(--accent); }
.todo-item.prio-low::before     { background: var(--text3); }

/* Checkbox */
.todo-check {
  width: 20px; height: 20px; border: 2px solid var(--border2);
  border-radius: 6px; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.todo-check:hover { border-color: #22c55e; }
.todo-check.checked { background: var(--green); border-color: #22c55e; }
.todo-check.checked::after {
  content: ''; display: block; width: 5px; height: 9px;
  border-right: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(45deg) translateY(-1px);
}

/* Content */
.todo-body { flex: 1; min-width: 0; }
.td-title-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; min-width: 0; }
.td-icon { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; }
.td-icon img { width: 16px; height: 16px; object-fit: contain; }
.td-icon-overdue  { background: rgba(239,68,68,.12); }
.td-icon-followup { background: rgba(59,130,246,.12); }
.td-icon-recurring{ background: rgba(249,115,22,.12); }
.td-icon-important{ background: rgba(239,68,68,.15); }
.td-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  line-height: 1.3; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.td-auto-badge {
  font-family: var(--mono); font-size: 8px; font-weight: 700;
  letter-spacing: .1em; color: #8b5cf6;
  background: rgba(139,92,246,.1); border: 1px solid rgba(167,139,250,.2);
  border-radius: 4px; padding: 2px 5px; flex-shrink: 0;
}
.todo-notes {
  font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.td-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.td-due {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 3px;
}
.td-due svg { width: 10px; height: 10px; flex-shrink: 0; }
.td-due.due-overdue { color: var(--red); }
.td-due.due-soon    { color: var(--amber); }
.td-due.due-ok      { color: var(--text3); }
.td-source {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  display: inline-flex; align-items: center; gap: 3px; text-decoration: none;
}
.td-source:hover { text-decoration: underline; }
.td-source svg { width: 9px; height: 9px; }

/* Action buttons on card right */
.todo-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.todo-act-btn {
  width: 28px; height: 28px; border-radius: 8px; background: none;
  border: 1px solid var(--border); color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .12s;
  -webkit-tap-highlight-color: transparent;
}
.todo-act-btn:hover { background: var(--bg4); border-color: var(--border2); color: var(--text); }
.todo-act-btn.dismiss:hover { border-color: rgba(239,68,68,.3); color: var(--red); }
.todo-act-btn.complete-btn { color: #22c55e; }
.todo-act-btn.complete-btn:hover { border-color: #22c55e; background: rgba(34,197,94,.08); }
.todo-act-btn svg { width: 14px; height: 14px; }

/* Show done toggle */
.show-done-btn {
  display: flex; align-items: center; gap: 8px;
  margin: 8px 20px; padding: 8px 0;
  background: none; border: none; color: var(--text3);
  font-size: 12px; font-weight: 600; font-family: var(--mono);
  cursor: pointer; letter-spacing: .04em;
  -webkit-tap-highlight-color: transparent;
}
.show-done-btn:hover { color: var(--text2); }
.show-done-btn svg { width: 14px; height: 14px; }

/* Tab count badges */
.tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px;
  background: var(--bg3); font-size: 10px; font-weight: 700; margin-left: 3px;
  vertical-align: middle;
}
.tab-count:empty { display: none; }
</style>

<script>
const API = '/api/v1/todos';
const api = window.makeApi('/todos');
let todos = [], stats = {}, editingId = null;
let filterCat = '', filterMode = ''; // mode: '' | 'urgent' | 'overdue' | 'auto' | 'done'
let showDone = false;

// ── Source deep-link map ──────────────────────────────────────
const SOURCE_LINKS = {
  hsa_payment:    (id) => ({ href: '/hsa.html',       label: 'View HSA expense',     icon: '❤️' }),
  hsa_otc:        (id) => ({ href: '/hsa.html',       label: 'View OTC expense',     icon: '💊' }),
  item:           (id) => ({ href: `/inventory.html?open=ITM-${String(id).padStart(4,'0')}`, label: 'View in Inventory', icon: '📦' }),
  daily_log:      (id) => ({ href: '/daily-log.html', label: 'View log entry',       icon: '📋' }),
  med_medication: (id) => ({ href: '/medical.html',   label: 'View medication',      icon: '💊' }),
};

function sourceLink(todo) {
  if (!todo.auto_source_type || !todo.auto_source_id) return null;
  const fn = SOURCE_LINKS[todo.auto_source_type];
  return fn ? fn(todo.auto_source_id) : null;
}

// ── Date helpers ──────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function dueClass(iso) {
  if (!iso) return '';
  const t = todayStr();
  if (iso < t) return 'due-overdue';
  const diff = (new Date(iso) - new Date(t)) / 86400000;
  return diff <= 7 ? 'due-soon' : 'due-ok';
}
function dueLabel(iso) {
  if (!iso) return '';
  const t = todayStr();
  if (iso < t) {
    const days = Math.ceil((new Date(t) - new Date(iso)) / 86400000);
    return `${days}d overdue`;
  }
  const diff = Math.ceil((new Date(iso) - new Date(t)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff <= 7)  return `${diff}d`;
  return fmtDate(iso);
}

// ── Load & render ─────────────────────────────────────────────
async function load() {
  const p = new URLSearchParams({ limit: 300 });

  if (filterMode === 'done') {
    p.set('status', 'done');
  } else {
    // default: open + in_progress handled by API
    if (filterMode === 'urgent')  p.set('priority', 'urgent');
    if (filterMode === 'auto')    p.set('auto', '1');
    if (filterMode === 'overdue') { /* filter client-side */ }
  }
  if (filterCat) p.set('category', filterCat);

  try {
    const data = await api('GET', `?${p}`);
    todos  = data.todos  || [];
    stats  = data.stats  || {};

    // Client-side overdue filter
    if (filterMode === 'overdue') {
      todos = todos.filter(t => t.due_date && t.due_date < todayStr());
    }

    updateStats(data.stats);
    render();
  } catch(e) {
    $('todoList').innerHTML = errorState(e.message, 'load()');
  }
}

function updateStats(s) {
  if (!s) return;
  $('statTotal').textContent  = s.open_count   ?? '—';
  $('statUrgent').textContent = s.urgent_count ?? '—';
  $('statOverdue').textContent= s.overdue_count?? '—';
  $('statAuto').textContent   = s.auto_count   ?? '—';
  $('statDone').textContent   = s.done_week    ?? '—';
}

function render() {
  const list = $('todoList');
  const q = (window._todoSearch || '').toLowerCase();

  // Apply search filter
  let displayTodos = q
    ? todos.filter(t =>
        (t.title||'').toLowerCase().includes(q) ||
        (t.notes||'').toLowerCase().includes(q) ||
        (t.category||'').toLowerCase().includes(q)
      )
    : todos;
  // Lens-derived filters (v202604.124). Priority/category were dropped
  // when the GH_VIEW filter drawer was unwired in favor of the Lens.
  if (_todoFilters.person != null) {
    // v202604.175 — API returns `family_members` objects, not `family_member_ids`
    displayTodos = displayTodos.filter(t => {
      const ids = Array.isArray(t.family_members) ? t.family_members.map(m => m.id) : [];
      return ids.map(String).includes(String(_todoFilters.person));
    });
  }
  if (_todoFilters.status) displayTodos = displayTodos.filter(t => t.status === _todoFilters.status);
  if (_todoFilters.tag)    displayTodos = displayTodos.filter(t => (t.tags||[]).includes(_todoFilters.tag));
  if (_todoFilters.time && window.LENS_CONFIG?.timeMatch) {
    displayTodos = displayTodos.filter(t => window.LENS_CONFIG.timeMatch(t.due_date, _todoFilters.time, 'future'));
  }
  // v202604.133 — title text + priority/category select filters
  if (_todoFilters.title) {
    const q = String(_todoFilters.title).toLowerCase();
    displayTodos = displayTodos.filter(t => (t.title||'').toLowerCase().includes(q));
  }
  if (_todoFilters.priority) {
    displayTodos = displayTodos.filter(t => (t.priority||'').toLowerCase() === String(_todoFilters.priority).toLowerCase());
  }
  if (_todoFilters.category) {
    displayTodos = displayTodos.filter(t => String(t.category||'').toLowerCase() === String(_todoFilters.category).toLowerCase());
  }

  if (!displayTodos.length) {
    if (filterMode === 'done') {
      list.innerHTML = `<div class="todos-empty">
        <div class="todos-empty-icon">✅</div>
        <div class="todos-empty-title">Nothing completed yet</div>
        <div class="todos-empty-sub">Completed items from the last 7 days show here.</div>
      </div>`;
    } else {
      list.innerHTML = `<div class="todos-empty">
        <div class="todos-empty-icon">🎉</div>
        <div class="todos-empty-title">All clear</div>
        <div class="todos-empty-sub">No open to-dos${filterCat ? ' in ' + filterCat : ''}. Tap + to add one.</div>
      </div>`;
    }
    return;
  }

  // Group by priority for open, or flat for done
  if (filterMode === 'done') {
    list.innerHTML = sectionHTML('Recently Done', displayTodos.filter(t => t.status === 'done' || t.status === 'dismissed'), true);
    return;
  }

  const prios = [
    { key: 'urgent', label: 'Urgent', items: displayTodos.filter(t => t.priority === 'urgent') },
    { key: 'high',   label: 'High',   items: displayTodos.filter(t => t.priority === 'high') },
    { key: 'medium', label: 'Medium', items: displayTodos.filter(t => t.priority === 'medium') },
    { key: 'low',    label: 'Low',    items: displayTodos.filter(t => t.priority === 'low') },
  ].filter(p => p.items.length);

  list.innerHTML = prios.map(p =>
    sectionHTML(p.label, p.items, false, p.key)
  ).join('');

  list.className = '';
  wireItems();
}

// ── GH_CARD pipeline (always on — formerly behind ?cards=v2) ─────
// v202604.124: card view is the default render, and lens-derived filters
// (person/status/time/tag) drive the result set. Legacy GH_VIEW filters
// (priority/category/tags) were removed when GH_VIEW was unwired.
(function() {
  if (!window.GH_CARD) {
    console.warn('[todos] GH_CARD not loaded; falling back to legacy render');
    return;
  }

  const _origRender = window.render;
  window.render = function() {
    const list = document.getElementById('todoList');
    if (!list) return _origRender();

    const q = (window._todoSearch || '').toLowerCase();
    let displayTodos = q
      ? todos.filter(t =>
          (t.title||'').toLowerCase().includes(q) ||
          (t.notes||'').toLowerCase().includes(q) ||
          (t.category||'').toLowerCase().includes(q)
        )
      : todos.slice();

    // Lens-derived filters (set by GH_LENS onChange via lensToTodoFilters)
    // v202604.175 — the todos API returns `family_members` (array of
    // {id, display_name, ...} objects), NOT `family_member_ids`. The old
    // field name silently matched nothing, so any active person scope
    // emptied the list. Read the real shape.
    if (_todoFilters.person != null) {
      displayTodos = displayTodos.filter(t => {
        const ids = Array.isArray(t.family_members) ? t.family_members.map(m => m.id) : [];
        return ids.map(String).includes(String(_todoFilters.person));
      });
    }
    if (_todoFilters.status) {
      displayTodos = displayTodos.filter(t => t.status === _todoFilters.status);
    }
    if (_todoFilters.tag) {
      displayTodos = displayTodos.filter(t => (t.tags||[]).includes(_todoFilters.tag));
    }
    // v202604.127 — time pill applies on due_date (future preset).
    if (_todoFilters.time && window.LENS_CONFIG?.timeMatch) {
      displayTodos = displayTodos.filter(t => window.LENS_CONFIG.timeMatch(t.due_date, _todoFilters.time, 'future'));
    }
    // v202604.133 — title text + priority/category select filters
    if (_todoFilters.title) {
      const q = String(_todoFilters.title).toLowerCase();
      displayTodos = displayTodos.filter(t => (t.title||'').toLowerCase().includes(q));
    }
    if (_todoFilters.priority) {
      displayTodos = displayTodos.filter(t => (t.priority||'').toLowerCase() === String(_todoFilters.priority).toLowerCase());
    }
    if (_todoFilters.category) {
      displayTodos = displayTodos.filter(t => String(t.category||'').toLowerCase() === String(_todoFilters.category).toLowerCase());
    }

    // v202604.175 — render the empty state BEFORE touching GH_LENS.setCount.
    // Previously setCount ran first; if it threw, render() aborted and the
    // page showed NEITHER todo items NOR the empty state (blank page bug).
    // setCount is now best-effort and never blocks the empty state.
    const _setLensCount = (n) => {
      try {
        if (window.GH_LENS && typeof GH_LENS.setCount === 'function') GH_LENS.setCount(n);
      } catch (e) { console.warn('[todos] GH_LENS.setCount failed', e); }
    };

    if (!displayTodos.length) {
      list.innerHTML = `<div class="todos-empty">
        <div class="todos-empty-icon">${filterMode === 'done' ? '✅' : '🎉'}</div>
        <div class="todos-empty-title">${filterMode === 'done' ? 'Nothing completed yet' : 'All clear'}</div>
        <div class="todos-empty-sub">${filterMode === 'done' ? 'Completed items from the last 7 days show here.' : ('No open to-dos' + (filterCat ? ' in ' + filterCat : '') + '. Tap + to add one.')}</div>
      </div>`;
      _setLensCount(0);
      return;
    }
    _setLensCount(displayTodos.length);

    list.innerHTML = '';
    list.className = '';
    list.style.padding = '16px';
    // v202604.107 — multi-column grid on desktop; CSS auto-collapses to 1 col on mobile.
    const grouped = window.GH_CARD.renderGrouped('todos', displayTodos, { layout: 'grid' });
    list.appendChild(grouped);
  };
})();

function isSectionCollapsed(key) {
  return localStorage.getItem('gh_todo_sec_' + key) === '0';
}

function toggleTodoSection(key, headEl) {
  const collapsed = !isSectionCollapsed(key);
  localStorage.setItem('gh_todo_sec_' + key, collapsed ? '0' : '1');
  const wrap = headEl.nextElementSibling;
  const chev = headEl.querySelector('.todo-section-chevron');
  if (wrap) wrap.classList.toggle('sec-collapsed', collapsed);
  if (chev) chev.style.transform = collapsed ? 'rotate(-90deg)' : '';
}

function sectionHTML(label, items, isDone, key) {
  const prioColors = { urgent:'var(--red)', high:'var(--amber)', medium:'var(--accent)', low:'var(--text3)', 'Recently Done':'var(--green)' };
  const col = prioColors[label] || 'var(--text3)';
  const collapsed = key ? isSectionCollapsed(key) : false;
  return `
    <div class="todo-section-head" style="border-left: 3px solid ${col}; padding-left: 8px; margin: 12px 16px 6px;"
         onclick="toggleTodoSection('${key||label}', this)">
      <span class="todo-section-title" style="color:${col}">${label}</span>
      <span class="todo-section-count">${items.length}</span>
      <span class="todo-section-chevron" style="transform:${collapsed?'rotate(-90deg)':''}">▾</span>
      <span class="todo-section-line"></span>
    </div>
    <div class="todo-grid-wrap${collapsed?' sec-collapsed':''}">
      <div class="todo-grid">
        ${items.map(t => todoHTML(t, isDone)).join('')}
      </div>
    </div>
  `;
}

function todoHTML(t, isDone) {
  const sl = sourceLink(t);
  const isChecked = t.status === 'done' || t.status === 'dismissed';
  const isOverdue  = t.due_date && t.due_date < todayStr();
  const isFollowUp = t.auto_source_type === 'daily_log';
  const isRecurring = !!t.recurrence_rule;

  // Status icon badges (shown left of title)
  const icons = [];
  if (t.priority === 'urgent') icons.push(`<span class="td-icon td-icon-important" title="Urgent"><img src="/icons/important.png" alt="urgent"></span>`);
  if (isOverdue)   icons.push(`<span class="td-icon td-icon-overdue" title="Overdue"><img src="/icons/overdue.png" alt="overdue"></span>`);
  if (isFollowUp)  icons.push(`<span class="td-icon td-icon-followup" title="Follow-up"><img src="/icons/followup.png" alt="follow-up"></span>`);
  if (isRecurring) icons.push(`<span class="td-icon td-icon-recurring" title="Recurring"><img src="/icons/recurring.png" alt="recurring"></span>`);

  // Due date meta
  const dueHtml = t.due_date ? `
    <span class="td-due ${dueClass(t.due_date)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${isOverdue ? `Due ${fmtDate(t.due_date)} · ${dueLabel(t.due_date)}` : dueLabel(t.due_date)}
    </span>` : '';

  // Source link
  const sourceHtml = sl ? `
    <a class="td-source" href="${sl.href}" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      ${sl.label}
    </a>` : '';

  // AUTO badge (only when no status icons — avoids clutter)
  const autoBadge = t.is_auto && icons.length === 0
    ? `<span class="td-auto-badge">AUTO</span>` : '';

  return `<div class="todo-item prio-${t.priority}${t.is_auto?' is-auto':''}${isDone?' done-item':''}"
               data-id="${t.id}" role="button" tabindex="0">
    <div class="todo-check${isChecked?' checked':''}" data-check="${t.id}" onclick="event.stopPropagation(); toggleDone(${t.id}, ${isChecked?0:1})"></div>
    <div class="todo-body">
      <div class="td-title-row">
        ${icons.join('')}
        <span class="td-name">${esc(t.title)}</span>
        ${autoBadge}
      </div>
      ${t.notes ? `<div class="todo-notes">${esc(t.notes)}</div>` : ''}
      <div class="td-meta">
        <span class="todo-cat cat-${t.category||'General'}">${t.category||'General'}</span>
        ${dueHtml}
        ${sourceHtml}
      </div>
      ${t.tags?.length ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${t.tags.map(tag=>{const s=window.GH_TAGS?GH_TAGS.chipStyle(tag):'';return `<span class="tag-chip" data-tag="${esc(tag)}" style="font-size:10px;padding:1px 6px;cursor:pointer${s?';'+s:''}" title="Search: ${esc(tag)}" onclick="event.stopPropagation()">${esc(tag)}</span>`;}).join('')}</div>` : ''}
    </div>
    <div class="todo-actions" onclick="event.stopPropagation()">
      ${!isDone ? `<button class="todo-act-btn complete-btn" title="Mark complete" onclick="toggleDone(${t.id}, 1)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </button>` : ''}
      ${!isDone ? `<button class="todo-act-btn" title="Snooze 1 day" onclick="snooze(${t.id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>` : ''}
      ${!t.is_auto && !isDone ? `<button class="todo-act-btn" title="Edit" onclick="openEdit(${t.id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>` : ''}
    </div>
  </div>`;
}

// ── Multi-select state ────────────────────────────────────────
let selectedIds = new Set();

// ── Multi-select state ────────────────────────────────────────
const selected = new Set();

function toggleSelect(id, el) {
  if (selected.has(id)) { selected.delete(id); el.classList.remove('selected'); }
  else { selected.add(id); el.classList.add('selected'); }
  updateBulkBar();
}
function updateBulkBar() {
  const bar = $('bulkBar'); if (!bar) return;
  if (selected.size > 0) { bar.classList.add('visible'); $('bulkCount').textContent = selected.size + ' selected'; }
  else { bar.classList.remove('visible'); }
}
function clearSelection() {
  selected.clear();
  document.querySelectorAll('.todo-item.selected').forEach(el => el.classList.remove('selected'));
  updateBulkBar();
}
async function bulkComplete() {
  if (!selected.size) return;
  await Promise.all([...selected].map(id => api('PATCH', `/${id}/status`, {status:'done'}).catch(()=>{})));
  toast(`✓ ${selected.size} completed`); clearSelection(); await load();
}
async function bulkSnooze() {
  if (!selected.size) return;
  const d = new Date(); d.setDate(d.getDate()+1);
  const due = d.toISOString().slice(0,10);
  await Promise.all([...selected].map(id => api('PUT', `/${id}`, {due_date:due}).catch(()=>{})));
  toast(`⏰ ${selected.size} snoozed`); clearSelection(); await load();
}
async function bulkDelete() {
  if (!selected.size) return;
  if (!await LT.confirm(`Delete ${selected.size} todo${selected.size>1?'s':''}?`)) return;
  await Promise.all([...selected].map(id => api('DELETE', `/${id}`).catch(()=>{})));
  toast(`Deleted ${selected.size}`); clearSelection(); await load();
}

function wireItems() {
  $('todoList').querySelectorAll('.todo-item').forEach(el => {
    const id = +el.dataset.id;
    // Long-press or Ctrl/Cmd+click enters multi-select mode
    let pressTimer;
    el.addEventListener('pointerdown', () => { pressTimer = setTimeout(() => toggleSelect(id, el), 500); });
    el.addEventListener('pointerup',   () => clearTimeout(pressTimer));
    el.addEventListener('pointermove', () => clearTimeout(pressTimer));
    el.addEventListener('click', e => {
      if (e.ctrlKey || e.metaKey) { toggleSelect(id, el); return; }
      if (selected.size > 0) { toggleSelect(id, el); return; }
      openDetail(id);
    });
    el.addEventListener('keydown', e => { if (e.key === 'Enter') openDetail(id); });
  });
}

// Lens state → _todoFilters bridge. The Lens emits filters as
// [{dim:'status', value:'open'}, {dim:'person', value:7}, ...]
// — translate into the flat object the renderer expects.
function lensToTodoFilters(lensFilters) {
  const out = {};
  for (const f of lensFilters) {
    if (f.dim === 'person')   out.person   = f.value;
    if (f.dim === 'status')   out.status   = f.value;
    if (f.dim === 'time')     out.time     = f.value;
    if (f.dim === 'tag')      out.tag      = f.value;
    if (f.dim === 'title')    out.title    = f.value;
    if (f.dim === 'priority') out.priority = f.value;
    if (f.dim === 'category') out.category = f.value;
  }
  return out;
}

    };
    const method = editingId ? 'PUT' : 'POST';
    const path   = editingId ? `/${editingId}` : '/';
    const r = await api(method, path, body);
    if (!r) throw new Error('Save failed');
    // v202604.139 — link source daily-log entry on first create
    if (window._seedDailyLogId && !editingId && r && r.id) {
      try {
        await window.api('PATCH', `/daily-log/${window._seedDailyLogId}`, {
          promoted_to_type: 'todo',
          promoted_to_id:   r.id,
        });
      } catch {} // non-fatal
      window._seedDailyLogId = null;
    }
    $('formDrawer').classList.remove('open');
    toast(editingId ? 'Updated' : 'To-do added');
    await load();
  } catch(e) { toast(e.message, 'err'); }
  finally {
    if (labelSpan) labelSpan.textContent = originalLabel;
    btn.disabled = false;
  }
});

// ── Stat chips ────────────────────────────────────────────────
document.getElementById('statsRow').addEventListener('click', e => {
  const chip = e.target.closest('.view-tab[data-filter]');
  if (!chip) return;
  document.querySelectorAll('#statsRow .view-tab').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  filterMode = chip.dataset.filter;
  filterCat = ''; // reset category when switching mode
  document.querySelectorAll('#filterStrip .view-tab').forEach(b => b.classList.remove('active'));
  const allCat = document.querySelector('#filterStrip .view-tab[data-cat=""]');
  if (allCat) allCat.classList.add('active');
  load();
});

// ── Category filter pills ─────────────────────────────────────
document.getElementById('filterStrip').addEventListener('click', e => {
  const pill = e.target.closest('.view-tab[data-cat]');
  if (!pill) return;
  document.querySelectorAll('#filterStrip .view-tab').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  filterCat = pill.dataset.cat;
  load();
});

async function loadCategoryPills() {
  const DEFAULT_CATS = ['HSA','Medical','Inventory','Finance','General','Home','Car','Health'];
  try {
    const opts = await window.api('GET', '/settings/dropdowns/todo_category');
    const cats = opts.length ? opts.map(o => o.value) : DEFAULT_CATS;
    const strip = document.getElementById('filterStrip');
    const existing = strip.innerHTML; // keep 'All' pill
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'view-tab';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      strip.appendChild(btn);
    });
  } catch(e) {
    // fallback: inject defaults
    const cats = ['HSA','Medical','Inventory','Finance','General','Home','Car','Health'];
    const strip = document.getElementById('filterStrip');
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'view-tab';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      strip.appendChild(btn);
    });
  }
}

// ── Snooze ────────────────────────────────────────────────────
async function snooze(id) {
  try {
    await api('PATCH', `/${id}/snooze`, { days: 1 });
    toast('Snoozed 1 day');
    await load();
  } catch { toast('Failed', 'err'); }
}

// Long-press to enter bulk select mode
let longPressTimer = null;
let _googleSyncEnabled = false;

async function checkGoogleStatus() {
  try {
    const s = await window.api('GET', '/google/status');
    _googleSyncEnabled = !!(s.connected && s.services?.tasks?.enabled);
    const badge = document.getElementById('googleSyncBadge');
    const btn   = document.getElementById('googleSyncBtn');
    if (!badge || !btn) return;
    badge.style.display = _googleSyncEnabled ? 'block' : 'none';
    if (_googleSyncEnabled) {
      const last = s.services?.tasks?.last_sync;
      btn.title = 'Google Tasks sync · ' + (last ? 'Last: ' + new Date(last).toLocaleString() : 'Never synced');
      btn.style.color = 'var(--green)';
    } else {
      btn.title = 'Google Tasks not connected — configure in Settings';
    }
  } catch { /* google not configured — silent */ }
}

async function syncGoogleTasks() {
  const btn = document.getElementById('googleSyncBtn');
  if (!_googleSyncEnabled) { toast('Google Tasks not configured — see Settings → Google Services', 'err'); return; }
  const orig = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '<div class="spin" style="width:14px;height:14px;border:2px solid var(--text3);border-top-color:var(--accent);border-radius:50%"></div>'; btn.disabled = true; }
  try {
    const r = await window.api('POST', '/google/sync/tasks', {});
    let msg = `Synced ${r.synced||0} task${r.synced!==1?'s':''}`;
    if (r.created) msg += ` · ${r.created} new`;
    if (r.updated) msg += ` · ${r.updated} updated`;
    toast(msg, 'ok');
    load();
  } catch(e) { toast(e.message, 'err'); }
  finally { if (btn) { btn.innerHTML = orig; btn.disabled = false; } }
}

document.addEventListener('DOMContentLoaded', () => {
  checkGoogleStatus();
  document.getElementById('todoList').addEventListener('touchstart', e => {
    const item = e.target.closest('.todo-item');
    if (!item) return;
    longPressTimer = setTimeout(() => {
      navigator.vibrate && navigator.vibrate(30);
      toggleSelect(+item.dataset.id);
    }, 500);
  }, { passive: true });
  document.getElementById('todoList').addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
  });
});

// ── Init ─────────────────────────────────────────────────────
loadCategoryPills();
load().then(() => maybeHandleTodoSeed());

// ── Seed-from-daily-log (v202604.139) ──────────────────────────
// When todos.html opens with ?seed=N, fetch the daily log entry,
// open the Add drawer pre-filled with the entry text. On save the
// daily log is PATCHed with the promotion link.
async function maybeHandleTodoSeed() {
  const params = new URLSearchParams(window.location.search);
  const seedId = params.get('seed');
  if (!seedId) return;
  let entry;
  try {
    entry = await window.api('GET', `/daily-log/${seedId}`);
  } catch {
    if (window.LT?.toast) LT.toast('Could not load daily log entry to promote', 'err');
    return;
  }
  await openAdd();
  // Pre-fill: daily log entry_text → todo title (truncated) + notes (full)
  const text = entry.entry_text || '';
  if ($('fTitle')) $('fTitle').value = text.slice(0, 80);
  if ($('fNotes')) $('fNotes').value = text;
  // Daily log carries family member ids in memory_members
  const memberIds = (entry.memory_members || []).map(m => m.family_member_id);
  if (memberIds.length && window.GH_FAMILY) {
    GH_FAMILY.init('todoFamilyWrap', memberIds);
  }
  window._seedDailyLogId = parseInt(seedId, 10);
  if (window.history?.replaceState) {
    window.history.replaceState({}, '', window.location.pathname);
  }
}

// ── Tags (todos) ───────────────────────────────────────────────
let todoFormTags = [];
function renderTodoTags() {
  const wrap=$('todoTagsWrap'), input=$('todoTagInput'); if(!wrap||!input) return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  todoFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{todoFormTags=todoFormTags.filter(x=>x!==t);renderTodoTags();});
    wrap.insertBefore(chip,input);
  });
}
function addTodoTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!todoFormTags.includes(t)).forEach(t=>todoFormTags.push(t));
  renderTodoTags(); const inp=$('todoTagInput'); if(inp)inp.value='';
}
function initTodoTags(existing){
  todoFormTags=(existing||[]).slice(); renderTodoTags();
  const inp=$('todoTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addTodoTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&todoFormTags.length){todoFormTags.pop();renderTodoTags();}};
  inp.onblur=()=>{if(inp.value.trim())addTodoTag(inp.value);};
  GH_TAGS.init({inputId:'todoTagInput',wrapId:'todoTagsWrap',module:'todos',getFormTags:()=>todoFormTags,addTag:t=>addTodoTag(t),allowCreate:true});
function triggerTodoSuggest() {
  const cat  = document.getElementById('fCategory')?.value || '';
  const name = document.getElementById('fTitle')?.value || '';
  GH_TAGS.suggest('todoTagsWrap', ()=>todoFormTags, t=>addTodoTag(t), { category: cat, name });
}

  GH_FAMILY.init('todoFamilyWrap', t?.family_members||[]);
}

// ── Top-level view switcher: Todos | Templates ────────────────
(function(){
  const tabs = document.querySelectorAll('#topViewTabs .view-tab[data-view]');
  function setView(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
    const todosV = document.getElementById('todosView');
    const tplV   = document.getElementById('templatesView');
    const fab    = document.getElementById('fabBtn');
    if (name === 'templates') {
      todosV.style.display = 'none';
      tplV.style.display = 'block';
      if (fab) fab.style.display = 'none';
      tplLoadList();
      if (location.hash !== '#templates') history.replaceState(null,'','#templates');
    } else {
      todosV.style.display = '';
      tplV.style.display = 'none';
      if (fab) fab.style.display = '';
      if (location.hash === '#templates') history.replaceState(null,'',location.pathname);
    }
  }
  tabs.forEach(t => t.addEventListener('click', () => setView(t.dataset.view)));
  // honor #templates deep link
  if (location.hash === '#templates') {
    document.addEventListener('DOMContentLoaded', () => setView('templates'));
  }
  window._ghTodosSetView = setView;
})();

// ── Templates panel: wrapped IIFE (folded from templates.html) ──
(function(){
  let editingId = null;
  let taskRows = [];
  function tplEsc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function loadList() {
    const el = document.getElementById('templateList');
    if (!el) return;
    try {
      const templates = await window.api('GET', '/templates');
      if (!templates.length) {
        el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">No templates yet. Create one to apply checklists to your todos.</div>';
        return;
      }
      el.innerHTML = templates.map(t => `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <div>
              <span style="font-weight:700;color:var(--text)">${tplEsc(t.name)}</span>
              ${t.category ? `<span style="margin-left:8px;font-size:11px;color:var(--accent)">${tplEsc(t.category)}</span>` : ''}
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-primary" style="padding:4px 12px;font-size:12px" onclick="tplApply(${t.id},'${tplEsc(t.name).replace(/'/g,"\\'")}')">▶ Apply</button>
              <button class="btn btn-ghost" style="padding:4px 8px" onclick="tplEdit(${t.id})">✏️</button>
              <button class="btn btn-ghost" style="padding:4px 8px;color:var(--red)" onclick="tplDelete(${t.id})">✕</button>
            </div>
          </div>
          ${t.description ? `<div style="font-size:13px;color:var(--text2);margin-bottom:4px">${tplEsc(t.description)}</div>` : ''}
          <div style="font-size:12px;color:var(--text3)">${t.item_count} task${t.item_count!==1?'s':''}</div>
        </div>`).join('');
    } catch(e) { el.innerHTML = `<div style="color:var(--red);padding:16px">${tplEsc(e.message)}</div>`; }
  }

  async function getItemCount(id) {
    try { const t = await window.api('GET', `/templates/${id}`); return t.items?.length || 0; } catch { return '?'; }
  }

  async function applyTpl(id, name) {
    if (!confirm(`Apply "${name}"? This will create ${await getItemCount(id)} new todos.`)) return;
    try {
      const r = await window.api('POST', `/templates/${id}/apply`, {});
      if (typeof toast === 'function') toast(`Created ${r.created} todo${r.created!==1?'s':''}`);
      // refresh todos list if user goes back to that view
      if (typeof load === 'function') load();
    } catch(e) { if (typeof toast === 'function') toast(e.message, 'err'); }
  }

  function openDrawer(template=null) {
    editingId = template?.id || null;
    document.getElementById('tplDrawerTitle').textContent = template ? 'Edit Template' : 'New Template';
    document.getElementById('tplName').value = template?.name || '';
    document.getElementById('tplCategory').value = template?.category || '';
    document.getElementById('tplDesc').value = template?.description || '';
    taskRows = (template?.items || []).map(i => ({title:i.title,priority:i.priority||'medium',offset:i.due_days_offset||0}));
    if (!taskRows.length) taskRows = [{title:'',priority:'medium',offset:0}];
    renderTaskRows();
    document.getElementById('tplDrawer').classList.add('open');
  }

  function renderTaskRows() {
    document.getElementById('tplTasks').innerHTML = taskRows.map((row, i) => `
      <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
        <input class="form-input" value="${tplEsc(row.title)}" placeholder="Task title" oninput="window._tplRows[${i}].title=this.value" style="flex:1">
        <select class="form-select" style="width:90px" onchange="window._tplRows[${i}].priority=this.value">
          ${['low','medium','high','urgent'].map(p=>`<option value="${p}" ${row.priority===p?'selected':''}>${p}</option>`).join('')}
        </select>
        <button class="btn btn-ghost" style="padding:4px 8px;color:var(--red);flex-shrink:0" onclick="tplRemoveRow(${i})">✕</button>
      </div>`).join('');
    window._tplRows = taskRows; // expose for inline oninput
  }

  function addRow(){ taskRows.push({title:'',priority:'medium',offset:0}); renderTaskRows(); }
  function removeRow(i){ taskRows.splice(i,1); renderTaskRows(); }

  async function saveTpl() {
    const name = document.getElementById('tplName').value.trim();
    if (!name) { if (typeof toast==='function') toast('Name required','err'); return; }
    const payload = {
      name,
      category: document.getElementById('tplCategory').value.trim() || null,
      description: document.getElementById('tplDesc').value.trim() || null,
      items: taskRows.filter(r=>r.title.trim()).map((r,i)=>({...r,sort_order:i}))
    };
    try {
      if (editingId) { await window.api('PUT', `/templates/${editingId}`, payload); if (typeof toast==='function') toast('Updated'); }
      else { await window.api('POST', '/templates', payload); if (typeof toast==='function') toast('Created'); }
      closeDrawer(); loadList();
    } catch(e) { if (typeof toast==='function') toast(e.message,'err'); }
  }

  async function editTpl(id) { try { const t = await window.api('GET', `/templates/${id}`); openDrawer(t); } catch(e){ if (typeof toast==='function') toast(e.message,'err'); } }
  async function deleteTpl(id) {
    if (!confirm('Delete this template?')) return;
    try { await window.api('DELETE', `/templates/${id}`); if (typeof toast==='function') toast('Deleted'); loadList(); }
    catch(e) { if (typeof toast==='function') toast(e.message,'err'); }
  }
  function closeDrawer() { document.getElementById('tplDrawer').classList.remove('open'); }

  // Expose to inline handlers + view switcher
  window.tplOpenDrawer  = () => openDrawer(null);
  window.tplCloseDrawer = closeDrawer;
  window.tplAddTaskRow  = addRow;
  window.tplRemoveRow   = removeRow;
  window.tplSaveTemplate= saveTpl;
  window.tplEdit        = editTpl;
  window.tplDelete      = deleteTpl;
  window.tplApply       = applyTpl;
  window.tplLoadList    = loadList;
})();

</script>
