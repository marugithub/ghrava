async function callProvider(prompt, provider, apiKeys) {
  const key = (apiKeys || {})[provider] || '';

  if (provider === 'gemini') {
    if (!key) throw new Error('Gemini API key not set — go to Settings');
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] }) }
    );
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  }

  if (provider === 'deepseek') {
    if (!key) throw new Error('DeepSeek API key not set — go to Settings');
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body: JSON.stringify({ model:'deepseek-chat', max_tokens:1000,
        messages:[{ role:'user', content: prompt }] }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return d.choices[0].message.content;
  }

  if (provider === 'openai') {
    if (!key) throw new Error('OpenAI API key not set — go to Settings');
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body: JSON.stringify({ model:'gpt-4o-mini', max_tokens:1000,
        messages:[{ role:'user', content: prompt }] }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices[0].message.content;
  }

  if (provider === 'claudeHaiku' || provider === 'claudeSonnet') {
    if (!key) throw new Error('Anthropic API key not set — go to Settings');
    const model = provider === 'claudeHaiku' ? 'claude-haiku-4-5-20251001' : 'claude-sonnet-4-6';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({ model, max_tokens:1000,
        messages:[{ role:'user', content: prompt }] }),
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content[0].text;
  }

  throw new Error(`Unknown provider: ${provider}`);
}

// Error categories for clear user messages
const ERR = {
  RATE_LIMIT:   'rate_limit',
  BAD_KEY:      'bad_key',
  NO_DATA:      'no_data',
  NETWORK:      'network',
  FREE_EXPIRED: 'free_expired',
};

function classifyError(text) {
  const t = (text||'').toLowerCase();
  if (t.includes('rate limit') || t.includes('too many') || t.includes('429') || t.includes('quota')) return ERR.RATE_LIMIT;
  if (t.includes('invalid') && (t.includes('key') || t.includes('token') || t.includes('api'))) return ERR.BAD_KEY;
  if (t.includes('premium') || t.includes('subscription') || t.includes('upgrade') || t.includes('limit: 0')) return ERR.FREE_EXPIRED;
  if (t.includes('network') || t.includes('fetch') || t.includes('failed')) return ERR.NETWORK;
  return ERR.NO_DATA;
}

const ERR_MSG = {
  [ERR.RATE_LIMIT]:   'Rate limit hit — too many requests',
  [ERR.BAD_KEY]:      'Invalid API key — check Settings',
  [ERR.FREE_EXPIRED]: 'Free tier quota reached for today',
  [ERR.NETWORK]:      'Network error — check your connection',
  [ERR.NO_DATA]:      'No data returned for this symbol',
};

// ─── Individual provider fetchers ────────────────────────────────

async function _fetchYahoo(symbol) {
  const r = await fetch(`/api/v1/trading/market/quote/${symbol.toUpperCase()}`);
  const d = await r.json();
  if (!r.ok) throw Object.assign(new Error(d.error||'Yahoo proxy failed'), { errType: classifyError(d.detail||d.error||'') });
  if (!d.price) throw Object.assign(new Error('No price data'), { errType: ERR.NO_DATA });
  return { ...d, _source: 'Yahoo Finance' };
}

async function _fetchFinnhub(symbol, key) {
  if (!key) throw Object.assign(new Error('No Finnhub key'), { errType: ERR.BAD_KEY });
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol.toUpperCase()}&token=${key}`);
  const d = await r.json();
  if (d.error) throw Object.assign(new Error(d.error), { errType: classifyError(d.error) });
  if (!d.c || d.c === 0) throw Object.assign(new Error('No data for symbol'), { errType: ERR.NO_DATA });
  const chg = d.d ?? (d.c - d.pc);
  const pct = d.dp ?? (d.pc > 0 ? (chg/d.pc)*100 : 0);
  return { price:parseFloat(d.c), chg:parseFloat(chg), pct:parseFloat(pct),
    h:parseFloat(d.h), l:parseFloat(d.l), vol:'—', _source:'Finnhub' };
}

async function _fetchAV(symbol, key) {
  if (!key) throw Object.assign(new Error('No Alpha Vantage key'), { errType: ERR.BAD_KEY });
  const r = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${key}`);
  const d = await r.json();
  if (d.Note || d.Information) {
    const errType = (d.Note||d.Information||'').toLowerCase().includes('premium') ? ERR.FREE_EXPIRED : ERR.RATE_LIMIT;
    throw Object.assign(new Error(d.Note||d.Information), { errType });
  }
  const q = d['Global Quote'];
  if (!q || !q['05. price']) throw Object.assign(new Error('No data'), { errType: ERR.NO_DATA });
  return { price:parseFloat(q['05. price']), chg:parseFloat(q['09. change']),
    pct:parseFloat(q['10. change percent']), vol:q['06. volume'],
    h:parseFloat(q['03. high']), l:parseFloat(q['04. low']), _source:'Alpha Vantage' };
}

// ─── Fallback chain ───────────────────────────────────────────────
// Returns { quote, source, warnings }
// warnings = array of { provider, reason } for each failed attempt
async function fetchQuote(symbol, settings) {
  const s = settings || {};
  const primary   = s.marketProvider || 'yahoo';
  const warnings  = [];

  // Build ordered provider list: primary first, then fallbacks
  const allProviders = ['yahoo', 'finnhub', 'av'];
  const ordered = [primary, ...allProviders.filter(p => p !== primary)];

  for (const provider of ordered) {
    try {
      let q = null;
      if (provider === 'yahoo')   q = await _fetchYahoo(symbol);
      if (provider === 'finnhub') q = await _fetchFinnhub(symbol, s.finnhubKey);
      if (provider === 'av')      q = await _fetchAV(symbol, s.avKey);
      if (q) return { quote: q, source: q._source, warnings };
    } catch (e) {
      const reason = ERR_MSG[e.errType] || e.message || 'Unknown error';
      warnings.push({ provider: providerLabel(provider), reason });
      // Don't try providers with no key configured
      if (e.errType === ERR.BAD_KEY) continue;
    }
  }
  return { quote: null, source: null, warnings };
}

// Simple version for backward compat — returns quote or null
async function fetchQuoteSimple(symbol, settings) {
  const { quote } = await fetchQuote(symbol, settings);
  return quote;
}

function providerLabel(p) {
  return p==='yahoo'?'Yahoo Finance':p==='finnhub'?'Finnhub':p==='av'?'Alpha Vantage':p;
}

// Keep avFetchQuote for news tab
async function avFetchQuote(symbol, apiKey) {
  try { return await _fetchAV(symbol, apiKey); } catch { return null; }
}

const Inp = ({ value, onChange, placeholder, style, onKeyDown, type='text' }) => (
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    type={type} onKeyDown={onKeyDown}
    style={{ background:C.bg, border:`1.5px solid ${C.border2}`, color:C.text,
      padding:'7px 12px', borderRadius:6, fontFamily:'inherit',
      fontSize:13, outline:'none', transition:'border-color 0.15s',
      '::placeholder':{ color:C.dimmed }, ...style }} />
);
const Sel = ({ value, onChange, options, style }) => (
  <select value={value} onChange={e=>onChange(e.target.value)}
    style={{ background:C.panel, border:`1.5px solid ${C.border2}`, color:C.text,
      padding:'7px 12px', borderRadius:6, fontFamily:'inherit',
      fontSize:13, cursor:'pointer', outline:'none', ...style }}>
    {options.map(o => <option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}
  </select>
);
const Spinner = ({ text='Loading…' }) => (
  <div style={{ color:C.blue, textAlign:'center', padding:48 }}>
    <div style={{ fontSize:28, animation:'spin 1s linear infinite', display:'inline-block', marginBottom:12 }}>⟳</div>
    <div style={{ fontSize:14, color:C.muted }}>{text}</div>
  </div>
);

// Shows which provider succeeded + any fallback warnings
const DataSourceBadge = ({ source, warnings=[] }) => {
  const [open, setOpen] = useState(false);
  if (!source && warnings.length === 0) return null;
  const hasFallback = warnings.length > 0;
  return (
    <div style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
      {source && (
        <span onClick={()=>hasFallback&&setOpen(o=>!o)}
          style={{ display:'inline-flex', alignItems:'center', gap:5,
            background: hasFallback ? C.amber+'20' : C.green+'20',
            border:`1px solid ${hasFallback?C.amber:C.green}44`,
            borderRadius:6, padding:'3px 9px', fontSize:11, fontWeight:600,
            cursor: hasFallback ? 'pointer' : 'default',
            color: hasFallback ? C.amber : C.green }}>
          {hasFallback ? '⚠' : '✓'} {source}
          {hasFallback && <span style={{ fontSize:10 }}>▾</span>}
        </span>
      )}
      {!source && warnings.length > 0 && (
        <span style={{ color:C.red, fontSize:11, fontWeight:600 }}>✕ All providers failed</span>
      )}
      {open && hasFallback && (
        <div style={{ position:'absolute', top:'100%', left:0, zIndex:50, marginTop:4,
          background:C.panel, border:`1px solid ${C.border}`, borderRadius:8,
          padding:12, minWidth:280, boxShadow:'0 4px 16px rgba(0,0,0,0.4)' }}>
          <div style={{ color:C.muted, fontSize:11, marginBottom:8, fontWeight:600 }}>FALLBACK CHAIN</div>
          {warnings.map((w,i)=>(
            <div key={i} style={{ display:'flex', gap:8, marginBottom:6, fontSize:12 }}>
              <span style={{ color:C.red, fontWeight:600, flexShrink:0 }}>✕ {w.provider}</span>
              <span style={{ color:C.muted }}>{w.reason}</span>
            </div>
          ))}
          <div style={{ borderTop:`1px solid ${C.border}`, marginTop:8, paddingTop:8,
            color:C.green, fontSize:12 }}>✓ Using {source} as fallback</div>
        </div>
      )}
    </div>
  );
};

const AIResultCard = ({ result, symbol }) => {
  if (!result) return <div style={{ color:C.red }}>Analysis failed. Check your API key in Settings.</div>;
  const ac = result.action==='BUY' ? C.green : result.action==='SELL'||result.action==='AVOID' ? C.red : C.amber;
  const conf = result.confidence || 5;
  const cc = conf>=7 ? C.green : conf>=5 ? C.amber : C.red;
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12, flexWrap:'wrap' }}>
        <span style={{ color:C.text, fontWeight:'bold', fontSize:15 }}>{symbol}</span>
        <Tag color={ac}>{result.action}</Tag>
        <Tag color={cc}>CONF {conf}/10</Tag>
        <Tag color={C.blue}>R/R {result.risk_reward}</Tag>
        <Tag color={C.purple}>⏱ {result.timeframe}</Tag>
        {result._provider && <Tag color={C.muted}>{result._provider}</Tag>}
        {result._date && <span style={{ color:C.dimmed, fontSize:13 }}>{new Date(result._date).toLocaleString()}</span>}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:12 }}>
        {[['ENTRY', result.entry_price, C.blue, result.entry_note],
          ['TARGET', result.target_price, C.green, null],
          ['STOP LOSS', result.stop_loss, C.red, null]
        ].map(([label, val, color, note]) => (
          <div key={label} style={{ background:color+'12', border:`1px solid ${color}44`, borderRadius:3, padding:14, textAlign:'center' }}>
            <div style={{ color:C.muted, fontSize:13, letterSpacing:2, marginBottom:4 }}>{label}</div>
            <div style={{ color, fontWeight:700, fontSize:22 }}>{fmtP(val)}</div>
            {note && <div style={{ color:C.muted, fontSize:13, marginTop:3 }}>{note}</div>}
          </div>
        ))}
      </div>
      <div style={{ color:C.text, lineHeight:1.7, marginBottom:8 }}>{result.thesis}</div>
      {result.technicals && <div style={{ color:C.amber, fontSize:13, marginBottom:8 }}>📐 {result.technicals}</div>}
      {result.options_play && result.options_play !== 'null' && (
        <div style={{ background:C.blue+'12', border:`1px solid ${C.blue}33`, borderRadius:3, padding:'8px 12px', marginBottom:8 }}>
          <span style={{ color:C.blue, fontWeight:'bold', fontSize:13, letterSpacing:1 }}>OPTIONS PLAY  </span>
          <span style={{ color:C.text, fontSize:13 }}>{result.options_play}</span>
        </div>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
        {result.catalysts?.length > 0 && (
          <div>
            <div style={{ color:C.muted, fontSize:13, letterSpacing:2, marginBottom:5 }}>CATALYSTS</div>
            {result.catalysts.map((c,i) => <div key={i} style={{ color:C.green, fontSize:13, marginBottom:2 }}>▸ {c}</div>)}
          </div>
        )}
        {result.key_risks?.length > 0 && (
          <div>
            <div style={{ color:C.muted, fontSize:13, letterSpacing:2, marginBottom:5 }}>KEY RISKS</div>
            {result.key_risks.map((r,i) => <div key={i} style={{ color:C.red, fontSize:13, marginBottom:2 }}>⚠ {r}</div>)}
          </div>
        )}
      </div>
    </div>
  );
};

// WATCHLIST TAB
// ═══════════════════════════════════════════════════════════════
const WatchlistTab = ({ data, update, quotes, setQuotes }) => {
  const { watchlist=[], settings={} } = data;
  const [newTick, setNewTick] = useState('');
  const [busy, setBusy] = useState(false);
  const [aiSymbol, setAiSymbol] = useState(null);
  const [aiTf, setAiTf] = useState('swing (2–4 weeks)');
  const [aiResult, setAiResult] = useState(null);
  const [aiErr, setAiErr] = useState('');
  const [aiLoading, setAiLoading] = useState(false);

  const TFS = ['day trade (today)','swing (1–2 weeks)','swing (2–4 weeks)','medium term (1–3 months)','long term (6+ months)'];

  const [fetchStatus, setFetchStatus] = useState(null); // { source, warnings }

  const refresh = async () => {
    if (settings.demoMode) { setQuotes(MOCK_QUOTES); return; }
    setBusy(true); setFetchStatus(null);
    const updated = {};
    let lastStatus = null;
    for (const sym of watchlist) {
      const res = await fetchQuote(sym, settings);
      if (res.quote) updated[sym] = res.quote;
      lastStatus = { source: res.source, warnings: res.warnings };
      await sleep(300);
    }
    setQuotes(prev => ({ ...prev, ...updated }));
    setFetchStatus(lastStatus);
    setBusy(false);
  };

  const add = () => {
    const s = newTick.toUpperCase().trim();
    if (s && !watchlist.includes(s)) {
      const wl = [...watchlist, s];
      update({ watchlist: wl });
      if (settings.demoMode && MOCK_QUOTES[s]) setQuotes(p => ({ ...p, [s]: MOCK_QUOTES[s] }));
    }
    setNewTick('');
  };

  const remove = s => update({ watchlist: watchlist.filter(x => x !== s) });

  const analyze = async sym => {
    setAiSymbol(sym); setAiLoading(true); setAiResult(null); setAiErr('');
    try {
      const q = quotes[sym] || MOCK_QUOTES[sym];
      const r = await analyzeStock({ symbol:sym, quote:q, timeframe:aiTf, settings });
      setAiResult(r);
      const hist = [{ sym, tf:aiTf, action:r.action, confidence:r.confidence,
        entry:r.entry_price, target:r.target_price, stop:r.stop_loss,
        date:r._date, provider:r._provider }, ...(data.analysisHistory||[])].slice(0,50);
      update({ analysisHistory: hist });
    } catch(e) { setAiErr(e.message); }
    setAiLoading(false);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 380px', gap:14 }}>
      <Panel>
        <PanelTitle>WATCHLIST</PanelTitle>
        <div style={{ display:'flex', gap:8, marginBottom:12, flexWrap:'wrap', alignItems:'center' }}>
          <Inp value={newTick} onChange={setNewTick} placeholder="Add symbol…" style={{ width:130 }}
            onKeyDown={e=>e.key==='Enter'&&add()} />
          <Btn onClick={add}>+ ADD</Btn>
          <Btn onClick={refresh} color={C.amber} disabled={busy}>{busy?'⟳ FETCHING…':'⟳ REFRESH'}</Btn>
          {settings.demoMode && <Tag color={C.amber}>DEMO — SIMULATED PRICES</Tag>}
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'90px 80px 90px 90px 70px 70px 1fr',
          gap:8, padding:'6px 10px', color:C.muted, fontSize:13, letterSpacing:1, borderBottom:`1px solid ${C.border}` }}>
          {['SYMBOL','PRICE','CHANGE','CHG%','HIGH','LOW',''].map(h=><span key={h}>{h}</span>)}
        </div>
        {watchlist.map(sym => {
          const q = quotes[sym]; const up = (q?.chg??0)>=0; const nd = !q?.price;
          return (
            <div key={sym} style={{ display:'grid', gridTemplateColumns:'90px 80px 90px 90px 70px 70px 1fr',
              alignItems:'center', gap:8, padding:'8px 10px', borderBottom:`1px solid ${C.border}22`,
              borderLeft:`4px solid ${nd?C.muted:up?C.green:C.red}`, background:C.bg, borderRadius:'0 6px 6px 0' }}>
              <span style={{ color:C.text, fontWeight:'bold' }}>{sym}</span>
              <span style={{ color:C.text }}>{nd?'—':fmtP(q.price)}</span>
              <span style={{ color:nd?C.muted:up?C.green:C.red }}>{nd?'—':`${up?'+':''}${fmtNum(q.chg)}`}</span>
              <span style={{ color:nd?C.muted:up?C.green:C.red }}>{nd?'—':fmtPct(q.pct)}</span>
              <span style={{ color:C.muted, fontSize:13 }}>{q?.h?fmtP(q.h):'—'}</span>
              <span style={{ color:C.muted, fontSize:13 }}>{q?.l?fmtP(q.l):'—'}</span>
              <div style={{ display:'flex', gap:5, justifyContent:'flex-end' }}>
                <Btn small color={C.blue} onClick={()=>analyze(sym)}>AI ▶</Btn>
                <Btn small color={C.red} onClick={()=>remove(sym)}>✕</Btn>
              </div>
            </div>
          );
        })}
        {watchlist.length===0 && <div style={{ color:C.muted, textAlign:'center', padding:30 }}>Watchlist empty.</div>}
      </Panel>

      <Panel>
        <PanelTitle>AI QUICK ANALYSIS</PanelTitle>
        <div style={{ color:C.muted, fontSize:13, marginBottom:8 }}>
          Click <span style={{ color:C.blue }}>AI ▶</span> on any row. Provider: <span style={{ color:C.green }}>{PROVIDERS[settings.provider]?.name||settings.provider}</span>
        </div>
        <Sel value={aiTf} onChange={setAiTf} options={TFS.map(t=>({value:t,label:t}))} style={{ width:'100%', marginBottom:10 }} />
        {aiLoading && <Spinner text={`Analyzing ${aiSymbol}…`} />}
        {aiErr && <div style={{ color:C.red, fontSize:13 }}>⚠ {aiErr}</div>}
        {!aiLoading && !aiErr && aiResult && <AIResultCard result={aiResult} symbol={aiSymbol} />}
        {!aiLoading && !aiResult && !aiErr && (
          <div style={{ color:C.dimmed, fontSize:13, textAlign:'center', paddingTop:20 }}>
            Select a stock and click AI ▶ to get entry/exit signals
          </div>
        )}
      </Panel>
    </div>
  );
};

// AI ANALYST TAB
// ═══════════════════════════════════════════════════════════════
const AIAnalystTab = ({ data, update, quotes }) => {
  const { settings={}, analysisHistory=[] } = data;
  const [sym, setSym] = useState('');
  const [tf, setTf] = useState('swing (2–4 weeks)');
  const [ctx, setCtx] = useState('');
  const [result, setResult] = useState(null);
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const TFS = [
    { value:'day trade (same day, in and out)', label:'📈 Day Trade' },
    { value:'swing (1–2 weeks)', label:'🔄 Swing 1–2 wks' },
    { value:'swing (2–4 weeks)', label:'🔄 Swing 2–4 wks' },
    { value:'medium term (1–3 months)', label:'📅 Medium 1–3 mo' },
    { value:'long term (6–12 months)', label:'🎯 Long 6–12 mo' },
  ];

  const run = async () => {
    const s = sym.toUpperCase().trim();
    if (!s) return;
    setLoading(true); setResult(null); setErr(''); setSaved(false);
    try {
      let q = quotes[s] || MOCK_QUOTES[s]; if (!q && !settings?.demoMode) { const res = await fetchQuote(s, settings); q = res?.quote; }
      const r = await analyzeStock({ symbol:s, quote:q, timeframe:tf, context:ctx, settings });
      setResult({ ...r, _sym:s });
      const hist = [{ sym:s, tf, action:r.action, confidence:r.confidence,
        entry:r.entry_price, target:r.target_price, stop:r.stop_loss,
        date:r._date, provider:r._provider }, ...analysisHistory].slice(0,50);
      update({ analysisHistory: hist });
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const saveReport = async () => {
    if (!result) return;
    setSaving(true);
    const title = `${result._sym} ${result.action} — ${tf}`;
    await persistReport('AI Analysis', title, result._sym, { symbol:result._sym, timeframe:tf, context:ctx, result });
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false), 3000);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 260px', gap:14 }}>
      <div>
        <Panel style={{ marginBottom:12 }}>
          <PanelTitle>AI ANALYST — ENTRY & EXIT SIGNALS</PanelTitle>
          <div style={{ color:C.muted, fontSize:13, marginBottom:8 }}>
            Provider: <span style={{ color:PROVIDERS[settings.provider]?.color||C.blue }}>{PROVIDERS[settings.provider]?.name||settings.provider}</span>
            &nbsp;·&nbsp;<span style={{ color:PROVIDERS[settings.provider]?.free?C.green:C.amber }}>{PROVIDERS[settings.provider]?.badge}</span>
          </div>
          <div style={{ display:'flex', gap:8, marginBottom:10, flexWrap:'wrap' }}>
            <Inp value={sym} onChange={setSym} placeholder="Ticker e.g. NVDA" style={{ width:140 }} onKeyDown={e=>e.key==='Enter'&&run()} />
            <Sel value={tf} onChange={setTf} options={TFS} style={{ minWidth:160 }} />
            <Btn onClick={run} color={C.green} disabled={loading}>{loading?'⟳ ANALYZING…':'▶ RUN ANALYSIS'}</Btn>
          </div>
          <textarea value={ctx} onChange={e=>setCtx(e.target.value)}
            placeholder="Optional context: 'earnings next week', 'I own 50 shares at $190', 'bearish on tech', etc."
            style={{ width:'100%', background:C.bg, border:`1px solid ${C.border2}`, color:C.text,
              padding:'8px 10px', borderRadius:3, fontFamily:'"Courier New",monospace',
              fontSize:13, resize:'vertical', minHeight:50, outline:'none' }} />
        </Panel>
        {loading && <Panel><Spinner text={`${PROVIDERS[settings.provider]?.name||'AI'} analyzing ${sym.toUpperCase()||'…'}`} /></Panel>}
        {err && <Panel><div style={{ color:C.red }}>⚠ {err}</div></Panel>}
        {!loading && result && (
          <Panel>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div style={{ color:C.muted, fontSize:13 }}>Generated: {result._date ? new Date(result._date).toLocaleString() : '—'}</div>
              <div style={{ display:'flex', gap:8 }}>
                {saved && <Tag color={C.green}>✓ SAVED</Tag>}
                <Btn small color={C.amber} onClick={saveReport} disabled={saving}>
                  {saving?'SAVING…':'💾 SAVE REPORT'}
                </Btn>
              </div>
            </div>
            <AIResultCard result={result} symbol={result._sym} />
          </Panel>
        )}
      </div>
      <div>
        <Panel>
          <PanelTitle>ANALYSIS HISTORY</PanelTitle>
          <div style={{ color:C.dimmed, fontSize:13, marginBottom:10 }}>Last 50 • auto-saved</div>
          {analysisHistory.length===0
            ? <div style={{ color:C.muted, fontSize:13 }}>No analyses yet.</div>
            : analysisHistory.map((h,i) => {
              const ac = h.action==='BUY'?C.green:h.action==='SELL'?C.red:C.amber;
              return (
                <div key={i} style={{ borderBottom:`1px solid ${C.border}`, paddingBottom:8, marginBottom:8 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:3 }}>
                    <span style={{ color:C.text, fontWeight:'bold' }}>{h.sym}</span>
                    <Tag color={ac}>{h.action}</Tag>
                  </div>
                  <div style={{ color:C.muted, fontSize:13, display:'flex', gap:8, flexWrap:'wrap' }}>
                    <span>In {fmtP(h.entry)}</span><span>→ {fmtP(h.target)}</span><span>Stop {fmtP(h.stop)}</span>
                  </div>
                  {h.date && <div style={{ color:C.dimmed, fontSize:13, marginTop:2 }}>{new Date(h.date).toLocaleString()}</div>}
                </div>
              );
            })
          }
        </Panel>
      </div>
    </div>
  );
};

// PORTFOLIO TAB
// ═══════════════════════════════════════════════════════════════
const PortfolioTab = ({ data, update, quotes }) => {
  const { portfolio=[], settings={} } = data;
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ symbol:'', shares:'', cost:'', type:'stock', notes:'' });
  const [analyzing, setAnalyzing] = useState(null);
  const [posResult, setPosResult] = useState({});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const getPrice = p => quotes[p.symbol]?.price ?? p.cost;
  const totalCost  = portfolio.reduce((a,p) => a + p.shares*p.cost, 0);
  const totalValue = portfolio.reduce((a,p) => a + p.shares*getPrice(p), 0);
  const totalPnl   = totalValue - totalCost;
  const totalPct   = totalCost>0 ? (totalPnl/totalCost)*100 : 0;

  const add = () => {
    const s = form.symbol.toUpperCase().trim();
    if (!s||!form.shares||!form.cost) return;
    const pos = { id:Date.now(), symbol:s, shares:parseFloat(form.shares), cost:parseFloat(form.cost), type:form.type, notes:form.notes, addedAt:nowISO() };
    update({ portfolio:[...portfolio, pos] });
    setForm({ symbol:'', shares:'', cost:'', type:'stock', notes:'' });
    setShowForm(false);
  };

  const remove = id => update({ portfolio: portfolio.filter(p=>p.id!==id) });

  const analyzePos = async pos => {
    setAnalyzing(pos.id);
    const q = quotes[pos.symbol]||MOCK_QUOTES[pos.symbol];
    const ctx = `I own ${pos.shares} shares at avg cost $${pos.cost}. Current P&L: ${fmtPct(((getPrice(pos)-pos.cost)/pos.cost)*100)}.`;
    try {
      const r = await analyzeStock({ symbol:pos.symbol, quote:q, timeframe:'medium to long term', context:ctx, settings });
      setPosResult(prev=>({...prev,[pos.id]:r}));
    } catch(e) { alert(e.message); }
    setAnalyzing(null);
  };

  const saveReport = async () => {
    setSaving(true);
    const reportData = {
      summary: { totalValue, totalCost, totalPnl, totalPct },
      positions: portfolio.map(p => {
        const curr=getPrice(p), val=p.shares*curr, cost=p.shares*p.cost;
        return { ...p, currentPrice:curr, marketValue:val, pnl:val-cost, pnlPct:cost>0?(val-cost)/cost*100:0 };
      }),
      generatedAt: nowISO(),
    };
    await persistReport('Portfolio Snapshot', `Portfolio Snapshot — ${new Date().toLocaleDateString()}`, null, reportData);
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  };

  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:14 }}>
        {[['PORTFOLIO VALUE',`$${totalValue.toFixed(2)}`,C.text],
          ['TOTAL COST',`$${totalCost.toFixed(2)}`,C.muted],
          ['TOTAL P&L',`${totalPnl>=0?'+':''}$${Math.abs(totalPnl).toFixed(2)}`,pColor(totalPnl)],
          ['RETURN',fmtPct(totalPct),pColor(totalPct)],
        ].map(([label,val,color])=>(
          <Panel key={label} style={{ textAlign:'center' }}>
            <div style={{ color:C.muted, fontSize:13, letterSpacing:2, marginBottom:6 }}>{label}</div>
            <div style={{ color, fontSize:20, fontWeight:'bold' }}>{val}</div>
          </Panel>
        ))}
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:12 }}>
        <Btn onClick={()=>setShowForm(!showForm)}>+ ADD POSITION</Btn>
        {saved && <Tag color={C.green}>✓ REPORT SAVED</Tag>}
        <Btn onClick={saveReport} color={C.amber} disabled={saving||portfolio.length===0}>
          {saving?'SAVING…':'💾 SAVE SNAPSHOT'}
        </Btn>
      </div>
      {showForm && (
        <Panel style={{ marginBottom:14 }}>
          <PanelTitle>NEW POSITION</PanelTitle>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'flex-end' }}>
            {[['SYMBOL','symbol','AAPL',90,null],['SHARES','shares','100',90,'number'],['AVG COST ($)','cost','185.00',100,'number']].map(([lbl,fld,ph,w,t])=>(
              <div key={fld}>
                <div style={{ color:C.muted, fontSize:13, marginBottom:4 }}>{lbl}</div>
                <Inp value={form[fld]} onChange={v=>setForm(f=>({...f,[fld]:v}))} placeholder={ph} style={{ width:w }} type={t||'text'} />
              </div>
            ))}
            <div>
              <div style={{ color:C.muted, fontSize:13, marginBottom:4 }}>TYPE</div>
              <Sel value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={['stock','etf','option']} style={{ width:90 }} />
            </div>
            <div>
              <div style={{ color:C.muted, fontSize:13, marginBottom:4 }}>NOTES</div>
              <Inp value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} placeholder="Optional" style={{ width:180 }} />
            </div>
            <Btn onClick={add} color={C.green}>ADD</Btn>
          </div>
        </Panel>
      )}
      <Panel style={{ overflowX:'auto' }}>
        {portfolio.length===0
          ? <div style={{ color:C.muted, textAlign:'center', padding:40 }}>No positions yet.</div>
          : <>
            <div style={{ display:'grid', gridTemplateColumns:'80px 55px 70px 75px 80px 90px 90px 75px 1fr',
              gap:8, padding:'6px 10px', color:C.muted, fontSize:13, letterSpacing:1, borderBottom:`1px solid ${C.border}` }}>
              {['SYMBOL','TYPE','SHARES','AVG COST','CUR PRICE','MKT VALUE','P&L','RETURN',''].map(h=><span key={h}>{h}</span>)}
            </div>
            {portfolio.map(p => {
              const curr=getPrice(p), val=p.shares*curr, cost=p.shares*p.cost, pnl=val-cost, pct=cost>0?(pnl/cost)*100:0, r=posResult[p.id];
              return (
                <div key={p.id}>
                  <div style={{ display:'grid', gridTemplateColumns:'80px 55px 70px 75px 80px 90px 90px 75px 1fr',
                    gap:8, padding:'9px 10px', borderBottom:`1px solid ${C.border}22`, alignItems:'center' }}>
                    <span style={{ color:C.text, fontWeight:'bold' }}>{p.symbol}</span>
                    <Tag color={C.muted}>{p.type.toUpperCase()}</Tag>
                    <span style={{ color:C.text }}>{p.shares}</span>
                    <span style={{ color:C.text }}>{fmtP(p.cost)}</span>
                    <span style={{ color:C.text }}>{fmtP(curr)}</span>
                    <span style={{ color:C.text }}>${val.toFixed(2)}</span>
                    <span style={{ color:pColor(pnl) }}>{pnl>=0?'+':''}${Math.abs(pnl).toFixed(2)}</span>
                    <span style={{ color:pColor(pct) }}>{fmtPct(pct)}</span>
                    <div style={{ display:'flex', gap:5 }}>
                      <Btn small color={C.blue} onClick={()=>analyzePos(p)} disabled={analyzing===p.id}>{analyzing===p.id?'⟳':'AI ▶'}</Btn>
                      <Btn small color={C.red} onClick={()=>remove(p.id)}>✕</Btn>
                    </div>
                  </div>
                  {r && <div style={{ padding:'10px 10px 10px 20px', background:C.bg+'aa', borderBottom:`1px solid ${C.border}22` }}><AIResultCard result={r} symbol={p.symbol} /></div>}
                </div>
              );
            })}
          </>
        }
      </Panel>
    </div>
  );
};

// OPTIONS TAB
// ═══════════════════════════════════════════════════════════════
const OptionsTab = ({ data, quotes }) => {
  const { settings={} } = data;
  const [symbol, setSymbol] = useState('AAPL');
  const [expiry, setExpiry] = useState('');
  const [optType, setOptType] = useState('call');
  const [aiResult, setAiResult] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiErr, setAiErr] = useState('');

  const q  = quotes[symbol] || MOCK_QUOTES[symbol] || {};
  const sp = q.price || 200;
  const getExpiries = () => {
    const dates=[]; const d=new Date();
    while(dates.length<4){ d.setDate(d.getDate()+1); if(d.getDay()===5) dates.push(d.toISOString().slice(0,10)); }
    return dates;
  };
  const expiries = getExpiries();
  const selExp = expiry || expiries[1];
  const base = Math.round(sp/5)*5;
  const strikes = Array.from({length:13},(_,i)=>base+(i-6)*5);
  const mockOpt = strike => {
    const diff=optType==='call'?sp-strike:strike-sp;
    const intrinsic=Math.max(0,diff);
    const tv=Math.max(0.4,2.5+Math.random()*2-Math.abs(diff)*0.05);
    const raw=optType==='call'?0.5+(diff/sp)*1.8:-0.5-(diff/sp)*1.8;
    return {
      premium:(intrinsic+tv).toFixed(2), iv:(22+Math.random()*18).toFixed(1),
      delta:Math.min(0.99,Math.max(0.01,raw)).toFixed(2),
      gamma:(0.01+Math.random()*0.03).toFixed(4), theta:-(0.02+Math.random()*0.08).toFixed(4),
      vol:Math.floor(Math.random()*8000+200), oi:Math.floor(Math.random()*30000+1000),
      itm:diff>0,
    };
  };
  const getAI = async () => {
    setAiLoading(true); setAiResult(null); setAiErr('');
    try {
      const r = await analyzeStock({ symbol, quote:q, timeframe:`options expiring ${selExp}`,
        context:`Underlying: $${sp}. Looking for options strategy expiring ${selExp}.`, settings });
      setAiResult(r);
    } catch(e) { setAiErr(e.message); }
    setAiLoading(false);
  };
  const ac = optType==='call'?C.green:C.red;
  return (
    <div>
      <div style={{ display:'flex', gap:8, marginBottom:14, alignItems:'center', flexWrap:'wrap' }}>
        <Inp value={symbol} onChange={v=>setSymbol(v.toUpperCase())} placeholder="Symbol" style={{ width:90 }} />
        <Sel value={selExp} onChange={setExpiry} options={expiries.map(e=>({value:e,label:e}))} />
        <div style={{ display:'flex', gap:4 }}>
          {['call','put'].map(t=>(
            <Btn key={t} color={optType===t?(t==='call'?C.green:C.red):C.muted} onClick={()=>setOptType(t)}>{t.toUpperCase()}S</Btn>
          ))}
        </div>
        <Btn color={C.blue} onClick={getAI} disabled={aiLoading}>{aiLoading?'⟳ ANALYZING…':'🤖 AI OPTIONS STRATEGY'}</Btn>
        <Tag color={C.muted}>UNDERLYING {fmtP(sp)} · SIMULATED CHAIN</Tag>
      </div>
      {aiLoading && <Panel style={{ marginBottom:14 }}><Spinner text="Generating options strategy…" /></Panel>}
      {aiErr && <Panel style={{ marginBottom:14 }}><div style={{ color:C.red }}>⚠ {aiErr}</div></Panel>}
      {!aiLoading && aiResult && <Panel style={{ marginBottom:14 }}><PanelTitle>AI OPTIONS RECOMMENDATION — {symbol}</PanelTitle><AIResultCard result={aiResult} symbol={symbol} /></Panel>}
      <Panel style={{ overflowX:'auto' }}>
        <PanelTitle>{symbol} · {selExp} · {optType.toUpperCase()}S</PanelTitle>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead><tr style={{ color:C.muted, borderBottom:`1px solid ${C.border}` }}>
            {['ITM','STRIKE','LAST $','IV %','DELTA','GAMMA','THETA','VOLUME','OPEN INT'].map(h=>(
              <th key={h} style={{ textAlign:'left', padding:'6px 10px', fontWeight:'normal', letterSpacing:1 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{strikes.map(strike=>{
            const o=mockOpt(strike);
            return (<tr key={strike} style={{ borderBottom:`1px solid ${C.border}18`, background:o.itm?ac+'0a':'transparent' }}>
              <td style={{ padding:'7px 10px' }}>{o.itm?<Tag color={ac}>ITM</Tag>:<span style={{ color:C.muted,fontSize:13 }}>OTM</span>}</td>
              <td style={{ padding:'7px 10px', color:C.text, fontWeight:'bold' }}>${strike.toFixed(2)}</td>
              <td style={{ padding:'7px 10px', color:C.text }}>${o.premium}</td>
              <td style={{ padding:'7px 10px', color:C.amber }}>{o.iv}%</td>
              <td style={{ padding:'7px 10px', color:ac }}>{o.delta}</td>
              <td style={{ padding:'7px 10px', color:C.muted }}>{o.gamma}</td>
              <td style={{ padding:'7px 10px', color:C.red }}>{o.theta}</td>
              <td style={{ padding:'7px 10px', color:C.text }}>{o.vol.toLocaleString()}</td>
              <td style={{ padding:'7px 10px', color:C.muted }}>{o.oi.toLocaleString()}</td>
            </tr>);
          })}</tbody>
        </table>
      </Panel>
    </div>
  );
};

// NEWS TAB
// ═══════════════════════════════════════════════════════════════
const NewsTab = ({ data, quotes }) => {
  const { settings={}, watchlist=[] } = data;
  const [news, setNews] = useState(MOCK_NEWS);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState('ALL');
  const [analyzing, setAnalyzing] = useState(null);
  const [newsAI, setNewsAI] = useState({});

  const sentColor = s => { const l=(s||'').toLowerCase(); return l.includes('bull')||l.includes('pos')?C.green:l.includes('bear')||l.includes('neg')?C.red:C.amber; };

  const refresh = async () => {
    if (!settings.avKey) { setNews(MOCK_NEWS); return; }
    setLoading(true);
    try {
      const t = watchlist.slice(0,5).join(',');
      const r = await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${t}&limit=20&apikey=${settings.avKey}`);
      const d = await r.json();
      if (d.feed) setNews(d.feed.map(item=>({ title:item.title, source:item.source, time:item.time_published?.slice(0,8)||'—', sentiment:item.overall_sentiment_label||'Neutral', ticker:item.ticker_sentiment?.[0]?.ticker||'' })));
    } catch {}
    setLoading(false);
  };

  const askAI = async (item, idx) => {
    setAnalyzing(idx);
    const sym = item.ticker || watchlist[0] || 'SPY';
    const q = quotes[sym]||MOCK_QUOTES[sym];
    try {
      const r = await analyzeStock({ symbol:sym, quote:q, timeframe:'swing (1–2 weeks)',
        context:`News: "${item.title}" — how does this affect ${sym}?`, settings });
      setNewsAI(p=>({...p,[idx]:r}));
    } catch(e) { alert(e.message); }
    setAnalyzing(null);
  };

  const filtered = filter==='ALL' ? news : news.filter(n =>
    filter==='Bullish' ? sentColor(n.sentiment)===C.green :
    filter==='Bearish' ? sentColor(n.sentiment)===C.red : sentColor(n.sentiment)===C.amber
  );

  return (
    <div>
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
        <Btn onClick={refresh} color={C.amber} disabled={loading}>{loading?'⟳ LOADING…':'⟳ REFRESH'}</Btn>
        {['ALL','Bullish','Bearish','Neutral'].map(f=>(
          <Btn key={f} small color={filter===f?C.blue:C.muted} onClick={()=>setFilter(f)}>{f.toUpperCase()}</Btn>
        ))}
        {!settings.avKey && <Tag color={C.amber}>Add AV key in Settings for live news</Tag>}
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {filtered.map((item,i)=>(
          <Panel key={i} style={{ borderLeft:`3px solid ${sentColor(item.sentiment)}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', gap:12, alignItems:'flex-start' }}>
              <div style={{ flex:1 }}>
                <div style={{ color:C.text, marginBottom:5, lineHeight:1.5 }}>{item.title}</div>
                <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
                  <span style={{ color:C.muted, fontSize:13 }}>{item.source}</span>
                  <span style={{ color:C.dimmed }}>·</span>
                  <span style={{ color:C.muted, fontSize:13 }}>{item.time}</span>
                  {item.ticker && <Tag color={C.blue}>{item.ticker}</Tag>}
                </div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:5, alignItems:'flex-end' }}>
                <Tag color={sentColor(item.sentiment)}>{(item.sentiment||'').toUpperCase()}</Tag>
                <Btn small color={C.blue} onClick={()=>askAI(item,i)} disabled={analyzing===i}>{analyzing===i?'⟳':'AI IMPACT'}</Btn>
              </div>
            </div>
            {newsAI[i] && <div style={{ marginTop:10, borderTop:`1px solid ${C.border}`, paddingTop:10 }}><AIResultCard result={newsAI[i]} symbol={item.ticker||''} /></div>}
          </Panel>
        ))}
      </div>
    </div>
  );
};

const ScreenerTab = ({ data, update, quotes }) => {
  const { watchlist=[], settings={} } = data;
  const [sector, setSector] = useState('ALL');
  const [sortBy, setSortBy] = useState('pct');
  const [sortDir, setSortDir] = useState('desc');
  const [minChg, setMinChg] = useState('');
  const [maxChg, setMaxChg] = useState('');
  const [aiPicks, setAiPicks] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiErr, setAiErr] = useState('');

  const all = Object.entries(MOCK_QUOTES).map(([sym,q])=>({sym,...q}));
  const sectors = ['ALL',...new Set(all.map(s=>s.sector))];
  let filtered = all;
  if (sector!=='ALL') filtered=filtered.filter(s=>s.sector===sector);
  if (minChg!=='') filtered=filtered.filter(s=>s.pct>=parseFloat(minChg));
  if (maxChg!=='') filtered=filtered.filter(s=>s.pct<=parseFloat(maxChg));
  filtered=[...filtered].sort((a,b)=>sortDir==='desc'?b[sortBy]-a[sortBy]:a[sortBy]-b[sortBy]);

  const toggleSort = col => { if(sortBy===col) setSortDir(d=>d==='desc'?'asc':'desc'); else {setSortBy(col);setSortDir('desc');} };

  const aiScreen = async () => {
    setAiLoading(true); setAiPicks(null); setAiErr('');
    const prompt = `You are a professional stock screener. Today: ${new Date().toDateString()}.
Identify 3 high-conviction trading opportunities across different timeframes.
Return ONLY valid JSON:
{"picks":[{"symbol":"...","name":"...","type":"Day Trade|Swing Trade|Long Term","entry":0,"target":0,"stop":0,"thesis":"...","confidence":0}],"market_outlook":"..."}`;
    try {
      const text = await callProvider(prompt, settings.provider||'gemini', settings.apiKeys||{});
      setAiPicks(JSON.parse(text.replace(/```json|```/g,'').trim()));
    } catch(e) { setAiErr(e.message); }
    setAiLoading(false);
  };

  const S = ({ col }) => sortBy===col?(sortDir==='desc'?' ▼':' ▲'):'';
  return (
    <div>
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
        <Sel value={sector} onChange={setSector} options={sectors.map(s=>({value:s,label:s}))} />
        <Inp value={minChg} onChange={setMinChg} placeholder="Min chg%" style={{ width:80 }} type="number" />
        <Inp value={maxChg} onChange={setMaxChg} placeholder="Max chg%" style={{ width:80 }} type="number" />
        <Btn color={C.purple} onClick={aiScreen} disabled={aiLoading}>{aiLoading?'⟳ SCANNING…':'🤖 AI TOP PICKS'}</Btn>
      </div>
      {aiLoading && <Panel style={{ marginBottom:14 }}><Spinner text="Scanning market for top picks…" /></Panel>}
      {aiErr && <Panel style={{ marginBottom:14 }}><div style={{ color:C.red }}>⚠ {aiErr}</div></Panel>}
      {aiPicks && (
        <Panel style={{ marginBottom:14 }}>
          <PanelTitle>AI TOP PICKS — {new Date().toLocaleDateString()}</PanelTitle>
          {aiPicks.market_outlook && <div style={{ color:C.amber, fontSize:13, marginBottom:12 }}>📊 {aiPicks.market_outlook}</div>}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:10 }}>
            {aiPicks.picks?.map((p,i)=>(
              <div key={i} style={{ background:C.bg, border:`1px solid ${C.border2}`, borderRadius:3, padding:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                  <span style={{ color:C.text, fontWeight:'bold', fontSize:14 }}>{p.symbol}</span>
                  <Tag color={C.green}>{p.type}</Tag>
                </div>
                <div style={{ color:C.muted, fontSize:13, marginBottom:8 }}>{p.name}</div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:5, marginBottom:8 }}>
                  {[['ENTRY',p.entry,C.blue],['TARGET',p.target,C.green],['STOP',p.stop,C.red]].map(([l,v,c])=>(
                    <div key={l} style={{ textAlign:'center', background:c+'15', borderRadius:2, padding:'4px 6px' }}>
                      <div style={{ color:C.muted, fontSize:13 }}>{l}</div>
                      <div style={{ color:c, fontWeight:'bold' }}>{fmtP(v)}</div>
                    </div>
                  ))}
                </div>
                <div style={{ color:C.text, fontSize:13, lineHeight:1.5, marginBottom:8 }}>{p.thesis}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <Tag color={p.confidence>=7?C.green:C.amber}>CONF {p.confidence}/10</Tag>
                  <Btn small color={C.blue} onClick={()=>{ if(!watchlist.includes(p.symbol)) update({watchlist:[...watchlist,p.symbol]}); }}>+ WATCHLIST</Btn>
                </div>
              </div>
            ))}
          </div>
        </Panel>
      )}
      <Panel style={{ overflowX:'auto' }}>
        <PanelTitle>MARKET SCREENER — {filtered.length} RESULTS</PanelTitle>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead><tr style={{ color:C.muted, borderBottom:`1px solid ${C.border}` }}>
            {[['SYMBOL','sym'],['SECTOR','sector'],['PRICE','price'],['CHG','chg'],['CHG %','pct'],['VOLUME','vol'],['MKT CAP','mktcap'],['',null]].map(([label,col])=>(
              <th key={label} onClick={col?()=>toggleSort(col):undefined}
                style={{ textAlign:'left', padding:'6px 10px', fontWeight:'normal', cursor:col?'pointer':'default', letterSpacing:1 }}>
                {label}{col&&<S col={col} />}
              </th>
            ))}
          </tr></thead>
          <tbody>{filtered.map(s=>(
            <tr key={s.sym} style={{ borderBottom:`1px solid ${C.border}18` }}>
              <td style={{ padding:'8px 10px', color:C.text, fontWeight:'bold' }}>{s.sym}</td>
              <td style={{ padding:'8px 10px' }}><Tag color={C.muted}>{s.sector}</Tag></td>
              <td style={{ padding:'8px 10px', color:C.text }}>{fmtP(s.price)}</td>
              <td style={{ padding:'8px 10px', color:pColor(s.chg) }}>{s.chg>=0?'+':''}{fmtNum(s.chg)}</td>
              <td style={{ padding:'8px 10px', color:pColor(s.pct) }}>{fmtPct(s.pct)}</td>
              <td style={{ padding:'8px 10px', color:C.muted }}>{s.vol}</td>
              <td style={{ padding:'8px 10px', color:C.muted }}>{s.mktcap}</td>
              <td style={{ padding:'8px 10px' }}><Btn small color={C.blue} onClick={()=>{ if(!watchlist.includes(s.sym)) update({watchlist:[...watchlist,s.sym]}); }}>+ WATCH</Btn></td>
            </tr>
          ))}</tbody>
        </table>
      </Panel>
    </div>
  );
};

    setLoading(true);
    const list = await loadReports();
    setReports(list);
    setLoading(false);
  };

  useEffect(()=>{ refresh(); }, []);

    setSelected(filename); setDetailLoading(true); setDetail(null);
    const r = await loadReport(filename);
    setDetail(r); setDetailLoading(false);
  };

  const del = async (filename) => {
    if (!confirm('Delete this report?')) return;
    await deleteReport(filename);
    if (selected===filename) { setSelected(null); setDetail(null); }

  const typeColor = t => t==='Portfolio Snapshot'?C.green:t==='AI Analysis'?C.blue:C.purple;

                <Tag color={typeColor(r.type)}>{r.type}</Tag>

                <Btn small color={C.red} onClick={e=>{e.stopPropagation();del(r.filename);}}>✕</Btn>
              </div>
              <div style={{ color:C.text, fontSize:13, marginBottom:3 }}>{r.title}</div>
              <div style={{ color:C.dimmed, fontSize:13 }}>{r.date ? new Date(r.date).toLocaleString() : '—'}</div>
            </div>
          ))}
        </Panel>
      </div>
      <Panel>
        {!selected && <div style={{ color:C.muted, textAlign:'center', paddingTop:60 }}>Select a report to view</div>}
        {detailLoading && <Spinner text="Loading report…" />}
        {detail && !detailLoading && (
          <>
            <div style={{ marginBottom:14, paddingBottom:12, borderBottom:`1px solid ${C.border}` }}>

                </div>
              </div>
            </div>
            {renderDetail(detail)}
          </>
        )}
      </Panel>
    </div>
  );
};

// QUICK SEARCH — lookup any ticker without saving
// ═══════════════════════════════════════════════════════════════
const QuickSearch = ({ data, quotes }) => {
  const { settings={} } = data;
  const [sym, setSym] = useState('');
  const [open, setOpen] = useState(false);
  const [quote, setQuote] = useState(null);
  const [aiResult, setAiResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [err, setErr] = useState('');
  const [fetchStatus, setFetchStatus] = useState(null);
  const ref = useRef(null);
  const TFS = ['day trade','swing (1–2 weeks)','swing (2–4 weeks)','medium term','long term'];
  const [tf, setTf] = useState('swing (2–4 weeks)');

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const lookup = async () => {
    const s = sym.toUpperCase().trim();
    if (!s) return;
    setLoading(true); setOpen(true); setQuote(null); setAiResult(null); setErr('');
    try {
      let q = quotes[s] || MOCK_QUOTES[s] || null;
      if (!q) {
        const res = await fetchQuote(s, settings);
        q = res.quote;
        if (res.warnings.length > 0 || res.source) setFetchStatus({ source: res.source, warnings: res.warnings });
      }
      setQuote(q);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const runAI = async () => {
    const s = sym.toUpperCase().trim();
    setAiLoading(true); setAiResult(null);
    try {
      const r = await analyzeStock({ symbol:s, quote, timeframe:tf, settings });
      setAiResult(r);
    } catch(e) { setErr(e.message); }
    setAiLoading(false);
  };

  const up = (quote?.chg??0) >= 0;

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <div style={{ position:'relative' }}>
          <Inp value={sym} onChange={v=>setSym(v.toUpperCase())} placeholder="🔍 Quick lookup…"
            style={{ width:170, paddingRight:36, background:C.bg+'cc', borderColor:C.border }}
            onKeyDown={e=>e.key==='Enter'&&lookup()} />
          {sym && (
            <span onClick={()=>{setSym('');setOpen(false);}}
              style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)',
                color:C.muted, cursor:'pointer', fontSize:16, lineHeight:1 }}>×</span>
          )}
        </div>
        <Btn onClick={lookup} small color={C.blue} disabled={loading}>
          {loading ? '⟳' : 'GO'}
        </Btn>
      </div>

      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 8px)', right:0, zIndex:1000, width:420,
          background:C.panel, border:`1.5px solid ${C.border2}`, borderRadius:10,
          boxShadow:'0 8px 32px rgba(0,0,0,0.6)', padding:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <span style={{ color:C.text, fontWeight:700, fontSize:16 }}>{sym.toUpperCase()}</span>
            <span onClick={()=>setOpen(false)} style={{ color:C.muted, cursor:'pointer', fontSize:20 }}>×</span>
          </div>

          {loading && <Spinner text="Fetching quote…" />}
          {err && <div style={{ color:C.red, fontSize:13 }}>⚠ {err}</div>}

          {quote && !loading && (
            <div style={{ marginBottom:14 }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:8 }}>
                <span style={{ color:C.text, fontWeight:700, fontSize:26 }}>${parseFloat(quote.price).toFixed(2)}</span>
                <span style={{ color:up?C.green:C.red, fontWeight:600, fontSize:15 }}>
                  {up?'+':''}{parseFloat(quote.chg).toFixed(2)} ({parseFloat(quote.pct).toFixed(2)}%)
                </span>
              </div>
              <div style={{ display:'flex', gap:16, color:C.muted, fontSize:12 }}>
                <span>H: <span style={{ color:C.text }}>${parseFloat(quote.h).toFixed(2)}</span></span>
                <span>L: <span style={{ color:C.text }}>${parseFloat(quote.l).toFixed(2)}</span></span>
                {quote.vol && <span>Vol: <span style={{ color:C.text }}>{quote.vol}</span></span>}
              </div>
            </div>
          )}

          {!loading && (
            <div>
              <div style={{ display:'flex', gap:8, marginBottom:10, flexWrap:'wrap' }}>
                <Sel value={tf} onChange={setTf} options={TFS.map(t=>({value:t,label:t}))} style={{ flex:1, fontSize:12 }} />
                <Btn onClick={runAI} color={C.green} disabled={aiLoading} small>
                  {aiLoading?'⟳ Analyzing…':'🤖 AI Analysis'}
                </Btn>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
                <div style={{ color:C.dimmed, fontSize:11 }}>Not saved to watchlist · temporary lookup only</div>
                {fetchStatus && <div style={{ position:'relative' }}><DataSourceBadge source={fetchStatus.source} warnings={fetchStatus.warnings} /></div>}
              </div>
            </div>
          )}

          {aiLoading && <div style={{ marginTop:12 }}><Spinner text="Analyzing…" /></div>}
          {aiResult && !aiLoading && (
            <div style={{ marginTop:12, borderTop:`1px solid ${C.border}`, paddingTop:12 }}>
              <AIResultCard result={aiResult} symbol={sym.toUpperCase()} />
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// TICKER TAPE
// ═══════════════════════════════════════════════════════════════
const TickerTape = ({ quotes }) => {
  const items = Object.entries(quotes).slice(0,10);
  if (!items.length) return null;
  return (
    <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:'4px 16px', overflowX:'auto', whiteSpace:'nowrap' }}>
      {items.map(([sym,q])=>(
        <span key={sym} style={{ marginRight:24, fontSize:13 }}>
          <span style={{ color:C.muted }}>{sym} </span>
          <span style={{ color:C.text }}>{fmtP(q.price)} </span>
          <span style={{ color:pColor(q.pct) }}>{fmtPct(q.pct)}</span>
        </span>
      ))}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
function App() {
  const [appData, setAppData] = useState(null);
  const [quotes, setQuotes]   = useState({});
  const [activeTab, setTab]   = useState('watchlist');
  const [saveMsg, setSaveMsg] = useState('');
  const saveTimer = useRef(null);

  // Load all data from Ghrava backend on mount
  useEffect(()=>{
    loadData().then(d => {
      setAppData(d);
      applyAppearance(d);
      if (d.settings?.demoMode) setQuotes(MOCK_QUOTES);
    });
  }, []);

  // Debounced auto-save to backend on every data change
  const update = useCallback((patch) => {
    setAppData(prev => {
      const next = { ...prev, ...patch };
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => persistData(next), 600);
      return next;
    });
  }, []);

  const TABS = [
    { id:'watchlist', label:'📊 WATCHLIST' },
    { id:'screener',  label:'🔍 SCREENER' },
    { id:'ai',        label:'🤖 AI ANALYST' },
    { id:'portfolio', label:'💼 PORTFOLIO' },
    { id:'options',   label:'⚙ OPTIONS' },
    { id:'news',      label:'📰 NEWS' },
    { id:'reports',   label:'📁 REPORTS' },
    { id:'settings',  label:'⚙ SETTINGS' },
  ];

  if (!appData) return (
    <div style={{ background:C.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <Spinner text="Loading Trade Terminal from Ghrava…" />
    </div>
  );

  const settings = appData.settings || {};
  const prov = PROVIDERS[settings.provider];
  const app = settings.appearance || {};
  const rootFont = FONT_FAMILIES[app.fontFamily]?.css || FONT_FAMILIES['inter']?.css || "'Inter', system-ui, sans-serif";

  return (
    <div style={{ background:C.bg, color:C.text, minHeight:'100vh', fontFamily:rootFont, display:'flex', flexDirection:'column' }}>
      {/* Top bar */}
      <div style={{ background:C.surface, borderBottom:`1.5px solid ${C.border}`, padding:'0 20px', display:'flex', alignItems:'center', gap:14, height:50, flexShrink:0, flexWrap:'wrap' }}>
        <span style={{ color:C.blue, fontWeight:700, letterSpacing:1.5, fontSize:16 }}>▸ Trade Terminal</span>
        {prov && <Tag color={prov.color}>{prov.name}</Tag>}
        {settings.demoMode && <Tag color={C.amber}>DEMO MODE</Tag>}
        {!settings.demoMode && (
          <Tag color={C.green}>
            {settings.marketProvider==='tradier'?'📡 TRADIER':settings.marketProvider==='av'?'📡 ALPHA VANTAGE':'📡 YAHOO FINANCE'}
          </Tag>
        )}
        <div style={{ marginLeft:'auto', display:'flex', gap:16 }}>
          {['SPY','QQQ','NVDA'].map(s=>{ const q=quotes[s]; if(!q) return null; return (
            <span key={s} style={{ fontSize:13 }}>
              <span style={{ color:C.muted }}>{s} </span>
              <span style={{ color:C.text }}>{fmtP(q.price)} </span>
              <span style={{ color:pColor(q.pct) }}>{fmtPct(q.pct)}</span>
            </span>
          ); })}
        </div>
      </div>

      {/* Ticker tape */}
      <TickerTape quotes={quotes} />

      {/* Tabs */}
      <div style={{ background:C.surface, borderBottom:`2px solid ${C.border}`, padding:'0 16px', display:'flex', gap:0, flexShrink:0, overflowX:'auto' }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            background:'transparent', border:'none',
            borderBottom:`2px solid ${activeTab===t.id?(t.id==='settings'||t.id==='reports'?C.amber:C.blue):'transparent'}`,
            color:activeTab===t.id?(t.id==='settings'||t.id==='reports'?C.amber:C.blue):C.muted,
            padding:'10px 14px', cursor:'pointer', fontFamily:'"Courier New",monospace',
            fontSize:13, fontWeight:activeTab===t.id?'bold':'normal', letterSpacing:1, whiteSpace:'nowrap',
          }}>{t.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex:1, padding:20, overflowY:'auto', background:C.bg }}>
        {activeTab==='watchlist' && <WatchlistTab data={appData} update={update} quotes={quotes} setQuotes={setQuotes} />}
        {activeTab==='screener'  && <ScreenerTab  data={appData} update={update} quotes={quotes} />}
        {activeTab==='ai'        && <AIAnalystTab data={appData} update={update} quotes={quotes} />}
        {activeTab==='portfolio' && <PortfolioTab data={appData} update={update} quotes={quotes} />}
        {activeTab==='options'   && <OptionsTab   data={appData} quotes={quotes} />}
        {activeTab==='news'      && <NewsTab       data={appData} quotes={quotes} />}
        {activeTab==='reports'   && <ReportsTab />}
        {activeTab==='settings'  && <SettingsTab  data={appData} update={update} setSaveMsg={setSaveMsg} saveMsg={saveMsg} />}
      </div>

      {/* Footer */}
      <div style={{ background:C.surface, borderTop:`1px solid ${C.border}`, padding:'4px 16px', fontSize:13, color:C.dimmed, letterSpacing:1 }}>
        ⚠ FOR INFORMATIONAL PURPOSES ONLY · NOT FINANCIAL ADVICE · DATA STORED ON YOUR QNAP NAS · NEVER CACHED IN BROWSER
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
