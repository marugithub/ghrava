<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0f4f8">
<meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
<title>Medical — Ghrava</title>
<link rel="stylesheet" href="/shared.css">
<script src="/theme.js"></script>
<script>
  // Apply nav-collapsed before first paint to prevent sidebar flash
  if (localStorage.getItem('gh_nav_collapsed') !== '0') {
    document.documentElement.classList.add('nav-collapsed-init');
  }
</script>
<style>
/* ── View tabs ─────────────────────────────────────────────── */

/* ── Medical card ──────────────────────────────────────────── */
/* med cards use shared .card system */

/* ── Patient pills ─────────────────────────────────────────── */
.patient-strip {
  display: flex;
  gap: 8px;
  padding: 10px 20px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.patient-strip::-webkit-scrollbar { display: none; }
.patient-pill {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 4px 4px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.patient-pill .gh-avatar { width: 22px !important; height: 22px !important; font-size: 9px !important; }
.patient-pill-name { line-height: 22px; }
.patient-pill.active {
  background: var(--accent-bg);
  border-color: var(--accent-bd);
  color: var(--accent);
}

/* ── Status dot ────────────────────────────────────────────── */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}
.status-active { background: var(--green); }
.status-discontinued, .status-resolved { background: var(--text3); }
.status-asneeded, .status-monitoring { background: var(--amber); }
.status-chronic { background: var(--red); }
.status-completed { background: var(--accent); }

/* ── Follow-up badge ───────────────────────────────────────── */
.followup-badge {
  background: var(--amber-bg);
/* ════════════════════════════════════════════════════════════
   SLICE 1B — Card #1 v5 medication card + center modal styles
   ══════════════════════════════════════════════════════════ */
.med-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 16px;
  padding: 4px 16px 100px;
}
@media(max-width:600px){
  .med-grid { grid-template-columns: 1fr; padding: 4px 12px 100px; gap: 12px; }
}

.med-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s, border-color .12s;
  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 32px rgba(0,0,0,.06);
}
.med-card:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(0,0,0,.05), 0 16px 40px rgba(0,0,0,.08); }
.med-card.refill-due { border-color: rgba(245,158,11,.35); }
.med-card.refill-overdue { border-color: rgba(220,38,38,.35); }

.med-z1 { display:flex; align-items:center; gap:8px; padding:14px 18px 0; flex-wrap:wrap; }
.med-z2 { display:flex; gap:18px; padding:12px 18px 8px; align-items:center; }
.med-z3 { display:flex; gap:8px; padding:4px 18px 12px; }
.med-tags-row { display:flex; gap:6px; padding:0 18px 10px; align-items:center; flex-wrap:wrap; font-size:11px; color:var(--text3); }
.med-strip { display:flex; gap:18px; padding:10px 18px; border-top:1px dashed var(--border); flex-wrap:wrap; font-size:11px; }
.med-strip > span { white-space:nowrap; }
.med-strip .lbl { text-transform:uppercase; letter-spacing:0.04em; font-size:10px; color:var(--text3); margin-right:4px; }
.med-strip strong { color:var(--text2); font-size:12px; font-weight:600; }
.med-alert { margin:4px 18px 14px; padding:14px; border-radius:12px; }
.med-alert.amber { background:rgba(254,243,199,.30); border:0.5px solid rgba(245,158,11,.30); }
.med-alert.red   { background:rgba(254,226,226,.30); border:0.5px solid rgba(220,38,38,.30); }
.med-alert .row1 { display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
.med-alert .msg { font-size:13px; font-weight:600; color:var(--text); }
.med-alert .meta { font-size:11px; color:var(--text3); font-weight:500; }
.med-alert .row2 { display:flex; justify-content:space-between; align-items:center; font-size:11px; gap:8px; flex-wrap:wrap; }
.med-z4 { display:flex; gap:10px; padding:14px 18px 16px; align-items:center; border-top:0.5px solid var(--border); flex-wrap:wrap; }

.med-status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.med-status-dot.green { background:#34c759; box-shadow:0 0 0 4px rgba(52,199,89,.16); }
.med-status-dot.amber { background:#f59e0b; box-shadow:0 0 0 4px rgba(245,158,11,.16); }
.med-status-dot.red   { background:#dc2626; box-shadow:0 0 0 4px rgba(220,38,38,.16); }
.med-status-dot.gray  { background:#94a3b8; box-shadow:0 0 0 4px rgba(148,163,184,.16); }

.med-cond-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px 4px 7px; border-radius:999px;
  background:rgba(220,38,38,.08); color:#991b1b;
  font-size:11px; font-weight:500;
}
.med-cond-chip img { width:14px; height:14px; opacity:.85; }
.med-class { font-size:11px; color:var(--text3); font-weight:500; }
.med-icon-btn {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; cursor:pointer; color:var(--text3);
  -webkit-tap-highlight-color: transparent;
}
.med-icon-btn:hover { background:var(--bg3); }
.med-icon-btn img { width:18px; height:18px; opacity:.7; }

.med-pill-hero {
  flex:0 0 92px; height:64px;
  display:flex; align-items:center; justify-content:center;
  border-radius:12px;
}
.med-pill-hero img { width:48px; height:48px; }
.med-pill-hero.active   { background:rgba(20,184,166,.10); color:#0d9488; }
.med-pill-hero.refill   { background:rgba(245,158,11,.10); color:#b45309; }
.med-pill-hero.overdue  { background:rgba(220,38,38,.10); color:#991b1b; }
.med-pill-hero.discont  { background:rgba(148,163,184,.10); color:#64748b; }

.med-name-line { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.med-name { font-size:18px; font-weight:600; color:var(--text); line-height:1.1; letter-spacing:-0.01em; }
.med-dose { font-size:13px; color:var(--text2); font-weight:500; }
.med-sub  { font-size:12px; color:var(--text3); margin-top:2px; }
.med-schedule { font-size:13px; color:var(--text2); margin-top:6px; }

.med-instr-chip {
  width:40px; height:40px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
}
.med-instr-chip img { width:22px; height:22px; }
.med-instr-chip.evening { background:rgba(99,102,241,.10); color:#4f46e5; }
.med-instr-chip.food    { background:rgba(217,119,6,.10);  color:#d97706; }
.med-instr-chip.warn    { background:rgba(220,38,38,.10);  color:#dc2626; }

.med-ent-circle {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:12px; font-weight:600; flex-shrink:0;
}
.med-ent-circle.brand { border-radius:9px; font-size:10px; font-weight:700; letter-spacing:0.04em; }
.med-link-chip {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; color:var(--text3); font-weight:500;
  padding:4px 8px; border-radius:6px; background:transparent; border:none; cursor:pointer;
}
.med-link-chip:hover { background:var(--bg3); color:var(--text2); }
.med-link-chip img { width:14px; height:14px; opacity:.7; }

/* ── Center modal (slice 1B pattern; full sweep deferred) ──── */
.gh-cmodal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:none; align-items:center; justify-content:center;
  z-index:560; padding:20px;
}
.gh-cmodal-overlay.open { display:flex; }
.gh-cmodal {
  width:min(560px, 100%); max-height:90vh; overflow-y:auto;
  background:var(--bg2); border-radius:18px; border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.30);
  display:flex; flex-direction:column;
}
.gh-cmodal-actions {
  display:flex; gap:8px; padding:12px 16px; border-top:0.5px solid var(--border);
  background:var(--bg2); flex-wrap:wrap;
}
.gh-cmodal-actions .btn { flex:1; min-width:90px; }
@media(max-width:480px){
  .gh-cmodal-overlay { padding:0; align-items:flex-end; }
  .gh-cmodal { border-radius:18px 18px 0 0; max-height:95vh; }
}
</head>
<body>
<div id="app">

  <!-- ── Page header ──────────────────────────────────────── -->
  <!-- header injected by nav.js -->

  <!-- ── Lens (page-level filter, sits above tabs) ─────────── -->
  <div style="padding: 12px 16px 0">
    <div id="medLens"></div>
  </div>

  <!-- ── View tabs ────────────────────────────────────────── -->
  <div class="view-tabs" style="--tab-color:#14b8a6;display:flex;align-items:center" style="--tab-color:#14b8a6">
    <button class="view-tab active" onclick="switchView('medications',this)">Meds</button>
    <button class="view-tab" onclick="switchView('conditions',this)">Conditions</button>
    <button class="view-tab" onclick="switchView('notes',this)">Visits</button>
    
    <button class="view-tab" onclick="switchView('hw',this)">H&amp;W</button>
    <button class="view-tab" onclick="switchView('eob',this)">EOB</button>
    <button class="view-tab" onclick="switchView('summary',this)">Summary</button>

  </div>

  <!-- ── Patient filter ─────────────────────────────────────
       v202604.135: HIDDEN — duplicates lens person dim. The
       device-scope pill in the nav header auto-applies. -->
  <div class="patient-strip legacy-hidden" id="patientStrip">
    <button class="patient-pill active" data-patient="" onclick="setPatient(this,'')" style="padding:4px 14px"><span class="patient-pill-name">All</span></button>
  </div>

  <!-- Search bar -->
  <!-- HIDDEN per session-12 search consolidation. Live-filter logic preserved in JS; remove .legacy-hidden to restore. Use Cmd+K (or nav search icon) for unified search; Filter/Advanced Filter for in-view filtering. -->
  <div class="search-wrap legacy-hidden" style="margin:8px 16px 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="medSearch" type="search" placeholder="Search medications, conditions, notes…" autocomplete="off">
  </div>
  <div id="medViewToolbar" style="display:none"></div>

  <!-- ── Main list ────────────────────────────────────────── -->
  <div class="content" style="padding-top:12px">
    <div id="listArea"></div>
  </div>

  <!-- ── Summary panel (hidden until tab switched) ───────── -->
  <div id="summaryPanel" style="display:none;padding:8px 16px 100px">
    <div id="summaryContent">
      <div class="spinner"><div class="spin"></div>Loading…</div>
    </div>
  </div>

</div>

<!-- ── FAB ──────────────────────────────────────────────────── -->
<button class="fab fab-pill" onclick="openAddDrawer()" title="Add record"><span>+ Add Record</span></button>

<!-- ── Generic info modal (replaces broken LT.modal call) ─── -->
<div id="medInfoOverlay" onclick="if(event.target===this)closeMedInfoModal()"
     style="position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
            align-items:flex-end;justify-content:center;z-index:550">
  <div id="medInfoBody"
       style="width:min(440px,100%);max-height:80vh;overflow-y:auto;
              background:var(--bg2);border-radius:16px 16px 0 0;padding:16px;
              border:1px solid var(--border);border-bottom:none"></div>
</div>
<style>
  @media(min-width:600px){
    #medInfoOverlay{align-items:center}
    #medInfoOverlay > div{border-radius:16px;border-bottom:1px solid var(--border)}
  }
</style>

<!-- ── Slice 1B: medication detail / refill / link-receipt center modal ── -->
<div class="gh-cmodal-overlay" id="medDetailOverlay" onclick="if(event.target===this)closeMedDetail()">
  <div class="gh-cmodal" id="medDetailBody"></div>
</div>

<!-- ── Add/Edit Medication Drawer ───────────────────────────── -->
<div class="drawer-overlay" id="medDrawer">
  <div class="drawer">
    <div class="drawer-handle" onclick="closeMedDrawer()"></div>
    <div class="drawer-title" id="medDrawerTitle">Add Medication</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Patient <span class="req">*</span></label>
        <div id="mFamilyWrap"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="mStatus"></select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;justify-content:space-between">
        Medication Name <span class="req">*</span>
        <button type="button" class="btn btn-ghost" style="font-size:11px;padding:3px 8px;font-weight:600" onclick="lookupDrug()" title="Look up drug info via OpenFDA">🔍 Lookup</button>
      </label>
      <input class="form-input" type="text" id="mName" placeholder="e.g. Lisinopril 10mg">
      <div id="drugFeedback" style="font-size:11px;color:var(--text3);margin-top:4px;display:none"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dosage</label>
        <input class="form-input" type="text" id="mDosage" placeholder="e.g. 10mg">
      </div>
      <div class="form-group">
        <label class="form-label">Frequency</label>
        <input class="form-input" type="text" id="mFreq" placeholder="e.g. Once daily">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Prescribing Physician</label>
      <select class="form-select" id="mPhysician">
        <option value="">— none —</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input class="form-input" type="date" id="mStart">
      </div>
      <div class="form-group">
        <label class="form-label">End Date</label>
        <input class="form-input" type="date" id="mEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Purpose / Indication</label>
      <input class="form-input" type="text" id="mPurpose" placeholder="Why prescribed">
    </div>
    <div class="form-group">
      <label class="form-label">Treats Condition <span style="font-size:10px;font-weight:400;color:var(--text3)">optional</span></label>
      <select class="form-select" id="mCondition"><option value="">— none —</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Pharmacy</label>
      <select class="form-select" id="mPharmacy"></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Rx #</label><input class="form-input" id="mRxNum" placeholder="Rx number"></div>
      <div class="form-group"><label class="form-label">Refills Left</label><input class="form-input" type="number" id="mRefills" min="0" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Next Refill</label><input class="form-input" type="date" id="mNextRefill"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Controlled Schedule <span style="font-size:10px;font-weight:400;color:var(--text3)">optional</span></label>
      <select class="form-select" id="mSchedule">
        <option value="">— none —</option>
        <option value="II">Schedule II</option>
        <option value="III">Schedule III</option>
        <option value="IV">Schedule IV</option>
        <option value="V">Schedule V</option>
      </select>
    </div>

    <!-- Slice 1B: form + generic + drug class -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Form <span style="font-size:10px;font-weight:400;color:var(--text3)">drives icon</span></label>
        <select class="form-select" id="mForm">
          <option value="">— none —</option>
          <option value="tablet">tablet</option>
          <option value="capsule">capsule</option>
          <option value="liquid">liquid</option>
          <option value="injection">injection</option>
          <option value="inhaler">inhaler</option>
          <option value="drops">drops</option>
          <option value="cream">cream</option>
          <option value="patch">patch</option>
          <option value="suppository">suppository</option>
          <option value="other">other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Generic name <span style="font-size:10px;font-weight:400;color:var(--text3)">e.g. atorvastatin</span></label>
        <input class="form-input" type="text" id="mGeneric" placeholder="">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Brand name <span style="font-size:10px;font-weight:400;color:var(--text3)">e.g. Lipitor</span></label>
        <input class="form-input" type="text" id="mBrand" placeholder="">
      </div>
      <div class="form-group">
        <label class="form-label">Drug class <span style="font-size:10px;font-weight:400;color:var(--text3)">optional</span></label>
        <input class="form-input" type="text" id="mClass" placeholder="e.g. Statin">
      </div>
    </div>

    <!-- Slice 1B: instruction signals (drive the 3 instruction icons on the card) -->
    <div class="form-row">
      <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:24px">
        <input type="checkbox" id="mTakeWithFood" style="width:18px;height:18px;cursor:pointer">
        <label for="mTakeWithFood" style="font-size:13px;cursor:pointer;margin:0">Take with food</label>
      </div>
      <div class="form-group">
        <label class="form-label">Time of day</label>
        <select class="form-select" id="mTimeOfDay">
          <option value="">— any —</option>
          <option value="morning">morning</option>
          <option value="evening">evening</option>
          <option value="with_meals">with meals</option>
          <option value="as_needed">as needed</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Interaction warning <span style="font-size:10px;font-weight:400;color:var(--text3)">e.g. "Avoid grapefruit"</span></label>
      <input class="form-input" type="text" id="mInteraction" placeholder="">
    </div>

    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="mNotes" rows="2"></textarea>
    </div>
        <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tags-input-wrap" id="medTagsWrap" onclick="document.getElementById('medTagInput').focus()">
        <input id="medTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
<div class="btn-row">
      <button class="btn btn-ghost" onclick="closeMedDrawer()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMedication()">Save</button>
    </div>
    <div style="height:4px"></div>
  </div>
</div>

<!-- ── Add/Edit Condition Drawer ──────────────────────────────── -->
<div class="drawer-overlay" id="condDrawer">
  <div class="drawer">
    <div class="drawer-handle" onclick="closeCondDrawer()"></div>
    <div class="drawer-title" id="condDrawerTitle">Add Condition</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Patient <span class="req">*</span></label>
        <div id="cFamilyWrap"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="cStatus"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Condition Name <span class="req">*</span></label>
      <input class="form-input" type="text" id="cName" placeholder="e.g. Hypertension">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Onset Date</label>
        <input class="form-input" type="date" id="cStart">
      </div>
      <div class="form-group">
        <label class="form-label">Resolved Date</label>
        <input class="form-input" type="date" id="cEnd">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Physician</label>
      <select class="form-select" id="cPhysician">
        <option value="">— none —</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Treatment Notes</label>
      <textarea class="form-textarea" id="cTreatment" rows="3" placeholder="Treatment plan, medications, outcomes…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="cNotes" rows="2"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeCondDrawer()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCondition()">Save</button>
    </div>
    <div style="height:4px"></div>
  </div>
</div>

<!-- ── Add/Edit Visit Note Drawer ─────────────────────────────── -->
<div class="drawer-overlay" id="noteDrawer">
  <div class="drawer">
    <div class="drawer-handle" onclick="closeNoteDrawer()"></div>
    <div class="drawer-title" id="noteDrawerTitle">Add Visit Note</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Patient <span class="req">*</span></label>
        <div id="nFamilyWrap"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Visit Date <span class="req">*</span></label>
        <input class="form-input" type="date" id="nDate">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Physician</label>
      <select class="form-select" id="nPhysician">
        <option value="">— Select or leave blank —</option>
      </select>
    </div>

// ── Medications (Card #1 v5 — slice 1B) ────────────────────────
//
// Card anatomy, top to bottom:
//   Z1: status dot + multi-condition chips + drug class + menu
//   Z2: pill icon hero (or attachment image) + name/dose/generic + 3 instruction icons
//   Tags row
//   Cross-module strip: HSA YTD · log mentions · last filled
//   Z3 (conditional): refill alert with Order button (only when something needs doing)
//   Z4: linked entities (patient/doctor/pharmacy circles) + link receipt + attachments
//
// Click anywhere on the card body → openMedDetail (read-only center modal w/ actions)
// Click stop-propagated buttons → individual flows (delete, refill, link receipt)
async function renderMedications() {
  const area = $id('listArea');
  area.innerHTML = '<div class="spinner"><div class="spin"></div> Loading…</div>';
  try {
    let url = '/medical/medications';
    const ps = [];
    if (currentPatient) ps.push(`patient=${encodeURIComponent(currentPatient)}`);
    if (ps.length) url += '?' + ps.join('&');
    let rows = await api('GET', url);
    if (_medSearch) rows = rows.filter(r =>
      ['name','patient','dosage','frequency','purpose','notes'].some(k=>(r[k]||'').toLowerCase().includes(_medSearch))
    );
    // Lens filter dimensions — must mirror what makeCardRender does
    const f = window._medFilters || {};
    if (f.status) rows = rows.filter(r => r.status === f.status);
    if (Array.isArray(f.tags) && f.tags.length) rows = rows.filter(r => f.tags.every(t => (r.tags||[]).includes(t)));
    if (f.tag) rows = rows.filter(r => (r.tags||[]).includes(f.tag));
    if (f.person != null) rows = rows.filter(r => String(r.family_member_id) === String(f.person));
    if (f.name) {
      const q = String(f.name).toLowerCase();
      rows = rows.filter(r => (r.name||'').toLowerCase().includes(q));
    }
    if (f.form) {
      rows = rows.filter(r => (r.form||'').toLowerCase() === String(f.form).toLowerCase());
    }
    if (f.time && window.LENS_CONFIG?.timeMatch) {
      rows = rows.filter(r => window.LENS_CONFIG.timeMatch(r.start_date, f.time, 'past'));
    }
    if (window.GH_LENS && typeof GH_LENS.setCount === 'function') GH_LENS.setCount(rows.length);
    if (!rows.length) { area.innerHTML = emptyState(...GH_EMPTY.medications); return; }

    // Cache last-rendered rows so the detail modal can re-find a med by id
    window._medRowsCache = rows;

    // Group by patient — kept as section labels
    const byPatient = {};
    rows.forEach(r => { (byPatient[r.patient] = byPatient[r.patient]||[]).push(r); });

    area.innerHTML = Object.entries(byPatient).map(([patient, meds]) => {
      const member = (familyMembers || []).find(m => m.display_name === patient);
      const avatar = (member && window.GH_AVATAR) ? GH_AVATAR.render(member, 'sm') : '';
      return `
        <div class="section-label" style="display:flex;align-items:center;gap:8px;padding:0 16px">${avatar}<span>${esc(patient)}</span></div>
        <div class="med-grid">${meds.map(r => renderMedCard(r)).join('')}</div>
      `;
    }).join('');

    // Non-blocking interaction check — fires after render
    checkInteractionsForAll(rows);
  } catch (e) {
    area.innerHTML = errorState(e.message, '');
  }
}

// Compute the refill state for status-dot color + pill hero tint
function medRefillState(r) {
  if (r.status === 'Discontinued' || r.status === 'Completed') return 'discont';
  // 0 refills + has rx_number = waiting on a doctor; treat as red
  if (r.refills_remaining === 0 && r.rx_number) return 'overdue';
  if (r.next_refill_date) {
    const today = new Date(); today.setHours(0,0,0,0);
    const next = new Date(r.next_refill_date);
    if (!isNaN(next.getTime())) {
      const days = Math.round((next - today) / 86400000);
      if (days < 0) return 'overdue';
      if (days <= 7) return 'refill';
    }
  }
  if (r.refills_remaining === 1) return 'refill';
  return 'active';
}
function medStateDot(state) {
  return state === 'overdue' ? 'red'
       : state === 'refill'  ? 'amber'
       : state === 'discont' ? 'gray'
       :                       'green';
}

// Single source of truth for hero name + subtitle (locked decision):
//   Hero = whatever was prescribed (`name` field)
//   Subtitle = relationship to the OTHER name + form
function medHeroLines(r) {
  const hero = r.name || '';
  const dose = r.dosage || '';
  const form = r.form || '';
  let sub = '';
  if (r.brand_name && r.generic_name) {
    if (hero.toLowerCase() === r.brand_name.toLowerCase())   sub = `${r.generic_name}${form?' · '+form:''}`;
    else if (hero.toLowerCase() === r.generic_name.toLowerCase()) sub = `generic version of ${r.brand_name}${form?' · '+form:''}`;
    else sub = form;
  } else if (r.brand_name && hero.toLowerCase() !== r.brand_name.toLowerCase()) {
    sub = `generic version of ${r.brand_name}${form?' · '+form:''}`;
  } else if (r.generic_name && hero.toLowerCase() !== r.generic_name.toLowerCase()) {
    sub = `${r.generic_name}${form?' · '+form:''}`;
  } else {
    sub = form;
  }
  return { hero, dose, sub };
}

// Pick Phosphor icon by form. Single source of truth.
function medFormIcon(form) {
  const f = (form||'').toLowerCase();
  if (f.includes('inject') || f.includes('syringe')) return '/assets/icons/phosphor/duotone/syringe-duotone.svg';
  if (f.includes('liquid')  || f.includes('drop'))   return '/assets/icons/phosphor/duotone/eyedropper-duotone.svg';
  if (f.includes('inhal'))                            return '/assets/icons/phosphor/duotone/eyedropper-duotone.svg';
  return '/assets/icons/phosphor/duotone/pill-duotone.svg';
}

// Avatar for an entity (family member, doctor, pharmacy contact)
// brand=true gives a brand-color square instead of a gradient circle
function medAvatar(label, opts = {}) {
  const t = (label||'?').slice(0, opts.brand ? 3 : 2).toUpperCase();
  // Gradient seeded by label hash for a stable color per entity
  let h = 0; for (const c of (label||'')) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  const grads = [
    ['#f472b6','#db2777'], ['#34d399','#047857'], ['#a78bfa','#7c3aed'],
    ['#fb923c','#c2410c'], ['#60a5fa','#1d4ed8'], ['#5eead4','#0d9488'],
  ];
  const g = grads[h % grads.length];
  const cls = opts.brand ? 'med-ent-circle brand' : 'med-ent-circle';
  return `<div class="${cls}" style="background:linear-gradient(135deg,${g[0]},${g[1]})" title="${esc(opts.title||label||'')}">${esc(t)}</div>`;
}

function renderMedCard(r) {
  const state = medRefillState(r);
  const dot = medStateDot(state);
  const heroTint = state === 'overdue' ? 'overdue' : state === 'refill' ? 'refill' : state === 'discont' ? 'discont' : 'active';
  const { hero, dose, sub } = medHeroLines(r);

  // Pill imagery: attachment image first → icon fallback
  // (For now, the card always shows the icon; an uploaded photo can later
  // override via a `pill_image_url` field on the record. Slice 1B ships
  // the icon path — photo override is a small future addition.)
  const pillImg = `<img src="${medFormIcon(r.form)}" alt="" />`;

  // Multi-condition chips (from junction enrichment) with +N overflow
  const conds = Array.isArray(r.conditions) ? r.conditions
              : (r.condition_name_text ? [{ id: r.condition_id, condition_name: r.condition_name_text }] : []);
  const condChips = conds.slice(0, 2).map(c => `
    <span class="med-cond-chip" title="Treats: ${esc(c.condition_name)}">
      <img src="/assets/icons/phosphor/duotone/heart-duotone.svg" alt="">${esc(c.condition_name)}
    </span>
  `).join('');
  const condOverflow = conds.length > 2
    ? `<span class="med-cond-chip" style="background:transparent;border:1px dashed var(--border);color:var(--text3)">+${conds.length-2}</span>`
    : '';

  // Instruction icons (max 3): evening / with food / interaction warning
  const instr = [];
  if (r.time_of_day === 'evening') instr.push(`<div class="med-instr-chip evening" title="Take in evening"><img src="/assets/icons/phosphor/duotone/moon-duotone.svg" alt=""></div>`);
  if (r.take_with_food) instr.push(`<div class="med-instr-chip food" title="Take with food"><img src="/assets/icons/phosphor/duotone/fork-knife-duotone.svg" alt=""></div>`);
  if (r.interaction_warning) instr.push(`<div class="med-instr-chip warn" title="${esc(r.interaction_warning)}"><img src="/assets/icons/phosphor/duotone/warning-duotone.svg" alt=""></div>`);

  // Cross-module strip
  const hsaYtd = (r.hsa_ytd != null) ? `$${Number(r.hsa_ytd).toFixed(2)}` : '$0.00';
  const lastFilled = r.last_filled ? formatDate(r.last_filled) : '—';

  // Refill alert (Z3) — only when something needs doing
  let alertBlock = '';
  if (state === 'overdue' || state === 'refill') {
    const daysText = (() => {
      if (!r.next_refill_date) return state === 'overdue' ? 'Refill overdue' : 'Refill needed soon';
      const today = new Date(); today.setHours(0,0,0,0);
      const next = new Date(r.next_refill_date);
      const days = Math.round((next - today) / 86400000);
      if (days < 0) return `Refill ${Math.abs(days)} day${Math.abs(days)===1?'':'s'} overdue`;
      if (days === 0) return `Refill today`;
      return `Refill in ${days} day${days===1?'':'s'}`;
    })();
    const supplyMeta = r.refills_remaining != null
      ? `${r.refills_remaining} refill${r.refills_remaining===1?'':'s'} left`
      : '';
    alertBlock = `
      <div class="med-alert ${state==='overdue'?'red':'amber'}">
        <div class="row1">
          <span class="msg">${esc(daysText)}</span>
          ${supplyMeta ? `<span class="meta">${esc(supplyMeta)}</span>` : ''}
          <div style="flex:1"></div>
          <button class="btn btn-primary" style="padding:6px 12px;font-size:12px"
                  onclick="event.stopPropagation();openRefillModal(${r.id})">Record refill</button>
        </div>
        <div class="row2">
          <span style="color:var(--text3)">

  // Z4: linked entities — patient, doctor (from contact FK), pharmacy
  const ents = [];

  return `
    <div class="med-card ${state==='refill'?'refill-due':state==='overdue'?'refill-overdue':''}" onclick="openMedDetail(${r.id})">

      <div class="med-z1">

        ${condChips}${condOverflow}
        ${r.drug_class ? `<span class="med-class">${esc(r.drug_class)}</span>` : ''}
        <div style="flex:1"></div>
        <button class="med-icon-btn" title="Delete"
                onclick="event.stopPropagation();deleteMed(${r.id})">
          <img src="/assets/icons/phosphor/duotone/trash-duotone.svg" alt="">
        </button>
      </div>

      <div class="med-z2">
        <div class="med-pill-hero ${heroTint}">${pillImg}</div>
        <div style="flex:1; min-width:0;">
          <div class="med-name-line">
            <span class="med-name">${esc(hero)}</span>
            ${dose ? `<span class="med-dose">${esc(dose)}</span>` : ''}
          </div>
          ${sub ? `<div class="med-sub">${esc(sub)}</div>` : ''}
          ${r.frequency ? `<div class="med-schedule">${esc(r.frequency)}</div>` : ''}
        </div>
      </div>

      ${instr.length ? `<div class="med-z3">${instr.join('')}</div>` : ''}
      ${tagRow}

      <div class="med-strip">
        <span title="HSA spent on this med, current year — tap to filter HSA to this">
          <span class="lbl">HSA YTD</span><strong>${hsaYtd}</strong>
        </span>
        <span title="Last refill date">
          <span class="lbl">Last filled</span><strong>${esc(lastFilled)}</strong>
        </span>
        <span title="Refills remaining">
          <span class="lbl">Refills</span><strong>${r.refills_remaining != null ? r.refills_remaining : '—'}</strong>
        </span>
      </div>

      ${alertBlock}

      <div class="med-z4">
        ${ents.join('')}
        <div style="flex:1"></div>
        <button class="med-link-chip" title="Link an HSA receipt to this medication"
                onclick="event.stopPropagation();openLinkReceiptModal(${r.id},'${esc(hero).replace(/'/g,"\\'")}')">
          <img src="/assets/icons/phosphor/duotone/link-duotone.svg" alt="">Link receipt
        </button>

  `;
}

// Drug interaction check — runs after medications render
// Shows a small orange/red badge; clicking opens a detail sheet
async function checkInteractionsForAll(meds) {
  // Group active meds by family_member_id
  const byMember = {};
  meds.filter(m => m.status === 'Active' && m.family_member_id).forEach(m => {
    (byMember[m.family_member_id] = byMember[m.family_member_id] || []).push(m);
  });
  for (const [memberId, memberMeds] of Object.entries(byMember)) {
    if (memberMeds.length < 2) continue;
    try {
      const result = await window.api('GET', `/medical/interactions/${memberId}`);
      if (!result.count) continue;
      // Find the section header for this member and append badge
      const headers = document.querySelectorAll('.section-label');
      headers.forEach(h => {
        const memberName = memberMeds[0].family_member_name || memberMeds[0].patient;
        if (h.textContent.trim() === memberName) {
          const color = result.high_count > 0 ? 'var(--red)' : 'var(--amber)';
          const existing = h.querySelector('.interaction-badge');
          if (existing) existing.remove();
          const badge = document.createElement('span');
          badge.className = 'interaction-badge';
          badge.style.cssText = `margin-left:8px;font-size:11px;font-weight:600;color:${color};cursor:pointer`;
          badge.textContent = result.high_count > 0 ? `⚠ ${result.count} interaction${result.count>1?'s':''}` : `ⓘ ${result.count} interaction${result.count>1?'s':''}`;
          badge.title = 'Click to view drug interactions';
          badge.onclick = (e) => { e.stopPropagation(); showInteractionDetail(result, memberName); };
          h.appendChild(badge);
        }
      });
    } catch { /* non-fatal */ }
  }
}

function showInteractionDetail(result, memberName) {
  const rows = result.interactions.map(i => {
    const color = i.severity?.toLowerCase()==='high' ? 'var(--red)' : 'var(--amber)';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:600;font-size:13px;color:${color}">${esc(i.drug1||'')} + ${esc(i.drug2||'')}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(i.severity||'')} severity</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(i.description||'')}</div>
    </div>`;
  }).join('');
  const body = document.getElementById('medInfoBody');
  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div style="font-size:16px;font-weight:700">Drug Interactions — ${esc(memberName)}</div>
      <button onclick="closeMedInfoModal()" style="background:none;border:none;color:var(--text2);font-size:22px;line-height:1;cursor:pointer;padding:0 0 0 12px">&times;</button>
    </div>
    ${rows}
    <div style="font-size:10px;color:var(--text3);margin-top:12px">Source: NLM RxNav API. Always consult your pharmacist or physician.</div>`;
  document.getElementById('medInfoOverlay').style.display = 'flex';
}

// ── Card view (formerly behind ?cards=v2 — now always on, v202604.124) ─
// Overrides the three legacy render fns to use the shared GH_CARD pipeline.
// The Lens (gh-lens.js) sits above the list area and drives filters.
(function() {
  if (!window.GH_CARD) {
    console.warn('[medical] GH_CARD not loaded; falling back to legacy renderers');
    return;
  }

  // Helper to swap a render: fetch, filter, then GH_CARD.renderGrouped into #listArea.
  function makeCardRender(moduleId, urlPath, searchKeys, statusFilterKey, emptyKey) {
    return async function() {
      const area = document.getElementById('listArea');
      area.innerHTML = '<div class="spinner"><div class="spin"></div> Loading…</div>';
      try {
        let u = urlPath;
        if (window.currentPatient) {
          u += (u.includes('?') ? '&' : '?') + 'patient=' + encodeURIComponent(window.currentPatient);
        }
        let rows = await window.api('GET', u);
        const term = (window._medSearch || '').toLowerCase();
        if (term) rows = rows.filter(r => searchKeys.some(k => (r[k]||'').toLowerCase().includes(term)));
        if (statusFilterKey && window._medFilters?.status) {
          rows = rows.filter(r => r.status === window._medFilters.status);
        }
        if (window._medFilters?.tags?.length) {
          rows = rows.filter(r => window._medFilters.tags.every(t => (r.tags||[]).includes(t)));
        }
        if (window._medFilters?.tag) {
          rows = rows.filter(r => (r.tags||[]).includes(window._medFilters.tag));
        }
        if (window._medFilters?.person != null) {
          rows = rows.filter(r => String(r.family_member_id) === String(window._medFilters.person));
        }
        // v202604.133 — name (meds + cond), provider (notes), form (meds), time
        if (window._medFilters?.name) {
          const q = String(window._medFilters.name).toLowerCase();
          rows = rows.filter(r => (r.name||'').toLowerCase().includes(q));
        }
        if (window._medFilters?.provider) {
          const q = String(window._medFilters.provider).toLowerCase();
          rows = rows.filter(r => (r.provider||'').toLowerCase().includes(q));
        }
        if (window._medFilters?.form) {
          rows = rows.filter(r => (r.form||'').toLowerCase() === String(window._medFilters.form).toLowerCase());
        }
        if (window._medFilters?.time && window.LENS_CONFIG?.timeMatch) {
          // Each subview uses a different date column — try all reasonable ones
          rows = rows.filter(r => window.LENS_CONFIG.timeMatch(
            r.start_date || r.visit_date || r.diagnosed_date,
            window._medFilters.time, 'past'));
        }
        if (window.GH_LENS && typeof GH_LENS.setCount === 'function') GH_LENS.setCount(rows.length);
        if (!rows.length) {
          area.innerHTML = window.emptyState(...window.GH_EMPTY[emptyKey]);
          return;
        }
        area.innerHTML = '';
        area.style.padding = '16px';
        const grouped = window.GH_CARD.renderGrouped(moduleId, rows, { layout: 'grid' });
        area.appendChild(grouped);

        // Run interaction check for medications (preserve legacy behavior)
        if (moduleId === 'medical_medications' && window.checkInteractionsForAll) {
          window.checkInteractionsForAll(rows);
        }
      } catch (e) {
        area.innerHTML = window.errorState(e.message, '');
      }
    };
  }

  // Slice 1B (v202604.142): renderMedications is owned by Card #1 v5 above
  // (defined via `async function renderMedications()`). Don't override it
  // here. Conditions and notes still use the generic GH_CARD render.
  //
  // window.renderMedications = makeCardRender(
  //   'medical_medications', '/medical/medications',
  //   ['name','patient','dosage','frequency','purpose','notes'],
  //   'status', 'medications'
  // );
  window.renderConditions = makeCardRender(
    'medical_conditions', '/medical/conditions',
    ['condition','patient','notes'],
    null, 'conditions'
  );
  window.renderNotes = makeCardRender(
    'medical_notes', '/medical/notes',
    ['patient','questions','doctors_response','notes'],
    null, 'visits'
  );
})();

// ── Boot ───────────────────────────────────────────────────────
async function _medBoot() {
  if (LT.authToken) await loadSharedData();
  // Populate patient filter strip from family members
  const strip = document.getElementById('patientStrip');
  if (strip && familyMembers.length) {
    // Hydrate the global avatar cache so initials are unique + photos load
    if (window.GH_AVATAR) { try { await GH_AVATAR.preload(); } catch(_) {} }
    familyMembers.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'patient-pill';
      btn.dataset.patient = m.display_name;
      // Avatar (sm) + name. innerHTML so the GH_AVATAR span renders.
      const avatar = window.GH_AVATAR ? GH_AVATAR.render(m, 'sm') : '';
      btn.innerHTML = `${avatar}<span class="patient-pill-name">${m.display_name}</span>`;
      btn.onclick = function() { setPatient(this, m.display_name); };
      strip.appendChild(btn);
    });
  }
  // Wire search bar
  const searchEl = document.getElementById('medSearch');
  if (searchEl) {
    searchEl.addEventListener('input', e => {
      _medSearch = e.target.value.trim().toLowerCase();
      renderCurrentView();
    });
  }
  // The Lens — re-inits per active subview (medications / conditions / visits)
  // because each has a different module config (verbs, statuses).
  window._medFilters = {};
  function initMedLens(view) {
    const moduleId = view === 'conditions' ? 'medical_conditions'
                   : view === 'notes'      ? 'medical_notes'
                   :                         'medical_medications';
    GH_LENS.init({
      container: 'medLens',
      moduleId,
      // Medical doesn't have a card view distinct from the default — so no
      // viewToolbar (only the sentence). The card render IS the legacy view.
      viewToolbar: false,
      onChange: ({ filters }) => {
        const f = {};
        for (const flt of filters) {
          if (flt.dim === 'person')   f.person   = flt.value;
          if (flt.dim === 'status')   f.status   = flt.value;
          if (flt.dim === 'tag')      f.tag      = flt.value;
          // v202604.133 — text/select dims
          if (flt.dim === 'name')     f.name     = flt.value;     // meds + conditions
          if (flt.dim === 'provider') f.provider = flt.value;     // notes
          if (flt.dim === 'form')     f.form     = flt.value;     // meds
          if (flt.dim === 'time')     f.time     = flt.value;     // any
        }
        window._medFilters = f;
        renderCurrentView();
      },
    });
  }
  // Initial — the medical page's renderCurrentView decides which subview is up
  initMedLens(window._medActiveView || 'medications');
  // Hook into setMedView if defined to re-init lens on subview change
  const _origSetMedView = window.setMedView;
  if (typeof _origSetMedView === 'function') {
    window.setMedView = function(v, btn) {
      _origSetMedView(v, btn);
      initMedLens(v);
    };
  }
  renderMedications();
  // v202604.139 — handle ?seed=N from daily-log promote
  setTimeout(() => maybeHandleMedicalSeed(), 100);
}
_medBoot();

// ── Seed-from-daily-log (v202604.139) ──────────────────────────
// When medical.html opens with ?seed=N, fetch the daily log entry,
// switch to the Visits tab, open the visit drawer pre-filled.
// On save, the daily log entry is PATCHed with the promotion link.
async function maybeHandleMedicalSeed() {
  const params = new URLSearchParams(window.location.search);
  const seedId = params.get('seed');
  if (!seedId) return;
  let entry;
  try {
    entry = await window.api('GET', `/daily-log/${seedId}`);
  } catch {
    if (window.LT?.toast) LT.toast('Could not load daily log entry to promote', 'err');
    return;
  }
  // Switch to the Visits view first
  const visitsBtn = document.querySelector('[onclick*="\'notes\'"]');
  if (visitsBtn) switchView('notes', visitsBtn);
  // Open the note drawer
  await openNoteDrawer();
  // Pre-fill from the daily log entry
  const memberIds = (entry.memory_members || []).map(m => m.family_member_id);
  if (memberIds.length && window.GH_FAMILY) {
    GH_FAMILY.init('nFamilyWrap', memberIds);
  }
  if ($id('nDate'))   $id('nDate').value   = entry.log_date || new Date().toISOString().slice(0,10);
  if ($id('nNotes'))  $id('nNotes').value  = entry.entry_text || '';
  // Stash seed id so saveNote can PATCH it on success
  window._seedDailyLogId = parseInt(seedId, 10);
  // Clean URL so refresh doesn't re-trigger
  if (window.history?.replaceState) {
    window.history.replaceState({}, '', window.location.pathname);
  }
}

let visitFormTags = [];
function renderVisitTags() {
  const wrap = $id('visitTagsWrap'), input = $id('visitTagInput'); if (!wrap||!input) return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  visitFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{visitFormTags=visitFormTags.filter(x=>x!==t);renderVisitTags();});
    wrap.insertBefore(chip,input);
  });
}
function addVisitTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!visitFormTags.includes(t)).forEach(t=>visitFormTags.push(t));
  renderVisitTags(); const inp=$id('visitTagInput'); if(inp)inp.value='';
}
function initVisitTags(existing){
  visitFormTags=(existing||[]).slice(); renderVisitTags();
  const inp=$id('visitTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addVisitTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&visitFormTags.length){visitFormTags.pop();renderVisitTags();}};
  inp.onblur=()=>{if(inp.value.trim())addVisitTag(inp.value);};
  GH_TAGS.init({inputId:'visitTagInput',wrapId:'visitTagsWrap',module:'medical',getFormTags:()=>visitFormTags,addTag:t=>addVisitTag(t),allowCreate:true});
}

<script>
const _eobApi = window.makeApi('');  // medical uses '' prefix

// ── EOB state ─────────────────────────────────────────────────
let _eobPreview = [];     // parsed statements from server
let _eobFile    = null;   // selected File object

// ── Render EOB panel ──────────────────────────────────────────
async function renderEob() {
  const el = $id('listArea');
  el.innerHTML = `
    <div style="padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text)">EOB Import</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">MHBP · local parse · no data leaves NAS</div>
        </div>
      </div>

      <!-- Upload zone -->
      <div style="background:var(--bg2);border:1.5px dashed var(--border2);border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;margin-bottom:14px"
           id="eobDropZone" onclick="document.getElementById('eobFileInput').click()"
           ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
           ondragleave="this.style.borderColor=''"
           ondrop="event.preventDefault();this.style.borderColor='';_eobOnDrop(event)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
        <div style="font-size:13px;font-weight:600;color:var(--text)">Browse or drag an EOB PDF</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">Single statement or combined multi-month PDF</div>
        <input type="file" id="eobFileInput" accept=".pdf" style="display:none" onchange="_eobOnFileSelect(this)">
      </div>
      <div id="eobFileName" style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px"></div>

      <!-- Preview table -->
      <div id="eobPreview"></div>

      <!-- Action buttons -->
      <div id="eobActions" style="display:none;margin-top:12px">
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="_eobClear()">Cancel</button>
          <button class="btn btn-primary" id="eobImportBtn" style="flex:1" onclick="_eobImport()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Import Selected
          </button>
        </div>
      </div>

      <!-- History -->
      <div id="eobHistory" style="margin-top:20px"></div>
    </div>`;

  await _eobLoadHistory();
}

function _eobOnDrop(e) {
  const f = e.dataTransfer?.files?.[0];
  if (f) _eobSetFile(f);
}
function _eobOnFileSelect(input) {
  if (input.files?.[0]) _eobSetFile(input.files[0]);
}
function _eobSetFile(f) {
  _eobFile = f;
  const el = $id('eobFileName');
  if (el) el.textContent = '📄 ' + f.name;
  _eobPreviewFile();
}

async function _eobPreviewFile() {
  const prev = $id('eobPreview');
  if (!prev || !_eobFile) return;
  prev.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">⏳ Parsing PDF…</div>';

  try {
    const fd = new FormData();
    fd.append('file', _eobFile);
    const h = {}; if (window.LT?.authToken) h['Authorization'] = 'Bearer ' + LT.authToken;
    const r = await fetch('/api/v1/medical/eob/preview', { method:'POST', headers:h, body:fd });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Parse failed');
    _eobPreview = d.statements;
    _renderEobPreviewTable(d.statements);
    const act = $id('eobActions');
    if (act) act.style.display = 'block';
  } catch(e) {
    prev.innerHTML = `<div style="color:var(--red);font-size:13px;padding:8px 0">⚠ ${esc(e.message)}</div>`;
  }
}

function _renderEobPreviewTable(stmts) {
  const el = $id('eobPreview'); if (!el) return;
  if (!stmts?.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px">No statements detected</div>'; return; }

  el.innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:6px">${stmts.length} statement${stmts.length!==1?'s':''} detected — uncheck any you don't want to import:</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1.5px solid var(--border)">
        <th style="padding:6px 8px;text-align:left;color:var(--text3);width:28px"></th>
        <th style="padding:6px 8px;text-align:left;color:var(--text3)">Date</th>
        <th style="padding:6px 8px;text-align:left;color:var(--text3)">Patients</th>
        <th style="padding:6px 8px;text-align:right;color:var(--text3)">Claims</th>
        <th style="padding:6px 8px;text-align:right;color:var(--text3)">Plan Paid</th>
        <th style="padding:6px 8px;text-align:right;color:var(--text3)">Your Share</th>
        <th style="padding:6px 8px;text-align:center;color:var(--text3)">Status</th>
      </tr></thead>
      <tbody>
        ${stmts.map((s,i) => `
          <tr style="border-bottom:1px solid var(--border);${s.already_imported?'opacity:.5':''}">
            <td style="padding:6px 8px">
              <input type="checkbox" id="eobChk${i}" ${s.already_imported?'':'checked'} ${s.already_imported?'disabled':''}>
            </td>
            <td style="padding:6px 8px;font-family:var(--mono);white-space:nowrap">${s.statement_date||'—'}</td>
            <td style="padding:6px 8px">${esc(s.patients||'—')}</td>
            <td style="padding:6px 8px;text-align:right">${s.claims_count||0}</td>
            <td style="padding:6px 8px;text-align:right;color:var(--green)">$${(s.plan_paid||0).toFixed(2)}</td>
            <td style="padding:6px 8px;text-align:right;color:${(s.your_share||0)>0?'var(--red)':'var(--text3)'}">$${(s.your_share||0).toFixed(2)}</td>
            <td style="padding:6px 8px;text-align:center">
              ${s.already_imported
                ? '<span style="color:var(--text3);font-size:11px">Already imported</span>'
                : '<span style="color:var(--green);font-size:11px">New</span>'}
            </td>
          </tr>`).join('')}
      </tbody>
    </table></div>`;
}

async function _eobImport() {
  if (!_eobFile) return;
  const stmts = _eobPreview || [];
  // Collect selected dates
  const selected = stmts
    .filter((s, i) => !s.already_imported && document.getElementById('eobChk'+i)?.checked)
    .map(s => s.statement_date);
  if (!selected.length) { if (window.toast) toast('Nothing selected', 'err'); return; }

  const btn = $id('eobImportBtn');
  btn.textContent = 'Importing…'; btn.disabled = true;
  try {
    const fd = new FormData();
    fd.append('file', _eobFile);
    fd.append('selected_dates', JSON.stringify(selected));
    const h = {}; if (window.LT?.authToken) h['Authorization'] = 'Bearer ' + LT.authToken;
    const r = await fetch('/api/v1/medical/eob/import', { method:'POST', headers:h, body:fd });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Import failed');
    if (window.toast) toast(`✓ ${d.imported} EOB statement${d.imported!==1?'s':''} imported`);
    _eobClear();
    await _eobLoadHistory();
    // Show name-match prompt if any flags were raised (S3/A10)
    if (d.name_flags && d.name_flags.length) {
      _showNameFlagPrompt(d.name_flags);
    }
  } catch(e) {
    if (window.toast) toast(e.message || 'Import failed', 'err');
  } finally {
    if (btn) { btn.textContent = 'Import Selected'; btn.disabled = false; }
  }
}

function _showNameFlagPrompt(flags) {
  const rows = flags.map(f => {
    const icon = f.confidence === 'none' ? '🔴' :
                 f.confidence === 'ambiguous' ? '🟡' : '🟠';
    const detail = f.confidence === 'none'
      ? `No family member found for <strong>${esc(f.raw)}</strong>`
      : f.confidence === 'ambiguous'
        ? `<strong>${esc(f.raw)}</strong> — could be: ${f.candidates.map(esc).join(', ')}`
        : `<strong>${esc(f.raw)}</strong> → auto-matched to <strong>${esc(f.matched)}</strong>`;
    return `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">${icon} ${detail}</div>`;
  }).join('');

  GH_MODAL.open({
    title: '⚠ Patient Names Need Review',
    wide: false,
    body: `<div style="margin-bottom:10px;font-size:13px;color:var(--text2)">
      ${flags.length} patient name${flags.length!==1?'s':''} could not be exactly matched to a family member.
      Records have been flagged in Data Quality review.
    </div>${rows}`,
    saveLabel: 'Go to Review',
    cancelLabel: 'Dismiss',
    onSave: () => {
      GH_MODAL.close();
      window.open('/reports.html#quality', '_blank');
    }
  });
}

function _eobClear() {
  _eobFile = null; _eobPreview = [];
  const fi = $id('eobFileInput'); if (fi) fi.value = '';
  const fn = $id('eobFileName'); if (fn) fn.textContent = '';
  const prev = $id('eobPreview'); if (prev) prev.innerHTML = '';
  const act = $id('eobActions'); if (act) act.style.display = 'none';
}

async function _eobLoadHistory() {
  const el = $id('eobHistory'); if (!el) return;
  try {
    const h = {}; if (window.LT?.authToken) h['Authorization'] = 'Bearer ' + LT.authToken;
    const stmts = await window.api('GET', '/medical/eob');
    if (!stmts.length) {
      el.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:13px">No EOBs imported yet</div>';
      return;
    }
    el.innerHTML = `
      <div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Imported Statements</div>
      ${stmts.map(s => `
        <div class="gh-card gh-s-gray card" style="padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div style="flex:1;cursor:pointer;min-width:0" onclick="_eobShowDetail(${s.id})">
              <div style="font-weight:600;font-size:13px">${s.statement_date} · ${esc(s.group_name||'MHBP')}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(s.patients||'')} · ${s.claims_count||0} claim${s.claims_count!==1?'s':''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <div style="font-size:13px;font-weight:600;color:var(--green)">Plan: $${(s.plan_paid_total||0).toFixed(2)}</div>
              <div style="font-size:11px;color:${(s.your_share_total||0)>0?'var(--red)':'var(--text3)'}">You: $${(s.your_share_total||0).toFixed(2)}</div>
              <button class="btn btn-ghost" style="font-size:11px;padding:2px 8px;color:var(--red);border-color:var(--red);margin-top:2px"
                onclick="event.stopPropagation();_eobDelete(${s.id},'${esc(s.statement_date)}')">Delete</button>
            </div>
          </div>
        </div>`).join('')}`;
  } catch(e) {
    el.innerHTML = '<div style="color:var(--red);font-size:12px">Could not load history</div>';
  }
}

async function _eobDelete(id, dateLabel) {
  if (!await LT.confirm(`Delete EOB statement from ${dateLabel}? This removes all claims, services and balance rows.`)) return;
  try {
    const h = {}; if (window.LT?.authToken) h['Authorization'] = 'Bearer ' + LT.authToken;
    const d = await window.api('DELETE', `/medical/eob/${id}`);
    if (!d.ok) throw new Error(d.error || 'Delete failed');
    toast('EOB statement deleted');
    await _eobLoadHistory();
  } catch(e) { toast(e.message || 'Delete failed', 'err'); }
}

async function _eobShowDetail(id) {
  const h = {}; if (window.LT?.authToken) h['Authorization'] = 'Bearer ' + LT.authToken;
  const s = await window.api('GET', `/medical/eob/${id}`);
  if (!s || s.error) return;

  // Build detail modal using LT.confirm style — simple alert-style for now
  let html = `<b>${s.statement_date} — ${esc(s.group_name||'MHBP')}</b><br>`;
  html += `<small style="color:var(--text3)">${esc(s.plan_name||'')} · ${esc(s.member_id||'')}</small><br><br>`;

  for (const c of (s.claims||[])) {
    html += `<b>${esc(c.patient)}</b> — ${esc(c.provider||'')}<br>`;
    html += `Plan paid: <b>$${(c.plan_paid||0).toFixed(2)}</b> &nbsp; Your share: <span style="color:var(--red)">$${(c.your_share||0).toFixed(2)}</span>`;
    if (c.fund_paid) html += ` &nbsp; Fund: $${c.fund_paid.toFixed(2)}`;
    html += '<br>';
    for (const sv of (c.services||[])) {
      html += `&nbsp;&nbsp;<small style="color:var(--text3)">${esc(sv.service_code||'')} ${esc(sv.service_description||'')} on ${sv.service_date||''} — $${(sv.amount_billed||0).toFixed(2)} billed</small><br>`;
    }
    html += '<br>';
  }

  if (s.deductible_annual) {
    html += `<small>Deductible: $${(s.deductible_used||0).toFixed(2)} of $${s.deductible_annual.toFixed(2)} used</small><br>`;
  }
  if (s.healthfund_remaining != null) {
    html += `<small>HealthFund remaining: $${(s.healthfund_remaining||0).toFixed(2)}</small><br>`;
  }

  alert(html.replace(/<[^>]+>/g, ''));
}

// ── OpenFDA Drug Lookup ──────────────────────────────────────
async function lookupDrug() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { if (window.toast) toast('Enter a drug name first', 'err'); return; }
  try { const cfg = await window.api('GET', '/settings/config'); if (cfg.api_openfda_enabled === '0') { toast('FDA lookup is disabled in Settings → Free APIs', 'err'); return; } } catch {}
  const fb = document.getElementById('drugFeedback');
  fb.textContent = '⏳ Looking up…'; fb.style.display = 'block'; fb.style.color = 'var(--text3)';
  try {
    // Search by brand name first, then generic
    const clean = name.replace(/\s+\d+.*$/, '').trim(); // strip dosage for search
    const url = `https://api.fda.gov/drug/label.json?search=openfda.brand_name:"${encodeURIComponent(clean)}"+openfda.generic_name:"${encodeURIComponent(clean)}"&limit=1`;
    const r = await fetch(url, { mode: 'cors' });
    const d = await r.json();
    if (d.error || !d.results?.length) {
      // Try generic name only
      const r2 = await fetch(
        `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(clean)}"&limit=1`,
        { mode: 'cors' }
      );
      const d2 = await r2.json();
      if (d2.error || !d2.results?.length) {
        fb.style.color = 'var(--amber)';
        fb.textContent = '⚠ Not found in FDA database — check spelling';
        return;
      }
      processResult(d2.results[0], fb);
    } else {
      processResult(d.results[0], fb);
    }
  } catch(e) {
    fb.style.color = 'var(--red)';
    fb.textContent = '⚠ Lookup failed — check connection';
  }
}

function processResult(result, fb) {
  const ofd = result.openfda || {};
  const generic  = (ofd.generic_name || [])[0] || '';
  const brand    = (ofd.brand_name || [])[0] || '';
  const mfr      = (ofd.manufacturer_name || [])[0] || '';
  const route    = (ofd.route || [])[0] || '';
  const purpose  = (result.purpose || [])[0] || '';
  // Auto-fill dosage field if empty and dosage info found
  const dosage_info = (result.dosage_and_administration || [])[0] || '';
  const parts = [
    generic && generic.toLowerCase() !== brand.toLowerCase() ? `Generic: ${generic}` : '',
    route ? `Route: ${route}` : '',
    mfr ? `Mfr: ${mfr}` : '',
  ].filter(Boolean).join(' · ');
  fb.style.color = 'var(--green)';
  fb.textContent = parts || '✓ Found in FDA database';
  if (window.toast) toast('Drug info found ✓');
}


// Populate condition dropdown for medication form
async function loadConditionsForPatient(selectEl, selectedId) {
  try {
    const conds = await api('GET', '/medical/conditions');
    const active = conds.filter(c => c.status === 'Active' || c.status === 'Chronic');
    selectEl.innerHTML = '<option value="">— none —</option>' +
      active.map(c => `<option value="${c.id}"${c.id === selectedId?' selected':''}>${esc(c.condition_name)}</option>`).join('');
  } catch { /* non-fatal */ }
}
