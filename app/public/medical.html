<style>
/* ── View tabs ─────────────────────────────────────────────── */

/* ── Medical card ──────────────────────────────────────────── */
/* med cards use shared .card system */

/* ── Patient pills ─────────────────────────────────────────── */
.patient-strip {
  display: flex;
  gap: 8px;
  padding: 10px 20px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.patient-strip::-webkit-scrollbar { display: none; }
.patient-pill {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.patient-pill.active {
  background: var(--accent-bg);
  border-color: var(--accent-bd);
  color: var(--accent);
}

/* ── Status dot ────────────────────────────────────────────── */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}
.status-active { background: var(--green); }
.status-discontinued, .status-resolved { background: var(--text3); }
.status-asneeded, .status-monitoring { background: var(--amber); }
.status-chronic { background: var(--red); }
.status-completed { background: var(--accent); }

/* ── Follow-up badge ───────────────────────────────────────── */
.followup-badge {
  background: var(--amber-bg);
  border: 1px solid rgba(245,158,11,.3);
  color: var(--amber);
  font-size: 10px;
  font-family: var(--mono);
  padding: 1px 6px;
  border-radius: 4px;
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Page header ──────────────────────────────────────── -->
  <!-- header injected by nav.js -->

  <!-- ── View tabs ────────────────────────────────────────── -->
  <div class="view-tabs" style="--tab-color:#14b8a6;display:flex;align-items:center" style="--tab-color:#14b8a6">
    <button class="view-tab active" onclick="switchView('medications',this)">Meds</button>
    <button class="view-tab" onclick="switchView('conditions',this)">Conditions</button>
    <button class="view-tab" onclick="switchView('notes',this)">Visits</button>
    
    <button class="view-tab" onclick="switchView('hw',this)">H&amp;W</button>
    <button class="view-tab" onclick="switchView('summary',this)">Summary</button>

  </div>

  <!-- ── Patient filter ───────────────────────────────────── -->

    <button class="patient-pill active" data-patient="" onclick="setPatient(this,'')">All</button>
  </div>

  <!-- Search bar -->
  <div class="search-wrap" style="margin:8px 16px 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="medSearch" type="search" placeholder="Search medications, conditions, notes…" autocomplete="off">
  </div>
  <div id="medViewToolbar" style="display:flex;align-items:center;padding:4px 16px 0"></div>

  <!-- ── Main list ────────────────────────────────────────── -->
  <div class="content" style="padding-top:12px">
    <div id="listArea"></div>
  </div>

  <!-- ── Summary panel (hidden until tab switched) ───────── -->

    <div class="form-row">

<script>
// ── Auth ──────────────────────────────────────────────────────
// Auth token from lt-core.js (LT.authToken)
Object.defineProperty(window, 'authToken', { get: () => LT.authToken, set: v => { LT.authToken = v; } });
let familyMembers = [];
let medicalContacts = [];

const api = window.makeApi('');

async function loadSharedData() {
  async function silentGet(path) {
    try {
      const r = await fetch('/api/v1' + path, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (!r.ok) return [];
      return await r.json();
    } catch { return []; }
  }
  familyMembers   = await silentGet('/settings/family');
  medicalContacts = await silentGet('/settings/contacts?type=Medical');
}

function populateFamilySelect(selectEl, currentVal) {
  selectEl.innerHTML = '';
  const members = familyMembers.length ? familyMembers : [{ display_name: 'Self' }];
  members.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.display_name;
    opt.textContent = m.display_name;
    if (m.display_name === (currentVal || 'Self')) opt.selected = true;
    selectEl.appendChild(opt);
  });
}

function populatePhysicianDatalist(datalistEl) {
  if (!datalistEl) return;
  datalistEl.innerHTML = '';
  medicalContacts.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    datalistEl.appendChild(opt);
  });
}

function $id(id) { return document.getElementById(id); }
function showToast(msg, type='ok') {
  const t = $id('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2400);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

// ── State ──────────────────────────────────────────────────────
let currentView = 'medications';
let _medSearch = '';
let currentPatient = '';
let editingId = null;
let confirmCb = null;

// ── View switching ─────────────────────────────────────────────
function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const strip = $id('patientStrip');
  strip.style.display = (view === 'summary') ? 'none' : 'flex';
  renderCurrentView();
}

function setPatient(btn, val) {
  currentPatient = val;
  document.querySelectorAll('.patient-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCurrentView();
}

async function renderCurrentView() {
  const listArea = $id('listArea');
  const summaryPanel = document.getElementById('summaryPanel');
  if (currentView === 'summary') {
    listArea.style.display = 'none';
    summaryPanel.style.display = 'block';
    await renderSummary();
  } else {
    listArea.style.display = '';
    summaryPanel.style.display = 'none';
    if (currentView === 'medications')  await renderMedications();
    else if (currentView === 'conditions') await renderConditions();
    else if (currentView === 'notes')   await renderNotes();
    else if (currentView === 'hw')      await renderHW();
  }
}

async function renderSummary() {
  const el = document.getElementById('summaryContent'); if (!el) return;
  try {
    const data = await api('GET', '/summary');
    if (!data.length) { el.innerHTML = '<div style="color:var(--text3);padding:20px;text-align:center">No family members found</div>'; return; }
    el.innerHTML = data.map(item => {
      const m = item.member;
      const activeConds  = item.conditions.filter(c => c.status === 'Active');
      const activeMeds   = item.medications.filter(x => x.status === 'Active');
      const inactiveConds = item.conditions.filter(c => c.status !== 'Active');
      const inactiveMeds  = item.medications.filter(x => x.status !== 'Active');
      return `<div style="background:var(--bg2);border-radius:var(--r);margin-bottom:16px;overflow:hidden">
        <div style="padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
            ${m.relationship === 'Child' ? '👦' : m.is_primary_user ? '🧑' : '👤'}
          </div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700;color:var(--text)">${esc(m.display_name)}</div>
            <div style="font-size:12px;color:var(--text3)">${esc(m.relationship||'')}</div>
          </div>
          <div style="display:flex;gap:10px;text-align:center">
            <div><div style="font-size:18px;font-weight:800;color:var(--text)">${activeConds.length}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase">Conditions</div></div>
            <div><div style="font-size:18px;font-weight:800;color:var(--text)">${activeMeds.length}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase">Meds</div></div>
          </div>
        </div>

        ${activeConds.length ? `<div style="padding:10px 16px 4px">
          <div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px">Active Conditions</div>
          ${activeConds.map(c => `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:13px;color:var(--text)">${esc(c.condition_name)}</span>
            ${c.physician?`<span style="font-size:11px;color:var(--text3)">${esc(c.physician)}</span>`:''}
          </div>`).join('')}
        </div>` : ''}

        ${activeMeds.length ? `<div style="padding:10px 16px 4px">
          <div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px">Active Medications</div>
          ${activeMeds.map(med => `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
            <div>
              <span style="font-size:13px;color:var(--text);font-weight:600">${esc(med.name)}</span>
              ${med.dosage?`<span style="font-size:12px;color:var(--text3)"> · ${esc(med.dosage)}</span>`:''}
            </div>
            ${med.frequency?`<span style="font-size:11px;color:var(--text3)">${esc(med.frequency)}</span>`:''}
          </div>`).join('')}
        </div>` : ''}

        ${item.recent_visits.length ? `<div style="padding:10px 16px 12px">
          <div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px">Recent Visits</div>
          ${item.recent_visits.map(v => `<div style="padding:4px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:13px;color:var(--text)">${esc(v.reason||'Visit')}</div>
            <div style="font-size:11px;color:var(--text3)">${v.visit_date||''}</div>
          </div>`).join('')}
        </div>` : ''}

        ${!activeConds.length && !activeMeds.length && !item.recent_visits.length ? `<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">No active records</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = errorState(e.message, ''); }
}

async function renderHW() {
  const area = $id('listArea');
  area.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Loading…</div>';
  try {
    const params = currentPatient && currentPatient !== 'All'
      ? `?family_member_id=${encodeURIComponent(currentPatient)}` : '';
    const items = await api('GET', `/inventory/hw${params}`);

    if (!items.length) {
      area.innerHTML = `<div style="text-align:center;padding:60px 20px">
        <div style="font-size:40px;margin-bottom:12px">💊</div>
        <h3 style="color:var(--text2)">No Health &amp; Wellness items</h3>
        <p style="color:var(--text3);font-size:14px">Add items in Inventory using the Health &amp; Wellness category</p>
      </div>`;
      return;
    }

    // Group by subcategory
    const groups = {};
    items.forEach(i => {
      const g = i.hw_subcategory || 'Other';
      if (!groups[g]) groups[g] = [];
      groups[g].push(i);
    });

    const subcatOrder = ['Prescription','OTC','First Aid','Personal Care','Vitamins & Supplements','Medical Equipment','Other'];
    let html = '';
    subcatOrder.forEach(subcat => {
      if (!groups[subcat]) return;
      html += `<div style="padding:12px 16px 4px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)">${subcat}</div>`;
      groups[subcat].forEach(item => {
        const expBadge = item.expiration_date ? (() => {
          const days = Math.ceil((new Date(item.expiration_date) - new Date()) / 86400000);
          if (days < 0) return '<span style="background:#fee2e2;color:#ef4444;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px">Expired</span>';
          if (days <= 30) return `<span style="background:#fef3c7;color:#d97706;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:6px">Exp soon</span>`;
          return '';
        })() : '';

        html += `<div style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer" onclick="window.location='/inventory.html?open=${item.item_ref}'">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-weight:600;font-size:15px">${item.name}${expBadge}</div>
              <div style="font-size:13px;color:var(--text3);margin-top:2px">
                ${item.family_member_name ? `For ${item.family_member_name} · ` : ''}
                ${item.dosage_strength || ''}
                ${item.rx_number ? ` · Rx ${item.rx_number}` : ''}
              </div>
              ${item.pharmacy_name ? `<div style="font-size:12px;color:var(--text3)">${item.pharmacy_name}</div>` : ''}
            </div>
            <div style="font-size:11px;color:var(--text3);text-align:right">
              Qty ${item.quantity || 1}
              ${item.expiration_date ? `<br>${item.expiration_date}` : ''}
            </div>
          </div>
        </div>`;
      });
    });

    area.innerHTML = `<div style="padding-bottom:80px">${html}</div>`;
  } catch(e) {
    area.innerHTML = errorState(e.message, '');
  }
}

function statusDotClass(status) {
  const m = {
    'Active': 'status-active',
    'Discontinued': 'status-discontinued', 'Resolved': 'status-resolved',
    'As Needed': 'status-asneeded', 'Monitoring': 'status-monitoring',
    'Chronic': 'status-chronic', 'Completed': 'status-completed',
  };
  return m[status] || 'status-active';
}

// ── Medications ─────────────────────────────────────────────────
async function renderMedications() {
  const area = $id('listArea');
  area.innerHTML = '<div class="spinner"><div class="spin"></div> Loading…</div>';
  try {
    let url = '/medical/medications';
    const ps = [];
    if (currentPatient) ps.push(`patient=${encodeURIComponent(currentPatient)}`);
    if (ps.length) url += '?' + ps.join('&');
    let rows = await api('GET', url);
    if (_medSearch) rows = rows.filter(r =>
      ['name','patient','dosage','frequency','purpose','notes'].some(k=>(r[k]||'').toLowerCase().includes(_medSearch))
    );
    if (window._medFilters?.status) rows = rows.filter(r => r.status === window._medFilters.status);
    if (window._medFilters?.tags?.length) rows = rows.filter(r => window._medFilters.tags.every(t => (r.tags||[]).includes(t)));
    if (!rows.length) { area.innerHTML = emptyState(...GH_EMPTY.medications); return; }

    // Group by patient
    const byPatient = {};
    rows.forEach(r => { (byPatient[r.patient] = byPatient[r.patient]||[]).push(r); });

    area.innerHTML = Object.entries(byPatient).map(([patient, meds]) => `
      <div class="section-label">${esc(patient)}</div>
      ${meds.map(r => `
        <div class="card" onclick="editMedication(${r.id})">
          <div class="card-right">
            <button class="btn btn-ghost" style="padding:3px 6px;font-size:11px;color:var(--red)" title="Delete"
                    onclick="event.stopPropagation();deleteMed(${r.id})">✕</button>
          </div>
          <div class="card-title">
            <span class="status-dot ${statusDotClass(r.status)}"></span>
            ${esc(r.name)}
            <span class="badge badge-grey">${r.status}</span>
          </div>
          ${r.dosage||r.frequency ? `<div class="card-meta">
            ${r.dosage ? `<span>${esc(r.dosage)}</span>` : ''}
            ${r.frequency ? `<span>· ${esc(r.frequency)}</span>` : ''}
          </div>` : ''}
          <div class="card-meta">
            ${r.physician ? `<span>Dr. ${esc(r.physician)}</span>` : ''}
            ${r.start_date ? `<span>Started ${formatDate(r.start_date)}</span>` : ''}
            ${r.purpose ? `<span style="color:var(--text2)">${esc(r.purpose)}</span>` : ''}
          </div>
          ${r.tags&&r.tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${r.tags.map(t=>{const s=window.GH_TAGS?GH_TAGS.chipStyle(t):'';return`<span class="tag-chip" style="font-size:10px;padding:1px 6px${s?';'+s:''}">${esc(t)}</span>`;}).join('')}</div>`:''}
        </div>
      `).join('')}
    `).join('');
  } catch (e) {
    area.innerHTML = errorState(e.message, '');
  }
}

// ── FAB routing ────────────────────────────────────────────────
function openAddDrawer() {
  editingId = null;
  if (currentView === 'medications')  openMedDrawer();
  else if (currentView === 'conditions') openCondDrawer();
  else if (currentView === 'notes')   openNoteDrawer();
}

// ── Medication CRUD ────────────────────────────────────────────
function openMedDrawer(r) {
  editingId = r?.id || null;
  $id('medDrawerTitle').textContent = editingId ? 'Edit Medication' : 'Add Medication';
  GH_REFS.populateFamily('mPatient', r?.patient || currentPatient || 'Self');
  GH_REFS.populateContact('mPhysician', r?.physician_contact_id || null, { type: 'Medical', placeholder: '— none —' });
  $id('mStatus').value = r?.status || 'Active';
  $id('mName').value = r?.name || '';
  $id('mDosage').value = r?.dosage || '';
  $id('mFreq').value = r?.frequency || '';
  $id('mStart').value = r?.start_date || '';
  $id('mEnd').value = r?.end_date || '';
  $id('mPurpose').value = r?.purpose || '';
  $id('mNotes').value = r?.notes || '';
  initMedTags(r?.tags||[]);
  $id('medDrawer').classList.add('open');
}
function closeMedDrawer() { $id('medDrawer').classList.remove('open'); }

async function editMedication(id) {
  try {
    const rows = await api('GET', '/medical/medications');
    const r = rows.find(x => x.id === id);
    if (r) openMedDrawer(r);
  } catch(e) { showToast(e.message,'err'); }
}
async function saveMedication() {
  if (!$id('mName').value.trim()) { showToast('Name required','err'); return; }
  const body = {
    patient: $id('mPatient').value, status: $id('mStatus').value,
    name: $id('mName').value.trim(), dosage: $id('mDosage').value.trim()||null,
    frequency: $id('mFreq').value.trim()||null,
    physician_contact_id: $id('mPhysician').value ? parseInt($id('mPhysician').value) : null,
    start_date: $id('mStart').value||null, end_date: $id('mEnd').value||null,
    purpose: $id('mPurpose').value.trim()||null, notes: $id('mNotes').value.trim()||null,
    tags: medFormTags,
  };
  try {
    if (editingId) { await api('PUT',`/medical/medications/${editingId}`,body); showToast('Updated'); }
    else { await api('POST','/medical/medications',body); showToast('Saved'); }
    closeMedDrawer(); await renderMedications();
  } catch(e) { showToast(e.message,'err'); }
}
async function deleteMed(id) {
  confirmCb = async () => {
    await api('DELETE',`/medical/medications/${id}`);
    showToast('Deleted'); await renderMedications();
  };
  showConfirm('Delete medication?');
}

// ── Visit Notes CRUD ────────────────────────────────────────────
function toggleFollowDate() {

}

async function openNoteDrawer(r) {
  editingId = r?.id || null;

// ── Confirm ─────────────────────────────────────────────────────
function showConfirm(title, msg='This cannot be undone.') {
  $id('confirmTitle').textContent = title;
  $id('confirmMsg').textContent = msg;
  $id('confirmDlg').classList.add('open');
}
function cancelConfirm() { $id('confirmDlg').classList.remove('open'); confirmCb=null; }
function doConfirm() {
  $id('confirmDlg').classList.remove('open');
  if (confirmCb) { confirmCb(); confirmCb=null; }
}

// ── Close drawers on overlay click ─────────────────────────────
['medDrawer','condDrawer','noteDrawer'].forEach(id => {
  const el = $id(id);
  if (el) el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

// ── Boot ───────────────────────────────────────────────────────
async function _medBoot() {
  if (LT.authToken) await loadSharedData();
  // Populate patient filter strip from family members
  const strip = document.getElementById('patientStrip');
  if (strip && familyMembers.length) {
    familyMembers.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'patient-pill';
      btn.dataset.patient = m.display_name;
      btn.textContent = m.display_name;
      btn.onclick = function() { setPatient(this, m.display_name); };
      strip.appendChild(btn);
    });
  }
  // Wire search bar
  const searchEl = document.getElementById('medSearch');
  if (searchEl) {
    searchEl.addEventListener('input', e => {
      _medSearch = e.target.value.trim().toLowerCase();
      renderCurrentView();
    });
  }
  // GH_VIEW toolbar
  window._medFilters = {};
  if (window.GH_VIEW) {
    GH_VIEW.init('medViewToolbar', 'med', state => {
      window._medFilters = state.filters || {};
      renderCurrentView();
    }, {
      defaultView: 'list',
      filterFields: [
        { key: 'status', type: 'select', label: 'Status',
          options: [{value:'',label:'All'},{value:'Active',label:'Active'},{value:'As Needed',label:'As Needed'},{value:'Discontinued',label:'Discontinued'},{value:'Completed',label:'Completed'}] },
        { key: 'tags', type: 'tags', label: 'Tags' },
      ]
    });
  }
  renderMedications();
}
_medBoot();

// ── Tags (medical) ───────────────────────────────────────────────────
let visitFormTags = [];
function renderVisitTags() {
  const wrap = $id('visitTagsWrap'), input = $id('visitTagInput'); if (!wrap||!input) return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  visitFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{visitFormTags=visitFormTags.filter(x=>x!==t);renderVisitTags();});
    wrap.insertBefore(chip,input);
  });
}
function addVisitTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!visitFormTags.includes(t)).forEach(t=>visitFormTags.push(t));
  renderVisitTags(); const inp=$id('visitTagInput'); if(inp)inp.value='';
}
function initVisitTags(existing){
  visitFormTags=(existing||[]).slice(); renderVisitTags();
  const inp=$id('visitTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addVisitTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&visitFormTags.length){visitFormTags.pop();renderVisitTags();}};
  inp.onblur=()=>{if(inp.value.trim())addVisitTag(inp.value);};
  GH_TAGS.init({inputId:'visitTagInput',wrapId:'visitTagsWrap',module:'medical',getFormTags:()=>visitFormTags,addTag:t=>addVisitTag(t),allowCreate:true});
}
