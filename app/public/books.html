<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0f4f8">
<meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
<title>Books — Ghrava</title>
<link rel="stylesheet" href="/shared.css">
<script src="/theme.js"></script>
<script>
  // Apply nav-collapsed before first paint to prevent sidebar flash
  if (localStorage.getItem('gh_nav_collapsed') === '1') {
    document.documentElement.classList.add('nav-collapsed-init');
  }
</script>
<style>
/* Shelf tabs */
/* shelf-tabs now uses shared view-tabs/view-tab classes */

/* Book cards */
.book-card {
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);
  display:flex;gap:12px;padding:13px 14px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
}
.book-card:hover { border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06); }
.book-spine { width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;background:var(--accent); }
.book-cover-thumb { width:44px;height:60px;object-fit:cover;border-radius:3px;border:1px solid var(--border);flex-shrink:0; }
.book-body { flex:1;min-width:0; }
.book-title { font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px; }
.book-author { font-size:12px;color:var(--text3);margin-bottom:6px; }
.book-meta { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
.book-badge { font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600; }
.badge-reading { background:rgba(34,197,94,.1);color:var(--green); }
.badge-read    { background:var(--accent-bg);color:var(--accent); }
.badge-want    { background:rgba(139,92,246,.1);color:#8b5cf6; }

/* Stars */
.stars { display:flex;gap:1px; }
.star { font-size:13px;color:var(--border2); }
.star.lit { color:#f59e0b; }

/* Stats */
.book-stats-row { display:flex;gap:8px;padding:10px 16px 4px;overflow-x:auto;scrollbar-width:none; }
.book-stats-row::-webkit-scrollbar { display:none; }
.book-stat { flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center;min-width:72px; }
.book-stat-val { font-size:20px;font-weight:800;font-family:var(--mono);color:var(--text); }
.book-stat-lbl { font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-top:2px; }

/* GH_VIEW grid mode */
#bookList.gh-grid {
  display:grid;
  grid-template-columns:repeat(var(--bk-cols,3),1fr);
  gap:10px;
  padding:8px 16px 100px;
}
#bookList.gh-grid .book-card {
  flex-direction:column;gap:8px;margin-bottom:0;
}
#bookList.gh-grid .book-cover-thumb { width:100%;height:120px;border-radius:var(--r); }
#bookList.gh-grid .book-spine { width:100%;height:4px;align-self:auto; }

</style>
</head>
<body>
<script>
window.GH_PAGE = { module: 'books', title: 'Books' };
</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-messages.js"></script>
<script src="/js/lt-shared-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.2/umd/index.min.js" crossorigin="anonymous"></script>
<div id="nav-container"></div>

<div id="app">

  <!-- Stats -->
  <div class="book-stats-row">
    <div class="book-stat"><div class="book-stat-val" id="stReading">—</div><div class="book-stat-lbl">Reading</div></div>
    <div class="book-stat"><div class="book-stat-val" id="stRead">—</div><div class="book-stat-lbl">Read</div></div>
    <div class="book-stat"><div class="book-stat-val" id="stWant">—</div><div class="book-stat-lbl">Want</div></div>
    <div class="book-stat"><div class="book-stat-val" id="stRating">—</div><div class="book-stat-lbl">Avg ★</div></div>
  </div>

  <!-- Shelf tabs -->
  <div class="view-tabs" id="shelfTabs" style="--tab-color:#8b5cf6">
    <button class="view-tab active" onclick="setShelf('Currently Reading',this)">Reading</button>
    <button class="view-tab" onclick="setShelf('Want to Read',this)">Want to Read</button>
    <button class="view-tab" onclick="setShelf('Read',this)">Read</button>
    <button class="view-tab" onclick="setShelf('all',this)">All</button>
    <button class="view-tab" onclick="setFormatFilter('Physical',this)">Physical</button>
    <button class="view-tab" onclick="setFormatFilter('Kindle',this)">Kindle</button>
    <button class="view-tab" onclick="setFormatFilter('Audible',this)">Audible</button>
  </div>

  <!-- Search -->
  <div style="padding:6px 16px 0">
    <input class="form-input" id="bookSearch" placeholder="Search title or author…" oninput="loadBooks()" style="font-size:13px">
  </div>
  <!-- Genre sub-filter populated dynamically -->
  <div style="display:flex;gap:6px;padding:4px 16px;overflow-x:auto;scrollbar-width:none" id="genreFilters"></div>

  <!-- GH_VIEW toolbar -->
  <div id="bookViewToolbar" style="display:flex;align-items:center;padding:4px 16px 0"></div>

  <!-- Book list -->
  <div id="bookList" style="padding:4px 16px 100px">
    <div class="spinner"><div class="spin"></div>Loading…</div>
  </div>

</div><!-- #app -->

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openAddMenu()" title="Add book">+</button>

<!-- ════════════════════════════════════════════════════════════
     BOOK DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="bookDrawer" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="bookDrawerTitle">Add Book</div>

    <div class="form-group"><label class="form-label">Title <span class="req">*</span></label><input class="form-input" id="bkTitle"></div>
    <div class="form-group"><label class="form-label">Author</label><input class="form-input" id="bkAuthor"></div>
    <div class="form-group"><label class="form-label">ISBN</label><input class="form-input" id="bkIsbn" placeholder="e.g. 9780743273565" style="font-family:var(--mono)"></div>
    <div class="form-row">
      <div class="form-group" style="flex:2"><label class="form-label">Publisher</label><input class="form-input" id="bkPublisher" placeholder="Publisher name"></div>
      <div class="form-group"><label class="form-label">Year</label><input class="form-input" type="number" id="bkPublishYear" placeholder="2024" min="1000" max="2099"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Genre</label><select class="form-select" id="bkGenre" onchange="triggerBookSuggest()"></select></div>
      <div class="form-group"><label class="form-label">Format</label>
        <select class="form-select" id="bkFormat">
          <option>Physical</option><option>Kindle</option><option>Audible</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="bkStatus">
        <option>Want to Read</option><option>Currently Reading</option><option>Read</option>
      </select>
    </div>

    <!-- Rating stars -->
    <div class="form-group">
      <label class="form-label">Rating</label>
      <div id="ratingPicker" style="display:flex;gap:8px;align-items:center">
        <button onclick="setRating(1)" id="star1" style="font-size:24px;background:none;border:none;cursor:pointer;padding:0;color:var(--border2)">★</button>
        <button onclick="setRating(2)" id="star2" style="font-size:24px;background:none;border:none;cursor:pointer;padding:0;color:var(--border2)">★</button>
        <button onclick="setRating(3)" id="star3" style="font-size:24px;background:none;border:none;cursor:pointer;padding:0;color:var(--border2)">★</button>
        <button onclick="setRating(4)" id="star4" style="font-size:24px;background:none;border:none;cursor:pointer;padding:0;color:var(--border2)">★</button>
        <button onclick="setRating(5)" id="star5" style="font-size:24px;background:none;border:none;cursor:pointer;padding:0;color:var(--border2)">★</button>
        <button onclick="setRating(0)" style="font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px">Clear</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group"><label class="form-label">Date Started</label><input class="form-input" type="date" id="bkStarted"></div>
      <div class="form-group"><label class="form-label">Date Finished</label><input class="form-input" type="date" id="bkFinished"></div>
    </div>
    <div class="form-row" id="bkProgressRow">
      <div class="form-group"><label class="form-label">Pages Read</label><input class="form-input" type="number" id="bkPagesRead" min="0" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Total Pages</label><input class="form-input" type="number" id="bkPagesTotal" min="0" placeholder="—"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes / Highlights</label><textarea class="form-textarea" id="bkNotes" style="min-height:80px"></textarea></div>

    <div style="display:flex;gap:8px;margin-top:8px">
    <div id="bookFamilyWrap" style="margin-bottom:12px"></div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tags-input-wrap" id="bookTagsWrap" onclick="document.getElementById('bookTagInput').focus()">
        <input id="bookTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
      <button class="btn btn-primary" id="bkSave" style="flex:1" onclick="saveBook()">Save</button>
      <button class="btn btn-ghost" id="bkDeleteBtn" style="color:var(--red);display:none" onclick="deleteBook()">Delete</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/books';
const $ = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
// Use window.api from lt-core.js (path prefixed with /api/v1)
// Books uses a module-local wrapper to prepend /books
const api = window.makeApi('/books');

let currentShelf  = 'Currently Reading';
let currentFormat = '';
let currentGenre  = '';
let currentRating = 0;
let editingBookId = null;
let _allBooks     = [];  // local cache for fast drawer open
let _bkView    = localStorage.getItem('bk_view') || 'list';
let _bkCols    = parseInt(localStorage.getItem('bk_cols')) || 3;
let _bkFilters = {};

const FORMAT_COLOR = { Physical:'#22c55e', Kindle:'#5c72fa', Audible:'#f59e0b' };

function setShelf(shelf, btn) {
  currentShelf = shelf;
  document.querySelectorAll('#shelfTabs .view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadBooks();
}

function setFormatFilter(fmt, btn) {
  currentFormat = fmt;
  document.querySelectorAll('#shelfTabs .view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadBooks();
}

function setGenreFilter(genre, btn) {
  currentGenre = genre;
  document.querySelectorAll('#genreFilters .filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadBooks();
}

async function loadBooks() {
  const el = $('bookList'); if(!el) return;
  const search = $('bookSearch')?.value.trim()||'';
  el.innerHTML='<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const qs=new URLSearchParams();
    if(currentShelf!=='all') qs.set('status',currentShelf);
    if(currentFormat) qs.set('format',currentFormat);
    if(currentGenre)  qs.set('genre',currentGenre);
    const books = await api('GET', '?'+qs.toString());
    _allBooks = books;

    // Build genre filter from results (all books)
    buildGenreFilter(books);

    // Client-side search
    let filtered = search
      ? books.filter(b=>(b.title+' '+(b.author||'')).toLowerCase().includes(search.toLowerCase()))
      : books;

    // Apply GH_VIEW advanced filters
    if (_bkFilters.tags?.length)   filtered = filtered.filter(b => _bkFilters.tags.every(t => (b.tags||[]).includes(t)));
    if (_bkFilters.rating)         filtered = filtered.filter(b => (b.rating||0) >= parseInt(_bkFilters.rating));
    if (_bkFilters.status)         filtered = filtered.filter(b => b.status === _bkFilters.status);
    if (_bkFilters.format)         filtered = filtered.filter(b => b.format === _bkFilters.format);
    if (_bkFilters.genre)          filtered = filtered.filter(b => (b.genre||'').toLowerCase().includes(_bkFilters.genre.toLowerCase()));

    // Apply grid/list view
    el.classList.toggle('gh-grid', _bkView === 'grid');
    el.classList.toggle('gh-list', _bkView === 'list');
    el.style.setProperty('--bk-cols', _bkCols);

    if(!filtered.length){
      el.innerHTML=emptyState(...GH_EMPTY.books);
      return;
    }
    el.innerHTML=filtered.map(b=>bookCardHtml(b)).join('');
  } catch(e){ el.innerHTML = errorState(e.message, ''); }
}

function buildGenreFilter(books) {
  const gf = $('genreFilters'); if(!gf) return;
  const genres = [...new Set(books.map(b=>b.genre).filter(Boolean))].sort();
  if(!genres.length){ gf.innerHTML=''; return; }
  gf.innerHTML = `<button class="filter-chip${!currentGenre?' active':''}" onclick="setGenreFilter('',this)">All Genres</button>` +
    genres.map(g=>`<button class="filter-chip${g===currentGenre?' active':''}" onclick="setGenreFilter('${g.replace(/'/g,"\\'")}',this)">${esc(g)}</button>`).join('');
}

async function loadStats() {
  try {
    const s = await api('GET', '/stats');
    $('stReading').textContent = s.reading_count||0;
    $('stRead').textContent    = s.read_count||0;
    $('stWant').textContent    = s.want_count||0;
    $('stRating').textContent  = s.avg_rating ? parseFloat(s.avg_rating).toFixed(1) : '—';
  } catch(e){}
}

function bookCardHtml(b) {
  const statusClass = {'Currently Reading':'badge-reading','Read':'badge-read','Want to Read':'badge-want'}[b.status]||'badge-want';
  const stars = b.rating ? Array.from({length:5},(_,i)=>`<span class="star${i<b.rating?' lit':''}">★</span>`).join('') : '';
  const spine = FORMAT_COLOR[b.format]||'var(--accent)';
  const coverSrc = b.primary_photo_id
    ? `/api/v1/attachments/thumb/${b.primary_photo_id}`
    : null;

  return `<div class="book-card" onclick="openBookDrawer(${b.id})">
    ${coverSrc
      ? `<img src="${coverSrc}" class="book-cover-thumb" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
      : ''}
    <div class="book-spine" style="background:${spine};${coverSrc?'display:none':''}"></div>
    <div class="book-body">
      <div class="book-title">${esc(b.title)}</div>
      ${b.author?`<div class="book-author">${esc(b.author)}${b.genre?' · '+esc(b.genre):''}</div>`:''}
      <div class="book-meta">
        <span class="book-badge ${statusClass}">${esc(b.status)}</span>
        <span style="font-size:11px;color:var(--text3)">${esc(b.format||'')}</span>
        ${stars?`<div class="stars">${stars}</div>`:''}
      </div>
      ${b.date_finished?`<div style="font-size:11px;color:var(--text3);margin-top:4px">Finished ${b.date_finished}</div>`:''}
      ${b.status==='Currently Reading'&&b.pages_total>0?`
        <div style="margin-top:5px">
          <div style="background:var(--bg3);border-radius:99px;height:4px;overflow:hidden">
            <div style="height:100%;width:${Math.min(100,Math.round((b.pages_read||0)/b.pages_total*100))}%;background:#8b5cf6;border-radius:99px"></div>
          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">${b.pages_read||0} / ${b.pages_total} pages</div>
        </div>`:''}
      ${b.notes?`<div style="font-size:12px;color:var(--text2);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(b.notes)}</div>`:''}
      ${b.tags?.length ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">${b.tags.map(t=>{const s=window.GH_TAGS?GH_TAGS.chipStyle(t):'';return `<span class="tag-chip" data-tag="${esc(t)}" style="font-size:10px;padding:1px 6px;cursor:pointer${s?';'+s:''}" title="Search: ${esc(t)}">${esc(t)}</span>`;}).join('')}</div>` : ''}
    </div>
  </div>`;
}

function setRating(n) {
  currentRating = n;
  for(let i=1;i<=5;i++){
    const el=$('star'+i);
    if(el) el.style.color = i<=n ? '#f59e0b' : 'var(--border2)';
  }
}

async function openBookDrawer(id) {
  editingBookId = id||null;
  $('bookDrawerTitle').textContent = id ? 'Edit Book' : 'Add Book';
  $('bkDeleteBtn').style.display   = id ? 'inline-flex' : 'none';

  const b = id ? (_allBooks.find(x=>x.id===id)||{}) : {};
  $('bkTitle').value    = b.title||'';
  $('bkAuthor').value   = b.author||'';
  $('bkIsbn').value        = b.isbn||'';
  $('bkPublisher').value   = b.publisher||'';
  $('bkPublishYear').value = b.publish_year||'';
  await GH_SELECT.init('bkGenre', 'book_genre', b.genre||'', { allowAdd: true, placeholder: '— select genre —' });
  $('bkFormat').value   = b.format||'Physical';
  $('bkStatus').value   = b.status||'Want to Read';
  $('bkStarted').value    = b.date_started||'';
  $('bkFinished').value   = b.date_finished||'';
  $('bkPagesRead').value  = b.pages_read != null ? b.pages_read : '';
  $('bkPagesTotal').value = b.pages_total != null ? b.pages_total : '';
  // Show pages row only when currently reading
  const statusEl = document.getElementById('bkStatus');
  const showProgress = () => {
    document.getElementById('bkProgressRow').style.display =
      statusEl.value === 'Currently Reading' ? '' : 'none';
  };
  statusEl.removeEventListener('change', showProgress);
  statusEl.addEventListener('change', showProgress);
  showProgress();
  $('bkNotes').value    = b.notes||'';
  currentRating = b.rating||0;
  setRating(currentRating);
  initBookTags(b.tags||[]);
  GH_FAMILY.init('bookFamilyWrap', b.family_members||[]);
  $('bookDrawer').classList.add('open')
  setTimeout(triggerBookSuggest, 100);;
}

async function saveBook() {
  const title=$('bkTitle').value.trim();
  if(!title){ toast('Title required','err'); return; }
  const btn=$('bkSave'); btn.textContent='Saving…'; btn.disabled=true;
  const body={
    title, author:$('bkAuthor').value.trim()||null,
    genre:$('bkGenre').value.trim()||null, format:$('bkFormat').value,
    status:$('bkStatus').value, rating:currentRating||null,
    date_started:$('bkStarted').value||null,
    date_finished:$('bkFinished').value||null,
    pages_total:$('bkPagesTotal').value ? parseInt($('bkPagesTotal').value) : null,
    publisher:$('bkPublisher').value.trim()||null,
    publish_year:$('bkPublishYear').value ? parseInt($('bkPublishYear').value) : null,
    pages_read:$('bkPagesRead').value  ? parseInt($('bkPagesRead').value)  : null,
    notes:$('bkNotes').value.trim()||null,
    tags:bookFormTags,
    family_member_ids: GH_FAMILY.getIds('bookFamilyWrap'),
    isbn: $('bkIsbn').value.trim()||null,
    cover_url: window._bkPendingCoverUrl || null,
  };
  const pendingCover = window._bkPendingCoverUrl || null;
  window._bkPendingCoverUrl = null;
  try {
    let saved;
    if(editingBookId) saved = await api('PUT', `/${editingBookId}`, body);
    else              saved = await api('POST', '/', body);
    // Download and store cover as attachment if we have a pending URL
    const bookId = saved?.id || editingBookId;
    if (pendingCover && bookId && !editingBookId) {
      try {
        await api('POST', `/${bookId}/fetch-cover`, { url: pendingCover });
      } catch(e) { console.warn('Cover fetch failed:', e.message); }
    }
    toast(editingBookId?'Updated':'Book added');
    $('bookDrawer').classList.remove('open');
    loadBooks(); loadStats();
  } catch(e){ toast(e.message||'Save failed','err'); }
  finally{ btn.textContent='Save'; btn.disabled=false; }
}

async function deleteBook() {
  if(!await LT.confirm('Remove this book?')) return;
  await api('DELETE', `/${editingBookId}`);
  toast('Removed'); $('bookDrawer').classList.remove('open');
  loadBooks(); loadStats();
}


// ── Tags (books) ───────────────────────────────────────────
let bookFormTags = [];
function renderBookTags() {
  const wrap = $('bookTagsWrap'), input = $('bookTagInput'); if (!wrap||!input) return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  bookFormTags.forEach(t => {
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{ bookFormTags=bookFormTags.filter(x=>x!==t);renderBookTags(); });
    wrap.insertBefore(chip,input);
  });
}
function addBookTag(raw) {
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!bookFormTags.includes(t)).forEach(t=>bookFormTags.push(t));
  renderBookTags(); const inp=$('bookTagInput'); if(inp)inp.value='';
}
function initBookTags(existing) {
  bookFormTags=(existing||[]).slice(); renderBookTags();
  const inp=$('bookTagInput'); if(!inp)return;
  inp.value='';
  inp.onkeydown=e=>{ if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addBookTag(inp.value);} else if(e.key==='Backspace'&&!inp.value&&bookFormTags.length){bookFormTags.pop();renderBookTags();} };
  inp.onblur=()=>{if(inp.value.trim())addBookTag(inp.value);};
  GH_TAGS.init({inputId:'bookTagInput',wrapId:'bookTagsWrap',module:'books',getFormTags:()=>bookFormTags,addTag:t=>addBookTag(t),allowCreate:true});
function triggerBookSuggest() {
  const cat  = document.getElementById('bkGenre')?.value || '';
  const name = document.getElementById('bkTitle')?.value || '';
  GH_TAGS.suggest('bookTagsWrap', ()=>bookFormTags, t=>addBookTag(t), { category: cat, name });
}

}
document.addEventListener('DOMContentLoaded', ()=>{
  GH_VIEW.init('bookViewToolbar', 'bk', state => {
    _bkView    = state.view;
    _bkCols    = state.cols;
    _bkFilters = state.filters || {};
    loadBooks();
  }, {
    defaultView: 'list',
    filterFields: [
      { key: 'status', type: 'select', label: 'Status',
        options: [{value:'',label:'All'},{value:'Currently Reading',label:'Reading'},{value:'Want to Read',label:'Want to Read'},{value:'Read',label:'Read'}] },
      { key: 'format', type: 'select', label: 'Format',
        options: [{value:'',label:'All'},{value:'Physical',label:'Physical'},{value:'Kindle',label:'Kindle'},{value:'Audible',label:'Audible'}] },
      { key: 'genre',  type: 'text',   label: 'Genre', placeholder: 'e.g. Fiction…' },
      { key: 'rating', type: 'select', label: 'Min Rating',
        options: [{value:'',label:'Any'},{value:'5',label:'★★★★★'},{value:'4',label:'★★★★+'},{value:'3',label:'★★★+'}] },
      { key: 'tags',   type: 'tags',   label: 'Tags' },
    ]
  });
  loadBooks();
  loadStats();
});

</script>

<div class="scanner-overlay" id="bkScannerOverlay">
  <div class="scanner-ui">
    <div class="scanner-header">
      <span style="font-size:15px;font-weight:700;color:#fff">Scan ISBN Barcode</span>
      <button onclick="closeBkScanner()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <video id="bkScannerVideo" autoplay playsinline style="width:100%;border-radius:8px;max-width:400px;margin:12px 0"></video>
    <p style="color:rgba(255,255,255,.7);font-size:13px;text-align:center">Point camera at the ISBN barcode on the back cover</p>
  </div>

<script>
// ══════════════════════════════════════════════════════════════
// BOOK ADD MENU + ISBN SCANNER
// ══════════════════════════════════════════════════════════════
// $ is defined in the first script block as a module-scoped const.
// Re-declare here so this block has its own reference.
const _$ = id => document.getElementById(id);

_$('menuScanIsbn').addEventListener('click', () => {
  closeAddMenu();
  startIsbnScan();
});
_$('menuAddManual').addEventListener('click', () => {
  closeAddMenu();
  openBookDrawer();
});

// ══════════════════════════════════════════════════════════════
// ISBN SCANNER
// ══════════════════════════════════════════════════════════════
let _bkScanStream = null;
let _bkScannerActive = false;
let _bkCodeReader = null;

async function startIsbnScan() {
  if (!navigator.mediaDevices?.getUserMedia) {
    toast('Camera not available — HTTPS required', 'err'); return;
  }
  try {
    _bkScanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    const video = _$('bkScannerVideo');
    video.srcObject = _bkScanStream;
    await video.play();
    _$('bkScannerOverlay').classList.add('open');
    _bkScannerActive = true;

    if (typeof BarcodeDetector !== 'undefined') {
      _bkScanWithNative(video);
    } else if (typeof ZXing !== 'undefined') {
      _bkScanWithZXing();
    } else {
      closeBkScanner();
      toast('Barcode scanning not supported on this browser', 'err');
    }
  } catch(err) {
    closeBkScanner();
    if (err.name === 'NotAllowedError') toast('Camera permission denied', 'err');
    else if (err.name === 'NotFoundError') toast('No camera found', 'err');
    else toast('Camera error: ' + err.message, 'err');
  }
}

async function _bkScanWithNative(video) {
  const wantFormats = ['ean_13','ean_8','upc_a','isbn'];
  let formats = wantFormats;
  try {
    const supported = await BarcodeDetector.getSupportedFormats();
    const filtered = wantFormats.filter(f => supported.includes(f));
    if (filtered.length) formats = filtered;
  } catch {}
  const detector = new BarcodeDetector({ formats });
  const poll = async () => {
    if (!_bkScannerActive) return;
    try {
      const results = await detector.detect(video);
      if (results.length && _bkScannerActive) {
        _bkScannerActive = false;
        closeBkScanner();
        lookupIsbn(results[0].rawValue);
        return;
      }
    } catch {}
    if (_bkScannerActive) requestAnimationFrame(poll);
  };
  requestAnimationFrame(poll);
}

async function _bkScanWithZXing() {
  let hints = null;
  try {
    if (ZXing.BarcodeFormat && ZXing.DecodeHintType) {
      hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.UPC_A,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    }
  } catch {}
  _bkCodeReader = new ZXing.BrowserMultiFormatReader(hints);
  let deviceId = null;
  try {
    const devices = await _bkCodeReader.listVideoInputDevices();
    const back = devices.find(d => /back|rear|environment/i.test(d.label));
    deviceId = back?.deviceId || devices[0]?.deviceId || null;
  } catch {}
  await _bkCodeReader.decodeFromVideoDevice(deviceId, 'bkScannerVideo', result => {
    if (result && _bkScannerActive) {
      _bkScannerActive = false;
      closeBkScanner();
      lookupIsbn(result.getText());
    }
  });
}

function closeBkScanner() {
  _bkScannerActive = false;
  if (_bkScanStream) { _bkScanStream.getTracks().forEach(t => t.stop()); _bkScanStream = null; }
  const video = _$('bkScannerVideo');
  if (video) video.srcObject = null;
  _bkCodeReader?.reset();
  _$('bkScannerOverlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════
// ISBN LOOKUP — Open Library first, Google Books fallback
// ══════════════════════════════════════════════════════════════
async function lookupIsbn(isbn) {
  toast('Looking up ISBN ' + isbn + '…');
  let bookData = null;

  // 1. Try Open Library
  try {
    const r = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);
    const d = await r.json();
    const key = `ISBN:${isbn}`;
    if (d[key]) {
      const b = d[key];
      bookData = {
        isbn,
        title:        b.title || '',
        author:       (b.authors||[]).map(a=>a.name).join(', '),
        cover_url:    b.cover?.large || b.cover?.medium || b.cover?.small || null,
        genre:        (b.subjects||[])[0]?.name || '',
        publisher:    b.publishers?.[0]?.name || null,
        publish_year: b.publish_date ? parseInt(b.publish_date.match(/\d{4}/)?.[0]) || null : null,
        language:     b.languages?.[0]?.key?.replace('/languages/','') || null,
        pages:        b.number_of_pages || null,
        source:       'Open Library',
      };
    }
  } catch {}

  // 2. Fallback: Google Books (if API key configured)
  if (!bookData) {
    try {
      const cfgR = await fetch('/api/v1/settings/config/google_books_api_key');
      const cfg  = cfgR.ok ? await cfgR.json() : null;
      const key  = cfg?.value;
      if (key) {
        const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&key=${key}`);
        const d = await r.json();
        const item = d.items?.[0]?.volumeInfo;
        if (item) {
          bookData = {
            isbn,
            title:        item.title || '',
            author:       (item.authors||[]).join(', '),
            cover_url:    item.imageLinks?.thumbnail?.replace('http://','https://') || null,
            genre:        (item.categories||[])[0] || '',
            publisher:    item.publisher || null,
            publish_year: item.publishedDate ? parseInt(item.publishedDate.slice(0,4)) || null : null,
            language:     item.language || null,
            pages:        item.pageCount || null,
            source:       'Google Books',
          };
        }
      }
    } catch {}
  }

  if (!bookData) {
    toast('Book not found for ISBN ' + isbn, 'err');
    openBookDrawer(); // open blank drawer so user can enter manually
    return;
  }

  showIsbnConfirmPanel(bookData);
}

function showIsbnConfirmPanel(b) {
  // Open drawer first so confirm panel renders inside it
  openBookDrawer();

  const coverHtml = b.cover_url
    ? `<img src="${b.cover_url}" style="width:60px;height:80px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0" onerror="this.style.display='none'">`
    : `<div style="width:60px;height:80px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📚</div>`;

  const panel = document.createElement('div');
  panel.id = 'isbnConfirmPanel';
  panel.style.cssText = 'background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-lg);padding:14px;margin-bottom:12px';
  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:12px;font-family:var(--mono);color:var(--accent);letter-spacing:.06em;text-transform:uppercase">📚 ${esc(b.source)}</span>
      <span style="font-size:11px;color:var(--text3)">Review before applying</span>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:12px">
      ${coverHtml}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.3">${esc(b.title)}</div>
        <div style="font-size:12px;color:var(--text3)">${esc(b.author)}</div>
        <div style="font-size:11px;color:var(--text4);margin-top:2px;font-family:var(--mono)">${esc(b.isbn)}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Title</div>
        <input class="form-input" id="ic_title" value="${esc(b.title)}" style="font-size:13px;padding:8px 10px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Author</div>
        <input class="form-input" id="ic_author" value="${esc(b.author)}" style="font-size:13px;padding:8px 10px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Genre</div>
        <input class="form-input" id="ic_genre" value="${esc(b.genre)}" style="font-size:13px;padding:8px 10px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">ISBN</div>
        <input class="form-input" id="ic_isbn" value="${esc(b.isbn)}" style="font-size:13px;padding:8px 10px;font-family:var(--mono)">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Publisher</div>
        <input class="form-input" id="ic_publisher" value="${esc(b.publisher||'')}" style="font-size:13px;padding:8px 10px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Year</div>
        <input class="form-input" id="ic_year" value="${b.publish_year||''}" style="font-size:13px;padding:8px 10px" type="number">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Pages</div>
        <input class="form-input" id="ic_pages" value="${b.pages||''}" style="font-size:13px;padding:8px 10px" type="number">
      </div>
    </div>
    <input type="hidden" id="ic_cover_url" value="${esc(b.cover_url||'')}">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1;padding:9px" onclick="applyIsbnFields()">Apply to Form</button>
      <button class="btn btn-ghost" style="padding:9px 14px" onclick="document.getElementById('isbnConfirmPanel')?.remove()">Cancel</button>
    </div>`;

  // Insert at top of drawer
  const drawerContent = document.querySelector('#bookDrawer .drawer');
  const handle = drawerContent.querySelector('.drawer-handle');
  handle.insertAdjacentElement('afterend', panel);
}

async function applyIsbnFields() {
  const title    = _$('ic_title')?.value?.trim() || '';
  const author   = _$('ic_author')?.value?.trim() || '';
  const genre    = _$('ic_genre')?.value?.trim() || '';
  const isbn     = _$('ic_isbn')?.value?.trim() || '';
  const coverUrl = _$('ic_cover_url')?.value?.trim() || '';

  const publisher   = _$('ic_publisher')?.value?.trim() || '';
  const publishYear = parseInt(_$('ic_year')?.value) || null;
  const pages       = parseInt(_$('ic_pages')?.value) || null;

  if (title)  _$('bkTitle').value  = title;
  if (author) _$('bkAuthor').value = author;
  if (isbn)   _$('bkIsbn').value   = isbn;
  if (publisher && _$('bkPublisher')) _$('bkPublisher').value = publisher;
  if (publishYear && _$('bkPublishYear')) _$('bkPublishYear').value = publishYear;
  if (pages && _$('bkPagesTotal')) _$('bkPagesTotal').value = pages;

  // Apply genre via GH_SELECT
  if (genre) {
    await GH_SELECT.init('bkGenre', 'book_genre', genre, { allowAdd: true, placeholder: '— select genre —' });
  }

  // Download cover and store as attachment after save — store URL for now
  if (coverUrl) {
    window._bkPendingCoverUrl = coverUrl;
  }

  _$('isbnConfirmPanel')?.remove();
  toast('Fields applied — review and save');
}

// ══════════════════════════════════════════════════════════════
// SETTINGS — Google Books API Key config endpoint
// ══════════════════════════════════════════════════════════════
// Exposed via GET /api/v1/settings/config/:key  (already in settings routes)
</script>
