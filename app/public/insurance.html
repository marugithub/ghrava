<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8">
  <title>Insurance — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') !== '0') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    .ins-grid{display:grid;grid-template-columns:repeat(var(--cols,2),minmax(0,1fr));gap:10px;padding:0 16px 90px}
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script>window.GH_PAGE = { module:'insurance', title:'Insurance' };</script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>

<div id="app">
  <div class="gh-page-header"></div>

  <div class="stats-row" style="margin:10px 16px 0">
    <div class="stat-item"><div class="stat-value" id="sumActive">—</div><div class="stat-label">Active</div></div>
    <div class="stat-item"><div class="stat-value" id="sumExpiring" style="color:var(--amber)">—</div><div class="stat-label">Expiring 60d</div></div>
    <div class="stat-item"><div class="stat-value" id="sumPremium" style="color:var(--red)">—</div><div class="stat-label">Annual Premium</div></div>
  </div>

  <div style="padding:6px 16px 0;display:flex;align-items:center">
    <div style="flex:1"></div>
    <div id="insViewToolbar"></div>
  </div>
  <div id="insList" style="padding-top:8px"></div>
</div>

<!-- Add/Edit Drawer -->
<div class="drawer-overlay" id="insDrawer">
 <div class="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="insDrawerTitle">Add Policy</div>
  <div class="drawer-body">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type *</label>
        <select class="form-select" id="iType"><option value="">—</option></select>
      </div>
      <div class="form-group"><label class="form-label">Policy #</label><input class="form-input" id="iPolicyNum"></div>
    </div>
    <div class="form-group"><label class="form-label">Provider</label><div id="iProvider"></div></div>
    <div class="form-group"><label class="form-label">Agent / Contact</label><div id="iAgent"></div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date *</label><input class="form-input" type="date" id="iStart"></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date" id="iEnd"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Premium</label><input class="form-input" type="number" step="0.01" id="iPremium" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Frequency</label>
        <select class="form-select" id="iFreq"><option value="annual">Annual</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Deductible</label><input class="form-input" type="number" id="iDeductible" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Coverage Limit</label><input class="form-input" type="number" id="iLimit" placeholder="0.00"></div>
    </div>
    <div class="form-group"><label class="form-label">Coverage Details</label><textarea class="form-textarea" id="iCovDetails" style="min-height:70px"></textarea></div>
    <div class="form-group"><label class="form-label">Family Members Covered</label><div id="iFamilyWrap"></div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="iStatus"><option value="active">Active</option></select>
      </div>
      <div class="form-group"><label class="form-label">Alert Days Before</label>
        <input class="form-input" type="number" id="iAlertDays" value="60" placeholder="60">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="iNotes" style="min-height:60px"></textarea></div>
  </div><!-- /drawer-body -->
  <div class="drawer-foot">
    <button class="btn btn-primary" onclick="savePolicy()">Save</button>
    <button class="btn btn-ghost" onclick="closeDrawer('insDrawer')">Cancel</button>
    <button class="btn btn-ghost" id="iRenewBtn" style="display:none" onclick="openRenewDrawer()">Renew</button>
    <button class="btn btn-ghost" id="iDeleteBtn" style="display:none" onclick="deletePolicy()">Delete</button>
  </div>
 </div><!-- /drawer -->
</div><!-- /drawer-overlay -->

<!-- Renew Drawer -->
<div class="drawer-overlay" id="renewDrawer">
 <div class="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Renew Policy</div>
  <div class="drawer-body">
    <div style="background:var(--bg3);border-radius:8px;padding:10px;font-size:13px;margin-bottom:16px;color:var(--text2)">
      Creates a new record in the same policy chain. The current policy is marked expired.
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">New Start Date *</label><input class="form-input" type="date" id="rStart"></div>
      <div class="form-group"><label class="form-label">New End Date</label><input class="form-input" type="date" id="rEnd"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">New Premium</label><input class="form-input" type="number" step="0.01" id="rPremium" placeholder="Same as before"></div>
      <div class="form-group"><label class="form-label">New Policy #</label><input class="form-input" id="rPolicyNum"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="rNotes" style="min-height:60px"></textarea></div>
  </div><!-- /drawer-body -->
  <div class="drawer-foot">
    <button class="btn btn-primary" onclick="confirmRenew()">Confirm Renewal</button>
    <button class="btn btn-ghost" onclick="closeDrawer('renewDrawer')">Cancel</button>
  </div>
 </div><!-- /drawer -->
</div><!-- /drawer-overlay -->

<button class="fab fab-pill" onclick="openDrawer()" title="Add policy"><span>+ Add Policy</span></button>

<script>
let _editingId = null;

function fmt$(v) { return '$' + (Math.round((v||0)*100)/100).toLocaleString(); }
function esc(s) { const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - new Date()) / 86400000);
}

function expiryClass(days) {
  if (days === null) return '';
  if (days < 0) return 'ins-expiry-danger';
  if (days <= 30) return 'ins-expiry-danger';
  if (days <= 60) return 'ins-expiry-warn';
  return 'ins-expiry-ok';
}

async function load() {
  const status = _insFilters.status || 'active';
  const type   = _insFilters.type || '';
  try {
    let url = `/insurance/?${status!=='all'?'status='+status:''}`;
    if (type) url += `&type=${encodeURIComponent(type)}`;
    const rows = await window.api('GET', url);

    const el = document.getElementById('insList');
    if (!rows.length) {
      el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:12px">🛡️</div>
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">No insurance policies yet</div>
        <div style="font-size:13px">Tap + to add your first policy</div></div>`;
      return;
    }

    const stripeColor = r => {
      if (r.status !== 'active') return 'gh-s-gray';
      const days = daysUntil(r.coverage_end_date);
      if (days !== null && days < 0) return 'gh-s-red';
      if (days !== null && days <= 30) return 'gh-s-red';
      if (days !== null && days <= 60) return 'gh-s-amber';
      return 'gh-s-green';
    };
    const freqLabel = f => ({'monthly':'mo','annual':'yr','semi-annual':'6mo','quarterly':'qtr'})[f] || f;
    el.innerHTML = `<div class="ins-grid" style="--cols:${_insCols}">${rows.map(r => {
      const days = daysUntil(r.coverage_end_date);
      const daysLabel = days !== null ? `${Math.abs(days)}d ${days < 0 ? 'ago' : 'left'}` : '';
      return `<div class="gh-card ${stripeColor(r)}" onclick="openDrawer(${r.id})">
        <div class="gh-card-head">
          <div class="gh-card-title">${esc(r.provider_name||r.policy_type)}</div>
          <span class="gh-badge gh-badge-${r.status==='active'?'blue':'gray'}">${esc(r.policy_type)}</span>
        </div>
        <div class="gh-card-meta">${r.policy_number?'#'+esc(r.policy_number):''}${r.agent_name?' · '+esc(r.agent_name):''}</div>
        <div class="gh-card-body">
          ${r.premium_amount?`<div class="gh-card-row"><span>Premium</span><span class="ghv">${fmt$(r.premium_amount)}/${freqLabel(r.premium_frequency)}</span></div>`:''}
          ${r.coverage_end_date?`<div class="gh-card-row"><span>${days<0?'Expired':'Expires'}</span><span class="${days<0||days<=30?'ghv-err':days<=60?'ghv-warn':'ghv'}">${r.coverage_end_date} (${daysLabel})</span></div>`:''}
          ${r.deductible?`<div class="gh-card-row"><span>Deductible</span><span class="ghv-dim">${fmt$(r.deductible)}</span></div>`:''}
        </div>
        ${r.members?.length?`<div class="gh-card-footer"><div class="gh-card-tags">${r.members.map(m=>`<span class="gh-badge gh-badge-gray">${esc(m.display_name)}</span>`).join('')}</div></div>`:''}
      </div>`;
    }).join('')}</div>`;

    loadSummary();
  } catch(e) { toast('Failed to load', 'err'); }
}

async function loadSummary() {
  try {
    const d = await window.api('GET', '/insurance/summary');
    document.getElementById('sumActive').textContent   = d.active || 0;
    document.getElementById('sumExpiring').textContent = d.expiring_60d || 0;
    document.getElementById('sumPremium').textContent  = fmt$(d.annual_premium);
  } catch(e) {}
}

async function openDrawer(id) {
  _editingId = id||null;
  document.getElementById('insDrawerTitle').textContent = id ? 'Edit Policy' : 'Add Policy';
  document.getElementById('iDeleteBtn').style.display = id ? '' : 'none';
  document.getElementById('iRenewBtn').style.display  = id ? '' : 'none';

  ['iPolicyNum','iDeductible','iLimit','iCovDetails','iNotes'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('iPremium').value    = '';
  document.getElementById('iStart').value      = '';
  document.getElementById('iEnd').value        = '';
  document.getElementById('iAlertDays').value  = '60';

  await GH_SELECT.init('iType',   'insurance_type',      '',        { placeholder:'— select type —', allowAdd:false });
  await GH_SELECT.init('iFreq',   'premium_frequency',   'annual',  { allowAdd:false });
  await GH_SELECT.init('iStatus', 'subscription_status', 'active',  { allowAdd:false });

  GH_REFS.populateContact('iProvider', null, { type:'Insurance', placeholder:'— select provider —', allowAdd:true });
  GH_REFS.populateContact('iAgent',    null, { placeholder:'— select agent —', allowAdd:true });
  GH_FAMILY.init('iFamilyWrap', []);

  if (id) {
    try {
      const rows = await window.api('GET', '/insurance/?status=all');
      const r = rows.find(x => x.id === id);
      if (r) {
        document.getElementById('iPolicyNum').value    = r.policy_number||'';
        document.getElementById('iStart').value        = r.coverage_start_date||'';
        document.getElementById('iEnd').value          = r.coverage_end_date||'';
        document.getElementById('iPremium').value      = r.premium_amount||'';
        document.getElementById('iDeductible').value   = r.deductible||'';
        document.getElementById('iLimit').value        = r.coverage_limit||'';
        document.getElementById('iCovDetails').value   = r.coverage_details||'';
        document.getElementById('iNotes').value        = r.notes||'';
        document.getElementById('iAlertDays').value    = r.alert_days_before||60;
        await GH_SELECT.init('iType',   'insurance_type',      r.policy_type||'',    { placeholder:'— select type —', allowAdd:false });
        await GH_SELECT.init('iFreq',   'premium_frequency',   r.premium_frequency||'annual', { allowAdd:false });
        await GH_SELECT.init('iStatus', 'subscription_status', r.status||'active',   { allowAdd:false });
        GH_REFS.populateContact('iProvider', r.provider_contact_id||null, { type:'Insurance', placeholder:'— select provider —', allowAdd:true });
        GH_REFS.populateContact('iAgent',    r.agent_contact_id||null,    { placeholder:'— select agent —', allowAdd:true });
        GH_FAMILY.init('iFamilyWrap', r.members||[]);
      }
    } catch(e) {}
  }
  document.getElementById('insDrawer').classList.add('open');
}

async function savePolicy() {
  const type  = document.getElementById('iType').value;
  const start = document.getElementById('iStart').value;
  if (!type || !start) { toast('Type and start date are required', 'err'); return; }
  const payload = {
    policy_type:         type,
    policy_number:       document.getElementById('iPolicyNum').value.trim()||null,
    provider_contact_id: parseInt(document.getElementById('iProvider')?.value)||null,
    agent_contact_id:    parseInt(document.getElementById('iAgent')?.value)||null,
    coverage_start_date: start,
    coverage_end_date:   document.getElementById('iEnd').value||null,
    premium_amount:      parseFloat(document.getElementById('iPremium').value)||null,
    premium_frequency:   document.getElementById('iFreq').value||'annual',
    deductible:          parseFloat(document.getElementById('iDeductible').value)||null,
    coverage_limit:      parseFloat(document.getElementById('iLimit').value)||null,
    coverage_details:    document.getElementById('iCovDetails').value.trim()||null,
    status:              document.getElementById('iStatus').value||'active',
    alert_days_before:   parseInt(document.getElementById('iAlertDays').value)||60,
    notes:               document.getElementById('iNotes').value.trim()||null,
    family_member_ids:   GH_FAMILY.getIds('iFamilyWrap'),
  };
  try {
    if (_editingId) {
      await window.api('PUT', `/insurance/${_editingId}`, payload);
      toast('Updated', 'ok');
    } else {
      await window.api('POST', '/insurance', payload);
      toast('Policy added', 'ok');
    }
    closeDrawer('insDrawer'); load();
  } catch(e) { toast('Save failed: '+e.message, 'err'); }
}

function openRenewDrawer() {
  const endDate = document.getElementById('iEnd').value;
  document.getElementById('rStart').value     = endDate||'';
  document.getElementById('rEnd').value       = '';
  document.getElementById('rPremium').value   = '';
  document.getElementById('rPolicyNum').value = '';
  document.getElementById('rNotes').value     = '';
  closeDrawer('insDrawer');
  document.getElementById('renewDrawer').classList.add('open');
}

async function confirmRenew() {
  const start = document.getElementById('rStart').value;
  if (!start) { toast('Start date required', 'err'); return; }
  const payload = {
    coverage_start_date: start,
    coverage_end_date:   document.getElementById('rEnd').value||null,
    premium_amount:      parseFloat(document.getElementById('rPremium').value)||null,
    policy_number:       document.getElementById('rPolicyNum').value.trim()||null,
    notes:               document.getElementById('rNotes').value.trim()||null,
  };
  try {
    await window.api('POST', `/insurance/${_editingId}/renew`, payload);
    closeDrawer('renewDrawer'); load();
    toast('Policy renewed — new record created', 'ok');
  } catch(e) { toast('Renewal failed: '+e.message, 'err'); }
}

async function deletePolicy() {
  LT.confirm('Delete this policy?', 'This removes the record from the database.', async () => {
    await window.api('DELETE', `/insurance/${_editingId}`);
    closeDrawer('insDrawer'); load(); toast('Deleted', 'ok');
  });
}

let _insView = 'grid', _insCols = 2, _insFilters = {};

document.addEventListener('DOMContentLoaded', () => {
  GH_VIEW.init('insViewToolbar', 'ins', state => {
    _insView = state.view; _insCols = state.cols; _insFilters = state.filters || {};
    load();
  }, {
    defaultView: 'grid',
    defaultCols: 2,
    filterFields: [
      { key:'status', type:'select', label:'Status', options:[{value:'active',label:'Active'},{value:'all',label:'All'}] },
      { key:'type',   type:'select', label:'Type',   options:[{value:'',label:'All'},{value:'Auto',label:'Auto'},{value:'Home',label:'Home'},{value:'Life',label:'Life'},{value:'Health',label:'Health'},{value:'Umbrella',label:'Umbrella'},{value:'Dental',label:'Dental'},{value:'Vision',label:'Vision'},{value:'Other',label:'Other'}] },
    ]
  });
  load();
});
</script>
</body>
</html>
