<script>
const API = '/api/v1/property';
const $  = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const api = window.makeApi('/property');
function bgClose(id){ if(event.target===$(id)) $(id).classList.remove('open'); }

let tab='props', editProp=null, editVeh=null, svcVehId=null;

function switchTab(t,btn){
  tab=t;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));
  if(t==='props') loadProps();
  else if(t==='vehs') loadVehs();
  else if(t==='maint') loadMaint();
}
function onFab(){
  if(tab==='props') openPropDrawer();
  else if(tab==='vehs') openVehDrawer();
  else openMaintDrawer();
}

// ── PROPERTIES ──────────────────────────────────────────────
async function loadProps(){
  const el=$('propList'); if(!el) return;
  try{
    let ps=await api('GET', '/properties');
    // B17: apply tag filter from GH_VIEW
    if (window._propFilters?.tags?.length) {
      ps = ps.filter(p => window._propFilters.tags.every(t => (p.tags||[]).includes(t)));
    }
    if (window._propFilters?.type) {
      ps = ps.filter(p => p.property_type === window._propFilters.type);
    }
    const tv=ps.reduce((s,p)=>s+(parseFloat(p.current_est_value)||0),0);
    const tm=ps.reduce((s,p)=>s+(parseFloat(p.mortgage_balance)||0),0);
    const eq=tv-tm;
    $('pTotalVal').textContent=fmt$(tv);
    $('pTotalMort').textContent=fmt$(tm);
    $('pEquity').textContent=fmt$(eq);
    $('pEquity').style.color=eq>=0?'var(--green)':'var(--red)';
    if(!ps.length){el.innerHTML=emptyState('🏠', 'No properties', 'Add a property to track value and maintenance.', '');return;}
    const ICONS={'Primary Residence':'🏠',Rental:'🏢',Vacation:'🏖️',Land:'🌳',Other:'🏗️'};
    el.innerHTML=ps.map(p=>{
      const v=parseFloat(p.current_est_value)||0, m=parseFloat(p.mortgage_balance)||0, eq=v-m;
      return `<div class="card" onclick="openPropDrawer(${p.id})">
        <div class="card-header">
          <div class="card-icon" style="background:rgba(239,68,68,.12)">${ICONS[p.property_type]||'🏠'}</div>
          <div style="flex:1;min-width:0">
            <div class="card-title">${esc(p.nickname)}</div>
            <div class="card-sub">${[p.address_city,p.address_state].filter(Boolean).map(esc).join(', ')||esc(p.property_type)}</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-cell"><div class="stat-lbl">Value</div><div class="stat-val" style="color:var(--green)">${v?fmt$(v):'—'}</div></div>
          <div class="stat-cell"><div class="stat-lbl">Mortgage</div><div class="stat-val" style="color:${m?'var(--red)':'var(--text3)'}">${m?fmt$(m):'None'}</div></div>
          <div class="stat-cell"><div class="stat-lbl">Equity</div><div class="stat-val" style="color:${eq>=0?'var(--green)':'var(--red)'}">${v?fmt$(eq):'—'}</div></div>
        </div>
        ${p.mortgage_monthly?`<div style="padding:8px 16px;font-size:12px;color:var(--text3);border-top:1px solid var(--border)">${fmt$(p.mortgage_monthly)}/mo${p.hoa_monthly?' · HOA '+fmt$(p.hoa_monthly)+'/mo':''}</div>`:''}

          ${regPill?`<span class="${regPill}">🏷️ Reg ${reg}</span>`:''}

        </div>`:''}

let propFormTags = [];
function renderPropTags() {
  const wrap=$('propTagsWrap'),input=$('propTagInput'); if(!wrap||!input)return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  propFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{propFormTags=propFormTags.filter(x=>x!==t);renderPropTags();});
    wrap.insertBefore(chip,input);
  });
}
function addPropTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!propFormTags.includes(t)).forEach(t=>propFormTags.push(t));
  renderPropTags(); const inp=$('propTagInput'); if(inp)inp.value='';
}
function initPropTags(existing){
  propFormTags=(existing||[]).slice(); renderPropTags();
  const inp=$('propTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addPropTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&propFormTags.length){propFormTags.pop();renderPropTags();}};
  inp.onblur=()=>{if(inp.value.trim())addPropTag(inp.value);};
  GH_TAGS.init({inputId:'propTagInput',wrapId:'propTagsWrap',module:'property',getFormTags:()=>propFormTags,addTag:t=>addPropTag(t),allowCreate:true});
function triggerPropSuggest() {
  const cat  = document.getElementById('pType')?.value || '';
  const name = document.getElementById('pNick')?.value || '';
  GH_TAGS.suggest('propTagsWrap', ()=>propFormTags, t=>addPropTag(t), { category: cat, name });
}
function triggerVehSuggest() {
  const cat  = document.getElementById('vMake')?.value || '';
  const name = document.getElementById('vNick')?.value || '';
  GH_TAGS.suggest('vehTagsWrap', ()=>vehFormTags, t=>addVehTag(t), { category: cat, name });
}

}

// ── MAINTENANCE ───────────────────────────────────────────────
let _editMaintId = null;
let _allProps = [];

async function loadMaint(){
  const el = $('maintList'); if(!el) return;
  // Populate property selector
  if(!_allProps.length){
    try{ _allProps = await api('GET', '/properties'); } catch(e){ _allProps=[]; }
  }
  const sel = $('maintPropFilter');
  if(sel && _allProps.length){
    const cur = sel.value;
    sel.innerHTML = '<option value="">All properties</option>' +
      _allProps.map(p=>`<option value="${p.id}">${esc(p.nickname||p.property_type)}</option>`).join('');
    if(cur) sel.value = cur;
  }

  const propId = sel?.value || '';
  el.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try{
    // Fetch maintenance for selected property or all
    let records = [];
    if(propId){
      records = await api('GET', `/properties/${propId}/maintenance`);
    } else {
      // Fetch for all props
      const all = await Promise.all((_allProps||[]).map(p=>
        api('GET', `/properties/${p.id}/maintenance`).then(r=>r.map(x=>({...x,_propName:p.nickname||p.property_type}))).catch(()=>[])
      ));
      records = all.flat().sort((a,b)=>b.maint_date.localeCompare(a.maint_date));
    }

    if(!records.length){
      el.innerHTML=emptyState(...GH_EMPTY.maintenance);
      return;
    }

    const catColor = {Roof:'#5c72fa',HVAC:'#f59e0b',Plumbing:'#06b6d4',Electrical:'#f97316',
      Landscaping:'#22c55e','Pest Control':'#8b5cf6',Foundation:'#ef4444',General:'#64748b',Other:'#94a3b8'};

    el.innerHTML = records.map(r=>{
      const col = catColor[r.category]||'#94a3b8';
      const today = new Date().toISOString().slice(0,10);
      const warrantyOk = r.warranty_expiry && r.warranty_expiry >= today;
      const nextDue    = r.next_due_date && r.next_due_date <= today;
      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:3px solid ${col}"
              onclick="openMaintDrawer(${r.id})">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-weight:600;font-size:13px">${esc(r.description)}</span>
              ${r.is_completed?`<span style="font-size:10px;font-weight:700;background:rgba(34,197,94,.12);color:var(--green);padding:1px 6px;border-radius:4px">✓ Done</span>`:nextDue?`<span style="font-size:10px;font-weight:700;background:rgba(245,158,11,.12);color:var(--amber);padding:1px 6px;border-radius:4px">OVERDUE</span>`:''}
              ${warrantyOk?`<span style="font-size:10px;background:rgba(34,197,94,.1);color:var(--green);padding:1px 6px;border-radius:4px">Warranty</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
              <span style="font-weight:600;color:${col}">${esc(r.category)}</span>
              <span>${r.maint_date}</span>
              ${r._propName?`<span>📍 ${esc(r._propName)}</span>`:''}
              ${r.vendor?`<span>🔧 ${esc(r.vendor)}</span>`:''}
              ${r.next_due_date?`<span>Next: ${r.next_due_date}</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
            ${r.cost?`<div style="font-family:var(--mono);font-weight:700;font-size:13px;color:var(--text)">${fmt$(r.cost)}</div>`:''}
            ${r.is_completed
              ?`<button class="btn btn-ghost" style="padding:2px 8px;font-size:11px;color:var(--text3)"
                  onclick="event.stopPropagation();reopenMaint(${r.id})">Reopen</button>`
              :`<button class="btn btn-ghost" style="padding:2px 8px;font-size:11px;color:var(--green)"
                  onclick="event.stopPropagation();completeMaint(${r.id})">✓ Done</button>`}
          </div>
        </div>
        ${r.notes?`<div style="font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5">${esc(r.notes)}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML = errorState(e.message, ''); }
}

function openMaintDrawer(id){
  _editMaintId = id||null;
  $('maintDrawerTitle').textContent = id?'Edit Maintenance':'Add Maintenance Record';
  $('maintDeleteBtn').style.display = id?'inline-flex':'none';

  // Populate property dropdown
  const sel=$('mProp');
  if(_allProps.length){
    sel.innerHTML=_allProps.map(p=>`<option value="${p.id}">${esc(p.nickname||p.property_type)}</option>`).join('');
    const filterPropId=$('maintPropFilter')?.value;
    if(filterPropId) sel.value=filterPropId;
  }

  if(id){
    // Find the record — fetch all and locate
    const propId = $('mProp').value||(_allProps[0]?.id);
    api('GET', `/properties/${propId}/maintenance`).then(records=>{
      // Try all props if not found
      const r=records.find(x=>x.id===id);
      if(r) populateMaintForm(r);
      else {
        // Search across all props
        Promise.all(_allProps.map(p=>api('GET', `/properties/${p.id}/maintenance`).catch(()=>[]))).then(all=>{
          const found=all.flat().find(x=>x.id===id);
          if(found){ $('mProp').value=found.property_id; populateMaintForm(found); }
        });
      }
    }).catch(()=>{});
  } else {
    $('mDate').value=new Date().toISOString().slice(0,10);
    ['mDesc','mCost','mWarranty','mNextDue','mNotes'].forEach(i=>{ if($(i)) $(i).value=''; });
    $('mCat').value='General';
    GH_REFS.populateContact('mVendor', null, { type: 'Contractor', placeholder: '— none —' });
  }
  $('maintDrawer').classList.add('open');
}

function populateMaintForm(r){
  $('mProp').value    = r.property_id;
  $('mDate').value    = r.maint_date||'';
  $('mCat').value     = r.category||'General';
  $('mDesc').value    = r.description||'';
  $('mCost').value    = r.cost||'';
  GH_REFS.populateContact('mVendor', r.vendor_contact_id||null, { type: 'Contractor', placeholder: '— none —' });
  $('mWarranty').value= r.warranty_expiry||'';
  $('mNextDue').value       = r.next_due_date||'';
  $('mNotes').value         = r.notes||'';
  $('mCompleted').value     = r.is_completed ? '1' : '';
  $('mCompletedDate').value = r.completed_date||'';
}

async function saveMaint(){
  const propId=$('mProp').value;
  const desc=$('mDesc').value.trim();
  const date=$('mDate').value;
  if(!propId||!desc||!date){ toast('Property, date and description required','err'); return; }
  const btn=$('maintSaveBtn'); btn.textContent='Saving…'; btn.disabled=true;
  const vendorVal = $('mVendor').value;
  const body={
    maint_date:date, category:$('mCat').value, description:desc,
    cost:parseFloat($('mCost').value)||null,
    vendor_contact_id: vendorVal ? parseInt(vendorVal) : null,
    warranty_expiry:$('mWarranty').value||null, next_due_date:$('mNextDue').value||null,
    notes:$('mNotes').value.trim()||null,
    is_completed: $('mCompleted').value === '1' ? 1 : 0,
    completed_date: $('mCompletedDate').value || null,
  };
  try{
    if(_editMaintId) await api('PUT', `/properties/maintenance/${_editMaintId}`, body);
    else             await api('POST', `/properties/${propId}/maintenance`, body);
    toast(_editMaintId?'Updated':'Record added');
    $('maintDrawer').classList.remove('open');
    loadMaint();
  } catch(e){ toast(e.message||'Save failed','err'); }
  finally{ btn.textContent='Save'; btn.disabled=false; }
}

async function deleteMaint(){
  if(!_editMaintId) return;
  const id = _editMaintId;
  if (!await LT.confirm({ title:'Delete record?', msg:'This cannot be undone.', confirmLabel:'Delete' })) return;
  await api('DELETE', `/properties/maintenance/${id}`);
  toast('Deleted'); $('maintDrawer').classList.remove('open'); loadMaint();
}

async function completeMaint(id){
  try{
    await api('PATCH', `/properties/maintenance/${id}/complete`);
    toast('Marked complete'); loadMaint();
  }catch(e){ toast(e.message||'Failed','err'); }
}

async function reopenMaint(id){
  try{
    await api('PATCH', `/properties/maintenance/${id}/reopen`);
    toast('Reopened'); loadMaint();
  }catch(e){ toast(e.message||'Failed','err'); }
}

// ── NHTSA VIN Decode ─────────────────────────────────────────
async function decodeVin() {
  const vin = $('vVin').value.trim().toUpperCase();
  if (!vin) { toast('Enter a VIN first', 'err'); return; }
  if (vin.length !== 17) { toast('VIN must be 17 characters', 'err'); return; }
  const fb = $('vinFeedback');
  fb.textContent = '⏳ Decoding VIN…'; fb.style.display = 'block';
  try {
    const r = await fetch(
      `https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${encodeURIComponent(vin)}?format=json`,
      { mode: 'cors' }
    );
    const d = await r.json();
    const results = d.Results || [];
    const get = (var_) => results.find(x => x.Variable === var_)?.Value || '';
    const year  = get('Model Year');
    const make  = get('Make');
    const model = get('Model');
    const trim  = get('Trim');
    const body  = get('Body Class');
    const fuel  = get('Fuel Type - Primary');
    const eng   = get('Displacement (L)') ? get('Displacement (L)') + 'L' : '';
    if (!make || make === 'Not Applicable') {
      fb.textContent = '⚠ VIN not recognized — check for typos'; return;
    }
    // Fill fields
    if (year  && !$('vYear').value)  $('vYear').value  = year;
    if (make  && !$('vMake').value)  $('vMake').value  = make.charAt(0) + make.slice(1).toLowerCase();
    if (model && !$('vModel').value) $('vModel').value = model;
    if (trim  && !$('vTrim').value)  $('vTrim').value  = trim;
    const details = [body, eng ? eng + ' ' + fuel : fuel].filter(Boolean).join(' · ');
    fb.style.color = 'var(--green)';
    fb.textContent = `✓ ${make} ${model} ${year}${details ? '  ·  ' + details : ''}`;
    toast('VIN decoded ✓');
  } catch(e) {
    fb.style.color = 'var(--red)';
    fb.textContent = '⚠ Decode failed — check internet connection';
  }
}

// ── NHTSA Recall Check ─────────────────────────────────────────
async function checkRecalls() {
  const make  = $('vMake').value.trim().toUpperCase();
  const model = $('vModel').value.trim().toUpperCase();
  const year  = $('vYear').value.trim();
  if (!make || !model || !year) {
    // Try to decode VIN first if fields empty
    if ($('vVin').value.trim().length === 17) {
      await decodeVin();
    } else {
      toast('Fill in Make, Model, and Year first (or enter a VIN and click Decode)', 'err');
      return;
    }
  }
  const fb = $('vinFeedback');
  fb.style.color = 'var(--text2)';
  fb.textContent = '⏳ Checking NHTSA recalls…'; fb.style.display = 'block';
  try {
    const url = `https://api.nhtsa.gov/recalls/recallsByVehicle?make=${encodeURIComponent(make)}&model=${encodeURIComponent(model)}&modelYear=${year}`;
    const r = await fetch(url, { mode: 'cors' });
    const d = await r.json();
    const recalls = d.results || [];
    if (!recalls.length) {
      fb.style.color = 'var(--green)';
      fb.textContent = `✓ No open recalls found for ${year} ${make} ${model}`;
    } else {
      fb.style.color = 'var(--amber)';
      const summary = recalls.slice(0, 3).map(r =>
        `• ${r.Component || 'Unknown'}: ${(r.Summary || '').slice(0, 80)}${r.Summary?.length > 80 ? '…' : ''}`
      ).join('\n');
      fb.style.whiteSpace = 'pre-line';
      fb.textContent = `⚠ ${recalls.length} recall${recalls.length > 1 ? 's' : ''} found for ${year} ${make} ${model}:\n${summary}`;
      toast(`${recalls.length} recall${recalls.length > 1 ? 's' : ''} found`, 'err');
    }
  } catch(e) {
    fb.style.color = 'var(--red)';
    fb.textContent = '⚠ Recall check failed — check internet connection';
  }
}
