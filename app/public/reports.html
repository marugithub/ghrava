<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Reports — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
  <script>if(localStorage.getItem('gh_nav_collapsed')==='1'){document.documentElement.classList.add('nav-collapsed-init');}</script>
  <style>
    .reports-container{padding:16px;max-width:900px;margin:0 auto}
    .reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:8px}
    .report-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:all .15s}
    .report-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
    .report-icon{font-size:26px;margin-bottom:10px}
    .report-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
    .report-desc{font-size:12px;color:var(--text3);line-height:1.5}
    .category-section{margin-bottom:24px}
    .category-header{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
    .report-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-top:4px}
    .report-panel-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .report-panel-back{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .report-panel-back:hover{background:var(--bg4);border-color:var(--border2)}
    .report-panel-title{font-size:18px;font-weight:700;color:var(--text);flex:1}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .stat-item{background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center}
    .stat-value{font-size:20px;font-weight:800;color:var(--text)}
    .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);margin-top:3px}
  </style>
</head>
<body>
<script>window.GH_PAGE = { module:'reports', title:'Reports' };</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-messages.js"></script>

<div id="app">
  <div class="reports-container">
    <div id="reportsMainView">
      <div id="reportsGridContainer"><div class="spinner"><div class="spin"></div>Loading…</div></div>
    </div>
    <div id="reportDetailView" style="display:none"></div>
  </div>
</div>

<script>
// ── Report Registry — add new reports here only ───────────────
const REPORT_REGISTRY = [
  { id:'summary',       category:'overview',   name:'Dashboard Summary',        icon:'📊', desc:'Overview of all modules',             endpoint:'/dashboard',                render:renderSummary },
  { id:'emergency',     category:'family',     name:'Emergency Info Card',       icon:'🚨', desc:'Critical contacts and medical info',  endpoint:'/reports/emergency',        render:renderEmergency },
  { id:'family-snap',   category:'family',     name:'Family Member Report',      icon:'👤', desc:'All data for a specific person',      endpoint:null,                        render:renderFamilySnapshot },
  { id:'memories',      category:'family',     name:'Memory Timeline',           icon:'✦',  desc:'Life events and milestones by person', endpoint:'/daily-log/memories',       render:renderMemories },
  { id:'expiry',        category:'documents',  name:'Document Expiry Timeline',  icon:'📅', desc:'Upcoming document expirations',       endpoint:'/reports/expiry?months=24', render:renderExpiry },
  { id:'insurance',     category:'inventory',  name:'Home Insurance Report',     icon:'🏠', desc:'Inventory with values for claims',    endpoint:'/receipts/insurance-report', render:renderInsurance },
  { id:'hsa',           category:'finance',    name:'HSA Summary',               icon:'❤️', desc:'Contributions and expenses',          endpoint:'/hsa/summary',              render:renderHsa },
  { id:'spending',      category:'finance',    name:'Spending by Category',      icon:'💰', desc:'Where your money goes',               endpoint:'/finance/reports/spending-by-category', render:renderSpending },
  { id:'networth',      category:'finance',    name:'Net Worth',                 icon:'📈', desc:'Assets, liabilities, and trend',      endpoint:'/finance/net-worth/current', render:renderNetWorth },
  { id:'portfolio',     category:'finance',    name:'Investment Portfolio',      icon:'📊', desc:'Holdings and performance',            endpoint:'/finance/portfolio/performance', render:renderPortfolio },
  { id:'subscriptions', category:'finance',   name:'Subscription Spending',     icon:'📦', desc:'Monthly costs and annual projection', endpoint:'/subscriptions/summary',    render:renderSubscriptions },
  { id:'ins-summary',   category:'family',    name:'Insurance Summary',         icon:'🛡️', desc:'Active policies and annual premium',  endpoint:'/insurance/summary',        render:renderInsuranceSummary },
  { id:'watcher',       category:'system',    name:'Folder Watcher Audit',      icon:'📁', desc:'Auto-import history',                 endpoint:'/watcher/history',          render:renderWatcher },
  { id:'database',      category:'system',     name:'Database Health',           icon:'🗄️', desc:'Size, integrity, maintenance',        endpoint:'/system/db/stats',          render:renderDatabase },
  { id:'tests',         category:'system',     name:'System Tests',              icon:'🧪', desc:'Run automated diagnostics',           endpoint:null,                        render:renderTests },
  { id:'member-snapshot', category:'family',   name:'Member Snapshot',           icon:'👤', desc:'Everything about one family member',  endpoint:null,                        render:renderStub('Member Snapshot','Per-person rollup. Will pull from medical, kids, career, finance, documents, contacts. Filter by family member to see all data tied to them in one view.') },
  { id:'maint-rollup',  category:'inventory',  name:'Maintenance Rollup',        icon:'🔧', desc:'All maintenance across home & items', endpoint:null,                        render:renderStub('Maintenance Rollup','Cross-module view of property_maintenance + item_maintenance_log + warranty_claims. Filterable by source (home / vehicle / item) and status (overdue / due-soon / done). Replaces the old standalone Maintenance page.') },
];

const CATEGORIES = {
  overview:  { name:'Overview',             icon:'📋' },
  family:    { name:'Family & Emergency',   icon:'👨‍👩‍👧‍👦' },
  inventory: { name:'Inventory & Home',     icon:'📦' },
  documents: { name:'Documents',            icon:'📄' },
  finance:   { name:'Finance & HSA',        icon:'💰' },
  system:    { name:'System & Auditing',    icon:'⚙️' },
};

// ── Render main grid ──────────────────────────────────────────
function renderMainGrid() {
  const container = document.getElementById('reportsGridContainer');
  const grouped = {};
  REPORT_REGISTRY.forEach(r => { if(!grouped[r.category]) grouped[r.category]=[]; grouped[r.category].push(r); });
  let html = '';
  Object.entries(CATEGORIES).forEach(([catId, cat]) => {
    const reports = grouped[catId]||[];
    if(!reports.length) return;
    html += `<div class="category-section"><div class="category-header">${cat.icon} ${cat.name}</div><div class="reports-grid">`;
    reports.forEach(r => {
      html += `<div class="report-card" onclick="openReport('${r.id}')">
        <div class="report-icon">${r.icon}</div>
        <div class="report-title">${r.name}</div>
        <div class="report-desc">${r.desc}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

// ── Open / close report ───────────────────────────────────────
async function openReport(id) {
  const report = REPORT_REGISTRY.find(r => r.id === id);
  if (!report) return;
  document.getElementById('reportsMainView').style.display = 'none';
  const detail = document.getElementById('reportDetailView');
  detail.style.display = 'block';
  detail.innerHTML = `<div class="report-panel"><div class="report-panel-header"><button class="report-panel-back" onclick="closeReport()">←</button><span class="report-panel-title">${report.icon} ${report.name}</span></div><div class="spinner"><div class="spin"></div>Loading…</div></div>`;
  try {
    const data = report.endpoint ? await window.api('GET', report.endpoint) : null;
    report.render(detail, data);
  } catch(e) {
    detail.innerHTML = `<div class="report-panel"><div class="report-panel-header"><button class="report-panel-back" onclick="closeReport()">←</button><span class="report-panel-title">${report.icon} ${report.name}</span></div><div style="color:var(--red);padding:20px;text-align:center">Failed to load: ${esc(e.message)}</div></div>`;
  }
}

function closeReport() {
  document.getElementById('reportsMainView').style.display = 'block';
  document.getElementById('reportDetailView').style.display = 'none';
}

// ── Render functions ──────────────────────────────────────────
function panelWrap(icon, name, content) {
  return `<div class="report-panel"><div class="report-panel-header"><button class="report-panel-back" onclick="closeReport()">←</button><span class="report-panel-title">${icon} ${name}</span></div>${content}</div>`;
}
function summaryRow(label, value, color) {
  return `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>${label}</span><span style="font-weight:600;color:${color||'var(--text)'}">${value}</span></div>`;
}
function statsRow(items) {
  return `<div class="stats-row">${items.map(([v,l,c])=>`<div class="stat-item"><div class="stat-value" style="color:${c||'var(--text)'}">${v}</div><div class="stat-label">${l}</div></div>`).join('')}</div>`;
}

function renderSummary(el, d) {
  const inv=d.inventory||{}, med=d.medical||{}, tod=d.todos||{}, fin=d.net_worth||{}, docs=d.expiring_documents||[], hsa=d.hsa||{};
  el.innerHTML = panelWrap('📊','Dashboard Summary',
    statsRow([[inv.items||0,'Items'],[med.medications||0,'Meds'],[tod.open_count||0,'Todos']]) +
    summaryRow('Est. Inventory Value', fmt$(inv.est_value||0), 'var(--green)') +
    summaryRow('Net Worth', fmt$(fin.net_worth||0), (fin.net_worth||0)>=0?'var(--green)':'var(--red)') +
    summaryRow('Overdue Todos', tod.overdue_count||0, 'var(--red)') +
    summaryRow('Expiring Docs (90d)', docs.length||0, 'var(--amber)') +
    summaryRow('HSA Pool', fmt$(hsa.unreimbursed_pool||0), 'var(--green)')
  );
}

function renderEmergency(el, d) {
  const contacts=d.emergency_contacts||[], meds=d.medications||[], allergies=d.allergies||[];
  let body = `<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="window.open('/api/v1/reports/emergency/html','_blank')">🖨️ Print Emergency Card</button>
    <button class="btn btn-ghost" onclick="copyEmText()">📋 Copy as Text</button>
  </div>`;

  body += `<div style="font-weight:600;margin-bottom:8px">📞 Emergency Contacts (${contacts.length})</div>`;
  body += contacts.length
    ? contacts.map(c=>`<div style="background:var(--bg3);padding:12px;border-radius:var(--r);margin-bottom:8px"><div style="font-weight:600">${esc(c.name)} <span style="font-size:11px;color:var(--red);text-transform:uppercase">${esc(c.contact_type)}</span></div><div style="color:var(--accent);font-weight:600">${esc(c.phone_primary||'—')}</div>${c.phone_secondary?`<div style="font-size:12px;color:var(--text3)">${esc(c.phone_secondary)}</div>`:''}</div>`).join('')
    : `<div style="color:var(--amber);padding:12px;background:var(--amber-bg,#fffbeb);border-radius:var(--r);font-size:13px">⚠️ No emergency contacts — Settings → Contacts → toggle "Emergency Contact"</div>`;

  body += `<div style="font-weight:600;margin:16px 0 8px">💊 Active Medications (${meds.length})</div>`;
  body += meds.length
    ? meds.slice(0,10).map(m=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-weight:600">${esc(m.name)}</span><span style="color:var(--red);font-size:11px;margin-left:8px">${esc(m.patient)}</span><div style="font-size:12px;color:var(--text3)">${m.dosage||''} ${m.frequency||''}</div></div>`).join('')
    : `<div style="color:var(--text3);padding:8px">No active medications</div>`;

  body += `<div style="font-weight:600;margin:16px 0 8px">⚠️ Allergies</div>`;
  body += allergies.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px">${allergies.map(a=>`<span style="background:var(--red-bg,#fef2f2);color:var(--red,#ef4444);padding:4px 10px;border-radius:99px;font-size:12px;border:1px solid var(--red,#ef4444)">${esc(a.patient)}: ${esc(a.allergies)}</span>`).join('')}</div>`
    : `<div style="color:var(--text3);padding:8px">No known allergies</div>`;

  el.innerHTML = panelWrap('🚨','Emergency Info Card', body);
}

async function renderMemories(el, d) {
  // d is all memories — render with filter controls
  let memories = Array.isArray(d) ? d : [];

  // Get family members for filter
  let members = [];
  try { members = await window.api('GET', '/settings/family'); } catch {}

  function buildHtml(list, filterMember, filterCat) {
    const cats = [...new Set(list.map(m => m.memory_category).filter(Boolean))].sort();
    const filtered = list.filter(m =>
      (!filterMember || (m.member_ids||[]).includes(+filterMember)) &&
      (!filterCat || m.memory_category === filterCat)
    );

    const filters = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <select class="form-select" id="memFilterMember" style="width:auto;min-width:120px" onchange="refilterMemories()">
        <option value="">All Members</option>
        ${members.map(m=>`<option value="${m.id}"${filterMember==m.id?' selected':''}>${esc(m.display_name)}</option>`).join('')}
      </select>
      <select class="form-select" id="memFilterCat" style="width:auto;min-width:130px" onchange="refilterMemories()">
        <option value="">All Categories</option>
        ${cats.map(c=>`<option value="${c}"${filterCat===c?' selected':''}>${esc(c)}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${filtered.length} ${filtered.length===1?'memory':'memories'}</span>
    </div>`;

    if (!filtered.length) return filters + `<div style="color:var(--text3);padding:32px;text-align:center">No memories found</div>`;

    // Group by year
    const byYear = {};
    filtered.forEach(m => {
      const yr = (m.log_date||'').slice(0,4) || 'Unknown';
      if (!byYear[yr]) byYear[yr] = [];
      byYear[yr].push(m);
    });

    const timeline = Object.keys(byYear).sort((a,b)=>b-a).map(yr => {
      const items = byYear[yr].map(m => {
        const lines = (m.entry_text||'').split('\n').filter(Boolean);
        const title = lines[0]||'';
        const preview = lines.slice(1).join(' ')||'';
        return `<div style="display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="width:3px;background:#a78bfa;border-radius:2px;flex-shrink:0;align-self:stretch"></div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span style="font-size:11px;color:var(--text3)">${esc(m.log_date)}</span>
              ${m.memory_category?`<span style="font-size:10px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);border-radius:4px;padding:1px 6px">${esc(m.memory_category)}</span>`:''}
            </div>
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:${preview?'4px':'0'}">${esc(title)}</div>
            ${preview?`<div style="font-size:12px;color:var(--text3)">${esc(preview.slice(0,120))}${preview.length>120?'…':''}</div>`:''}
            ${m.member_names?`<div style="font-size:11px;color:#a78bfa;margin-top:4px">👤 ${esc(m.member_names)}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.04em;padding:8px 0;border-bottom:2px solid #a78bfa;margin-bottom:4px">${yr}</div>
        ${items}
      </div>`;
    }).join('');

    return filters + timeline;
  }

  // Store memories on window for refilter
  window._reportMemories = memories;
  window._reportMembers  = members;
  window.refilterMemories = function() {
    const fm = document.getElementById('memFilterMember')?.value||'';
    const fc = document.getElementById('memFilterCat')?.value||'';
    const content = document.getElementById('memTimelineContent');
    if (content) content.innerHTML = buildHtml(window._reportMemories, fm, fc);
  };

  el.innerHTML = panelWrap('✦','Memory Timeline',
    statsRow([[memories.length,'Total Memories'],[...new Set(memories.map(m=>m.memory_category).filter(Boolean))].length,'Categories'],) +
    `<div id="memTimelineContent">${buildHtml(memories,'','')}</div>`
  );
}

async function renderFamilySnapshot(el) {
  el.innerHTML = panelWrap('👤','Family Member Report',
    `<div id="snapMemberPicker" style="margin-bottom:16px">
      <label style="font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase">Family Member</label>
      <select class="form-select" id="snapMemberSel" style="margin-top:6px" onchange="loadSnapshot(this.value)">
        <option value="">— select a member —</option>
      </select>
    </div>
    <div id="snapContent"><div style="color:var(--text3);padding:20px;text-align:center">Select a family member above</div></div>`
  );
  try {
    const members = await window.api('GET', '/settings/family');
    const sel = document.getElementById('snapMemberSel');
    if (sel) members.forEach(m => {
      const o = document.createElement('option');
      o.value = m.id; o.textContent = m.display_name;
      sel.appendChild(o);
    });
    if (window._reportPreselectMember && sel) {
      const id = String(window._reportPreselectMember);
      if ([...sel.options].some(opt => opt.value === id)) {
        sel.value = id;
        loadSnapshot(id);
      }
      window._reportPreselectMember = null;
    }
  } catch {}
}

async function loadSnapshot(id) {
  const el = document.getElementById('snapContent');
  if (!id || !el) return;
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">Loading…</div>';
  try {
    const d = await window.api('GET', `/family-snapshot/${id}`);
    const m = d.member;

    function section(icon, title, items, fmtRow) {
      if (!items || !items.length) return '';
      return `<div style="font-weight:600;margin:14px 0 8px;display:flex;align-items:center;gap:6px">
        <span>${icon}</span><span>${esc(title)}</span>
        <span style="font-size:11px;color:var(--text3);font-weight:400">(${items.length})</span>
      </div>` + items.map(fmtRow).join('');
    }

    const html =
      `<div style="font-size:18px;font-weight:700;margin-bottom:2px">${esc(m.display_name)}</div>
       <div style="font-size:12px;color:var(--text3);margin-bottom:14px">${esc(m.relationship||'')} ${m.date_of_birth ? '· DOB: '+m.date_of_birth : ''}</div>` +

      section('✦', 'Memories', d.memories,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px">
          <span>${esc((x.entry_text||'').split('\n')[0].slice(0,80))}</span>
          <span style="font-size:12px;color:var(--text3);white-space:nowrap">${esc(x.log_date)} · ${esc(x.memory_category||'')}</span>
        </div>`) +

      section('💊', 'Medications', d.medications,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <span>${esc(x.name)}</span>
          <span style="font-size:12px;color:var(--text3)">${esc(x.dosage||'')} · ${esc(x.status||'')}</span>
        </div>`) +

      section('🩺', 'Conditions', d.conditions,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          ${esc(x.condition_name)} <span style="font-size:11px;color:var(--text3)">${esc(x.status||'')}</span>
        </div>`) +

      section('✓', 'Open Todos', d.todos,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px">
          <span>${esc(x.title)}</span>
          ${x.due_date?`<span style="font-size:11px;color:var(--text3);white-space:nowrap">${esc(x.due_date)}</span>`:''}
        </div>`) +

      section('🧒', 'Kids Profile', d.kids,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          Grade: ${esc(x.grade||'—')} · School: ${esc(x.school_name||'—')}
          ${x.allergies?`<div style="font-size:12px;color:var(--text3);margin-top:2px">Allergies: ${esc(x.allergies)}</div>`:''}
        </div>`) +

      section('🛡️', 'Insurance', d.insurance,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <span>${esc(x.policy_number)}</span>
          <span style="font-size:12px;color:var(--text3)">${esc(x.status||'')}</span>
        </div>`) +

      section('🔁', 'Subscriptions', d.subscriptions,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
          <span>${esc(x.name)}</span>
          <span style="font-size:12px;color:var(--text3)">${esc(x.category||'')} · ${esc(x.status||'')}</span>
        </div>`) +

      section('🏠', 'Properties', d.properties,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          ${esc(x.nickname||'—')} <span style="font-size:11px;color:var(--text3)">${esc(x.property_type||'')}</span>
        </div>`) +

      section('🚗', 'Vehicles', d.vehicles,
        x => `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
          ${esc(x.nickname||(x.make+' '+x.model).trim())} ${x.license_plate?`<span style="font-size:11px;color:var(--text3)">· ${esc(x.license_plate)}</span>`:''}
        </div>`) +

      (d.wardrobe && d.wardrobe.length ? `<div style="font-weight:600;margin:14px 0 4px">👕 Wardrobe <span style="font-size:11px;color:var(--text3);font-weight:400">(${d.wardrobe.length} items)</span></div>` : '') +
      (d.perfumes && d.perfumes.length ? `<div style="font-weight:600;margin:14px 0 4px">🌸 Perfume Collection <span style="font-size:11px;color:var(--text3);font-weight:400">(${d.perfumes.length} fragrances)</span></div>` : '') +

function renderExpiry(el, d) {
  const docs = d.documents||[];
  const today = new Date().toISOString().slice(0,10);
  const getColor = (days) => days<0?'var(--red)':days<=30?'var(--red)':days<=90?'var(--amber)':'var(--green)';
  el.innerHTML = panelWrap('📅','Document Expiry',
    statsRow([[d.total||0,'Total'],[d.expired||0,'Expired','var(--red)'],[d.next_30_days||0,'Next 30d','var(--amber)']]) +
    (docs.length ? docs.map(doc => {
      const color = getColor(doc.days_until);
      const badge = doc.days_until<0?`${Math.abs(doc.days_until)}d ago`:doc.days_until<=30?`${doc.days_until}d left`:`${Math.floor(doc.days_until/30)}mo`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-weight:600">${esc(doc.title)}</div><div style="font-size:12px;color:var(--text3)">${esc(doc.category||'Document')} · ${doc.expiry_date}</div></div>
        <span style="font-size:11px;font-weight:700;color:${color}">${badge}</span>
      </div>`;
    }).join('') : `<div style="color:var(--text3);padding:20px;text-align:center">No expiring documents</div>`)
  );
}

async function runTests() {
  const btn = document.getElementById('runTestsBtn');
  const out  = document.getElementById('testOut');
  if (btn) { btn.textContent='Running…'; btn.disabled=true; }
  const results = [];
  const tests = [
    ['Config API',        () => window.api('GET','/settings/config')],
    ['DB stats',          () => window.api('GET','/system/db/stats')],
    ['Emergency report',  () => window.api('GET','/reports/emergency')],
    ['Expiry report',     () => window.api('GET','/reports/expiry?months=12')],
    ['Google status',     () => window.api('GET','/google/status')],
    ['Recurring list',    () => window.api('GET','/finance/recurring')],
    ['Webhooks events',   () => window.api('GET','/system/webhooks/events')],
    ['Undo delete list',  () => window.api('GET','/system/deleted')],
  ];
  for (const [name, fn] of tests) {
    try { await fn(); results.push({name,ok:true}); } catch(e) { results.push({name,ok:false,err:e.message}); }
  }
  const p=results.filter(r=>r.ok).length, f=results.filter(r=>!r.ok).length;
  if (out) out.innerHTML = `<div style="margin-bottom:8px"><span style="color:var(--green)">✅ ${p} passed</span> · <span style="color:var(--red)">❌ ${f} failed</span></div>` +
    results.map(r=>`<div style="color:${r.ok?'var(--green)':'var(--red)'};padding:2px 0">${r.ok?'✅':'❌'} ${r.name}${r.err?' — '+esc(r.err):''}</div>`).join('');
  if (btn) { btn.textContent='▶ Run All Tests'; btn.disabled=false; }
}

// ── Helpers ───────────────────────────────────────────────────
function fmt$(n) {
  if (n==null) return '$0';
  const abs = Math.abs(n);
  if (abs>=1000000) return (n<0?'-':'')+'$'+(abs/1000000).toFixed(1)+'M';
  if (abs>=1000)    return (n<0?'-':'')+'$'+(abs/1000).toFixed(1)+'k';
  return (n<0?'-':'')+'$'+abs.toFixed(0);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function copyEmText() {
  try {
    const t = await fetch('/api/v1/reports/emergency/text').then(r=>r.text());
    await navigator.clipboard.writeText(t);
    toast('Copied to clipboard');
  } catch { toast('Copy failed','err'); }
}

renderMainGrid();

// Open a report by ID via ?open=ID query param. Optional ?member=ID for
// the family snapshot to pre-select the member.
(function autoOpenFromQuery() {
  try {
    const params = new URLSearchParams(window.location.search);
    const open = params.get('open');
    if (!open) return;
    const memberId = params.get('member');
    if (memberId) window._reportPreselectMember = parseInt(memberId, 10);
    setTimeout(() => openReport(open), 50);
  } catch (_) {}
})();
</script>
