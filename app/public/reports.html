// Shared txn-row renderer for the drill-down list. Used by every
// chart's drill-down so the list reads identically regardless of
// what slice opened it.
function renderDrillDown(title, subtitle, transactions) {
  if (!transactions || !transactions.length) {
    return `<div class="rep-detail-header">
      <button class="rep-detail-back" onclick="closeDrillDown()" aria-label="Back">←</button>
      <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">${esc(title)}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(subtitle)}</div></div>
    </div>
    <div class="rep-detail-body" style="text-align:center;color:var(--text3);padding:40px 16px">No transactions on this slice.</div>`;
  }
  const rows = transactions.map(t => `
    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.description || '(no description)')}</div>

    </div>`).join('');
  return `<div class="rep-detail-header">
    <button class="rep-detail-back" onclick="closeDrillDown()" aria-label="Back">←</button>
    <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text)">${esc(title)}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(subtitle)}</div></div>

}

  try {

      ['Inventory Items',  (d.inventory?.total_items ?? 0).toLocaleString(),       'items',   '/inventory.html'],

      ['HSA Balance',      fmtMoney((d.hsa?.contributions || 0) - (d.hsa?.expenses || 0)), null, '/medical.html#hsa'],
    ];

function fmtMoney(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
}

async function openReportInPane(id, rowEl) {
  const r = REPORT_REGISTRY.find(x => x.id === id);
  if (!r) return;
  activeReportId = id;
  // Highlight active row
  document.querySelectorAll('.rep-row').forEach(el => el.classList.toggle('active', el === rowEl));
  document.querySelectorAll('.fam-avatar').forEach(el => el.classList.remove('active'));

  const right = document.getElementById('reportsRight');
  right.classList.remove('empty');
  right.classList.add('open');
  const editPath = EDIT_PATHS[id];
  right.innerHTML = `
    <div class="rep-detail-header">
      <button class="rep-detail-back" onclick="closeRightPane()" title="Close">×</button>
      <span class="rep-detail-title">${r.icon} ${esc(r.name)}</span>

    </div>
    <div class="rep-detail-body" id="repDetailBody">
      <div class="spinner"><div class="spin"></div>Loading…</div>
    </div>`;
  try {
    const data = r.endpoint ? await window.api('GET', r.endpoint) : null;

    // passing the body div and the data they expect.
    const body = document.getElementById('repDetailBody');
    body.innerHTML = '';

  } catch(e) {
    document.getElementById('repDetailBody').innerHTML =

  }

  if (m.relationship)   sections.push(['Relationship', m.relationship]);
  if (m.role)           sections.push(['Role', m.role]);

    sections.map(([k,v]) => `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:var(--text3)">${k}</span><span>${esc(v)}</span></div>`).join('') +

    [['Conditions', counts.conditions||0], ['Medications', counts.medications||0],
     ['Visits', counts.visits||0], ['Documents', counts.documents||0],
     ['Activities', counts.activities||0], ['Todos', counts.todos||0]]
    .map(([l,v]) => `<div class="stat-item"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`).join('') +

// ── Render functions ──────────────────────────────────────────
// Right pane already renders its own header with back button + title +

// expecting it to wrap with header markup — make it a passthrough so we
// don't double-render the title or break with closeReport() (now closeRightPane).
function panelWrap(icon, name, content) {
  return content;
}
function summaryRow(label, value, color) {
  return `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>${label}</span><span style="font-weight:600;color:${color||'var(--text)'}">${value}</span></div>`;
}
function statsRow(items) {
  return `<div class="stats-row">${items.map(([v,l,c])=>`<div class="stat-item"><div class="stat-value" style="color:${c||'var(--text)'}">${v}</div><div class="stat-label">${l}</div></div>`).join('')}</div>`;
}

async function renderMemories(el, d) {
  // d is all memories — render with filter controls
  let memories = Array.isArray(d) ? d : [];

  // Get family members for filter
  let members = [];
  try { members = await window.api('GET', '/settings/family'); } catch {}

  function buildHtml(list, filterMember, filterCat) {
    const cats = [...new Set(list.map(m => m.memory_category).filter(Boolean))].sort();
    const filtered = list.filter(m =>
      (!filterMember || (m.member_ids||[]).includes(+filterMember)) &&
      (!filterCat || m.memory_category === filterCat)
    );

    const filters = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <select class="form-select" id="memFilterMember" style="width:auto;min-width:120px" onchange="refilterMemories()">
        <option value="">All Members</option>
        ${members.map(m=>`<option value="${m.id}"${filterMember==m.id?' selected':''}>${esc(m.display_name)}</option>`).join('')}
      </select>
      <select class="form-select" id="memFilterCat" style="width:auto;min-width:130px" onchange="refilterMemories()">
        <option value="">All Categories</option>
        ${cats.map(c=>`<option value="${c}"${filterCat===c?' selected':''}>${esc(c)}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${filtered.length} ${filtered.length===1?'memory':'memories'}</span>
    </div>`;

    if (!filtered.length) return filters + `<div style="color:var(--text3);padding:32px;text-align:center">No memories found</div>`;

    // Group by year
    const byYear = {};
    filtered.forEach(m => {
      const yr = (m.log_date||'').slice(0,4) || 'Unknown';
      if (!byYear[yr]) byYear[yr] = [];
      byYear[yr].push(m);
    });

    const timeline = Object.keys(byYear).sort((a,b)=>b-a).map(yr => {
      const items = byYear[yr].map(m => {
        const lines = (m.entry_text||'').split('\n').filter(Boolean);
        const title = lines[0]||'';
        const preview = lines.slice(1).join(' ')||'';
        return `<div style="display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="width:3px;background:#a78bfa;border-radius:2px;flex-shrink:0;align-self:stretch"></div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span style="font-size:11px;color:var(--text3)">${esc(m.log_date)}</span>
              ${m.memory_category?`<span style="font-size:10px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);border-radius:4px;padding:1px 6px">${esc(m.memory_category)}</span>`:''}
            </div>
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:${preview?'4px':'0'}">${esc(title)}</div>
            ${preview?`<div style="font-size:12px;color:var(--text3)">${esc(preview.slice(0,120))}${preview.length>120?'…':''}</div>`:''}
            ${m.member_names?`<div style="font-size:11px;color:#a78bfa;margin-top:4px">👤 ${esc(m.member_names)}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.04em;padding:8px 0;border-bottom:2px solid #a78bfa;margin-bottom:4px">${yr}</div>
        ${items}
      </div>`;
    }).join('');

    return filters + timeline;
  }

  // Store memories on window for refilter
  window._reportMemories = memories;
  window._reportMembers  = members;
  window.refilterMemories = function() {
    const fm = document.getElementById('memFilterMember')?.value||'';
    const fc = document.getElementById('memFilterCat')?.value||'';
    const content = document.getElementById('memTimelineContent');
    if (content) content.innerHTML = buildHtml(window._reportMemories, fm, fc);
  };

  el.innerHTML = panelWrap('✦','Memory Timeline',
    statsRow([[memories.length,'Total Memories'],[...new Set(memories.map(m=>m.memory_category).filter(Boolean))].length,'Categories'],) +
    `<div id="memTimelineContent">${buildHtml(memories,'','')}</div>`
  );
}

async function renderFamilySnapshot(el) {

      <select class="form-select" id="snapMemberSel" style="margin-top:6px" onchange="loadSnapshot(this.value)">

  );

// v202604.140 — IRS-ready reimbursement report (HSA + LP-FSA).
// Year picker; renders two pot sections, each with totals + line items
// + reimbursement events. Designed to be print-friendly.
async function renderHsaFsaIrs(el, _ignored) {
  const year = el._year || new Date().getFullYear();
  el.innerHTML = `
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <label style="font-size:12px;color:var(--text3)">Tax year:</label>
      <select id="hsaIrsYear" style="padding:4px 8px;font-size:13px"></select>
      <button class="btn btn-ghost" id="hsaIrsPrint" style="margin-left:auto">Print</button>
    </div>
    <div id="hsaIrsBody"><div class="spinner"><div class="spin"></div>Loading…</div></div>
  `;
  const sel = document.getElementById('hsaIrsYear');
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= thisYear - 7; y--) {
    sel.innerHTML += `<option value="${y}"${y===year?' selected':''}>${y}</option>`;
  }
  sel.onchange = () => { el._year = parseInt(sel.value); renderHsaFsaIrs(el); };
  document.getElementById('hsaIrsPrint').onclick = () => window.print();

  try {
    const d = await window.api('GET', `/reports/hsa-fsa-irs?year=${year}`);
    document.getElementById('hsaIrsBody').innerHTML =
      potSection('HSA', d.hsa) +
      potSection('LP-FSA', d.fsa);
  } catch (e) {
    document.getElementById('hsaIrsBody').innerHTML =
      `<div style="color:var(--red);padding:14px">Failed to load: ${esc(e.message)}</div>`;
  }
}

function potSection(label, d) {
  if (!d) return '';
  const t = d.totals || {};
  const exp = (d.expenses || []).filter(e => e.parent_payment_id == null);
  const otc = d.otc || [];
  const reimb = d.reimbursements || [];

  const expRows = exp.length ? exp.map(e => `
    <tr>
      <td>${esc(e.date||'')}</td>
      <td>${esc(e.vendor_name || e.provider || '—')}</td>
      <td>${esc(e.patient||'')}</td>
      <td style="text-align:right;font-family:var(--mono)">${fmt$(e.amount||0)}</td>
      <td>${e.eligible === 1 ? '✓' : (e.eligible === 2 ? '✗' : '?')}</td>
      <td>${e.reimbursed ? esc(e.reimbursement_date||'yes') : 'no'}</td>
      <td>${e.eob_claim_id ? `EOB #${e.eob_claim_id}` : ''}</td>
    </tr>
  `).join('') : `<tr><td colspan="7" style="color:var(--text3);text-align:center;padding:14px">No expenses</td></tr>`;

  const otcRows = otc.length ? otc.map(o => `
    <tr>
      <td>${esc(o.date||'')}</td>
      <td>${esc(o.store||'OTC')}</td>
      <td>—</td>
      <td style="text-align:right;font-family:var(--mono)">${fmt$(o.amount||0)}</td>
      <td>${o.eligible === 1 ? '✓' : '?'}</td>
      <td>${o.reimbursed ? esc(o.reimbursement_date||'yes') : 'no'}</td>
      <td></td>
    </tr>
  `).join('') : '';

  const reimbRows = reimb.length ? reimb.map(r => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <strong>${esc(r.date||'')}</strong> — ${fmt$(r.amount||r.total_amount||0)}
      ${r.method ? ` · ${esc(r.method)}` : ''}
      ${(r.items||[]).length ? ` · covered ${r.items.length} item(s)` : ''}
    </div>
  `).join('') : `<div style="color:var(--text3);font-size:12px;padding:8px">No reimbursements this year</div>`;

  return `
    <div style="margin-bottom:24px">
      <h3 style="margin:0 0 8px;font-size:14px">${label}</h3>
      ${statsRow([
        [fmt$(t.eligible_expenses||0),'Eligible expenses'],
        [fmt$(t.eligible_otc||0),'Eligible OTC'],
        [fmt$(t.mileage||0),`Mileage (${(t.mileage_miles||0).toFixed(0)}mi)`],
        [fmt$(t.grand_eligible||0),'Grand eligible'],
      ])}
      <div style="overflow-x:auto;margin-top:10px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:var(--bg3)">
              <th style="text-align:left;padding:6px;font-weight:600">Date</th>
              <th style="text-align:left;padding:6px;font-weight:600">Vendor / Provider</th>
              <th style="text-align:left;padding:6px;font-weight:600">Person</th>
              <th style="text-align:right;padding:6px;font-weight:600">Amount</th>
              <th style="text-align:center;padding:6px;font-weight:600">Eligible</th>
              <th style="text-align:left;padding:6px;font-weight:600">Reimbursed</th>
              <th style="text-align:left;padding:6px;font-weight:600">EOB</th>

          <tbody>${expRows}${otcRows}</tbody>
        </table>
      </div>
      <div style="margin-top:12px"><strong style="font-size:12px">Reimbursement events</strong></div>
      <div>${reimbRows}</div>
    </div>
  `;
}

const _MAINT_ICONS = { property:'🏠', vehicle:'🚗', item:'📦' };

    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap" id="maintDaysChips">

      <div class="sum-card"><div class="sum-val" id="mOverdue" style="color:var(--red)">—</div><div class="sum-lbl">Overdue</div></div>
      <div class="sum-card"><div class="sum-val" id="mDue30" style="color:var(--amber)">—</div><div class="sum-lbl">Due 30d</div></div>
      <div class="sum-card"><div class="sum-val" id="mTotal">—</div><div class="sum-lbl">Upcoming</div></div>
    </div>
    <div id="maintList"><div class="spinner"><div class="spin"></div>Loading…</div></div>
  `);
  loadMaintRollup(90);

async function loadMaintRollup(days) {
  try {
    const [data, summary] = await Promise.all([
      window.api('GET', `/maintenance/upcoming?days=${days}`),
      window.api('GET', '/maintenance/summary'),
    ]);
    const set = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
    set('mOverdue', summary.overdue || 0);
    set('mDue30',   summary.due_30_days || 0);
    set('mTotal',   data.total || 0);
    const el = document.getElementById('maintList');
    if (!el) return;
    if (!data.items?.length) {
      el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">✅ No upcoming maintenance in this period</div>';
      return;
    }
    el.innerHTML = data.items.map(item => {
      const daysUntil = item.next_due_date ? Math.ceil((new Date(item.next_due_date) - new Date()) / 86400000) : null;
      const cls = daysUntil === null || daysUntil < 0 ? 'border-left:3px solid var(--red)' : daysUntil <= 30 ? 'border-left:3px solid var(--amber)' : 'border-left:3px solid var(--green)';
      const badge = daysUntil === null ? '' : daysUntil < 0 ? `<span style="font-size:10px;font-weight:700;color:var(--red)">${Math.abs(daysUntil)}d OVERDUE</span>`
        : daysUntil === 0 ? `<span style="font-size:10px;font-weight:700;color:var(--red)">TODAY</span>`
        : daysUntil <= 30 ? `<span style="font-size:10px;color:var(--amber)">${daysUntil}d</span>`
        : `<span style="font-size:10px;color:var(--text3)">${daysUntil}d</span>`;
      return `<div style="background:var(--bg2);border:1px solid var(--border);${cls};border-radius:var(--r-lg);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="window.location.href='${item.href}'">
        <div style="width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--bg3)">${_MAINT_ICONS[item.source]||'🔧'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;color:var(--text);margin-bottom:2px">${esc(item.description||item.category)}</div>
          <div style="font-size:12px;color:var(--text3)">${esc(item.entity_name)} · ${item.next_due_date||'—'}</div>
        </div>
        ${badge}
        ${item.cost ? `<div style="font-size:12px;color:var(--text3);margin-left:8px">$${Number(item.cost).toFixed(0)}</div>` : ''}

async function loadMemberSnap(memberId) {
  const cont = document.getElementById('msContent');
  const printBtn = document.getElementById('msPrintBtn');
  if (printBtn) printBtn.style.display = 'none';
  if (!memberId) { cont.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Pick a family member to see their full rollup.</div>'; return; }
  cont.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const d = await window.api('GET', `/family-snapshot/${memberId}`);
    const m = d.member;
    const age = m.date_of_birth ? Math.floor((Date.now() - new Date(m.date_of_birth)) / (365.25*24*3600*1000)) + ' yrs' : null;
    let html = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px">
        <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px">${esc(m.display_name)}</div>
        <div style="font-size:13px;color:var(--text3)">${[m.relationship, age].filter(Boolean).join(' · ')}</div>
        ${m.emergency_notes ? `<div style="margin-top:8px;font-size:13px;color:var(--text2);padding:8px 12px;background:var(--red-bg,#fef2f2);border-radius:var(--r)">${esc(m.emergency_notes)}</div>` : ''}
      </div>`;
    const section = (icon, title, count, body) => `<div style="margin-bottom:20px"><div style="font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px">${icon} ${title}${count!=null?' ('+count+')':''}</div>${body}</div>`;
    if (d.medications?.length) {
      const rows = d.medications.map(x => {
        const active = x.status === 'Active';
        return `<div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--text);font-weight:500;flex:1">${esc(x.name)}${x.dosage?' · '+esc(x.dosage):''}</span>
          <span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:${active?'rgba(34,197,94,.1)':'var(--bg3)'};color:${active?'var(--green)':'var(--text3)'}">${esc(x.status)}</span>
        </div>`;
      }).join('');
      html += section('💊','Medications', d.medications.length, rows);
    }
    if (d.conditions?.length) {
      const rows = d.conditions.map(x => `<div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text);font-weight:500;flex:1">${esc(x.condition_name)}</span><span style="color:var(--text3);min-width:120px">${esc(x.status||'')}</span></div>`).join('');
      html += section('🩺','Conditions', d.conditions.length, rows);
    }
    if (d.todos?.length) {
      const rows = d.todos.map(x => {
        const overdue = x.due_date && x.due_date < new Date().toISOString().slice(0,10);
        return `<div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text);font-weight:500;flex:1">${esc(x.title)}</span>${x.due_date?`<span style="color:${overdue?'var(--red)':'var(--text3)'};min-width:90px;text-align:right">${x.due_date}</span>`:''}</div>`;
      }).join('');
      html += section('✓','Open Todos', d.todos.length, rows);
    }
    if (d.visits?.length) {
      const rows = d.visits.slice(0,5).map(x => `<div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3);min-width:90px">${esc(x.visit_date)}</span><span style="color:var(--text);font-weight:500;flex:1">${x.physician?esc(x.physician)+' · ':''}${esc((x.questions||'').slice(0,60))}</span></div>`).join('');
      html += section('🏥','Recent Visits', d.visits.length, rows);
    }
    if (d.hsa?.length) {
      const total = d.hsa.reduce((s,x) => s + (x.you_paid||0), 0);
      const rows = d.hsa.slice(0,5).map(x => `<div style="display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3);min-width:90px">${esc(x.date)}</span><span style="color:var(--text);font-weight:500;flex:1">${esc(x.provider||x.category||'')}</span><span style="font-weight:600;color:var(--text)">$${Number(x.you_paid||0).toFixed(2)}</span></div>`).join('');
      html += section('❤️',`Recent HSA — $${total.toFixed(2)} total`, null, rows);
    }
    if (!d.medications?.length && !d.conditions?.length && !d.todos?.length) {
      html += `<div style="text-align:center;padding:40px;color:var(--text3)">No linked data found for this family member.</div>`;
    }
    html += `<div style="margin-top:16px;font-size:11px;color:var(--text3);text-align:center">Generated ${new Date().toLocaleString()}</div>`;
    cont.innerHTML = html;
    if (printBtn) { printBtn.style.display = 'inline-flex'; printBtn.dataset.memberId = memberId; }
  } catch(e) {
    cont.innerHTML = `<div style="color:var(--red);padding:20px">${esc(e.message)}</div>`;
  }
}
function printMemberSnap() {
  const id = document.getElementById('msPrintBtn')?.dataset.memberId;
  if (id) window.open(`/api/v1/family-snapshot/${id}/html`, '_blank');

async function loadTestRuns() {
  const list = document.getElementById('testRunList');
  const summary = document.getElementById('testRunSummary');
  const detail = document.getElementById('testRunDetail');
  if (detail) detail.innerHTML = '';
  if (list)   list.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const runs = await window.api('GET', '/app/test-results');
    if (!runs.length) {
      if (summary) summary.innerHTML = '';
      if (list) list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">
        No test runs recorded yet.<br>
        <span style="font-size:11px">Run <code>tests/run-tests.ps1</code> on the deploy machine to populate this view.</span>
      </div>`;
      return;
    }
    // Summary card based on most recent
    const latest = runs[0];
    const ago = _timeAgo(latest.started_at);
    const passClass = latest.failed === 0 ? 'green' : 'red';
    if (summary) summary.innerHTML = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:50%;background:${latest.failed===0?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)'};display:flex;align-items:center;justify-content:center;font-size:22px">${latest.failed===0?'✓':'✕'}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:var(--text)">${latest.passed}/${latest.total} passed</div>
          <div style="font-size:12px;color:var(--text3)">${ago} · ${(latest.duration_ms/1000).toFixed(1)}s · ${latest.suites||0} suite${latest.suites===1?'':'s'}</div>
        </div>
        ${latest.failed > 0
          ? `<span style="font-size:11px;font-weight:700;color:var(--red);background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);padding:3px 10px;border-radius:99px">${latest.failed} FAIL</span>`
          : `<span style="font-size:11px;font-weight:700;color:var(--green);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:99px">ALL GREEN</span>`}
      </div>
    `;
    // List of all runs
    if (list) list.innerHTML = `
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px">Recent Runs (${runs.length})</div>
      ${runs.map(r => {
        const ok = r.failed === 0;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:var(--r);transition:background .12s"
          onmouseenter="this.style.background='var(--bg3)'" onmouseleave="this.style.background=''"
          onclick="loadTestRunDetail('${r.filename}')">
          <span style="width:8px;height:8px;border-radius:50%;background:${ok?'var(--green)':'var(--red)'};flex-shrink:0"></span>
          <span style="flex:1;font-size:13px;color:var(--text)">${_timeAgo(r.started_at)}</span>
          <span style="font-size:12px;color:${ok?'var(--green)':'var(--red)'};font-weight:600">${r.passed}/${r.total}</span>
          <span style="font-size:11px;color:var(--text3);min-width:50px;text-align:right">${(r.duration_ms/1000).toFixed(1)}s</span>
        </div>`;
      }).join('')}
    `;
  } catch(e) {
    if (list) list.innerHTML = `<div style="color:var(--red);padding:16px;font-size:13px">Failed to load: ${esc(e.message)}</div>`;
  }
}

async function loadTestRunDetail(filename) {
  const detail = document.getElementById('testRunDetail');
  if (!detail) return;
  detail.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const run = await window.api('GET', '/app/test-results/' + filename);
    const html = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-top:8px">

          <div>
            <div style="font-size:14px;font-weight:700;color:var(--text)">${_dateString(run.started_at)}</div>
            <div style="font-size:12px;color:var(--text3)">${run.passed}/${run.total} passed · ${(run.duration_ms/1000).toFixed(1)}s · target: ${esc(run.ghrava_url||'')}</div>
          </div>
          <button class="btn btn-ghost" style="font-size:11px;padding:3px 9px" onclick="document.getElementById('testRunDetail').innerHTML=''">Close</button>

          <div style="margin-top:12px">

            ${(s.tests||[]).map(t => {
              const ok = t.status === 'passed';
              return `<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12px">
                <span style="color:${ok?'var(--green)':'var(--red)'};flex-shrink:0;font-family:var(--mono)">${ok?'✓':'✕'}</span>
                <span style="flex:1;color:var(--text)">${esc(t.title||'')}</span>
                <span style="color:var(--text3);font-size:11px;flex-shrink:0">${t.duration_ms||0}ms</span>
              </div>${t.error ? `<div style="color:var(--red);font-size:11px;font-family:var(--mono);padding:4px 0 4px 20px;white-space:pre-wrap">${esc(t.error)}</div>` : ''}`;
            }).join('')}
          </div>
        `).join('')}
      </div>
    `;
    detail.innerHTML = html;
  } catch(e) {
    detail.innerHTML = `<div style="color:var(--red);padding:14px;font-size:13px">Failed to load: ${esc(e.message)}</div>`;
  }
}
window.loadTestRuns = loadTestRuns;
window.loadTestRunDetail = loadTestRunDetail;

function _timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const sec = (Date.now() - d.getTime()) / 1000;
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec/60) + 'm ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  if (sec < 86400 * 7) return Math.floor(sec/86400) + 'd ago';
  return d.toLocaleDateString();
}
function _dateString(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString();
}

async function runTests() {
  const btn = document.getElementById('runTestsBtn');
  const out  = document.getElementById('testOut');
  if (btn) { btn.textContent='Running…'; btn.disabled=true; }
  const results = [];
  const tests = [
    ['Config API',        () => window.api('GET','/settings/config')],
    ['DB stats',          () => window.api('GET','/system/db/stats')],
    ['Emergency report',  () => window.api('GET','/reports/emergency')],
    ['Expiry report',     () => window.api('GET','/reports/expiry?months=12')],
    ['Google status',     () => window.api('GET','/google/status')],
    ['Recurring list',    () => window.api('GET','/finance/recurring')],
    ['Webhooks events',   () => window.api('GET','/system/webhooks/events')],
    ['Undo delete list',  () => window.api('GET','/system/deleted')],
  ];
  for (const [name, fn] of tests) {
    try { await fn(); results.push({name,ok:true}); } catch(e) { results.push({name,ok:false,err:e.message}); }
  }
  const p=results.filter(r=>r.ok).length, f=results.filter(r=>!r.ok).length;
  if (out) out.innerHTML = `<div style="margin-bottom:8px"><span style="color:var(--green)">✅ ${p} passed</span> · <span style="color:var(--red)">❌ ${f} failed</span></div>` +
    results.map(r=>`<div style="color:${r.ok?'var(--green)':'var(--red)'};padding:2px 0">${r.ok?'✅':'❌'} ${r.name}${r.err?' — '+esc(r.err):''}</div>`).join('');
  if (btn) { btn.textContent='▶ Run Smoke Tests'; btn.disabled=false; }
}

// ── Helpers ───────────────────────────────────────────────────
function fmt$(n) {
  if (n==null) return '$0';
  const abs = Math.abs(n);
  if (abs>=1000000) return (n<0?'-':'')+'$'+(abs/1000000).toFixed(1)+'M';
  if (abs>=1000)    return (n<0?'-':'')+'$'+(abs/1000).toFixed(1)+'k';
  return (n<0?'-':'')+'$'+abs.toFixed(0);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function copyEmText() {
  try {
    const t = await fetch('/api/v1/reports/emergency/text').then(r=>r.text());
    await navigator.clipboard.writeText(t);
    toast('Copied to clipboard');
  } catch { toast('Copy failed','err'); }
}

// ── Init ──────────────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(window.location.search);
  const tabParam = params.get('tab');
  let tabId = (tabParam && TABS[tabParam]) ? tabParam : 'overview';

  // Legacy: ?open=reportId — find which tab it lives in, switch, open in pane
  const openId = params.get('open');
  if (openId) {
    for (const [tid, t] of Object.entries(TABS)) {
      if (t.reports.includes(openId)) { tabId = tid; break; }
    }
  }

  // Activate matching tab button
  document.querySelectorAll('.reports-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  renderTabContent(tabId);

  // Auto-open requested report after tab content renders
  if (openId) {
    setTimeout(() => {
      const row = document.querySelector(`.rep-row[data-report="${openId}"]`);
      if (row) openReportInPane(openId, row);
    }, 100);
  }

  // v.171 — populate the Pending tab count badge (background load).
  fetch('/api/v1/pending/counts')
    .then(r => r.ok ? r.json() : null)
    .then(j => {
      if (!j || !j.total) return;
      const el = document.getElementById('pendingTabCount');
      if (el) el.textContent = j.total;
    })
    .catch(() => {});
})();
</script>
