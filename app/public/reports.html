<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Reports — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
  <script>if(localStorage.getItem('gh_nav_collapsed')==='1'){document.documentElement.classList.add('nav-collapsed-init');}</script>
  <style>
    /* ── Page shell ──────────────────────────────────────── */
    .reports-container{padding:16px;max-width:none}

    /* ── v202604.167 — Charts (preview) tab styles ────────── */
    .ch-wrap { padding: 6px 4px 60px; max-width: 1280px; }
    .ch-banner { background: linear-gradient(90deg, rgba(245,158,11,.10), rgba(245,158,11,.04)); border: 1px solid rgba(245,158,11,.25); border-radius: var(--r-lg); padding: 12px 16px; font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
    .ch-banner b { color: var(--text); }
    .ch-group { margin-bottom: 28px; }
    .ch-group-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .ch-group-num { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: .08em; }
    .ch-group-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .ch-group-sub { font-size: 12px; color: var(--text3); margin-left: auto; }
    .ch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 14px; }
    @media (max-width: 760px) { .ch-grid { grid-template-columns: 1fr; } }
    .ch-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; min-height: 240px; display: flex; flex-direction: column; transition: border-color .15s; }
    .ch-card.live:hover { border-color: var(--accent); cursor: pointer; }
    .ch-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .ch-card-sub { font-size: 12px; color: var(--text3); margin-bottom: 10px; line-height: 1.4; }
    .ch-card-canvas { flex: 1; min-height: 140px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: var(--r); border: 1px dashed var(--border2); position: relative; overflow: hidden; }
    .ch-card-canvas svg { width: 100%; height: 100%; }
    .ch-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .ch-card-status { font-family: var(--mono); font-size: 11px; color: var(--text3); }
    .ch-card-status.live { color: var(--green, #15803d); }
    .ch-card-status.mock { color: var(--amber, #b45309); }
    .ch-card-cta { font-size: 12px; color: var(--accent); }
    .ch-drilldown-hint { font-size: 11px; color: var(--text3); font-style: italic; margin-top: 8px; }
    .ch-legend { display: flex; gap: 12px; font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 6px; flex-wrap: wrap; }
    .ch-legend-item { display: flex; align-items: center; gap: 4px; }
    .ch-legend-sw { width: 10px; height: 10px; border-radius: 2px; }

    /* ── Tab bar ────────────────────────────────────────── */
    .reports-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .reports-tab{flex-shrink:0;padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:color .15s,border-color .15s}
    .reports-tab:hover{color:var(--text)}
    .reports-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

    /* ── Two-pane layout ─────────────────────────────────── */
    .reports-shell{display:flex;gap:16px;align-items:flex-start;position:relative}
    .reports-left{flex:1;min-width:0}
    .reports-right{flex:0 0 480px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);max-height:calc(100vh - 140px);overflow-y:auto;position:sticky;top:80px}
    .reports-right.empty{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;padding:40px 16px;text-align:center;min-height:200px}
    @media (max-width:899px){
      .reports-shell{display:block}
      .reports-right{position:fixed;top:0;left:0;right:0;bottom:0;flex:none;z-index:500;max-height:100vh;border-radius:0;display:none}
      .reports-right.open{display:block}
      .reports-right.empty{display:none}
    }

    /* ── Drilldown row pattern (used by all tabs) ────────── */
    .rep-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .12s}
    .rep-row:hover{border-color:var(--accent);transform:translateX(2px)}
    .rep-row.active{border-color:var(--accent);background:var(--bg3)}
    .rep-row-icon{font-size:22px;flex-shrink:0}
    .rep-row-body{flex:1;min-width:0}
    .rep-row-title{font-size:14px;font-weight:600;color:var(--text)}
    .rep-row-desc{font-size:12px;color:var(--text3);margin-top:2px}
    .rep-row-chev{color:var(--text3);font-size:18px;flex-shrink:0}

    /* ── Right pane content ──────────────────────────────── */
    .rep-detail-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
    .rep-detail-back{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rep-detail-back:hover{background:var(--bg4)}
    .rep-detail-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
    .rep-detail-edit{font-size:12px;color:var(--accent);text-decoration:none;flex-shrink:0;padding:4px 10px;border:1px solid var(--accent);border-radius:6px}
    .rep-detail-edit:hover{background:rgba(20,184,166,.1)}
    .rep-detail-body{padding:16px}

    /* ── Family avatars row ──────────────────────────────── */
    .fam-avatars{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;padding:4px 0}
    .fam-avatar{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 6px;border-radius:var(--r);transition:background .12s;min-width:56px}
    .fam-avatar:hover{background:var(--bg3)}
    .fam-avatar.active .gh-avatar{outline:2px solid var(--accent);outline-offset:2px}
    .fam-avatar-name{font-size:12px;color:var(--text);font-weight:500;text-align:center;max-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── Overview tile grid ──────────────────────────────── */
    .ov-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
    .ov-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:pointer;transition:transform .12s,border-color .12s}
    .ov-tile:hover{border-color:var(--accent);transform:translateY(-1px)}
    .ov-tile-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
    .ov-tile-value{font-size:24px;font-weight:800;color:var(--text)}
    .ov-tile-sub{font-size:11px;color:var(--text3);margin-top:4px}

    /* ── Existing report-panel styles (kept for renderXxx() funcs) ── */
    .report-panel{background:none;border:none;padding:0}
    .report-panel-header{display:none}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .stat-item{background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center}
    .stat-value{font-size:20px;font-weight:800;color:var(--text)}
    .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);margin-top:3px}
  </style>
</head>
<body>
<script>window.GH_PAGE = { module:'reports', title:'Reports' };</script>
<link rel="stylesheet" href="/gh-print.css" media="print">
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-messages.js"></script>
<script src="/js/pending-report.js"></script>
<!-- Reports Redesign Foundation (v.197) — shared components -->
<script src="/js/gh-tile.js"></script>
<script src="/js/gh-drilldown.js"></script>
<script src="/js/gh-filter-strip.js"></script>
<script src="/js/gh-report-states.js"></script>

<div id="app">
  <div class="reports-container">

    <!-- Reports Redesign Foundation (v.197) ── #30a locked layout ─────────
         Replaces the old 7-tab loose-card layout with: header (icon + title
         + Lens search + count) + Pinned strip + 5-tab row + per-tab tile
         grid. Tile grids are NON-FUNCTIONAL in v.197 (every click → 'Coming
         soon' toast). v.198 wires the 5 Money reports live. Pending tab
         keeps the existing v.171 PendingReport.mount() behavior unchanged.
    ───────────────────────────────────────────────────────────────────── -->

    <!-- Page header — icon, title + count subtitle, Lens search, New report -->
    <div class="rep-header" style="display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:10px;min-width:140px">
        <div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center">
          <span style="font-size:18px">📊</span>
        </div>
        <div>
          <div style="font-size:16px;font-weight:500;color:var(--text);line-height:1.1">Reports</div>
          <div id="repHeaderCount" style="font-size:11px;color:var(--text3)">— reports · 0 pinned</div>
        </div>
      </div>
      <div style="flex:1;min-width:200px" id="repLensWrap">
        <!-- Lens search renders here via GH_LENS.init or a simple input fallback -->
        <input id="repLensInput" placeholder="🔍 narrow by report name or description…"
          style="width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:999px;
            padding:7px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none">
      </div>
    </div>

    <!-- Pinned strip — populated from /api/v1/preferences/pinned-reports -->
    <div id="repPinnedWrap" style="margin-bottom:18px;display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:13px">📌</span>
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:500">Pinned</span>
      </div>
      <div id="repPinnedGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px"></div>
    </div>

    <!-- Tab row — 5 tabs per locked spec, Money first (most-used) -->
    <div class="reports-tabs" id="reportsTabs">
      <button class="reports-tab active" data-tab="money"      onclick="switchTab('money',this)">Money <span id="repCount_money" class="rep-tab-count"></span></button>
      <button class="reports-tab"        data-tab="health"     onclick="switchTab('health',this)">Health <span id="repCount_health" class="rep-tab-count"></span></button>
      <button class="reports-tab"        data-tab="household"  onclick="switchTab('household',this)">Household <span id="repCount_household" class="rep-tab-count"></span></button>
      <button class="reports-tab"        data-tab="family"     onclick="switchTab('family',this)">Family <span id="repCount_family" class="rep-tab-count"></span></button>
      <button class="reports-tab"        data-tab="pending"    onclick="switchTab('pending',this)"
        title="Bank charges waiting to be linked to the right car, prescription, item, or subscription">Pending <span id="pendingTabCount" style="font-size:10px;color:var(--text3);font-weight:400;margin-left:4px"></span></button>
    </div>

    <!-- Tab content. Pending uses pendingRoot for the existing PendingReport.mount.
         All other tabs render their tile grid into repTabContent via JS.
         repViewerRoot renders the report viewer page when ?run=<slug> is in the URL. -->
    <div id="repTabContent">
      <div class="spinner"><div class="spin"></div>Loading…</div>
    </div>
    <div id="pendingRoot" style="display:none"></div>
    <div id="repViewerRoot" style="display:none">
      <!-- Viewer shell — populated by openReportViewer() per the locked #30c design -->
      <div class="rep-viewer-head" style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px" id="repViewerCrumb">
            <a href="/reports.html" style="color:var(--text3);text-decoration:none">📊 Reports</a>
            <span style="margin:0 6px">›</span>
            <a href="#" id="repViewerCrumbTab" style="color:var(--text3);text-decoration:none">Money</a>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px;flex-wrap:wrap">
            <h2 id="repViewerTitle" style="font-size:18px;font-weight:500;color:var(--text);margin:0">Loading…</h2>
            <span id="repViewerScope" style="font-size:11px;color:var(--text3);padding:2px 8px;background:var(--bg2);border-radius:999px;display:none"></span>
          </div>
          <div style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span id="repViewerDesc"></span>
            <span style="opacity:.6">·</span>
            <span id="repViewerRefreshed">🕒 —</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <button id="repViewerBackBtn" title="Back to Reports" onclick="closeReportViewer()"
            style="background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;color:var(--text2);
              cursor:pointer;padding:6px 12px;font-family:inherit;font-size:12px">← Back</button>
          <button id="repViewerRefreshBtn" title="Refresh"
            style="width:30px;height:30px;border:0.5px solid var(--border);border-radius:8px;
              background:var(--bg2);cursor:pointer;color:var(--text2);font-family:inherit">↻</button>
        </div>
      </div>
      <div id="repViewerFilters"></div>
      <div id="repViewerSummary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px"></div>
      <div id="repViewerBody"></div>
    </div>

    <!-- LEGACY HIDDEN SHELL — kept so the unreachable renderer functions
         below don't throw on getElementById('reportsLeft'/'reportsRight').
         Removed in v.198+ when those functions are deleted. -->
    <div class="reports-shell" style="display:none">
      <div class="reports-left" id="reportsLeft"></div>
      <div class="reports-right empty" id="reportsRight"><div></div></div>
    </div>

  </div>
</div>

<!-- Tile-grid styles for the new layout — small helpers, kept inline -->
<style>
  .rep-tab-count { font-size:10px;color:var(--text3);font-weight:400;margin-left:4px }
  .rep-tab-count.active { color:var(--accent) }
  .rep-group-label { font-size:10px;text-transform:lowercase;letter-spacing:.04em;color:var(--text3);font-weight:500;margin:18px 0 8px 2px }
  .rep-group-label:first-child { margin-top:6px }
  .rep-tile-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:6px }
  @media (max-width:899px) { .rep-tile-grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)) } }
  @media (max-width:640px) { .rep-tile-grid { grid-template-columns:1fr 1fr } }
</style>

<script>
// ── Report Registry — add new reports here only ───────────────
const REPORT_REGISTRY = [
  { id:'summary',       category:'overview',   name:'Dashboard Summary',        icon:'📊', desc:'Overview of all modules',             endpoint:'/dashboard',                render:renderSummary },
  { id:'emergency',     category:'family',     name:'Emergency Info Card',       icon:'🚨', desc:'Critical contacts and medical info',  endpoint:'/reports/emergency',        render:renderEmergency },
  { id:'family-snap',   category:'family',     name:'Family Member Report',      icon:'👤', desc:'All data for a specific person',      endpoint:null,                        render:renderFamilySnapshot },
  { id:'memories',      category:'family',     name:'Memory Timeline',           icon:'✦',  desc:'Life events and milestones by person', endpoint:'/daily-log/memories',       render:renderMemories },
  { id:'expiry',        category:'documents',  name:'Document Expiry Timeline',  icon:'📅', desc:'Upcoming document expirations',       endpoint:'/reports/expiry?months=24', render:renderExpiry },
  { id:'insurance',     category:'inventory',  name:'Home Insurance Report',     icon:'🏠', desc:'Inventory with values for claims',    endpoint:'/receipts/insurance-report', render:renderInsurance },
  { id:'hsa',           category:'finance',    name:'HSA Summary',               icon:'❤️', desc:'Contributions and expenses',          endpoint:'/hsa/summary',              render:renderHsa },
  { id:'hsa-fsa-irs',   category:'finance',    name:'HSA / FSA IRS Reimbursement', icon:'🧾', desc:'Audit-ready expenses + reimbursements', endpoint:null,                  render:renderHsaFsaIrs },
  { id:'spending',      category:'finance',    name:'Spending by Category',      icon:'💰', desc:'Where your money goes',               endpoint:'/finance/reports/spending-by-category', render:renderSpending },
  { id:'networth',      category:'finance',    name:'Net Worth',                 icon:'📈', desc:'Assets, liabilities, and trend',      endpoint:'/finance/net-worth/current', render:renderNetWorth },
  { id:'portfolio',     category:'finance',    name:'Investment Portfolio',      icon:'📊', desc:'Holdings and performance',            endpoint:'/finance/portfolio/performance', render:renderPortfolio },
  { id:'subscriptions', category:'finance',   name:'Subscription Spending',     icon:'📦', desc:'Monthly costs and annual projection', endpoint:'/subscriptions/summary',    render:renderSubscriptions },
  { id:'ins-summary',   category:'family',    name:'Insurance Summary',         icon:'🛡️', desc:'Active policies and annual premium',  endpoint:'/insurance/summary',        render:renderInsuranceSummary },
  { id:'watcher',       category:'system',    name:'Folder Watcher Audit',      icon:'📁', desc:'Auto-import history',                 endpoint:'/watcher/history',          render:renderWatcher },
  { id:'database',      category:'system',     name:'Database Health',           icon:'🗄️', desc:'Size, integrity, maintenance',        endpoint:'/system/db/stats',          render:renderDatabase },
  { id:'tests',         category:'system',     name:'System Tests',              icon:'🧪', desc:'Run automated diagnostics',           endpoint:null,                        render:renderTests },
  { id:'member-snapshot', category:'family',   name:'Member Snapshot',           icon:'👤', desc:'Everything about one family member',  endpoint:null,                        render:renderMemberSnapshot },
  { id:'maint-rollup',  category:'inventory',  name:'Maintenance Rollup',        icon:'🔧', desc:'All maintenance across home & items', endpoint:null,                        render:renderMaintRollup },
];

// ── Tab → reports mapping ─────────────────────────────────────
// Maps each top-level tab to which report IDs from REPORT_REGISTRY belong there.
// "editPath" gives the right pane an "Edit in Module →" link when the report is
// editable from another page; null means it's read-only / no module to edit in.
const TABS = {
  overview: {
    label: 'Overview',
    reports: ['summary'],
  },
  // v.171 — Pending Items Report. The transaction-linking subsystem.
  // Renders via app/public/js/pending-report.js (window.PendingReport).
  pending: {
    label: 'Pending',
    reports: [],
  },
  // v202604.167 — Charts preview (design lock #26 in _templates.html)
  charts: {
    label: 'Charts (preview)',
    reports: [],
  },
  family: {
    label: 'Family',
    reports: ['emergency', 'family-snap', 'memories', 'ins-summary'],
    showFamilyAvatars: true,
  },
  money: {
    label: 'Money',
    reports: ['networth', 'spending', 'hsa', 'hsa-fsa-irs', 'portfolio', 'subscriptions'],
  },
  maintenance: {
    label: 'Maintenance',
    reports: ['maint-rollup', 'expiry', 'insurance'],
  },
  system: {
    label: 'System',
    reports: ['tests', 'database', 'watcher'],
  },
};

const EDIT_PATHS = {
  summary: null,
  emergency: null,
  'family-snap': '/kids.html',
  memories: '/daily-log.html',
  expiry: '/documents.html',
  insurance: '/insurance.html',
  hsa: '/medical.html#hsa',
  spending: '/finance.html',
  networth: '/finance.html',
  portfolio: '/finance.html',
  subscriptions: '/subscriptions.html',
  'ins-summary': '/insurance.html',
  watcher: '/settings.html#watcher',
  database: '/settings.html#database',
  tests: null,
  'member-snapshot': '/kids.html',
  'maint-rollup': '/property.html',
};

let activeTab = 'money';   // v.197 default
let activeReportId = null;

// ── Reports Redesign Foundation (v.197) ───────────────────────
// Locked tile lists per REPORTS_REDESIGN_HANDOFF.md 2026-05-23 refinement block.
// Format: { groups: [ { label, tiles: [ { slug, title, meta, icon, color, live? } ] } ] }
// 'live' is OPTIONAL — defaults to false (Coming soon toast). v.198+ flips
// individual tiles to live as their viewer pages get wired.
const REPORT_TABS_V2 = {
  money: {
    label: 'Money',
    icon: '💰',
    color: 'var(--green,#22c55e)',
    groups: [
      { label: 'spending', tiles: [
        { slug:'spending-by-cat', title:'Spending by category',  meta:'per-category totals, current month + YTD' },
        { slug:'top-vendors',     title:'Top vendors',           meta:'treemap of vendor totals' },
        { slug:'spending-cal',    title:'Spending calendar',     meta:'heatmap of daily spend' },
        { slug:'category-trends', title:'Category trends',       meta:'small-multiples, top categories' },
      ]},
      { label: 'income & cash', tiles: [
        { slug:'income-flow',     title:'Income → categories',   meta:'Sankey, where every dollar went' },
        { slug:'cash-flow',       title:'Cash-flow forecast',    meta:'projected balance 30/60/90 days' },
        { slug:'net-worth',       title:'Net worth trend',       meta:'monthly snapshots' },
      ]},
      { label: 'tax & receipts', tiles: [
        { slug:'hsa-fsa-irs',     title:'HSA & FSA — IRS ready', meta:'tax-export, current year' },
        { slug:'subs-renewals',   title:'Subscriptions renewals',meta:'next 90 days' },
      ]},
      { label: 'trade terminal', tiles: [
        { slug:'portfolio-snap',  title:'Portfolio snapshot',    meta:'live holdings by account' },
        { slug:'portfolio-perf',  title:'Portfolio performance', meta:'12-month value, gain, return' },

// Count total tiles per tab (used for the header subtitle + tab pills)
function repTileCount(tabId) {
  const tab = REPORT_TABS_V2[tabId];
  if (!tab) return 0;
  return tab.groups.reduce((s, g) => s + g.tiles.length, 0);
}
function repAllTilesCount() {
  return Object.keys(REPORT_TABS_V2).reduce((s, k) => s + repTileCount(k), 0);
}

// Render the new tile grid for a tab into #repTabContent.
function renderTabGridV2(tabId) {
  const root = document.getElementById('repTabContent');
  if (!root) return;
  const tab = REPORT_TABS_V2[tabId];
  if (!tab) { root.innerHTML = ''; return; }
  root.innerHTML = '';   // wipe spinner / previous tab's grid
  for (const group of tab.groups) {
    const label = document.createElement('div');
    label.className = 'rep-group-label';
    label.textContent = group.label;
    root.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'rep-tile-grid';
    root.appendChild(grid);

    for (const t of group.tiles) {
      const matchesLens = repLensMatches(t);
      if (!matchesLens) continue;
      window.GH_TILE.render({
        container: grid,
        slug: t.slug,
        title: t.title,
        meta: t.meta,
        icon: tab.icon,
        eyebrow: tab.label.toUpperCase() + ' · ' + (group.label.split(' ')[0]).toUpperCase(),
        color: tab.color,
        onClick: (slug) => {
          // v.197 foundation: all tiles non-functional. v.198 will swap
          // selected slugs to navigate to their viewer page.
          if (t.live) {
            // Future: navigate to /reports.html?run=<slug>
            window.GH_REPORT_STATES.comingSoon(slug);
          } else {
            window.GH_REPORT_STATES.comingSoon(slug);
          }
        },
      });
    }
  }
  // Show empty state if Lens filtered everything out.
  if (root.children.length === 0) {
    window.GH_REPORT_STATES.empty(root, {
      title: 'No reports match your search',
      subtitle: 'Try a different word or clear the search box.',
      actions: [{ label: 'Clear search', onClick: () => { document.getElementById('repLensInput').value = ''; repLensQuery = ''; renderTabGridV2(tabId); refreshTabCounts(); } }],
    });
  }
}

// Lens search — matches against title + meta (per locked spec: titles +
// visible descriptions only; NOT inside report data).
let repLensQuery = '';
function repLensMatches(tile) {
  if (!repLensQuery) return true;
  const q = repLensQuery.toLowerCase();
  return ((tile.title || '').toLowerCase().includes(q))
      || ((tile.meta  || '').toLowerCase().includes(q));
}

// Update per-tab count pills + header subtitle based on current Lens query.
function refreshTabCounts() {
  for (const tabId of Object.keys(REPORT_TABS_V2)) {
    const el = document.getElementById('repCount_' + tabId);
    if (!el) continue;
    const total = repTileCount(tabId);
    if (!repLensQuery) { el.textContent = ''; continue; }
    let matches = 0;
    for (const g of REPORT_TABS_V2[tabId].groups) for (const t of g.tiles) if (repLensMatches(t)) matches++;
    el.textContent = '· ' + matches + ' of ' + total;
    el.classList.toggle('active', matches > 0 && matches < total);
  }
  // Header subtitle
  const headerCount = document.getElementById('repHeaderCount');
  if (headerCount) {
    const total = repAllTilesCount();
    const pinnedN = (repPinnedSlugs || []).length;
    headerCount.textContent = total + ' reports · ' + pinnedN + ' pinned';
  }
}

// ── Pinned strip ──────────────────────────────────────────────
let repPinnedSlugs = [];
function repFindTileBySlug(slug) {
  for (const tabId of Object.keys(REPORT_TABS_V2)) {
    for (const g of REPORT_TABS_V2[tabId].groups) for (const t of g.tiles) {
      if (t.slug === slug) return { tab: REPORT_TABS_V2[tabId], group: g, tile: t };
    }
  }
  return null;
}
async function loadPinned() {
  try {
    const r = await window.silentGet('/preferences/pinned-reports');
    repPinnedSlugs = Array.isArray(r && r.pinned_reports) ? r.pinned_reports : [];
  } catch { repPinnedSlugs = []; }
  renderPinned();
  refreshTabCounts();
}
function renderPinned() {
  const wrap = document.getElementById('repPinnedWrap');
  const grid = document.getElementById('repPinnedGrid');
  if (!wrap || !grid) return;
  grid.innerHTML = '';
  if (!repPinnedSlugs.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  for (const slug of repPinnedSlugs) {
    const found = repFindTileBySlug(slug);
    if (!found) continue;   // pinned slug no longer in the registry — skip silently
    window.GH_TILE.render({
      container: grid,
      slug,
      title: found.tile.title,
      meta: found.tile.meta,
      icon: found.tab.icon,
      eyebrow: found.tab.label.toUpperCase(),
      color: found.tab.color,
      onClick: (s) => window.GH_REPORT_STATES.comingSoon(s),
    });
  }
}

// Replaces the old switchTab. Pending tab keeps existing PendingReport.mount.
// All other tabs render the new tile grid + hide the old layout shells.
function switchTab(tabId, btn) {
  document.querySelectorAll('.reports-tab').forEach(b => b.classList.toggle('active', b === btn || b.dataset.tab === tabId));
  activeTab = tabId;
  history.replaceState(null, '', `?tab=${tabId}`);

  const content = document.getElementById('repTabContent');
  const pending = document.getElementById('pendingRoot');
  if (tabId === 'pending') {
    content.style.display = 'none';
    pending.style.display = '';
    pending.innerHTML = '<div class="spinner"><div class="spin"></div>Loading pending items…</div>';
    if (window.PendingReport && typeof window.PendingReport.mount === 'function') {
      window.PendingReport.mount('pendingRoot');
    } else {
      pending.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Pending Items module did not load (pending-report.js missing).</div>';
    }
    return;
  }
  pending.style.display = 'none';
  content.style.display = '';
  renderTabGridV2(tabId);
}

// ── Report viewer registry (v.198) ──────────────────────────
// Per-report viewer modules register themselves into REPORT_VIEWERS keyed
// by slug. Each module exposes:
//   defaultFilters()  → array of { key, label, value } applied on first load
//   fetch(filters)    → returns the data object the renderers consume
//   renderSummary(container, data, filters)  → fills the 4-card grid
//   renderBody(container, data, filters, onDrill)  → fills the data table
// onDrill(detailObj) opens GH_DRILLDOWN with whatever content the report wants.
// v.198 task 3-4 populate REPORT_VIEWERS with the 5 Money LIVE reports.
// Slugs not in this registry continue to fire comingSoon() per v.197 behavior.
window.REPORT_VIEWERS = window.REPORT_VIEWERS || {};

// ── Viewer page rendering ─────────────────────────────────────
let currentViewerSlug = null;
let currentViewerFilters = [];

function showViewerView() {
  document.getElementById('repTabContent').style.display = 'none';
  document.getElementById('pendingRoot').style.display = 'none';
  document.getElementById('repPinnedWrap').style.display = 'none';
  document.getElementById('reportsTabs').style.display = 'none';
  document.getElementById('repViewerRoot').style.display = '';
}
function showTabsView() {
  document.getElementById('repViewerRoot').style.display = 'none';
  document.getElementById('reportsTabs').style.display = '';
  document.getElementById('repTabContent').style.display = '';
  // Pinned strip visibility decided by renderPinned() based on count
  renderPinned();
}

// Locate the tab + group + tile object that owns a given slug (for breadcrumbs).
function findTileMeta(slug) {
  for (const tabId of Object.keys(REPORT_TABS_V2)) {
    for (const g of REPORT_TABS_V2[tabId].groups) for (const t of g.tiles) {
      if (t.slug === slug) return { tabId, tab: REPORT_TABS_V2[tabId], group: g, tile: t };
    }
  }
  return null;
}

async function openReportViewer(slug, opts) {
  const viewer = window.REPORT_VIEWERS[slug];
  if (!viewer) {
    // Not wired live yet → fall through to tile-grid toast behavior.
    window.GH_REPORT_STATES.comingSoon(slug);
    return;
  }
  const meta = findTileMeta(slug);
  if (!meta) { window.GH_REPORT_STATES.comingSoon(slug); return; }

  currentViewerSlug = slug;
  // Initialise filters from defaults unless caller overrides via opts.filters.
  currentViewerFilters = (opts && opts.filters) || (viewer.defaultFilters ? viewer.defaultFilters() : []);

  showViewerView();

  // Title + breadcrumb
  document.getElementById('repViewerTitle').textContent = meta.tile.title;
  const crumbTab = document.getElementById('repViewerCrumbTab');
  crumbTab.textContent = meta.tab.label;
  crumbTab.onclick = (e) => { e.preventDefault(); closeReportViewer(meta.tabId); };
  document.getElementById('repViewerDesc').textContent = meta.tile.meta || '';

  // Push history state so browser back button works naturally.
  if (!opts || !opts.fromPopstate) {
    history.pushState({ viewer: slug }, '', '?run=' + encodeURIComponent(slug));
  }

  // Refresh button
  document.getElementById('repViewerRefreshBtn').onclick = () => loadAndRenderViewer(slug);

  await loadAndRenderViewer(slug);
}

async function loadAndRenderViewer(slug) {
  const viewer = window.REPORT_VIEWERS[slug];
  if (!viewer) return;
  const summaryEl = document.getElementById('repViewerSummary');
  const bodyEl    = document.getElementById('repViewerBody');
  const filtersEl = document.getElementById('repViewerFilters');
  const refreshedEl = document.getElementById('repViewerRefreshed');

  // Filter strip — uses gh-filter-strip.
  window.GH_FILTERS.render({
    container: filtersEl,
    filters: currentViewerFilters,
    onRemove: (key) => {
      currentViewerFilters = currentViewerFilters.filter(f => f.key !== key);
      loadAndRenderViewer(slug);
    },
    onAdd: () => {
      // v.198: stub — real "add filter" flow ships in v.199+ (typeahead UI).
      window.GH_REPORT_STATES.comingSoon('add-filter');
    },
  });

  // Loading state
  summaryEl.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  bodyEl.innerHTML = '';
  refreshedEl.textContent = '🕒 loading…';

  try {
    const t0 = Date.now();
    const data = await viewer.fetch(currentViewerFilters);
    const ms  = Date.now() - t0;
    refreshedEl.textContent = '🕒 just now · ' + ms + 'ms';

    summaryEl.innerHTML = '';
    if (viewer.renderSummary) viewer.renderSummary(summaryEl, data, currentViewerFilters);

    bodyEl.innerHTML = '';
    if (viewer.renderBody) {
      viewer.renderBody(bodyEl, data, currentViewerFilters, (detail) => {
        // Drill-down — opens gh-drilldown with the detail HTML provided by the report.
        window.GH_DRILLDOWN.open({
          title: detail.title || 'Detail',
          html:  detail.html  || '',
          onClose: detail.onClose,
        });
      });
    }
  } catch (e) {
    window.GH_REPORT_STATES.error(bodyEl, {
      title: "Couldn't load this report",
      subtitle: (e && e.message) || 'Request failed.',
      retry: () => loadAndRenderViewer(slug),
    });
    refreshedEl.textContent = '🕒 error';
  }
}

function closeReportViewer(targetTabId) {
  currentViewerSlug = null;
  currentViewerFilters = [];
  // Restore tab grid view + URL.
  const tabId = targetTabId || 'money';
  history.pushState(null, '', '?tab=' + tabId);
  showTabsView();
  const btn = document.querySelector(`.reports-tab[data-tab="${tabId}"]`);
  switchTab(tabId, btn);
}
window.openReportViewer  = openReportViewer;
window.closeReportViewer = closeReportViewer;

// Browser back/forward — restore prior state.
window.addEventListener('popstate', (e) => {
  const params = new URLSearchParams(window.location.search);
  const runSlug = params.get('run');
  if (runSlug && window.REPORT_VIEWERS[runSlug]) {
    openReportViewer(runSlug, { fromPopstate: true });
  } else {
    const tab = params.get('tab') || 'money';
    showTabsView();
    const btn = document.querySelector(`.reports-tab[data-tab="${tab}"]`);
    switchTab(tab, btn);
  }
});

// ─── Shared viewer helpers ────────────────────────────────────
function repFmt$(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  return (n < 0 ? '-' : '') + '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function repFmt$k(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000)    return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + Math.round(n).toLocaleString();
}
function repSummaryCard(label, value, color) {
  return ''
    + '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px">'
    +   '<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">' + label + '</div>'
    +   '<div style="font-size:18px;font-weight:600;color:' + (color || 'var(--text)') + '">' + value + '</div>'
    + '</div>';
}
function repCurrentYear() { return new Date().getFullYear().toString(); }

// MONEY · Spending by category (v.198 — first LIVE viewer)
// ═══════════════════════════════════════════════════════════════
window.REPORT_VIEWERS['spending-by-cat'] = {
  defaultFilters() {
    return [{ key: 'year', label: 'Year', value: repCurrentYear() }];
  },
  async fetch(filters) {
    const year = (filters.find(f => f.key === 'year') || {}).value || repCurrentYear();
    const r = await fetch('/api/v1/finance/reports/spending-by-category?year=' + encodeURIComponent(year));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  },
  renderSummary(container, data) {
    const t = data.totals || {};
    const cats = data.categories || [];
    const net = (t.total_income || 0) - (t.total_spent || 0);
    const netColor = net >= 0 ? 'var(--green,#22c55e)' : 'var(--red,#dc2626)';
    container.innerHTML = ''
      + repSummaryCard('Total Spent',  repFmt$(t.total_spent),  'var(--red,#dc2626)')
      + repSummaryCard('Total Income', repFmt$(t.total_income), 'var(--green,#22c55e)')
      + repSummaryCard('Net',          repFmt$(net),            netColor)
      + repSummaryCard('Categories',   String(cats.length))
      + repSummaryCard('Transactions', String(t.tx_count || 0));
  },
  renderBody(container, data, filters, onDrill) {
    const cats = data.categories || [];
    if (cats.length === 0) {
      window.GH_REPORT_STATES.empty(container, {
        title: 'No spending in ' + (filters.find(f => f.key === 'year') || {}).value,
        subtitle: 'Try a different year or import recent transactions.',
      });
      return;
    }
    const totalSpent = cats.reduce((s, c) => s + (c.spent || 0), 0);
    const year = (filters.find(f => f.key === 'year') || {}).value || repCurrentYear();
    container.innerHTML = ''
      + '<table style="width:100%;border-collapse:collapse;font-size:13px">'
      +   '<thead><tr style="border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.04em">'
      +     '<th style="text-align:left;padding:8px 10px">Category</th>'
      +     '<th style="text-align:right;padding:8px 10px">Spent</th>'
      +     '<th style="text-align:right;padding:8px 10px">% of total</th>'
      +     '<th style="text-align:right;padding:8px 10px">Transactions</th>'
      +     '<th style="width:24px"></th>'
      +   '</tr></thead><tbody id="rep-spending-tbody"></tbody>'
      + '</table>';
    const tbody = container.querySelector('#rep-spending-tbody');
    for (const c of cats) {
      const pct = totalSpent > 0 ? (c.spent / totalSpent * 100) : 0;
      const tr = document.createElement('tr');
      tr.style.cssText = 'border-bottom:1px solid var(--border);cursor:pointer';
      tr.innerHTML = ''
        + '<td style="padding:8px 10px;color:var(--text)">' + escapeHtml(c.category) + '</td>'
        + '<td style="padding:8px 10px;text-align:right;color:var(--text);font-family:var(--mono,monospace)">' + repFmt$(c.spent) + '</td>'
        + '<td style="padding:8px 10px;text-align:right;color:var(--text3)">' + pct.toFixed(1) + '%</td>'
        + '<td style="padding:8px 10px;text-align:right;color:var(--text3)">' + (c.tx_count || 0) + '</td>'
        + '<td style="padding:8px 10px;text-align:right;color:var(--accent)">→</td>';
      tr.onclick = async () => {
        // Drill: fetch /txns-by-category and show in slideout
        try {
          const r = await fetch('/api/v1/finance/reports/txns-by-category?category=' + encodeURIComponent(c.category) + '&year=' + encodeURIComponent(year) + '&side=expense');
          const d = await r.json();
          const txns = d.txns || d.transactions || [];
          let html = '<div style="font-size:13px;color:var(--text2);margin-bottom:10px">' + (txns.length || 0) + ' transactions · ' + repFmt$(c.spent) + ' total</div>';
          html += '<div style="display:flex;flex-direction:column;gap:6px">';
          for (const t of txns.slice(0, 50)) {
            html += '<div style="border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px">'
              + '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">'
              +   '<span style="color:var(--text);font-weight:500">' + escapeHtml(t.description || t.merchant_name || '—') + '</span>'
              +   '<span style="color:var(--red,#dc2626);font-family:var(--mono,monospace)">' + repFmt$(Math.abs(t.amount || 0)) + '</span>'
              + '</div>'
              + '<div style="color:var(--text3);font-size:11px;margin-top:2px">' + escapeHtml(t.date || '') + '</div>'
              + '</div>';
          }
          if (txns.length > 50) html += '<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">' + (txns.length - 50) + ' more — open in Finance for full list</div>';
          html += '</div>';
          onDrill({ title: c.category, html });
        } catch (e) {
          onDrill({ title: c.category, html: '<div style="color:var(--red,#dc2626)">Could not load transactions: ' + escapeHtml(e.message) + '</div>' });
        }
      };
      tbody.appendChild(tr);
    }
  },
};

// Small HTML-escape used by the viewers above.
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Boot — load pinned, render default tab OR open viewer if ?run=  ────
(async function bootReportsV2() {
  await loadPinned();
  // Honor ?run=<slug> if the slug is a registered live viewer; else fall
  // through to ?tab= (tile grid). ?tab= unrecognised → money default.
  const params = new URLSearchParams(window.location.search);
  const runSlug = params.get('run');
  if (runSlug && window.REPORT_VIEWERS[runSlug]) {
    // Need to mark a tab active for the breadcrumb / back-target — find which tab
    // owns the slug and mark it without rendering the grid.
    const meta = findTileMeta(runSlug);
    if (meta) {
      document.querySelectorAll('.reports-tab').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === meta.tabId));
      activeTab = meta.tabId;
    }
    await openReportViewer(runSlug, { fromPopstate: true });
    refreshTabCounts();
    return;
  }
  const wanted = params.get('tab');
  const initial = REPORT_TABS_V2[wanted] ? wanted : (wanted === 'pending' ? 'pending' : 'money');
  const btn = document.querySelector(`.reports-tab[data-tab="${initial}"]`);
  switchTab(initial, btn);
  refreshTabCounts();
})();

// ── Render left pane for a given tab ──────────────────────────
function renderTabContent(tabId) {
  activeTab = tabId;
  activeReportId = null;
  closeRightPane();
  const tab = TABS[tabId];
  if (!tab) return;
  const left = document.getElementById('reportsLeft');
  let html = '';

  // Overview tab: show summary tiles inline (not as drilldown rows)
  if (tabId === 'overview') {
    html = '<div id="overviewTiles"><div class="spinner"><div class="spin"></div>Loading summary…</div></div>';
    left.innerHTML = html;
    loadOverviewTiles();
    return;
  }

  // v202604.167 — Charts preview tab: Settings-style grouped sections + chart mockups
  if (tabId === 'charts') {
    left.innerHTML = renderChartsPreview();
    setTimeout(() => renderMockCharts(), 50);
    return;
  }

  // v.171 — Pending Items Report tab. The transaction-linking subsystem.
  if (tabId === 'pending') {
    left.innerHTML = '<div id="pendingRoot"><div class="spinner"><div class="spin"></div>Loading pending items…</div></div>';
    if (window.PendingReport && typeof window.PendingReport.mount === 'function') {

// ── #26.1.1 Where money goes each month (Sankey) — LIVE (v.185) ─
// Wires the locked #26.1.1 chart to /finance/reports/income-by-
// category-flow. Two-column ribbon layout: income categories stacked
// left (amount > 0 rows), expense categories stacked right (amount <
// 0 rows), ribbons drawn between every (i, j) pair with width =
// (income[i].amount / total_income) × (expense[j].amount /
// total_expense) × full_height. Both sides fill the full chart
// height — the visual is proportional, not a true paired join,
// because finance_transactions rows aren't linked income→expense.
// Click an income or expense node → drill into that side+category
// for the year. Click a ribbon → drill into the destination expense
// category (the "where the money went" side).
async function renderSankey() {
  const el = document.getElementById('canvas-c111');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px">Loading flow…</div>';
  try {
    const year = new Date().getFullYear();
    const d = await window.api('GET', `/finance/reports/income-by-category-flow?year=${year}`);
    const income  = (d && Array.isArray(d.income))  ? d.income  : [];
    const expense = (d && Array.isArray(d.expense)) ? d.expense : [];
    if (!income.length || !expense.length) {
      const msg = !income.length && !expense.length
        ? 'No transactions recorded this year yet.'
        : !income.length
          ? 'No income recorded this year yet.'
          : 'No spending recorded this year yet.';
      el.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">${msg}</div>`;
      return;
    }
    el.innerHTML = sankeySvg(year, income, expense, d.total_income || 0, d.total_expense || 0);
  } catch (e) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">Could not load the flow right now.</div>';
  }
}

// Build the Sankey SVG. Top-N per side (default 6) with "(K more)"
// tail. Pixel layout: 14px wide bar on each side, the rest is ribbons.
// Ribbon rendering: cubic bezier 4-corner ribbon (top edge bows from
// income slice's top → expense slice's top, bottom edge bows back),
// fill = expense-side color at low opacity, matches the locked mock-
// up's style.
function sankeySvg(year, income, expense, totalIncome, totalExpense) {
  const W = 400, H = 180;
  const pad = { l: 4, r: 4, t: 4, b: 18 };
  const innerH = H - pad.t - pad.b;

  const N_PER_SIDE = 6;
  const palette = ['#5c72fa', '#7c3aed', '#ec4899', '#b91c1c', '#d97706', '#15803d', '#0891b2', '#475569'];
  function hashHue(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h) % palette.length;
  }

  function topN(arr, total) {
    if (arr.length <= N_PER_SIDE) return arr.slice();
    const head = arr.slice(0, N_PER_SIDE - 1);
    const tail = arr.slice(N_PER_SIDE - 1);
    const otherAmt = tail.reduce((s, r) => s + (r.amount || 0), 0);
    head.push({ category: `(${tail.length} more)`, amount: otherAmt, isOther: true });
    return head;
  }

  const incomeN  = topN(income,  totalIncome);
  const expenseN = topN(expense, totalExpense);
  const sumI = incomeN .reduce((s, r) => s + (r.amount || 0), 0) || 1;
  const sumE = expenseN.reduce((s, r) => s + (r.amount || 0), 0) || 1;

  // Compute stacked y-positions for each side.
  function stack(arr, total) {
    let y = pad.t;
    return arr.map(r => {
      const h = innerH * ((r.amount || 0) / total);
      const out = { ...r, y, h };
      y += h;
      return out;
    });
  }
  const iNodes = stack(incomeN,  sumI);
  const eNodes = stack(expenseN, sumE);

  // Bar geometry
  const barW = 12;
  const xI = pad.l + 90;          // income bar x — leave room for labels on left
  const xE = W - pad.r - 90 - barW; // expense bar x — leave room for labels on right

  // Ribbons: for every (i, j) pair, draw a bezier from a sub-slice of
  // i's right edge to a sub-slice of j's left edge. Track per-node
  // y-offsets as we stack ribbons against each node.
  const iCursor = iNodes.map(n => n.y);
  const eCursor = eNodes.map(n => n.y);
  const ribbons = [];
  for (let i = 0; i < iNodes.length; i++) {
    for (let j = 0; j < eNodes.length; j++) {
      const inode = iNodes[i], enode = eNodes[j];
      const flowH = innerH * ((inode.amount || 0) / sumI) * ((enode.amount || 0) / sumE);
      if (flowH < 0.3) continue; // skip near-zero slivers
      const iy0 = iCursor[i], iy1 = iy0 + flowH;
      const ey0 = eCursor[j], ey1 = ey0 + flowH;
      iCursor[i] += flowH;
      eCursor[j] += flowH;
      const color = enode.isOther ? '#94a3b8' : palette[hashHue(enode.category || '')];
      const mx = (xI + barW + xE) / 2;
      // 4-corner cubic bezier ribbon
      const d = `M ${xI + barW} ${iy0.toFixed(1)} `
              + `C ${mx} ${iy0.toFixed(1)}, ${mx} ${ey0.toFixed(1)}, ${xE} ${ey0.toFixed(1)} `
              + `L ${xE} ${ey1.toFixed(1)} `
              + `C ${mx} ${ey1.toFixed(1)}, ${mx} ${iy1.toFixed(1)}, ${xI + barW} ${iy1.toFixed(1)} Z`;
      const safeSrc = esc(inode.category || '');
      const safeDst = esc(enode.category || '');
      const tooltip = `${safeSrc} → ${safeDst} · share $${((inode.amount || 0) * ((enode.amount || 0) / sumE)).toLocaleString(undefined,{maximumFractionDigits:0})}`;
      const click = enode.isOther
        ? ''
        : ` onclick="openDrillDown('income-flow', 'expense::${safeDst.replace(/'/g, '&#39;')}')"`;
      const cursor = enode.isOther ? 'default' : 'pointer';
      ribbons.push(`<path d="${d}" fill="${color}" opacity="0.22"${click} style="cursor:${cursor}"><title>${tooltip}</title></path>`);
    }
  }

  // Side bars + labels (rendered AFTER ribbons so they sit on top)
  const incomeBars = iNodes.map(n => {
    const color = n.isOther ? '#94a3b8' : palette[hashHue(n.category || '')];
    const safe = esc(n.category || '');
    const click = n.isOther
      ? ''
      : ` onclick="openDrillDown('income-flow','income::${safe.replace(/'/g, '&#39;')}')"`;
    const cursor = n.isOther ? 'default' : 'pointer';
    const showLabel = n.h > 10;
    const labelY = n.y + Math.min(n.h - 2, 11);
    const labelText = showLabel
      ? `<text x="${(xI - 4).toFixed(1)}" y="${labelY.toFixed(1)}" font-size="9" font-family="monospace" fill="#666" text-anchor="end" pointer-events="none">${safe.length > 14 ? safe.slice(0, 13) + '…' : safe}</text>`
      : '';
    return `<g${click} style="cursor:${cursor}">
      <rect x="${xI.toFixed(1)}" y="${n.y.toFixed(1)}" width="${barW}" height="${n.h.toFixed(1)}" rx="2" fill="${color}" opacity="${n.isOther ? 0.55 : 0.95}"/>
      <title>${safe} · $${(n.amount || 0).toLocaleString()}</title>
      ${labelText}
    </g>`;
  }).join('');

  const expenseBars = eNodes.map(n => {
    const color = n.isOther ? '#94a3b8' : palette[hashHue(n.category || '')];
    const safe = esc(n.category || '');
    const click = n.isOther
      ? ''
      : ` onclick="openDrillDown('income-flow','expense::${safe.replace(/'/g, '&#39;')}')"`;
    const cursor = n.isOther ? 'default' : 'pointer';
    const showLabel = n.h > 10;
    const labelY = n.y + Math.min(n.h - 2, 11);
    const labelText = showLabel
      ? `<text x="${(xE + barW + 4).toFixed(1)}" y="${labelY.toFixed(1)}" font-size="9" font-family="monospace" fill="#666" pointer-events="none">${safe.length > 14 ? safe.slice(0, 13) + '…' : safe}</text>`
      : '';
    return `<g${click} style="cursor:${cursor}">
      <rect x="${xE.toFixed(1)}" y="${n.y.toFixed(1)}" width="${barW}" height="${n.h.toFixed(1)}" rx="2" fill="${color}" opacity="${n.isOther ? 0.55 : 0.95}"/>
      <title>${safe} · $${(n.amount || 0).toLocaleString()}</title>
      ${labelText}
    </g>`;
  }).join('');

  // Summary line
  const summary = `<text x="${pad.l}" y="${H - 4}" font-size="10" font-family="monospace" fill="#666">${year} · income $${totalIncome.toLocaleString()} · spend $${totalExpense.toLocaleString()}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto">
    ${ribbons.join('')}
    ${incomeBars}
    ${expenseBars}
    ${summary}
  </svg>`;
}

function mockBpLineSvg() {
  // Sample data: 12 BP readings, systolic + diastolic
  const sys = [134, 138, 132, 128, 130, 136, 142, 138, 134, 128, 130, 126];
  const dia = [86,  88,  84,  82,  84,  86,  90,  88,  86,  82,  84,  80];
  const pad = { l: 32, r: 12, t: 14, b: 22 };
  const W = 400, H = 180;
  const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
  const minY = 60, maxY = 160;
  const x = i => pad.l + (i / (sys.length - 1)) * innerW;
  const y = v => pad.t + ((maxY - v) / (maxY - minY)) * innerH;
  const path = arr => arr.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');

  // Healthy zone: systolic <120, diastolic <80 — show as green band
  const greenTop = y(120), greenBot = y(80);

  return `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- healthy zone shading -->
      <rect x="${pad.l}" y="${greenTop}" width="${innerW}" height="${greenBot - greenTop}" fill="#15803d" opacity="0.07"/>
      <text x="${W - pad.r - 4}" y="${greenTop + 12}" font-size="9" font-family="monospace" fill="#15803d" text-anchor="end">healthy zone</text>

      <!-- y-axis labels -->
      <text x="${pad.l - 4}" y="${y(140) + 3}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">140</text>
      <text x="${pad.l - 4}" y="${y(120) + 3}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">120</text>
      <text x="${pad.l - 4}" y="${y(100) + 3}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">100</text>
      <text x="${pad.l - 4}" y="${y( 80) + 3}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">80</text>

      <!-- x-axis -->
      <line x1="${pad.l}" y1="${H - pad.b}" x2="${W - pad.r}" y2="${H - pad.b}" stroke="#ddd" stroke-width="1"/>

      <!-- systolic line -->
      <path d="${path(sys)}" fill="none" stroke="#b91c1c" stroke-width="2"/>
      ${sys.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="#b91c1c"/>`).join('')}

      <!-- diastolic line -->
      <path d="${path(dia)}" fill="none" stroke="#5c72fa" stroke-width="2"/>
      ${dia.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.5" fill="#5c72fa"/>`).join('')}

      <!-- x-axis labels -->
      <text x="${pad.l}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999">Jan</text>
      <text x="${W / 2}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999" text-anchor="middle">Jun</text>
      <text x="${W - pad.r}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">Dec</text>

      <!-- legend -->
      <g transform="translate(${pad.l}, 4)">
        <circle cx="4" cy="4" r="3" fill="#b91c1c"/>
        <text x="12" y="7" font-size="9" font-family="monospace" fill="#666">Systolic</text>
        <circle cx="64" cy="4" r="3" fill="#5c72fa"/>
        <text x="72" y="7" font-size="9" font-family="monospace" fill="#666">Diastolic</text>
      </g>
    </svg>`;
}

// Builds the running-balance line. Mirrors mockBpLineSvg's layout
// (same 400×180 viewBox, padding, axis/label style) so it sits
// identically in the locked card. 0 is always in range so a dip
// below zero reads correctly; the projected low point is marked.
function forecastLineSvg(daily, summary) {
  const vals = daily.map(p => Number(p.running_balance) || 0);
  const pad = { l: 48, r: 12, t: 14, b: 22 };
  const W = 400, H = 180;
  const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
  let minY = Math.min(0, ...vals);
  let maxY = Math.max(0, ...vals);
  if (minY === maxY) maxY = minY + 1;            // flat line guard
  const range = maxY - minY;
  minY -= range * 0.08; maxY += range * 0.08;     // breathing room
  const n = vals.length;
  const x = i => pad.l + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const y = v => pad.t + ((maxY - v) / (maxY - minY)) * innerH;
  const linePath = vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  const baseY = y(minY).toFixed(1);
  const areaPath = `${linePath} L ${x(n - 1).toFixed(1)} ${baseY} L ${x(0).toFixed(1)} ${baseY} Z`;

  const zeroVisible = minY < 0 && maxY > 0;
  const zeroY = y(0).toFixed(1);
  const endBal = vals[vals.length - 1];
  const lineColor = endBal < 0 ? '#b91c1c' : '#15803d';

  const lowVal  = (summary && typeof summary.projected_lowest === 'number') ? summary.projected_lowest : Math.min(...vals);
  const lowDate = summary && summary.projected_lowest_date;
  let lowIdx = lowDate ? daily.findIndex(p => p.date === lowDate) : -1;
  if (lowIdx < 0) lowIdx = vals.indexOf(Math.min(...vals));
  const lowColor = lowVal < 0 ? '#b91c1c' : '#b45309';

  const money = v => (typeof window.fmtMoney === 'function' ? fmtMoney(v) : ('$' + Math.round(v)));
  const md = s => { const p = String(s).split('-'); return p.length === 3 ? `${+p[1]}/${+p[2]}` : s; };
  const midIdx = Math.floor((n - 1) / 2);

  return `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <!-- projected-balance area + line -->
      <path d="${areaPath}" fill="${lineColor}" opacity="0.08"/>
      ${zeroVisible ? `<line x1="${pad.l}" y1="${zeroY}" x2="${W - pad.r}" y2="${zeroY}" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
      <text x="${W - pad.r - 2}" y="${(+zeroY) - 3}" font-size="9" font-family="monospace" fill="#b91c1c" text-anchor="end">$0</text>` : ''}
      <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="2"/>

      <!-- y-axis: start, low, end balances -->
      <text x="${pad.l - 4}" y="${y(maxY) + 9}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">${money(maxY)}</text>
      <text x="${pad.l - 4}" y="${y(minY) - 2}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">${money(minY)}</text>

      <!-- x-axis -->
      <line x1="${pad.l}" y1="${H - pad.b}" x2="${W - pad.r}" y2="${H - pad.b}" stroke="#ddd" stroke-width="1"/>
      <text x="${pad.l}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999">${md(daily[0].date)}</text>
      <text x="${W / 2}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999" text-anchor="middle">${md(daily[midIdx].date)}</text>
      <text x="${W - pad.r}" y="${H - 6}" font-size="9" font-family="monospace" fill="#999" text-anchor="end">${md(daily[n - 1].date)}</text>

      <!-- projected low point -->
      <circle cx="${x(lowIdx).toFixed(1)}" cy="${y(vals[lowIdx]).toFixed(1)}" r="3" fill="${lowColor}"/>
      <text x="${x(lowIdx).toFixed(1)}" y="${y(vals[lowIdx]) - 7}" font-size="9" font-family="monospace" fill="${lowColor}" text-anchor="middle">low ${money(lowVal)}</text>

      <!-- legend -->
      <g transform="translate(${pad.l}, 4)">
        <circle cx="4" cy="4" r="3" fill="${lineColor}"/>
        <text x="12" y="7" font-size="9" font-family="monospace" fill="#666">Projected balance · ends ${money(endBal)}</text>
      </g>
    </svg>`;
}

// ── #26.1.2 Busiest spending days (calendar heatmap) — LIVE (v.183)
// Wires the locked #26.1.2 chart to /finance/reports/daily-spend.
// Renders a GitHub-style year heatmap (53 weeks × 7 days, ~365 cells)
// colored by daily spend intensity. Clicking a cell opens the
// drill-down in #reportsRight with that day's transactions.
async function renderCalendarHeatmap() {
  const el = document.getElementById('canvas-c112');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px">Loading heatmap…</div>';
  try {
    const year = new Date().getFullYear();
    const d = await window.api('GET', `/finance/reports/daily-spend?year=${year}`);
    const days = (d && Array.isArray(d.days)) ? d.days : [];
    el.innerHTML = calendarHeatmapSvg(year, days, d.max_spent || 0, d.total_spent || 0);
  } catch (e) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">Could not load the heatmap right now.</div>';
  }
}

// Builds the SVG heatmap. Layout matches the locked card's 400×180
// canvas. Color ramp: 5 buckets from var(--bg3) (zero spend) to a
// muted red (max spend). Each cell carries an SVG <title> for native
// tooltip and an onclick that opens the drill-down.
function calendarHeatmapSvg(year, days, maxSpent, totalSpent) {
  const W = 400, H = 180;
  const pad = { l: 28, r: 4, t: 22, b: 28 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;

  // Cell sizing: 53 weeks across, 7 days down. Stride from inner width.
  const stride = innerW / 53;
  const cell   = Math.max(3, stride - 1);

  // Build a date → spent map for fast lookup
  const byDate = {};
  for (const d of days) byDate[d.date] = d;

  // Compute Jan 1 day-of-week (Sun=0). Sunday-first columns match the
  // common GitHub layout.
  const jan1 = new Date(year, 0, 1);
  const jan1Dow = jan1.getDay();
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
  const daysInYear = isLeap ? 366 : 365;

  // 5-step color ramp. Buckets: 0, low, med-low, med-high, high. Empty
  // days stay var(--bg3) (the same neutral the page uses for inactive
  // surfaces). Red ramp because spending = expense.
  const colors = ['var(--bg3)', '#fde2e2', '#f9b4b4', '#e87171', '#b91c1c'];
  const bucketFor = (v) => {
    if (!v || !maxSpent) return 0;
    const r = v / maxSpent;
    if (r < 0.05) return 1;
    if (r < 0.20) return 2;
    if (r < 0.50) return 3;
    return 4;
  };

  // Render one cell per day-in-year
  const cells = [];
  for (let i = 0; i < daysInYear; i++) {
    const dt = new Date(year, 0, 1 + i);
    const month = dt.getMonth();
    const day   = dt.getDate();
    const col   = Math.floor((i + jan1Dow) / 7);
    const row   = (i + jan1Dow) % 7;
    const x = pad.l + col * stride;
    const y = pad.t + row * stride;
    const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const data = byDate[iso];
    const spent = data?.spent || 0;
    const fill = colors[bucketFor(spent)];
    const title = spent
      ? `${iso} · $${spent.toLocaleString()} (${data.tx_count} charge${data.tx_count === 1 ? '' : 's'})`
      : `${iso} · no spending`;
    cells.push(
      `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${cell.toFixed(1)}" height="${cell.toFixed(1)}"`
      + ` rx="1" fill="${fill}" style="cursor:pointer"`
      + ` onclick="openDrillDown('calendar','${iso}')">`
      + `<title>${title}</title></rect>`
    );
  }

  // Month labels along the top — show abbreviation above the first
  // column that contains a day of that month.
  const monthLabels = [];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for (let m = 0; m < 12; m++) {
    const firstOfMonth = new Date(year, m, 1);
    const dayOfYear = Math.floor((firstOfMonth - jan1) / 86400000);
    const col = Math.floor((dayOfYear + jan1Dow) / 7);
    const x = pad.l + col * stride;
    monthLabels.push(`<text x="${x.toFixed(1)}" y="${pad.t - 6}" font-size="9" font-family="monospace" fill="#999">${monthNames[m]}</text>`);
  }

  // Day-of-week labels (S M T W T F S) along the left, on alternate rows
  const dowNames = ['S','M','T','W','T','F','S'];
  const dowLabels = [0, 2, 4, 6].map(r =>
    `<text x="${pad.l - 6}" y="${(pad.t + r * stride + cell - 1).toFixed(1)}" font-size="8" font-family="monospace" fill="#999" text-anchor="end">${dowNames[r]}</text>`
  );

  // Summary line + legend below
  const summary = `<text x="${pad.l}" y="${H - 14}" font-size="10" font-family="monospace" fill="#666">${days.length} day${days.length === 1 ? '' : 's'} with spending · total $${totalSpent.toLocaleString()}</text>`;
  const legend = `<g transform="translate(${W - pad.r - 80}, ${H - 18})">
    <text x="0" y="9" font-size="8" font-family="monospace" fill="#999">less</text>
    ${colors.slice(1).map((c, i) => `<rect x="${24 + i * 9}" y="2" width="7" height="7" rx="1" fill="${c}"/>`).join('')}
    <text x="68" y="9" font-size="8" font-family="monospace" fill="#999">more</text>
  </g>`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto">
    ${monthLabels.join('')}
    ${dowLabels.join('')}
    ${cells.join('')}
    ${summary}
    ${legend}
  </svg>`;
}

// ── #26.1.3 Where you shop most (vendor treemap) — LIVE (v.183) ─
// Wires the locked #26.1.3 chart to /finance/reports/top-vendors.
// Simplified squarify: top vendors laid out in 3 rows of decreasing
// height (50%/30%/20%), widths within each row proportional to spend.
// "(N more)" lumps the long tail at the end. Click any tile → drill-
// down into that vendor's transactions for the year.
async function renderVendorTreemap() {
  const el = document.getElementById('canvas-c113');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px">Loading vendors…</div>';
  try {
    const year = new Date().getFullYear();
    const d = await window.api('GET', `/finance/reports/top-vendors?year=${year}&limit=50`);
    const vendors = (d && Array.isArray(d.vendors)) ? d.vendors : [];
    if (!vendors.length) {
      el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">No spending recorded this year yet.</div>';
      return;
    }
    el.innerHTML = vendorTreemapSvg(vendors, d.total_spent || 0);
  } catch (e) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">Could not load the vendor breakdown right now.</div>';
  }
}

// Build the treemap SVG. Three-row layout with decreasing height
// (heuristic: top vendors deserve more area). Within a row, each
// box's width is its share of that row's total spend. Labels render
// inside each box when it's wide enough to fit; otherwise just the
// SVG <title> tooltip is shown.
function vendorTreemapSvg(vendors, totalSpent) {
  const W = 400, H = 180;
  const pad = { l: 4, r: 4, t: 4, b: 20 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;

  // Take the top N; lump the rest as "(K more)". 12 fits cleanly in
  // 3 rows of 3/4/5.
  const N_VISIBLE = 12;
  const visible = vendors.slice(0, N_VISIBLE).slice();
  if (vendors.length > N_VISIBLE) {
    const tail = vendors.slice(N_VISIBLE);
    const otherSpent = tail.reduce((s, v) => s + (v.spent || 0), 0);
    visible.push({
      vendor:   `(${tail.length} more)`,
      spent:    otherSpent,
      tx_count: tail.reduce((s, v) => s + (v.tx_count || 0), 0),
      isOther:  true,
    });
  }

  // Row distribution and per-row height shares
  const rowSizes        = [3, 4, 5];
  const rowHeightShares = [0.50, 0.30, 0.20];
  const palette = ['#5c72fa', '#7c3aed', '#ec4899', '#b91c1c', '#d97706', '#15803d', '#0891b2', '#475569'];

  // Stable hash → palette index. Same vendor name → same color across
  // page renders.
  function hashHue(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h) % palette.length;
  }

  const boxes = [];
  let yOffset = pad.t;
  let i = 0;
  for (let r = 0; r < rowSizes.length && i < visible.length; r++) {
    const row = visible.slice(i, Math.min(i + rowSizes[r], visible.length));
    i += row.length;
    const rowH     = innerH * rowHeightShares[r];
    const rowTotal = row.reduce((s, v) => s + (v.spent || 0), 0) || 1;
    let xOffset = pad.l;
    for (const v of row) {
      const w = innerW * ((v.spent || 0) / rowTotal);
      const color = v.isOther ? '#94a3b8' : palette[hashHue(v.vendor || '')];
      const safeName = esc(v.vendor || '(no description)');
      const tooltip  = `${safeName} · $${(v.spent || 0).toLocaleString()} (${v.tx_count} charge${v.tx_count === 1 ? '' : 's'})`;
      const click = v.isOther
        ? ''
        : ` onclick="openDrillDown('vendor', '${safeName.replace(/'/g, '&#39;')}')"`;
      const cursor   = v.isOther ? 'default' : 'pointer';
      const showLabel = w > 50 && rowH > 18;
      const labelText = showLabel
        ? `<text x="${(xOffset + 4).toFixed(1)}" y="${(yOffset + 14).toFixed(1)}" font-size="10" font-family="monospace" fill="#fff" font-weight="600" pointer-events="none">${safeName.length > 22 ? safeName.slice(0, 21) + '…' : safeName}</text>
           <text x="${(xOffset + 4).toFixed(1)}" y="${(yOffset + 26).toFixed(1)}" font-size="9" font-family="monospace" fill="#fff" opacity="0.85" pointer-events="none">$${(v.spent || 0).toLocaleString()}</text>`
        : '';
      boxes.push(`<g${click} style="cursor:${cursor}">
        <rect x="${xOffset.toFixed(1)}" y="${yOffset.toFixed(1)}" width="${w.toFixed(1)}" height="${rowH.toFixed(1)}" fill="${color}" stroke="#fff" stroke-width="1" rx="2" opacity="${v.isOther ? 0.55 : 0.88}"/>
        <title>${tooltip}</title>
        ${labelText}
      </g>`);
      xOffset += w;
    }
    yOffset += rowH;
  }

  const summary = `<text x="${pad.l}" y="${H - 6}" font-size="10" font-family="monospace" fill="#666">${vendors.length} vendor${vendors.length === 1 ? '' : 's'} · top ${Math.min(vendors.length, N_VISIBLE)} shown · total $${totalSpent.toLocaleString()}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto">
    ${boxes.join('')}
    ${summary}
  </svg>`;
}

// ── #26.1.4 What you spend on, month by month (small-multiples) — LIVE (v.185) ─
// Wires the locked #26.1.4 chart to /finance/reports/spending-by-
// category-monthly. Grid of N mini bar charts, one per top expense
// category, 12 bars each (Jan..Dec). Bar charts (not lines) because
// (a) monthly spend is non-cumulative bucketed data — a line implies
// continuity between months — and (b) sparse spend (some months
// zero) reads better as gaps in a bar chart than as zigzag line.
// Each bar carries an SVG <title> tooltip and an onclick that opens
// the drill-down for that (category, month).
async function renderSmallMultiples() {
  const el = document.getElementById('canvas-c114');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px">Loading…</div>';
  try {
    const year  = new Date().getFullYear();
    const limit = 6;
    const d = await window.api('GET', `/finance/reports/spending-by-category-monthly?year=${year}&limit=${limit}`);
    const cats = (d && Array.isArray(d.categories)) ? d.categories : [];
    if (!cats.length) {
      el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">No spending recorded this year yet.</div>';
      return;
    }
    el.innerHTML = smallMultiplesSvg(year, cats, d.total_spent_year || 0);
  } catch (e) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:24px;line-height:1.5">Could not load the category breakdown right now.</div>';
  }
}

// Build the small-multiples SVG. Layout: 3 columns × 2 rows of mini
// panels (for limit=6). Each panel: category name + max-month label
// at top, 12 mini bars below, month tick (J/F/M/...) at the bottom.
// Shared per-panel Y scale (each panel scales to its own max — small-
// multiples convention is "show shape, not magnitude" since
// categories differ wildly in absolute spend).
function smallMultiplesSvg(year, categories, totalYear) {
  const W = 400, H = 180;
  const cols = 3;
  const rows = Math.ceil(categories.length / cols);
  const outerPad = { l: 4, r: 4, t: 4, b: 16 };
  const innerW = W - outerPad.l - outerPad.r;
  const innerH = H - outerPad.t - outerPad.b;
  const cellW = innerW / cols;
  const cellH = innerH / rows;

  const palette = ['#5c72fa', '#7c3aed', '#ec4899', '#b91c1c', '#d97706', '#15803d', '#0891b2', '#475569'];
  function hashHue(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h) % palette.length;
  }

  const monthLetters = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const panels = categories.map((c, idx) => {
    const r = Math.floor(idx / cols);
    const col = idx % cols;
    const cx = outerPad.l + col * cellW;
    const cy = outerPad.t + r * cellH;

    // Panel internal padding (room for title at top, month labels at bottom)
    const ip = { t: 14, b: 12, l: 2, r: 2 };
    const barAreaY = cy + ip.t;
    const barAreaH = cellH - ip.t - ip.b;
    const barAreaW = cellW - ip.l - ip.r;
    const barW = barAreaW / 12;

    const max = Math.max(...c.months, 1);
    const total = c.months.reduce((s, v) => s + v, 0);
    const color = palette[hashHue(c.category || '')];
    const safe = esc(c.category || '');
    const titleTxt = safe.length > 16 ? safe.slice(0, 15) + '…' : safe;

    const bars = c.months.map((v, m) => {
      const x = cx + ip.l + m * barW;
      const h = max > 0 ? (v / max) * barAreaH : 0;
      const y = barAreaY + barAreaH - h;
      if (v <= 0) return '';
      const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];
      const tip = `${safe} · ${monthName} ${year} · $${v.toLocaleString()}`;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(barW - 0.6).toFixed(1)}" height="${h.toFixed(1)}" fill="${color}" rx="0.5" style="cursor:pointer"`
           + ` onclick="openDrillDown('category-month','${safe.replace(/'/g, '&#39;')}::${m + 1}')">`
           + `<title>${tip}</title></rect>`;
    }).join('');

    // Month tick labels — show every other letter to fit
    const ticks = monthLetters.map((ltr, m) => {
      if (m % 2 !== 0) return '';
      const x = cx + ip.l + m * barW + barW / 2;
      return `<text x="${x.toFixed(1)}" y="${(cy + cellH - 2).toFixed(1)}" font-size="7" font-family="monospace" fill="#bbb" text-anchor="middle">${ltr}</text>`;
    }).join('');

    return `<g>
      <text x="${(cx + ip.l).toFixed(1)}" y="${(cy + 9).toFixed(1)}" font-size="9" font-family="monospace" fill="#666" font-weight="600">${titleTxt}</text>
      <text x="${(cx + cellW - ip.r).toFixed(1)}" y="${(cy + 9).toFixed(1)}" font-size="8" font-family="monospace" fill="#999" text-anchor="end">$${total.toLocaleString(undefined,{maximumFractionDigits:0})}</text>
      <line x1="${cx + ip.l}" y1="${(barAreaY + barAreaH).toFixed(1)}" x2="${(cx + cellW - ip.r).toFixed(1)}" y2="${(barAreaY + barAreaH).toFixed(1)}" stroke="#eee" stroke-width="0.5"/>
      ${bars}
      ${ticks}
    </g>`;
  }).join('');

  const summary = `<text x="${outerPad.l}" y="${H - 4}" font-size="10" font-family="monospace" fill="#666">${year} · top ${categories.length} of all categories · total $${totalYear.toLocaleString()}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto">
    ${panels}
    ${summary}
  </svg>`;
}

// ── Chart drill-down (v.183) ──────────────────────────────────
// Generic right-pane drill-down handler shared by chart cards. Kind
// dispatches to the right endpoint; key carries the slice identifier
// (a date for calendar, a vendor name for treemap, etc.). The right
// pane already has `.rep-detail-*` styling from earlier reports work
// — we reuse it instead of inventing a new modal layer.
async function openDrillDown(kind, key) {
  const pane = document.getElementById('reportsRight');
  if (!pane) return;
  pane.classList.remove('empty');
  pane.classList.add('open'); // triggers the mobile full-screen overlay rule
  pane.innerHTML = '<div style="padding:24px;color:var(--text3);font-size:13px">Loading…</div>';

  try {
    if (kind === 'calendar') {
      const date = key;
      const d = await window.api('GET', `/finance/reports/txns-on-date?date=${encodeURIComponent(date)}`);
      pane.innerHTML = renderDrillDown(
        `Charges on ${date}`,
        `${d.transactions.length} transaction${d.transactions.length === 1 ? '' : 's'} · ${fmtMoney(d.total_spent)} spent`
          + (d.total_income > 0 ? ` · ${fmtMoney(d.total_income)} in` : ''),
        d.transactions
      );
      return;
    }
    if (kind === 'vendor') {
      const vendor = key;
      const year   = new Date().getFullYear();
      const d = await window.api('GET', `/finance/reports/txns-by-vendor?vendor=${encodeURIComponent(vendor)}&year=${year}`);
      pane.innerHTML = renderDrillDown(
        vendor,
        `${d.transactions.length} transaction${d.transactions.length === 1 ? '' : 's'} in ${year} · ${fmtMoney(d.total_spent)} spent`,
        d.transactions
      );
      return;
    }
    if (kind === 'income-flow') {
      // v.185 — Sankey ribbon / node click. Key shape: "side::category"
      // where side is 'income' or 'expense'. Reuses /txns-by-category.
      const sep = key.indexOf('::');
      const side = sep > 0 ? key.slice(0, sep) : 'expense';
      const category = sep > 0 ? key.slice(sep + 2) : key;
      const year = new Date().getFullYear();
      const d = await window.api(
        'GET',
        `/finance/reports/txns-by-category?category=${encodeURIComponent(category)}&year=${year}&side=${encodeURIComponent(side)}`
      );
      const total = side === 'income' ? d.total_income : d.total_spent;
      const verb  = side === 'income' ? 'received' : 'spent';
      pane.innerHTML = renderDrillDown(
        `${category} (${side})`,
        `${d.transactions.length} transaction${d.transactions.length === 1 ? '' : 's'} in ${year} · ${fmtMoney(total)} ${verb}`,
        d.transactions
      );
      return;
    }
    if (kind === 'category-month') {
      // v.185 — Small-multiples bar click. Key shape: "category::month"
      // where month is 1..12. Reuses /txns-by-category (expense side,
      // year + month filter).
      const sep = key.lastIndexOf('::');
      const category = sep > 0 ? key.slice(0, sep) : key;
      const month    = sep > 0 ? key.slice(sep + 2) : null;
      const year = new Date().getFullYear();
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const mLabel = month ? `${monthNames[+month - 1]} ${year}` : `${year}`;
      const d = await window.api(
        'GET',
        `/finance/reports/txns-by-category?category=${encodeURIComponent(category)}&year=${year}`
          + (month ? `&month=${encodeURIComponent(month)}` : '')
          + `&side=expense`
      );
      pane.innerHTML = renderDrillDown(
        `${category} · ${mLabel}`,
        `${d.transactions.length} transaction${d.transactions.length === 1 ? '' : 's'} · ${fmtMoney(d.total_spent)} spent`,
        d.transactions
      );
      return;
    }
    pane.innerHTML = '<div style="padding:24px;color:var(--text3)">Unknown drill-down.</div>';
  } catch (e) {
    pane.innerHTML = '<div style="padding:24px;color:var(--text3);font-size:13px">Could not load the details right now.</div>';
  }
}
