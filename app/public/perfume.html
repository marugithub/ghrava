<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
  <title>Perfume — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') === '1') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    .perf-grid{display:grid;grid-template-columns:repeat(var(--perf-cols,2),minmax(0,1fr));gap:10px;padding:10px 16px 90px}
    .perf-list{display:flex;flex-direction:column;gap:8px;padding:10px 16px 90px}
    .perf-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px}
    .perf-head{display:flex;align-items:center;gap:10px}.perf-icon{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}
    .perf-name{font-size:14px;font-weight:700}.perf-meta{font-size:12px;color:var(--text3)}.perf-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
    .perf-tag{font-size:10px;border:1px solid var(--border2);background:var(--bg3);padding:2px 7px;border-radius:999px}
    @media(max-width:700px){.perf-grid{grid-template-columns:1fr!important}}
  </style>
</head>
<body>
<script src="/nav.js"></script><script>window.GH_PAGE = { key:'perfume', title:'Perfume' };</script>
<script src="/js/lt-core.js"></script><script src="/js/lt-messages.js"></script>

<div id="app">
  <div class="gh-page-header"></div>
  <div style="padding:10px 16px 0"><input id="perfSearch" class="search-input" type="search" placeholder="Search perfume, notes, season..."></div>
  <div id="perfViewToolbar" style="display:flex;align-items:center;padding:6px 16px 0"></div>
  <div id="perfList"></div>
</div>

<script>
const PERF_DATA=[
  {id:1,name:'Bleu de Chanel',brand:'Chanel',conc:'EDP',season:'Fall',scent:'Woody',occasion:'Work',top:'Citrus, Mint',base:'Sandalwood, Cedar',icon:'🌿'},
  {id:2,name:'Dior Sauvage',brand:'Dior',conc:'EDT',season:'Summer',scent:'Fresh',occasion:'Casual',top:'Bergamot, Pepper',base:'Ambroxan, Cedar',icon:'🌊'},
  {id:3,name:'YSL Y',brand:'YSL',conc:'EDP',season:'Spring',scent:'Aromatic',occasion:'Work',top:'Apple, Ginger',base:'Tonka, Cedar',icon:'🍏'},
  {id:4,name:'Tom Ford Ombre Leather',brand:'Tom Ford',conc:'EDP',season:'Winter',scent:'Leather',occasion:'Evening',top:'Cardamom',base:'Leather, Amber',icon:'🖤'}
];
let perfView='grid', perfCols=parseInt(localStorage.getItem('perf_cols')) || (window.innerWidth>=600?2:1), perfFilters={};
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function initView(){
  GH_VIEW.init('perfViewToolbar','perf',s=>{perfView=s.view;perfCols=s.cols;perfFilters=s.filters||{};renderPerfume();},{
    defaultView:'grid',
    filterFields:[
      {key:'season',type:'select',label:'Season',options:['Spring','Summer','Fall','Winter']},
      {key:'scent',type:'select',label:'Scent Family',options:['Fresh','Woody','Aromatic','Leather']},
      {key:'occasion',type:'select',label:'Occasion',options:['Casual','Work','Evening','Formal']},
      {key:'brand',type:'text',label:'Brand',placeholder:'e.g. Chanel'}
    ]
  });
}

function rows(){
  const q=(document.getElementById('perfSearch').value||'').toLowerCase();
  return PERF_DATA.filter(r=>{
    if(q && !(`${r.name} ${r.brand} ${r.top} ${r.base} ${r.scent} ${r.season}`.toLowerCase().includes(q))) return false;
    if(perfFilters.season && r.season!==perfFilters.season) return false;
    if(perfFilters.scent && r.scent!==perfFilters.scent) return false;
    if(perfFilters.occasion && r.occasion!==perfFilters.occasion) return false;
    if(perfFilters.brand && !r.brand.toLowerCase().includes(perfFilters.brand.toLowerCase())) return false;
    return true;
  });
}

function renderPerfume(){
  const out=rows();
  if(!out.length){document.getElementById('perfList').innerHTML=emptyState('🧴','No fragrances match','Try changing your search or filters.');return;}
  const cls=perfView==='list'?'perf-list':'perf-grid';
  document.getElementById('perfList').innerHTML=`<div class="${cls}" style="--perf-cols:${perfCols}">${out.map(r=>`<div class="perf-card"><div class="perf-head"><div class="perf-icon">${r.icon}</div><div style="flex:1;min-width:0"><div class="perf-name">${esc(r.name)}</div><div class="perf-meta">${esc(r.brand)} · ${esc(r.conc)} · ${esc(r.occasion)}</div></div></div><div class="perf-tags"><span class="perf-tag">${esc(r.scent)}</span><span class="perf-tag">${esc(r.season)}</span><span class="perf-tag">Top: ${esc(r.top)}</span><span class="perf-tag">Base: ${esc(r.base)}</span></div></div>`).join('')}</div>`;
}

document.getElementById('perfSearch').addEventListener('input', renderPerfume);
document.addEventListener('DOMContentLoaded',()=>{initView();renderPerfume();});
</script>
</body>
</html>
