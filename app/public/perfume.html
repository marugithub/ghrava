<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
  <title>Perfume — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') !== '0') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    .perf-grid{display:grid;grid-template-columns:repeat(var(--perf-cols,2),minmax(0,1fr));gap:10px;padding:10px 16px 90px}
    .perf-list{display:flex;flex-direction:column;gap:8px;padding:10px 16px 90px}
    .perf-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;cursor:pointer}
    .perf-card:hover{border-color:var(--accent)}
    .perf-head{display:flex;align-items:center;gap:10px}
    .perf-icon{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}
    .perf-name{font-size:14px;font-weight:700}.perf-meta{font-size:12px;color:var(--text3)}
    .perf-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
    .perf-tag{font-size:10px;border:1px solid var(--border2);background:var(--bg3);padding:2px 7px;border-radius:999px}
    .notes-pyramid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
    .notes-layer{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
    .notes-layer-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .notes-layer-val{font-size:12px;color:var(--text)}
    .lookup-result{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:6px;cursor:pointer}
    .lookup-result:hover{border-color:var(--accent)}
    @media(max-width:700px){.perf-grid{grid-template-columns:1fr!important}}
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script>window.GH_PAGE = { module:'perfume', title:'Perfume' };</script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>
<!-- v202604.117 — card view available via GH_VIEW toolbar (3-view: list/grid/card) -->
<script src="/js/gh-card.js"></script>
<script src="/js/gh-card-shared.js"></script>
<script src="/js/gh-card-brands.js"></script>
<script src="/js/gh-card-configs-batch2.js"></script>
<script src="/js/gh-card-mount.js"></script>

<div id="app">
  <div class="gh-page-header"></div>
  <div style="padding:10px 16px 0;display:flex;gap:8px;align-items:center">
  <!-- HIDDEN per session-12 search consolidation. Input stays in DOM so load() can read its value (always ''). To restore, remove style="display:none" on the input. Use Cmd+K for unified search; Filter for in-view filtering. -->
    <input id="perfSearch" class="search-input" type="search" placeholder="Search perfume, notes, brand…" style="flex:1;display:none">
    <select class="form-select" id="perfStatus" onchange="load()" style="width:120px">
      <option value="active">Active</option>
      <option value="all">All</option>
    </select>
  </div>
  <div id="perfViewToolbar" style="display:flex;align-items:center;padding:6px 16px 0"></div>
  <div id="perfList"></div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="perfDrawer">
 <div class="drawer">
  <div class="drawer-handle"></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="drawer-title" id="perfDrawerTitle" style="flex:1">Add Perfume</div>
    <button id="perfArchiveBtn" title="Archive perfume" style="display:none;width:32px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0" onclick="openPerfArchive()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    </button>
    <button id="pDeleteBtn" title="Delete perfume" style="display:none;width:32px;height:32px;border-radius:var(--r);border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#ef4444;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0" onclick="deletePerfume()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
  </div>
  <div class="drawer-body">
    <!-- Fragella lookup -->
    <div class="form-group" id="lookupGroup">
      <label class="form-label">Lookup by name (Fragella)</label>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="lookupQuery" placeholder="e.g. Dior Sauvage" style="flex:1">
        <button class="btn btn-ghost" style="padding:8px 12px;white-space:nowrap" onclick="doLookup()">Search</button>
      </div>
      <div id="lookupResults"></div>
    </div>
    <div style="height:1px;background:var(--border);margin:12px 0"></div>

    <div class="form-row">
      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="pName"></div>
      <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="pBrand"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Concentration</label>
        <select class="form-select" id="pConc"><option value="">—</option></select>
      </div>
      <div class="form-group"><label class="form-label">Gender</label>
        <select class="form-select" id="pGender"><option value="">—</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Scent Family (multi-select)</label>
      <div id="pScentFam" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="notes-pyramid" style="margin-bottom:16px">
      <div class="notes-layer">
        <div class="notes-layer-label">Top Notes</div>
        <input class="form-input" id="pTopNotes" placeholder="Citrus, Pepper…" style="margin-top:4px;font-size:12px">
      </div>
      <div class="notes-layer">
        <div class="notes-layer-label">Heart Notes</div>
        <input class="form-input" id="pMidNotes" placeholder="Rose, Jasmine…" style="margin-top:4px;font-size:12px">
      </div>
      <div class="notes-layer">
        <div class="notes-layer-label">Base Notes</div>
        <input class="form-input" id="pBaseNotes" placeholder="Amber, Musk…" style="margin-top:4px;font-size:12px">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Season</label>
      <div id="pSeasonTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Occasion</label>
      <div id="pOccasionTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Size (ml)</label><input class="form-input" type="number" id="pSizeMl" placeholder="50"></div>
      <div class="form-group"><label class="form-label">Amount</label>
        <select class="form-select" id="pAmount"><option value="Full">Full</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Owner</label>
      <select class="form-select" id="pOwner"><option value="">— select —</option></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Purchase Price</label><input class="form-input" type="number" id="pPrice" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Purchase Date</label><input class="form-input" type="date" id="pPDate"></div>
    </div>
    <div class="form-group"><label class="form-label">Purchased From</label><input class="form-input" id="pFrom"></div>
    <div class="form-group"><label class="form-label">Rating</label>
      <div id="pRating" style="display:flex;gap:8px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="pStatus"><option value="active">Active</option></select>
    </div>
    <div class="form-group"><label class="form-label">Notes / Review</label><textarea class="form-textarea" id="pNotes" style="min-height:70px"></textarea></div>
  </div><!-- /drawer-body -->
  <div class="drawer-foot">
    <button class="btn btn-primary" onclick="savePerfume()">Save</button>
    <button class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
  </div>
 </div><!-- /drawer -->
</div><!-- /drawer-overlay -->

<button class="fab fab-pill" onclick="openDrawer()" title="Add"><span>+ Add</span></button>

<!-- Archive perfume modal -->
<div class="drawer-overlay" id="perfArchiveOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="drawer" style="max-width:420px">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Archive Perfume</div>
    <div class="drawer-body">
      <div class="form-group">
        <label class="form-label">Disposition</label>
        <select class="form-select" id="perfArchiveStatus">
          <option value="empty">Finished / Empty</option>
          <option value="given_away">Given Away / Gifted</option>
          <option value="sold">Sold</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes <span style="color:var(--text3);font-weight:400">(optional)</span></label>
        <textarea class="form-textarea" id="perfArchiveNotes" placeholder="Any notes…" style="min-height:60px"></textarea>
      </div>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-primary" onclick="savePerfArchive()">Archive</button>
      <button class="btn btn-ghost" onclick="document.getElementById('perfArchiveOverlay').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<script>
const SCENT_FAMILIES = ['Fresh','Citrus','Floral','Oriental','Woody','Gourmand','Aquatic','Spicy'];
const SEASONS        = ['Spring','Summer','Fall','Winter','Rainy','All-season'];
const OCCASIONS      = ['Casual','Work','Formal','Sport','Evening'];

let _perfumeView = localStorage.getItem('perf_view') || 'grid';
let _perfumeCols = parseInt(localStorage.getItem('perf_cols'))||(window.innerWidth>=600?2:1);
let _editingId   = null;
let _pScentSel   = [], _pSeasonSel = [], _pOccasionSel = [];
let _pRating     = 0;
let _members     = [];

function esc(s) { const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }

function closeDrawer() { document.getElementById('perfDrawer').classList.remove('open'); }
function openDrawer(id) {
  _editingId = id||null;
  _pScentSel = []; _pSeasonSel = []; _pOccasionSel = []; _pRating = 0;

  document.getElementById('perfDrawerTitle').textContent = id ? 'Edit Perfume' : 'Add Perfume';
  const archBtn = document.getElementById('perfArchiveBtn');
  const delBtn  = document.getElementById('pDeleteBtn');
  if (archBtn) archBtn.style.display = id ? 'flex' : 'none';
  if (delBtn)  delBtn.style.display  = id ? 'flex' : 'none';
  document.getElementById('lookupGroup').style.display = id ? 'none' : '';
  document.getElementById('lookupResults').innerHTML = '';
  document.getElementById('lookupQuery').value = '';

  // Clear form
  ['pName','pBrand','pTopNotes','pMidNotes','pBaseNotes','pSizeMl','pPrice','pFrom','pNotes'].forEach(i => {
    document.getElementById(i).value = '';
  });
  document.getElementById('pPDate').value = '';

  if (id) {
    loadPerfumeForEdit(id);
  } else {
    renderTagPicker('pScentFam',    SCENT_FAMILIES, _pScentSel,   'toggleScentFam');
    renderTagPicker('pSeasonTags',  SEASONS,        _pSeasonSel,  'togglePSeason');
    renderTagPicker('pOccasionTags',OCCASIONS,      _pOccasionSel,'togglePOccasion');
    renderRating(0);
  }

  document.getElementById('perfDrawer').classList.add('open');
}

async function loadPerfumeForEdit(id) {
  try {
    const p = await window.api('GET', `/perfume/${id}`);
    document.getElementById('pName').value     = p.name||'';
    document.getElementById('pBrand').value    = p.brand||'';
    document.getElementById('pTopNotes').value = p.top_notes||'';
    document.getElementById('pMidNotes').value = p.middle_notes||'';
    document.getElementById('pBaseNotes').value= p.base_notes||'';
    document.getElementById('pSizeMl').value   = p.size_ml||'';
    document.getElementById('pPrice').value    = p.purchase_price||'';
    document.getElementById('pPDate').value    = p.purchase_date||'';
    document.getElementById('pFrom').value     = p.purchased_from||'';
    document.getElementById('pNotes').value    = p.notes||'';
    document.getElementById('pOwner').value    = p.owner_family_member_id||'';
    _pScentSel   = p.scent_family  || [];
    _pSeasonSel  = p.season_tags   || [];
    _pOccasionSel= p.occasion_tags || [];
    _pRating     = p.rating || 0;
    await GH_SELECT.init('pConc',   'perfume_concentration', p.concentration||'',  { placeholder:'—', allowAdd:false });
    await GH_SELECT.init('pGender', 'perfume_gender',        p.gender||'',         { placeholder:'—', allowAdd:false });
    await GH_SELECT.init('pAmount', 'perfume_amount',        p.amount_level||'Full',{ allowAdd:false });
    await GH_SELECT.init('pStatus', 'perfume_status',        p.status||'active',   { allowAdd:false });
    renderTagPicker('pScentFam',    SCENT_FAMILIES, _pScentSel,   'toggleScentFam');
    renderTagPicker('pSeasonTags',  SEASONS,        _pSeasonSel,  'togglePSeason');
    renderTagPicker('pOccasionTags',OCCASIONS,      _pOccasionSel,'togglePOccasion');
    renderRating(_pRating);
  } catch(e) {}
}

function renderTagPicker(containerId, opts, selected, onToggle) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = opts.map(o => `
    <div onclick="${onToggle}('${o}')" style="padding:4px 10px;border-radius:99px;font-size:12px;cursor:pointer;
      border:1.5px solid ${selected.includes(o)?'var(--accent)':'var(--border)'};
      background:${selected.includes(o)?'var(--accent-bg)':'var(--bg2)'};
      color:${selected.includes(o)?'var(--accent)':'var(--text2)'}">
      ${esc(o)}
    </div>`).join('');
}

function toggleScentFam(v) {
  _pScentSel = _pScentSel.includes(v) ? _pScentSel.filter(x=>x!==v) : [..._pScentSel,v];
  renderTagPicker('pScentFam', SCENT_FAMILIES, _pScentSel, 'toggleScentFam');
}
function togglePSeason(v) {
  _pSeasonSel = _pSeasonSel.includes(v) ? _pSeasonSel.filter(x=>x!==v) : [..._pSeasonSel,v];
  renderTagPicker('pSeasonTags', SEASONS, _pSeasonSel, 'togglePSeason');
}
function togglePOccasion(v) {
  _pOccasionSel = _pOccasionSel.includes(v) ? _pOccasionSel.filter(x=>x!==v) : [..._pOccasionSel,v];
  renderTagPicker('pOccasionTags', OCCASIONS, _pOccasionSel, 'togglePOccasion');
}

function renderRating(val) {
  _pRating = val;
  const el = document.getElementById('pRating');
  el.innerHTML = [1,2,3,4,5].map(n =>
    `<div onclick="renderRating(${n})" style="font-size:24px;cursor:pointer;opacity:${n<=val?1:0.3}">${n<=val?'★':'☆'}</div>`
  ).join('');
}

async function doLookup() {
  const q = document.getElementById('lookupQuery').value.trim();
  if (!q) return;
  const el = document.getElementById('lookupResults');
  el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px">Searching…</div>';
  try {
    const d = await window.api('GET', `/perfume/lookup/fragella?q=${encodeURIComponent(q)}`);
    if (d.error) { el.innerHTML = `<div style="color:var(--amber);font-size:13px;padding:8px">${esc(d.error)}</div>`; return; }
    const results = d.results || [];
    if (!results.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px">No results found — fill in manually</div>'; return; }
    el.innerHTML = results.slice(0,5).map(r => `
      <div class="lookup-result" onclick="applyLookup(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <div style="font-weight:600">${esc(r.name||r.title||'')}</div>
        <div style="font-size:12px;color:var(--text3)">${esc(r.brand||r.house||'')} ${r.concentration||r.type?'· '+(r.concentration||r.type):''}${r.year?'· '+r.year:''}</div>
        ${r.top_notes||r.notes?.top ? `<div style="font-size:11px;color:var(--text3);margin-top:3px">Top: ${esc(r.top_notes||r.notes?.top||'')}</div>`:''}
      </div>`).join('');
  } catch(e) { el.innerHTML = '<div style="color:var(--red);font-size:13px;padding:8px">Lookup failed</div>'; }
}

function applyLookup(r) {
  document.getElementById('pName').value      = r.name||r.title||'';
  document.getElementById('pBrand').value     = r.brand||r.house||'';
  document.getElementById('pTopNotes').value  = r.top_notes||r.notes?.top||'';
  document.getElementById('pMidNotes').value  = r.middle_notes||r.heart_notes||r.notes?.middle||'';
  document.getElementById('pBaseNotes').value = r.base_notes||r.notes?.base||'';
  if (r.concentration) {
    const map = {'EDP':'EDP','EDT':'EDT','Parfum':'Parfum','Cologne':'Cologne','EDC':'EDC'};
    const conc = Object.keys(map).find(k => (r.concentration||'').toUpperCase().includes(k.toUpperCase()));
    if (conc) GH_SELECT.init('pConc','perfume_concentration',conc,{placeholder:'—',allowAdd:false});
  }
  // Apply scent family tags if returned
  if (r.accords?.length || r.scent_family?.length) {
    const fams = (r.accords||r.scent_family||[]).map(a => {
      const label = typeof a === 'string' ? a : a.name||a.label||'';
      return SCENT_FAMILIES.find(f => label.toLowerCase().includes(f.toLowerCase()));
    }).filter(Boolean);
    _pScentSel = [...new Set(fams)];
    renderTagPicker('pScentFam', SCENT_FAMILIES, _pScentSel, 'toggleScentFam');
  }
  document.getElementById('lookupResults').innerHTML = '<div style="color:var(--green);font-size:13px;padding:8px">✓ Fields pre-filled — review and save</div>';
  toast('Fields pre-filled from Fragella', 'ok');
}

async function savePerfume() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { toast('Name is required', 'err'); return; }
  const payload = {
    name, brand: document.getElementById('pBrand').value.trim()||null,
    concentration: document.getElementById('pConc').value||null,
    top_notes:    document.getElementById('pTopNotes').value.trim()||null,
    middle_notes: document.getElementById('pMidNotes').value.trim()||null,
    base_notes:   document.getElementById('pBaseNotes').value.trim()||null,
    scent_family: _pScentSel, season_tags: _pSeasonSel, occasion_tags: _pOccasionSel,
    gender:       document.getElementById('pGender').value||null,
    size_ml:      parseFloat(document.getElementById('pSizeMl').value)||null,
    amount_level: document.getElementById('pAmount').value||'Full',
    purchase_price: parseFloat(document.getElementById('pPrice').value)||null,
    purchase_date:  document.getElementById('pPDate').value||null,
    purchased_from: document.getElementById('pFrom').value.trim()||null,
    owner_family_member_id: parseInt(document.getElementById('pOwner').value)||null,
    rating: _pRating||null,
    notes:  document.getElementById('pNotes').value.trim()||null,
    status: document.getElementById('pStatus').value||'active',
  };
  try {
    if (_editingId) {
      await window.api('PUT', `/perfume/${_editingId}`, payload);
      toast('Perfume updated', 'ok');
    } else {
      await window.api('POST', '/perfume', payload);
      toast('Perfume added', 'ok');
    }
    closeDrawer();
    load();
  } catch(e) { toast('Save failed: '+e.message, 'err'); }
}

function openPerfArchive() {
  document.getElementById('perfArchiveStatus').value = 'empty';
  document.getElementById('perfArchiveNotes').value = '';
  document.getElementById('perfArchiveOverlay').classList.add('open');
}

async function savePerfArchive() {
  if (!_editingId) return;
  const status = document.getElementById('perfArchiveStatus').value;
  const notes  = document.getElementById('perfArchiveNotes').value.trim();
  try {
    await window.api('PUT', `/perfume/${_editingId}`, { status, notes: notes || undefined });
    document.getElementById('perfArchiveOverlay').classList.remove('open');
    closeDrawer();
    toast('Perfume archived', 'ok');
    load();
  } catch(e) { toast('Archive failed: ' + e.message, 'err'); }
}

async function deletePerfume() {
  LT.confirm('Delete this perfume?', 'This cannot be undone.', async () => {
    await window.api('DELETE', `/perfume/${_editingId}`);
    closeDrawer();
    load();
    toast('Perfume deleted', 'ok');
  });
}

async function load() {
  const status = document.getElementById('perfStatus').value;
  const q = (document.getElementById('perfSearch').value||'').toLowerCase();
  try {
    const url = `/perfume/?${status!=='all'?'status=active':'status=all'}`;
    let rows = await window.api('GET', url);
    if (q) rows = rows.filter(r =>
      [r.name,r.brand,r.top_notes,r.middle_notes,r.base_notes,...(r.scent_family||[])]
        .join(' ').toLowerCase().includes(q));

    // Card view: render via GH_CARD when user picks "card" in the toolbar.
    if (_perfumeView === 'card' && window.GH_MOUNT) {
      if (Array.isArray(_members) && _members.length) window.familyMembers = _members;
      const mounted = window.GH_MOUNT.intoContainer({
        containerId: 'perfList',
        moduleId:    'perfumes',
        records:     rows,
        onClick:     (r) => openDrawer(r.id),
        derive: (r) => ({
          // scent_family / season_tags may already be arrays from API or JSON strings
          season_tags: Array.isArray(r.season_tags) ? JSON.stringify(r.season_tags) : r.season_tags,
          scent_family: Array.isArray(r.scent_family) ? JSON.stringify(r.scent_family) : r.scent_family,
          // photo: API now returns primary_photo_id + first_photo_id (added v202604.119)
          photo_attachment_id: r.photo_attachment_id || r.primary_photo_id || r.first_photo_id || null,
        }),
        onEmpty: () => `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
          <div style="font-size:48px;margin-bottom:12px">🧴</div>
          <div style="font-weight:700;font-size:15px;margin-bottom:6px">No fragrances yet</div>
          <div style="font-size:13px">Tap + to add your first perfume</div></div>`,
      });
      if (mounted) return;
    }

    if (!rows.length) {
      document.getElementById('perfList').innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:12px">🧴</div>
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">No fragrances yet</div>
        <div style="font-size:13px">Tap + to add your first perfume</div></div>`;
      return;
    }
    const cls = _perfumeView === 'list' ? 'perf-list' : 'perf-grid';
    document.getElementById('perfList').innerHTML = `<div class="${cls}" style="--perf-cols:${_perfumeCols}">
      ${rows.map(r => `
        <div class="perf-card" data-id="${r.id}" onclick="openDrawer(${r.id})">
          <div class="perf-head">
            <div class="perf-icon">🧴</div>
            <div style="flex:1;min-width:0">
              <div class="perf-name">${esc(r.name)}</div>
              <div class="perf-meta">${esc(r.brand||'')}${r.concentration?' · '+esc(r.concentration):''}${r.owner_name?' · '+esc(r.owner_name):''}</div>
            </div>
            ${r.rating?`<div style="color:var(--amber);font-size:13px">${'★'.repeat(r.rating)}</div>`:''}
          </div>
          ${(r.top_notes||r.middle_notes||r.base_notes) ? `
          <div class="notes-pyramid" style="margin-top:8px">
            <div class="notes-layer"><div class="notes-layer-label">Top</div><div class="notes-layer-val">${esc(r.top_notes||'—')}</div></div>
            <div class="notes-layer"><div class="notes-layer-label">Heart</div><div class="notes-layer-val">${esc(r.middle_notes||'—')}</div></div>
            <div class="notes-layer"><div class="notes-layer-label">Base</div><div class="notes-layer-val">${esc(r.base_notes||'—')}</div></div>
          </div>` : ''}
          <div class="perf-tags">
            ${(r.scent_family||[]).map(t=>`<span class="perf-tag">${esc(t)}</span>`).join('')}
            ${(r.season_tags||[]).map(t=>`<span class="perf-tag">${esc(t)}</span>`).join('')}
            ${r.amount_level&&r.amount_level!=='Full'?`<span class="perf-tag" style="color:var(--amber)">${esc(r.amount_level)}</span>`:''}
          </div>
        </div>`).join('')}
    </div>`;
  } catch(e) { toast('Failed to load', 'err'); }
}

async function initDropdowns() {
  await GH_SELECT.init('pConc',   'perfume_concentration', '', { placeholder:'—', allowAdd:false });
  await GH_SELECT.init('pGender', 'perfume_gender',        '', { placeholder:'—', allowAdd:false });
  await GH_SELECT.init('pAmount', 'perfume_amount',        'Full', { allowAdd:false });
  await GH_SELECT.init('pStatus', 'perfume_status',        'active', { allowAdd:false });
  try {
    const members = await window.api('GET', '/settings/family');
    _members = members;
    const sel = document.getElementById('pOwner');
    members.forEach(m => { const o=document.createElement('option'); o.value=m.id; o.textContent=m.display_name; sel.appendChild(o); });
  } catch(e) {}
}

document.getElementById('perfSearch').addEventListener('input', load);

GH_VIEW.init('perfViewToolbar','perf', s => {
  _perfumeView = s.view; _perfumeCols = s.cols;
  // Apply filters
  const f = s.filters || {};
  if (f.status !== undefined) document.getElementById('perfStatus').value = f.status || 'active';
  load();
},{
  defaultView: 'grid',
  defaultCols: 2,
  views: ['grid','list','card'],
  filterFields: [
    { key:'status',    type:'select', label:'Status',       options:[{value:'active',label:'Active'},{value:'all',label:'All'}] },
    { key:'gender',    type:'select', label:'Gender',       options:[{value:'',label:'All'},{value:'Masculine',label:'Masculine'},{value:'Feminine',label:'Feminine'},{value:'Unisex',label:'Unisex'}] },
    { key:'season',    type:'select', label:'Season',       options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'}] },
    { key:'occasion',  type:'select', label:'Occasion',     options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'},{value:'Evening',label:'Evening'}] },
    { key:'scent',     type:'text',   label:'Scent family', placeholder:'e.g. Woody' },
  ]
});

GH_BULK.init({
  toolbarId:    'perfViewToolbar',
  containerId:  'perfList',
  cardSelector: '.perf-card',
  getId:        (el) => parseInt(el.dataset.id, 10),
  refresh:      () => load(),
  onDelete:     async (ids) => { for (const id of ids) await window.api('DELETE', `/perfume/${id}`, {}); },
});

document.addEventListener('DOMContentLoaded', async () => {
  await initDropdowns();
  renderTagPicker('pScentFam',    SCENT_FAMILIES, _pScentSel,   'toggleScentFam');
  renderTagPicker('pSeasonTags',  SEASONS,        _pSeasonSel,  'togglePSeason');
  renderTagPicker('pOccasionTags',OCCASIONS,      _pOccasionSel,'togglePOccasion');
  renderRating(0);
  load();
});
</script>
</body>
</html>
