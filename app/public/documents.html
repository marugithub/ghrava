<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Documents — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
  <script>
    if (localStorage.getItem('gh_nav_collapsed') !== '0') {
      document.documentElement.classList.add('nav-collapsed-init');
    }
  </script>
  <style>
    :root { --tab-color: #6366f1; }
    .doc-card { margin-bottom:6px; }
    .doc-card-inner { padding:8px 12px; display:flex; align-items:flex-start; gap:8px; }
    .doc-icon { width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:15px; }
    .doc-title { font-size:13px; font-weight:700; color:var(--text); line-height:1.3; }
    .doc-meta { font-size:11px; color:var(--text3); margin-top:2px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .expiry-chip { display:inline-flex; align-items:center; padding:1px 7px; border-radius:99px; font-size:11px; font-weight:600; gap:3px; }
    .exp-red   { background:rgba(239,68,68,.12); color:var(--red); }
    .exp-amber { background:var(--amber-bg); color:var(--amber); }
    .exp-ok    { background:rgba(34,197,94,.1); color:var(--green); }
    .cat-group-label { font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); padding:12px 16px 6px; display:flex; align-items:center; justify-content:space-between; }

    /* ── Document modal ─────────────────────────────────────── */
    .doc-modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .doc-modal-overlay.open { display: flex; animation: fadein .2s ease; }
    .doc-modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      width: 100%;
      max-width: 580px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .doc-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .doc-modal-x {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .doc-modal-x:hover { background: var(--bg3); color: var(--text); }
    .doc-modal-body {
      overflow-y: auto;
      padding: 12px 20px;
      flex: 1;
    }
    .doc-modal-body .form-group { margin-bottom: 10px; }
    .doc-modal-body .form-label { font-size: 10px; margin-bottom: 3px; }
    .doc-modal-body .form-input,
    .doc-modal-body .form-select { padding: 7px 10px; font-size: 13px; }
    .doc-modal-body .form-textarea { padding: 7px 10px; font-size: 13px; min-height: 44px; }
    .doc-modal-body .form-row { gap: 8px; }
    .doc-modal-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    /* GH_VIEW grid mode */
    #docList.gh-grid {
      display: grid;
      grid-template-columns: repeat(var(--doc-cols,3), 1fr);
      gap: 10px;
      padding: 8px 16px 100px;
    }
    #docList.gh-grid .doc-card { margin-bottom: 0; }
  </style>
</head>
<body class="module-documents">
<script>window.GH_PAGE = { module: 'documents', title: 'Documents' };</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>
<div id="nav-container"></div>

<div id="app" style="padding-bottom:100px">

  <div style="padding:8px 16px 0">
    <div class="search-wrap" style="margin-top:0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="searchBox" placeholder="Search documents…" oninput="onSearch()" type="search" autocomplete="off">
    </div>
  </div>

  <!-- Category tabs — loaded from dropdown_options -->
  <div class="view-tabs" id="catStrip" style="--tab-color:#6366f1">
    <button class="view-tab active" data-cat="">All</button>
  </div>

  <!-- GH_VIEW toolbar -->
  <div id="docViewToolbar" style="display:flex;align-items:center;padding:4px 16px 0"></div>

  <div id="docList" style="padding:0 16px"></div>
</div>

<button class="fab fab-pill" onclick="openDocDrawer()" title="Add document"><span>+ Add Doc</span></button>

<!-- Archive document modal -->
<div class="drawer-overlay" id="docArchiveOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="drawer" style="max-width:420px">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Archive Document</div>
    <div class="drawer-body">
      <div class="form-group">
        <label class="form-label">Reason <span style="color:var(--text3);font-weight:400">(optional)</span></label>
        <textarea class="form-textarea" id="docArchiveReason" placeholder="e.g. Expired, superseded by newer version…" style="min-height:70px"></textarea>
      </div>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-primary" onclick="saveDocArchive()">Archive</button>
      <button class="btn btn-ghost" onclick="document.getElementById('docArchiveOverlay').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- DOCUMENT MODAL -->
<div class="doc-modal-overlay" id="docDrawer" onclick="if(event.target===this)closeDocModal()">
  <div class="doc-modal">
    <!-- Header -->
    <div class="doc-modal-header">
      <div class="drawer-title" id="docDrawerTitle" style="margin:0;font-size:18px;flex:1">Add Document</div>
      <div style="display:flex;align-items:center;gap:6px">
        <button id="dArchiveBtn" title="Archive document" style="display:none;width:30px;height:30px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0" onclick="openDocArchive()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        </button>
        <button id="dDelBtn" title="Delete document" style="display:none;width:30px;height:30px;border-radius:var(--r);border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#ef4444;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0" onclick="deleteDoc()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <button onclick="closeDocModal()" class="doc-modal-x" title="Cancel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="doc-modal-body">

      <div class="form-group">
        <label class="form-label">Title <span class="req">*</span></label>
        <input class="form-input" id="dTitle" placeholder="2024 Tax Return, Home Insurance Policy…">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="dCat" onchange="triggerDocSuggest()"></select>
        </div>
        <div class="form-group" style="flex:2">
          <label class="form-label">Subcategory</label>
          <select class="form-select" id="dSubcat"><option value="">— none —</option></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Issuer / Source</label>
          <input class="form-input" id="dIssuer" placeholder="IRS, State Farm…">
        </div>
      </div>
      <select id="dMember" style="display:none"></select>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Issue Date</label>
          <input class="form-input" type="date" id="dIssueDate">
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date</label>
          <input class="form-input" type="date" id="dExpiry">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Description / Notes</label>
        <textarea class="form-textarea" id="dDesc" rows="2" style="min-height:52px;resize:none" placeholder="Brief description…"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">File / Location</label>
        <input class="form-input" id="dFileName" placeholder="Z:\Docs\tax_2024.pdf  or  \\NAS\Docs\...  or  https://...">
      </div>
      <div class="form-group">
        <label class="form-label">External Link <span style="font-size:10px;font-weight:400;color:var(--text3)">optional</span></label>
        <input class="form-input" type="url" id="dUrlLink" placeholder="https://portal.irs.gov/…">
      </div>

      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label">Tags</label>
          <div class="tags-input-wrap" id="docTagsWrap" onclick="document.getElementById('docTagInput').focus()">
            <input id="docTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
          </div>
        </div>
        <div class="form-group" style="flex:1">
          <div id="docFamilyWrap"></div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="doc-modal-footer">
      <button class="btn btn-ghost" onclick="closeDocModal()">Cancel</button>
      <div style="display:flex;gap:8px;flex:1;justify-content:flex-end">
        <button class="btn btn-primary" id="dSave" onclick="saveDoc()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/documents';
const $ = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
function bgClose(id) { if (event.target === $(id)) $(id).classList.remove('open'); }
function closeDocModal() { $('docDrawer').classList.remove('open'); }

let editDocId = null, allDocs = [], filterCat = '', searchQ = '';
let _docView = localStorage.getItem('doc_view') || 'list';
let _docCols = parseInt(localStorage.getItem('doc_cols')) || 3;
let _docFilters = {};
let docFormTags = [];

const CAT_ICONS = { Tax:'📄',Legal:'⚖️',Insurance:'🛡️',Warranty:'🔧',Medical:'🏥',Financial:'💰',Property:'🏠',Vehicle:'🚗',Career:'💼',Other:'📁' };
const CAT_COLORS = { Tax:'rgba(239,68,68,.12)',Legal:'rgba(99,102,241,.12)',Insurance:'rgba(20,184,166,.12)',Warranty:'rgba(245,158,11,.12)',Medical:'rgba(20,184,166,.12)',Financial:'rgba(34,197,94,.12)',Property:'rgba(59,130,246,.12)',Vehicle:'rgba(99,102,241,.12)',Career:'rgba(249,115,22,.12)',Other:'rgba(148,163,184,.12)' };

// ── Load docs ──────────────────────────────────────────────────
// ── File path link helper ─────────────────────────────────────
// Detects path type and returns a clickable element:
//   UNC  \\server\share\...  → copy-to-clipboard (browsers block file:// for UNC)
//   Drive Z:\path\...       → file:// URL (opens in browser/Explorer if reachable)
//   URL  http(s)://...      → plain <a> link, new tab
//   Anything else           → copy-to-clipboard fallback
function fileLink(raw) {
  if (!raw) return '';
  const s = raw.trim();
  // HTTP/HTTPS URL
  if (/^https?:\/\//i.test(s)) {
    return `<a href="${esc(s)}" target="_blank" rel="noopener"
      style="font-size:11px;color:var(--accent);font-family:var(--mono);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:3px"
      onclick="event.stopPropagation()">📎 ${esc(s)}</a>`;
  }
  // Drive-letter path
  if (/^[A-Za-z]:[\\\x2f]/.test(s)) {
    const url = 'file:///' + s.replace(/\\/g, '/').replace(/ /g, '%20');
    return `<a href="${esc(url)}" target="_blank" rel="noopener"
      title="Open file"
      style="font-size:11px;color:var(--accent);font-family:var(--mono);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:3px"
      onclick="event.stopPropagation()">📎 ${esc(s)}</a>`;
  }
  // UNC or other — copy to clipboard via data-path (no inline JSON, avoids backslash escaping)
  const isUnc = /^[\\\x2f]{2}/.test(s);
  return `<button class="file-copy-btn" data-path="${s.replace(/"/g,'&quot;')}" 
    title="${isUnc ? 'Copy UNC path' : 'Copy to clipboard'}"
    style="font-size:11px;color:var(--accent);font-family:var(--mono);background:none;border:none;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:4px;margin-top:3px"
    onclick="event.stopPropagation()">${isUnc ? '📋' : '📎'} ${esc(s)}</button>`;
}

async function loadDocs() {
  const el = $('docList'); if (!el) return;
  el.innerHTML = spinnerHtml();
  try {
    const params = new URLSearchParams();
    if (filterCat) params.set('category', filterCat);
    if (searchQ)   params.set('q', searchQ);
    allDocs = await window.api('GET', '/documents/?' + params);
    renderDocs();
  } catch(e) { el.innerHTML = errorState(e.message, 'loadDocs()'); }
}

function renderDocs() {
  const el = $('docList'); if (!el) return;

  // Apply GH_VIEW grid/list mode
  el.classList.toggle('gh-grid', _docView === 'grid');
  el.classList.toggle('gh-list', _docView === 'list');
  el.style.setProperty('--doc-cols', _docCols);

  // Apply tag filter from GH_VIEW
  let docs = allDocs;
  if (_docFilters.tags?.length)  docs = docs.filter(d => _docFilters.tags.every(t => (d.tags||[]).includes(t)));
  if (_docFilters.category)      docs = docs.filter(d => d.category === _docFilters.category);
  if (_docFilters.expiring) {
    const days = parseInt(_docFilters.expiring);
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + days);
    const cutStr = cutoff.toISOString().slice(0,10);
    const todayStr = new Date().toISOString().slice(0,10);
    docs = docs.filter(d => d.expiry_date && d.expiry_date >= todayStr && d.expiry_date <= cutStr);
  }

  if (!docs.length) { el.innerHTML = emptyState(...GH_EMPTY.documents); return; }
  const today  = new Date().toISOString().slice(0,10);
  const warn30 = new Date(Date.now()+30*864e5).toISOString().slice(0,10);
  const warn90 = new Date(Date.now()+90*864e5).toISOString().slice(0,10);
  const groups = {};
  docs.forEach(d => { (groups[d.category]=groups[d.category]||[]).push(d); });
  let html = '';
  Object.keys(groups).sort().forEach(cat => {
    const docs = groups[cat];
    html += `<div class="cat-group-label">${CAT_ICONS[cat]||'📁'} ${esc(cat)} <span>${docs.length}</span></div>`;
    docs.forEach(d => {
      const exp = d.expiry_date;
      let exHtml = '';
      if (exp) {
        const cls = exp<today?'exp-red':exp<=warn30?'exp-amber':exp<=warn90?'exp-amber':'exp-ok';
        const lbl = exp<today?'⚠️ Expired':exp<=warn30?'⏰ Expires '+exp:'📅 '+exp;
        exHtml = `<span class="expiry-chip ${cls}">${lbl}</span>`;
      }
      const tagHtml = (d.tags||[]).length ? d.tags.map(t=>{const s=window.GH_TAGS?GH_TAGS.chipStyle(t):'';return `<span class="tag-chip" data-tag="${esc(t)}" style="cursor:pointer${s?';'+s:''}" title="Search tag: ${esc(t)}">${esc(t)}</span>`;}).join('') : '';
      const docStatusCls = exp
        ? (exp < today ? 'gh-s-red' : exp <= warn30 ? 'gh-s-amber' : 'gh-s-green')
        : 'gh-s-blue';
      const archivedCls = d.is_active === 0 ? ' is-archived' : '';
      html += `<div class="gh-card ${docStatusCls} doc-card${archivedCls}" data-id="${d.id}" onclick="openDocDrawer(${d.id})">
        <div class="doc-card-inner">
          <div class="doc-icon" style="background:${CAT_COLORS[d.category]||'rgba(148,163,184,.12)'}">${CAT_ICONS[d.category]||'📁'}</div>
          <div style="flex:1;min-width:0">
            <div class="doc-title">${d.file_name ? `<a href="#" onclick="event.stopPropagation();openDocDrawer(${d.id})" style="color:inherit;text-decoration:none">${esc(d.title)}</a>` : esc(d.title)}</div>
            <div class="doc-meta">${d.subcategory?`<span>${esc(d.subcategory)}</span>`:''} ${d.issuer?`<span style="color:var(--text2)">${esc(d.issuer)}</span>`:''} ${d.family_member?`<span>👤 ${esc(d.family_member)}</span>`:''} ${exHtml}</div>
            ${d.description?`<div style="font-size:12px;color:var(--text3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.description)}</div>`:''}
            ${tagHtml?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${tagHtml}</div>`:''}
            ${d.file_name ? `<div style="margin-top:3px">${fileLink(d.file_name)}</div>` : ''}
            ${d.url_link ? `<div style="margin-top:3px"><a href="${esc(d.url_link)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent)" onclick="event.stopPropagation()">🔗 ${esc(d.url_link.replace(/^https?:\/\//, '').slice(0, 50))}</a></div>` : ''}
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

// ── Category strip — dynamic ───────────────────────────────────
async function loadCatStrip() {
  const strip = $('catStrip'); if (!strip) return;
  try {
    const opts = await window.api('GET', '/settings/dropdowns/document_category');
    const cats = opts.length ? opts.map(o=>o.value) : ['Tax','Legal','Insurance','Warranty','Medical','Financial','Property','Vehicle','Career','Other'];
    strip.innerHTML = `<button class="view-tab active" data-cat="">All</button>` +
      cats.map(c=>`<button class="view-tab" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
  } catch(e) {}
  strip.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      strip.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterCat = btn.dataset.cat;
      loadDocs();
    });
  });
}

// ── Drawer dropdowns — dynamic ─────────────────────────────────
async function loadDrawerDropdowns() {
  // GH_SELECT populates from dropdown_options and appends a '＋ Add new…' option
  await GH_SELECT.init('dCat',    'document_category',    '', { allowAdd: true });
  await GH_SELECT.init('dSubcat', 'document_subcategory', '', { allowAdd: true, placeholder: '— none —' });
}

// ── Tags ───────────────────────────────────────────────────────
function renderDocTags() {
  const wrap = $('docTagsWrap'), input = $('docTagInput');
  if (!wrap || !input) return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  docFormTags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    const cs = window.GH_TAGS ? GH_TAGS.chipStyle(t) : '';
    if (cs) chip.style.cssText = cs;
    chip.innerHTML = `${esc(t)}<span class="tag-chip-remove">&times;</span>`;
    chip.querySelector('.tag-chip-remove').addEventListener('click', () => { docFormTags=docFormTags.filter(x=>x!==t); renderDocTags(); });
    wrap.insertBefore(chip, input);
  });
}
function addDocTag(raw) {
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!docFormTags.includes(t)).forEach(t=>docFormTags.push(t));
  renderDocTags();
  const inp = $('docTagInput'); if (inp) inp.value = '';
}

// ── Search ──────────────────────────────────────────────────────
let searchTimer;
function onSearch() { searchQ=$('searchBox').value.trim(); clearTimeout(searchTimer); searchTimer=setTimeout(loadDocs,250); }

// ── Drawer ──────────────────────────────────────────────────────
async function openDocDrawer(id) {
  editDocId = id||null;
  const d = id ? (allDocs.find(x=>x.id===id)||{}) : {};
  $('docDrawerTitle').textContent = id ? 'Edit Document' : 'Add Document';
  const archBtn = $('dArchiveBtn');
  const delBtn  = $('dDelBtn');
  if (archBtn) archBtn.style.display = id ? 'flex' : 'none';
  if (delBtn)  delBtn.style.display  = id ? 'flex' : 'none';
  $('dTitle').value     = d.title||'';
  $('dIssuer').value    = d.issuer||'';
  $('dDesc').value      = d.description||'';
  $('dIssueDate').value = d.issue_date||'';
  $('dExpiry').value    = d.expiry_date||'';
  $('dFileName').value  = d.file_name||'';
  $('dUrlLink').value   = d.url_link||'';
  $('dDelBtn').style.display = id?'inline-flex':'none';

  await loadDrawerDropdowns();
  if (d.category) $('dCat').value = d.category;
  if (d.subcategory) {
    const sel = $('dSubcat');
    const exists = Array.from(sel.options).some(o=>o.value===d.subcategory);
    if (!exists) { const opt=document.createElement('option'); opt.value=opt.textContent=d.subcategory; sel.appendChild(opt); }
    sel.value = d.subcategory;
  }

  docFormTags = (d.tags||[]).slice();
  renderDocTags();
  await GH_REFS.populateFamily('dMember', d.family_member, { placeholder: 'Whole Family' });

  const inp = $('docTagInput');
  if (inp) {
    inp.value = '';
    inp.onkeydown = e => {
      if (e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addDocTag(inp.value);}
      else if(e.key==='Backspace'&&!inp.value&&docFormTags.length){docFormTags.pop();renderDocTags();}
    };
    inp.onblur = ()=>{if(inp.value.trim())addDocTag(inp.value);};
    GH_TAGS.init({inputId:'docTagInput',wrapId:'docTagsWrap',module:'documents',getFormTags:()=>docFormTags,addTag:t=>addDocTag(t),allowCreate:true});
function triggerDocSuggest() {
  const cat  = document.getElementById('dCat')?.value || '';
  const name = document.getElementById('dTitle')?.value || '';
  GH_TAGS.suggest('docTagsWrap', ()=>docFormTags, t=>addDocTag(t), { category: cat, name });
}

  GH_FAMILY.init('docFamilyWrap', d.family_members||[]);
  }

  $('docDrawer').classList.add('open')
  setTimeout(triggerDocSuggest, 100);;
  setTimeout(()=>$('dTitle').focus(),100);
}


async function saveDoc() {
  const title=$('dTitle').value.trim();
  if (!title){toast('Title required','err');return;}
  const btn=$('dSave'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const payload={title,category:$('dCat').value||'Other',subcategory:$('dSubcat').value||null,issuer:$('dIssuer').value||null,description:$('dDesc').value||null,issue_date:$('dIssueDate').value||null,expiry_date:$('dExpiry').value||null,file_name:$('dFileName').value||null,url_link:$('dUrlLink').value.trim()||null,family_member:$('dMember').value||null,tags:docFormTags,family_member_ids:GH_FAMILY.getIds('docFamilyWrap')};
    if (editDocId) { await window.api('PUT',`/documents/${editDocId}`,payload); toast('Updated'); }
    else           { await window.api('POST','/documents/',payload); toast('Document saved'); }
    $('docDrawer').classList.remove('open'); loadDocs();
  } catch(e){toast(e.message||'Save failed','err');}
  finally{btn.textContent='Save';btn.disabled=false;}
}

function openDocArchive() {
  document.getElementById('docArchiveReason').value = '';
  document.getElementById('docArchiveOverlay').classList.add('open');
}

async function saveDocArchive() {
  if (!editDocId) return;
  try {
    await window.api('PATCH', `/documents/${editDocId}/archive`, {
      reason: document.getElementById('docArchiveReason').value.trim() || null
    });
    document.getElementById('docArchiveOverlay').classList.remove('open');
    $('docDrawer').classList.remove('open');
    toast('Document archived', 'ok');
    loadDocs();
  } catch(e) { toast('Archive failed: ' + e.message, 'err'); }
}

async function deleteDoc() {
  if (!await LT.confirm('Delete this document permanently? This cannot be undone.')) return;
  try {
    await window.api('DELETE', `/documents/${editDocId}`);
    toast('Deleted');
    $('docDrawer').classList.remove('open');
    loadDocs();
  } catch(e) { toast('Delete failed', 'err'); }
}

document.addEventListener('DOMContentLoaded', () => {
  // Delegated handler for file path copy buttons (data-path avoids inline escaping issues)
  document.addEventListener('click', e => {
    const btn = e.target.closest('.file-copy-btn');
    if (!btn) return;
    const p = btn.dataset.path;
    if (!p) return;
    navigator.clipboard.writeText(p).then(
      () => { if (window.LT?.toast) toast('Path copied', 'ok'); },
      () => { prompt('Copy this path:', p); }
    );
  });

  GH_VIEW.init('docViewToolbar', 'doc', state => {
    _docView    = state.view;
    _docCols    = state.cols;
    _docFilters = state.filters || {};
    renderDocs();
  }, {
    defaultView: 'list',
    filterFields: [
      { key: 'category', type: 'select', label: 'Category',
        options: [{value:'',label:'All'},{value:'Tax',label:'Tax'},{value:'Legal',label:'Legal'},{value:'Insurance',label:'Insurance'},{value:'Warranty',label:'Warranty'},{value:'Medical',label:'Medical'},{value:'Financial',label:'Financial'},{value:'Property',label:'Property'},{value:'Vehicle',label:'Vehicle'},{value:'Career',label:'Career'},{value:'Other',label:'Other'}] },
      { key: 'expiring', type: 'toggle', label: 'Expiring Soon',
        options: [{label:'All',value:''},{label:'Expiring 90d',value:'90'},{label:'Expiring 30d',value:'30'}] },
      { key: 'tags', type: 'tags', label: 'Tags' },
    ]
  });
  GH_BULK.init({
    toolbarId:    'docViewToolbar',
    containerId:  'docList',
    cardSelector: '.doc-card',
    getId:        (el) => parseInt(el.dataset.id, 10),
    isArchived:   (el) => el.classList.contains('is-archived'),
    refresh:      () => loadDocs(),
    onArchive:    async (ids) => { for (const id of ids) await window.api('PATCH', `/documents/${id}/archive`, {}); },
    onUnarchive:  async (ids) => { for (const id of ids) await window.api('PUT',   `/documents/${id}/unarchive`, {}); },
    onDelete:     async (ids) => { for (const id of ids) await window.api('DELETE',`/documents/${id}`, {}); },
  });
  loadCatStrip();
  loadDocs();
});
</script>
