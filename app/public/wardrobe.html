async function openItemDrawer(id) {
  _editingItemId = id||null;
  _iSeasonSel = []; _iOccasionSel = [];
  _iPhotos = []; _pendingItemPhotos = [];
  const isEdit = !!id;
  const archBtn = document.getElementById('wrdItemArchiveBtn');
  const delBtn  = document.getElementById('wrdItemDeleteBtn');
  if (archBtn) archBtn.style.display = isEdit ? 'flex' : 'none';
  if (delBtn)  delBtn.style.display  = isEdit ? 'flex' : 'none';

  // Populate platform dropdown
  await GH_SELECT.init('iSoldPlatform', 'sold_platform', '', { placeholder: '— select —', allowAdd: false });
  await GH_SELECT.init('iCategory', 'wardrobe_category', 'Clothing', { allowAdd: false });
  await GH_SELECT.init('iStatus',   'wardrobe_status',   'active',   { allowAdd: false });

  document.getElementById('itemDrawerTitle').textContent = id ? 'Edit Item' : 'Add Item';
  document.getElementById('iDeleteBtn').style.display = id ? '' : 'none';
  document.getElementById('iName').value = '';
  document.getElementById('iBrand').value = '';
  document.getElementById('iNickname').value = '';
  document.getElementById('iPrice').value = '';
  document.getElementById('iPDate').value = '';
  document.getElementById('iNotes').value = '';
  document.getElementById('iStatus').value = 'active';
  document.getElementById('iBarcode').value = '';
  const wrdFb = document.getElementById('wrdUpcFeedback');
  if (wrdFb) { wrdFb.style.display = 'none'; wrdFb.innerHTML = ''; }
  toggleStatusFields();

  if (id) {
    try {
      const item = await window.api('GET', `/wardrobe/items/${id}`);
      // Update archive button to show Restore if already archived
      const archBtn = document.getElementById('wrdItemArchiveBtn');
      if (archBtn) {
        archBtn.dataset.archived = item.is_archived ? '1' : '0';
        if (item.is_archived) {
          archBtn.title = 'Restore item';
          archBtn.style.color = 'var(--green)';
          archBtn.style.borderColor = 'rgba(34,197,94,.3)';
          archBtn.style.background = 'rgba(34,197,94,.08)';
          archBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 7 5 5 7 7"/><path d="M5 5v6a4 4 0 004 4h6"/><polyline points="17 17 19 19 21 17"/><path d="M19 19v-6a4 4 0 00-4-4H9"/></svg>';
        } else {
          archBtn.title = 'Archive item';
          archBtn.style.color = 'var(--text3)';
          archBtn.style.borderColor = 'var(--border)';
          archBtn.style.background = 'var(--bg3)';
          archBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>';
        }
      }
      document.getElementById('iName').value     = item.name||'';
      document.getElementById('iBrand').value    = item.brand||'';
      document.getElementById('iNickname').value = item.wardrobe_nickname||'';
      document.getElementById('iColor').value    = item.wardrobe_color||'';
      document.getElementById('iPrice').value    = item.purchase_price||'';
      document.getElementById('iPDate').value    = item.purchase_date||'';
      document.getElementById('iNotes').value    = item.notes||'';
      document.getElementById('iBarcode').value  = item.upc_barcode||'';
      await GH_SELECT.init('iCategory', 'wardrobe_category', item.category||'Clothing', { allowAdd: false });
      document.getElementById('iOwner').value    = item.wardrobe_owner_id||'';
      await GH_SELECT.init('iStatus', 'wardrobe_status', item.wardrobe_status||'active', { allowAdd: false });
      toggleStatusFields();
      document.getElementById('iSoldPrice').value  = item.sold_price||'';
      document.getElementById('iSoldDate').value   = item.sold_date||'';
      GH_SELECT.init('iSoldPlatform','sold_platform',item.sold_platform||'',{placeholder:'— select —',allowAdd:false});
      document.getElementById('iDonatedFmv').value    = item.donated_fmv||'';
      document.getElementById('iDiscardReason').value = item.discarded_reason||'';
      GH_REFS.populateContact('iDonatedOrg', item.donated_org_contact_id||null, { placeholder:'— select org —' });
      try { _iSeasonSel   = item.season_tags   ? JSON.parse(item.season_tags)   : []; } catch { _iSeasonSel=[]; }
      try { _iOccasionSel = item.occasion_tags ? JSON.parse(item.occasion_tags) : []; } catch { _iOccasionSel=[]; }
    } catch(e) {}
  }
  renderTagPicker('iSeasonTags',   SEASON_OPTS,   _iSeasonSel,   'toggleISeason');
  renderTagPicker('iOccasionTags', OCCASION_OPTS, _iOccasionSel, 'toggleIOccasion');
  renderItemPhotoPanel();
  openDrawer('itemDrawer');
}

// ── Item photo panel ──────────────────────────────────────────
// Greyed "Save first" hint when no _editingItemId; thumbnail strip + "+ Add Photo"
// when item exists. Pulls photos from /api/v1/attachments?entity_type=item&entity_id=N
let _pendingItemPhotos = []; // Files selected before save

function onItemPhotoSelected(input) {
  _pendingItemPhotos = [..._pendingItemPhotos, ...Array.from(input.files)];
  input.value = '';
  renderItemPhotoPanel();
}

async function renderItemPhotoPanel() {
  const panel = document.getElementById('iPhotoPanel');
  const body  = document.getElementById('iPhotoPanelBody');
  const count = document.getElementById('iPhotoPanelCount');
  if (!panel || !body) return;

  panel.classList.remove('locked');
  let html = '';

  // Pending (not yet uploaded) photos — show object URL previews
  if (_pendingItemPhotos.length) {
    html += `<div class="wrd-photo-strip">${_pendingItemPhotos.map((f,i) => `
      <div class="wrd-photo-strip-thumb" title="${esc(f.name)}" style="position:relative">
        <img src="${URL.createObjectURL(f)}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r)">
        <button onclick="removePendingPhoto(${i})" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--danger,#e55);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</button>
      </div>`).join('')}</div>`;
  }

  // Saved photos (if editing existing item)
  if (_editingItemId) {
    try {
      const list = await window.api('GET', `/attachments/item/${_editingItemId}`);
      const imgs = (list||[]).filter(a => a.is_image);
      _iPhotos = imgs;
      const total = imgs.length + _pendingItemPhotos.length;
      count.textContent = total ? `${total} photo${total===1?'':'s'}` : '';
      if (imgs.length) {
        html += `<div class="wrd-photo-strip">${imgs.slice(0,8).map(p => `
          <div class="wrd-photo-strip-thumb${p.is_primary_photo?' primary':''}">
            <img src="/api/v1/attachments/thumb/${p.id}" alt=""
                 onerror="this.parentElement.innerHTML='📷'">
          </div>`).join('')}</div>`;
      }
    } catch(e) {}
  } else {
    count.textContent = _pendingItemPhotos.length ? `${_pendingItemPhotos.length} pending` : '';
  }

  html += `<button type="button" class="wrd-photo-add" onclick="document.getElementById('iPhotoInput').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    + Add Photo
  </button>`;
  body.innerHTML = html;
}

function removePendingPhoto(idx) {
  _pendingItemPhotos.splice(idx, 1);
  renderItemPhotoPanel();
}

async function openItemPhotos() {
  try {
    if (!_editingItemId) {
      const saved = await saveItem({ keepOpen: true });
      if (!saved) return;
      // After successful save we have an _editingItemId; refresh panel
      renderItemPhotoPanel();
    }
    const name = document.getElementById('iName').value.trim();
    // Force z-index inline so CSS caching can't hide the modal behind the drawer
    const attDrawer = document.getElementById('attDrawer');
    if (attDrawer) attDrawer.style.zIndex = '600';
    AttachmentManager.open('item', _editingItemId, name);
    // Refresh the panel after AttachmentManager closes — best-effort poll on drawer close
    const drawer = document.getElementById('attDrawer');
    if (drawer) {
      const observer = new MutationObserver(() => {
        if (!drawer.classList.contains('open')) {
          renderItemPhotoPanel();
          observer.disconnect();
        }
      });
      observer.observe(drawer, { attributes: true, attributeFilter: ['class'] });
    }
  } catch(e) {
    console.error('openItemPhotos:', e);
    toast('Photos error: ' + e.message, 'err');
  }
}

async function saveItem(opts = {}) {
  const name = document.getElementById('iName').value.trim();
  if (!name) { toast('Name is required', 'err'); return false; }

  const payload = {
    name:                document.getElementById('iName').value.trim() || null,
    brand:               document.getElementById('iBrand').value.trim() || null,
    category:            document.getElementById('iCategory').value || null,
    purchase_price:      parseFloat(document.getElementById('iPrice').value) || null,
    purchase_date:       document.getElementById('iPDate').value || null,
    notes:               document.getElementById('iNotes').value.trim() || null,
    upc_barcode:         document.getElementById('iBarcode').value.trim() || null,
    wardrobe_owner_id:   parseInt(document.getElementById('iOwner').value)||null,
    wardrobe_nickname:   document.getElementById('iNickname').value.trim()||null,
    wardrobe_color:      document.getElementById('iColor').value.trim()||null,
    season_tags:         _iSeasonSel,
    occasion_tags:       _iOccasionSel,
    wardrobe_status:     document.getElementById('iStatus').value,
    sold_price:          parseFloat(document.getElementById('iSoldPrice').value)||null,
    sold_date:           document.getElementById('iSoldDate').value||null,
    sold_platform:       document.getElementById('iSoldPlatform').value||null,
    donated_fmv:         parseFloat(document.getElementById('iDonatedFmv').value)||null,
    donated_org_contact_id: parseInt(document.getElementById('iDonatedOrg')?.value)||null,
    discarded_reason:    document.getElementById('iDiscardReason').value.trim()||null,
  };

  try {
    if (_editingItemId) {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}`, payload);
      toast('Item updated', 'ok');
    } else {
      // New item — needs to go through inventory first with wardrobe category
      // then update wardrobe fields
      // For now create via inventory with wardrobe category
      // Get first available location, or use ID 1 as fallback
      let parentId = 1;
      try {
        const locs = await window.api('GET', '/inventory/locations/flat');
        if (locs?.length) parentId = locs[0].id;
      } catch(e) {}
      const invPayload = {
        name, brand: document.getElementById('iBrand').value.trim()||null,
        category: document.getElementById('iCategory').value,
        purchase_price: parseFloat(document.getElementById('iPrice').value)||null,
        purchase_date:  document.getElementById('iPDate').value||null,
        notes: document.getElementById('iNotes').value.trim()||null,
        upc_barcode: document.getElementById('iBarcode').value.trim()||null,
        parent_type: 'location', parent_id: parentId, quantity: 1
      };
      const created = await window.api('POST', '/inventory/items', invPayload);
      if (created.id) {
        _editingItemId = created.id;
        await window.api('PUT', `/wardrobe/items/${created.id}`, payload);
      }
      toast('Item added', 'ok');
    }
    if (!opts.keepOpen) { closeDrawer('itemDrawer'); loadItems(); }
    // Upload any photos that were picked before/during editing
    if (_pendingItemPhotos.length && _editingItemId) {
      try {
        const fd = new FormData();
        _pendingItemPhotos.forEach(f => fd.append('photos', f));
        await fetch(`${window.location.origin}/api/v1/attachments/item/${_editingItemId}`,{
          method:'POST', body:fd,
          headers: LT.authToken ? { Authorization: 'Bearer '+LT.authToken } : {}
        });
        _pendingItemPhotos = [];
        if (opts.keepOpen) renderItemPhotoPanel();
        else loadItems();
      } catch(e) { toast('Photos saved but upload failed: '+e.message,'warn'); }
    }
    return true;
  } catch(e) { toast('Save failed: '+e.message, 'err'); return false; }
}

async function deleteItem() {
  LT.confirm({
    title: 'Remove from wardrobe?',
    msg: 'This only updates the wardrobe status — the inventory item remains.',
    confirmLabel: 'Remove',
    onConfirm: async () => {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}`, { wardrobe_status: 'discarded' });
      closeDrawer('itemDrawer');
      loadItems();
      toast('Item removed from wardrobe', 'ok');
    }
  });
}

// ── Outfits ───────────────────────────────────────────────────
async function loadOutfits() {
  try {
    const url = `/wardrobe/outfits${_activeMember?'?member_id='+_activeMember:''}`;
    const outfits = await window.api('GET', url);
    const el = document.getElementById('outfitList');
    if (!outfits.length) {
      el.className = '';
      el.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👗</div>
        <div class="lb-empty-title">No outfits yet</div>
        <div class="lb-empty-sub">Create an outfit to start planning your week</div>
      </div>`;
      return;
    }
    let filtered = outfits;
    if (_outfitFilters.season)   filtered = filtered.filter(o => (o.season_tags||[]).includes(_outfitFilters.season));
    if (_outfitFilters.occasion) filtered = filtered.filter(o => (o.occasion_tags||[]).includes(_outfitFilters.occasion));
    if (!filtered.length) {
      el.className = '';
      el.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👗</div>
        <div class="lb-empty-title">No outfits match</div>
        <div class="lb-empty-sub">Try changing filters</div>
      </div>`;
      return;
    }
    refreshMemberCache();
    el.className = 'lb-outfits-grid';
    el.style.gridTemplateColumns = `repeat(${_itemCols},1fr)`;
    el.innerHTML = filtered.map((o, k) => {
      const tilt = `lb-tilt-${k % 4}`;
      const member = o.family_member_id ? _memberById[o.family_member_id] : null;
      const ownerName = member?.display_name || o.owner_name || '';
      const polaroid = lbPolaroid({
        primary_photo: o.primary_photo,
        category: null,
        name: o.name,
        label: o.name,
        ratio: 'square'
      });
      return `<div class="lb-item-card ${tilt}" style="position:relative" onclick="openOutfitDrawer(${o.id})">
        ${polaroid}
        <div class="lb-item-meta">
          <span class="lb-item-meta-owner">${ownerName ? lbMemberDot(member, 5) + esc(ownerName) : ''}</span>
          <span class="lb-item-meta-stat">${(o.items||[]).length ? `${o.items.length}pc` : '·'}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function openOutfitDrawer(id) {
  try {
  _editingOutfitId = id||null;
  _oSeasonSel = []; _oOccasionSel = []; _oItemIds = [];
  _oPhotos = [];

  document.getElementById('outfitDrawerTitle').textContent = id ? 'Edit Outfit' : 'New Outfit';
  document.getElementById('oDeleteBtn').style.display = id ? '' : 'none';
  document.getElementById('oName').value = '';
  document.getElementById('oMember').value = '';
  document.getElementById('oNotes').value = '';

  if (id) {
    try {
      const outfits = await window.api('GET', '/wardrobe/outfits');
      const o = outfits.find(x => x.id === id);
      if (o) {
        document.getElementById('oName').value   = o.name||'';
        document.getElementById('oMember').value = o.family_member_id||'';
        document.getElementById('oNotes').value  = o.notes||'';
        _oSeasonSel   = o.season_tags   || [];
        _oOccasionSel = o.occasion_tags || [];
        _oItemIds     = (o.items||[]).map(i => i.id);
      }
    } catch(e) {}
  }

  renderTagPicker('oSeasonTags',   SEASON_OPTS,   _oSeasonSel,   'toggleOSeason');
  renderTagPicker('oOccasionTags', OCCASION_OPTS, _oOccasionSel, 'toggleOOccasion');
  await renderItemPicker();
  openDrawer('outfitDrawer');
  } catch(e) { console.error('openOutfitDrawer error:', e); toast('Could not open outfit drawer: ' + e.message, 'err'); }
}

let _pickerItems = [];

async function renderItemPicker() {
  const memberId = document.getElementById('oMember').value;
  try {
    const items = await window.api('GET', `/wardrobe/items${memberId?'?member_id='+memberId:''}`);
    _pickerItems = items;
    const el = document.getElementById('oItemPicker');
    if (!items.length) {
      el.innerHTML = '<div style="color:var(--text3);font-size:12px">No items' + (memberId?' for this member':' yet') + '</div>';
      return;
    }
    el.innerHTML = `<div class="wrd-item-picker-grid">${items.map(item => {
      const sel = _oItemIds.includes(item.id);
      const thumb = item.primary_photo?.id
        ? `<img src="/api/v1/attachments/thumb/${item.primary_photo.id}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
        : `<div style="width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px">${(item.category||'?').charAt(0)}</div>`;
      return `<div class="wrd-item-pick-card${sel?' selected':''}" onclick="toggleOItem(${item.id})" title="${esc(item.wardrobe_nickname||item.name)}">
        <div class="wrd-item-pick-thumb">${thumb}</div>
        ${sel?`<div class="wrd-item-pick-check">✓</div>`:''}
        <div class="wrd-item-pick-label">${esc((item.wardrobe_nickname||item.name).substring(0,14))}</div>
      </div>`;
    }).join('')}</div>`;
  } catch(e) {}
}

function syncOutfitTagsFromItems() {
  const selected = _pickerItems.filter(i => _oItemIds.includes(i.id));
  if (!selected.length) return;
  const seasons   = [...new Set(selected.flatMap(i => i.season_tags||[]))];
  const occasions = [...new Set(selected.flatMap(i => i.occasion_tags||[]))];
  if (seasons.length)   { _oSeasonSel   = seasons;   renderTagPicker('oSeasonTags',   SEASON_OPTS,   _oSeasonSel,   'toggleOSeason'); }
  if (occasions.length) { _oOccasionSel = occasions; renderTagPicker('oOccasionTags', OCCASION_OPTS, _oOccasionSel, 'toggleOOccasion'); }
}

function toggleOItem(id) {
  _oItemIds = _oItemIds.includes(id) ? _oItemIds.filter(x=>x!==id) : [..._oItemIds,id];
  syncOutfitTagsFromItems();
  renderItemPicker();
}
async function saveOutfit(opts = {}) {
  const name = document.getElementById('oName').value.trim();
  if (!name) { toast('Name is required', 'err'); return false; }
  const payload = {
    name, family_member_id: parseInt(document.getElementById('oMember').value)||null,
    season_tags: _oSeasonSel, occasion_tags: _oOccasionSel,
    notes: document.getElementById('oNotes').value.trim()||null,
    item_ids: _oItemIds
  };
  try {
    if (_editingOutfitId) {
      await window.api('PUT', `/wardrobe/outfits/${_editingOutfitId}`, payload);
      toast('Outfit updated', 'ok');
    } else {
      const created = await window.api('POST', '/wardrobe/outfits', payload);
      if (created && created.id) _editingOutfitId = created.id;
      toast('Outfit created', 'ok');
    }
    if (!opts.keepOpen) { closeDrawer('outfitDrawer'); loadOutfits(); }
    return true;
  } catch(e) { toast('Save failed: '+e.message, 'err'); return false; }
}

async function deleteOutfit() {
  LT.confirm({
    title: 'Delete this outfit?',
    msg: 'This removes the outfit and unschedules it from any planner days. Items in your wardrobe are not affected.',
    confirmLabel: 'Delete',
    onConfirm: async () => {
      await window.api('DELETE', `/wardrobe/outfits/${_editingOutfitId}`);
      closeDrawer('outfitDrawer');
      loadOutfits();
      toast('Outfit deleted', 'ok');
    }
  });
}

// ── Insights ─────────────────────────────────────────────────
async function loadInsights() {
  try {
    const url = `/wardrobe/insights${_activeMember?'?member_id='+_activeMember:''}`;
    const d = await window.api('GET', url);
    const root = document.getElementById('lbInsights');
    if (!root) return;
    refreshMemberCache();

    const nowMonth = new Date().toLocaleString('en-US', { month:'long' });
    const year = new Date().getFullYear();
    const total = d.total || 0;
    const worn  = total - (d.never_worn || 0);
    const neverWorn = d.never_worn || 0;
    const value = Math.round(d.total_value || 0);

    const heroEyebrow = `SEASON · ${nowMonth.toUpperCase()} ${year}`;
    const heroSentence = `${worn} worn, <span class="neverworn">${neverWorn} never worn,</span> $${value.toLocaleString()} on the rack.`;

    // Section: Never worn (top 8 in triage cards)
    const neverWornItems = d.never_worn_items || [];
    const triageHTML = neverWornItems.length ? `
      <div class="lb-section-hdr">
        <div>
          <span class="lb-section-hdr-title">Never worn</span>
          <span class="lb-section-hdr-count">· ${neverWornItems.length}</span>
        </div>
        <button class="lb-pill-btn" onclick="toast('Bulk triage coming soon','info')">Triage all</button>
      </div>
      <div class="lb-triage-grid" style="grid-template-columns:repeat(${_itemCols},1fr)">
        ${neverWornItems.slice(0,8).map((it, k) => {
          const polaroid = lbPolaroid({
            primary_photo: it.primary_photo,
            category: it.category,
            name: it.wardrobe_nickname || it.name,
            label: it.wardrobe_nickname || it.name,
            ratio: 'square'
          });
          return `<div class="lb-tilt-${k%4}">
            <div onclick="openItemDrawer(${it.id})" style="cursor:pointer">${polaroid}</div>
            <div class="lb-triage-actions">
              <button class="keep" onclick="event.stopPropagation();toast('Tagged keep','ok')">Keep</button>
              <button class="donate" onclick="event.stopPropagation();toast('Tagged donate','ok')">Donate</button>
              <button class="sell" onclick="event.stopPropagation();toast('Tagged sell','ok')">Sell</button>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    // Section: Most worn (5 across)
    const mostWornHTML = (d.most_worn || []).length ? `
      <div class="lb-section-hdr">
        <div>
          <span class="lb-section-hdr-title">Most worn</span>
          <span class="lb-section-hdr-count">· ${d.most_worn.length}</span>
        </div>
      </div>
      <div class="lb-most-grid" style="grid-template-columns:repeat(${_itemCols},1fr)">
        ${d.most_worn.map((it, k) => {
          const tilt = `lb-tilt-${k % 4}`;
          const polaroid = lbPolaroid({
            primary_photo: it.primary_photo,
            category: it.category,
            name: it.wardrobe_nickname || it.name,
            label: it.wardrobe_nickname || it.name,
            ratio: 'square'
          });
          return `<div class="lb-item-card ${tilt}" onclick="openItemDrawer(${it.id})" style="cursor:pointer">
            ${polaroid}
            <div class="lb-item-meta">
              <span class="lb-item-meta-stat">${it.times_worn}W</span>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    // Section: Spend by member (proportional bar)
    const spendByMember = d.spend_by_member || [];
    const spendHTML = spendByMember.length ? `
      <div class="lb-section-hdr">
        <div><span class="lb-section-hdr-title">Spend by member</span></div>
      </div>
      <div class="lb-spend-row">
        ${spendByMember.map(s => {
          const member = _memberById[s.member_id] || {};
          const color = member.color || 'var(--text3)';
          const flex = Math.max(s.total, 1);
          return `<div class="lb-spend-cell" style="flex:${flex};border-left-color:${color}">
            <div class="lb-spend-cell-name">${esc((s.name||'?').toUpperCase())}</div>
            <div class="lb-spend-cell-val">$${Math.round(s.total).toLocaleString()}</div>
          </div>`;
        }).join('')}
      </div>` : '';

    root.innerHTML = `
      <div class="lb-insights">
        <div class="lb-hero">
          <div class="lb-hero-eyebrow">${heroEyebrow}</div>
          <div class="lb-hero-num">${heroSentence}</div>
        </div>
        ${triageHTML}
        ${mostWornHTML}
        ${spendHTML}
      </div>`;
  } catch(e) {}
}

function esc(s) { const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function emptyState(icon,title,sub) {
  return `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
    <div style="font-size:48px;margin-bottom:12px">${icon}</div>
    <div style="font-weight:700;font-size:15px;margin-bottom:6px">${title}</div>
    <div style="font-size:13px">${sub}</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
