<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wardrobe — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') !== '0') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    .member-pills{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px 0}
    .member-pill{padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;
      border:1.5px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s}
    .member-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .weather-strip{display:flex;gap:10px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none}
    .weather-strip::-webkit-scrollbar{display:none}
    .weather-col{flex-shrink:0;width:200px}
    .weather-cell{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:13px}
    .weather-cell.today{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
    .day-scroll-wrap{position:relative;padding:0 16px}
    .day-scroll{display:flex;gap:10px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:none}
    .day-scroll::-webkit-scrollbar{display:none}
    .scroll-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;
      background:var(--bg2);border:1px solid var(--border);border-radius:50%;
      display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;font-size:16px}
    .scroll-arrow.left{left:4px}.scroll-arrow.right{right:4px}
    .day-col{flex-shrink:0;width:180px}
    .day-hdr{font-size:12px;font-weight:700;color:var(--text2);padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
    .outfit-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:8px;font-size:13px;cursor:pointer}
    .outfit-card:hover{border-color:var(--accent)}
    .outfit-name{font-weight:600;margin-bottom:4px}
    .outfit-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
    .outfit-tag{font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
    .add-outfit-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--r);
      background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit}
    .add-outfit-btn:hover{border-color:var(--accent);color:var(--accent)}
    .insights-section{padding:12px 16px 90px}
    .insights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
    @media(min-width:600px){.insights-grid{grid-template-columns:repeat(4,1fr)}}
    .insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
    .insight-val{font-size:22px;font-weight:800;color:var(--accent)}
    .insight-label{font-size:11px;color:var(--text3);margin-top:2px}

    .item-name{font-size:13px;font-weight:600;margin-bottom:2px}
    .item-meta{font-size:11px;color:var(--text3)}
    .tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:0;overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Calendar-style day cards (planner) ──────────────────── */
    .day-card{flex-shrink:0;width:140px;background:var(--bg2);border:1px solid var(--border);
      border-radius:var(--r-lg,16px);padding:14px 12px;position:relative;display:flex;flex-direction:column;gap:6px}
    .day-card.today{border:2px solid #185FA5;padding:13px 11px}
    .day-card-today-badge{position:absolute;top:8px;right:8px;background:#dbeafe;color:#1e40af;
      font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em}
    .day-card-wkd{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .day-card-num{font-size:22px;font-weight:500;color:var(--text);line-height:1}
    .day-card-mo{font-size:11px;color:var(--text3);margin-top:-2px}
    .day-card-wx{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);min-height:14px}
    .day-card-body{margin-top:4px;display:flex;flex-direction:column;gap:6px}
    .day-card-thumb{width:100%;aspect-ratio:1;border-radius:var(--r-sm,8px);overflow:hidden;
      display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
    .day-card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .day-card-thumb-svg{width:38%;height:38%;opacity:.65}
    .day-card-empty{width:100%;height:54px;border:1.5px dashed var(--border2);
      border-radius:var(--r-sm,8px);background:transparent;color:var(--text3);font-size:18px;
      display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;transition:all .15s}
    .day-card-empty:hover{border-color:var(--accent);color:var(--accent)}
    .day-card-empty-hint{font-size:10px;color:var(--text3);text-align:center;margin-top:2px}
    .day-card-outfit-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.3;
      overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .day-card-outfit-meta{font-size:10px;color:var(--text2);line-height:1.2}

    /* Tinted thumb backgrounds keyed off outfit's first occasion tag */
    .tint-casual,.tint-school,.tint-other{background:rgba(143,163,191,0.18);color:var(--text2)}
    .tint-active,.tint-sports,.tint-outdoor{background:rgba(167,139,250,0.18);color:#a78bfa}
    .tint-formal,.tint-work,.tint-evening{background:rgba(92,114,250,0.18);color:var(--accent)}

    /* ── Photo panel inside drawers (item + outfit) ─────────── */
    .wrd-photo-panel{margin:14px 0 10px;padding:12px;border:1px dashed var(--border);
      border-radius:var(--r-sm,8px);background:var(--bg);display:flex;flex-direction:column;gap:8px}
    .wrd-photo-panel.locked{opacity:.55;cursor:not-allowed}
    .wrd-photo-panel-hdr{display:flex;align-items:center;justify-content:space-between;font-size:12px;
      color:var(--text2);font-weight:600}
    .wrd-photo-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .wrd-photo-strip-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border);
      cursor:pointer;background:var(--bg2);display:flex;align-items:center;justify-content:center}
    .wrd-photo-strip-thumb.primary{border-color:#22c55e}
    .wrd-photo-strip-thumb img{width:100%;height:100%;object-fit:cover}
    .wrd-photo-add{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;
      background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;
      display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .wrd-photo-add:hover{border-color:var(--accent);color:var(--accent)}

    /* ── Outfit card cover thumb ──────────────────────────── */
    .outfit-card-cover{width:100%;aspect-ratio:16/9;border-radius:var(--r-sm,8px);overflow:hidden;
      margin-bottom:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;
      border:1px solid var(--border)}
    .outfit-card-cover img{width:100%;height:100%;object-fit:cover}

    /* ── Planner add-outfit modal ─────────────────────────── */
    #wrdPlannerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
      align-items:flex-end;justify-content:center;z-index:550}
    #wrdPlannerOverlay.open{display:flex}
    #wrdPlannerOverlay .wrd-modal{width:min(440px,100%);background:var(--bg2);
      border-radius:16px 16px 0 0;padding:16px;border:1px solid var(--border);border-bottom:none}
    @media(min-width:600px){
      #wrdPlannerOverlay{align-items:center}
      #wrdPlannerOverlay .wrd-modal{border-radius:16px;border-bottom:1px solid var(--border)}
    }
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script>window.GH_PAGE = { module:'wardrobe', title:'Wardrobe' };</script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>
<script src="/attachments.js"></script>

<div id="app">
  <div class="gh-page-header"></div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('planner',this)">Planner</div>
    <div class="tab" onclick="switchTab('items',this)">Items</div>
    <div class="tab" onclick="switchTab('outfits',this)">Outfits</div>
    <div class="tab" onclick="switchTab('insights',this)">Insights</div>
  </div>

  <!-- Member filter -->
  <div class="member-pills" id="memberPills"></div>

  <!-- Planner tab -->
  <div id="tab-planner">
    <div class="weather-strip" id="weatherStrip"></div>
    <div class="day-scroll-wrap">
      <div class="scroll-arrow left" id="scrollLeft">‹</div>
      <div class="day-scroll" id="dayScroll"></div>
      <div class="scroll-arrow right" id="scrollRight">›</div>
    </div>
  </div>

  <!-- Items tab -->
  <div id="tab-items" style="display:none">
    <div style="display:flex;align-items:center;padding:6px 16px 0">
      <div style="flex:1"></div>
      <div id="itemViewToolbar"></div>
    </div>
    <div id="itemGrid" style="padding:8px 16px 90px"></div>
  </div>

  <!-- Outfits tab -->
  <div id="tab-outfits" style="display:none;padding:10px 16px 90px">
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary" style="padding:8px 16px;font-size:13px" onclick="openOutfitDrawer()">+ New Outfit</button>
    </div>
    <div id="outfitList"></div>
  </div>

  <!-- Insights tab -->
  <div id="tab-insights" style="display:none">
    <div class="insights-section">
      <div class="insights-grid" id="insightsGrid"></div>
      <div style="font-weight:700;margin-bottom:10px">Most Worn</div>
      <div id="mostWornList"></div>
    </div>
  </div>
</div>

<!-- Item Drawer -->
<div class="gh-drawer" id="itemDrawer">
  <div class="gh-drawer-header">
    <div class="gh-drawer-title" id="itemDrawerTitle">Add Item</div>
    <button class="gh-drawer-close" onclick="closeDrawer('itemDrawer')">×</button>
  </div>
  <div class="gh-drawer-body">
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="iName"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="iCategory"><option value="">Loading…</option></select>
      </div>
      <div class="form-group"><label class="form-label">Owner</label>
        <select class="form-select" id="iOwner"><option value="">— select —</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="iBrand"></div>
      <div class="form-group"><label class="form-label">Nickname</label><input class="form-input" id="iNickname" placeholder="Optional label"></div>
    </div>
    <div class="form-group"><label class="form-label">Season Tags</label>
      <div id="iSeasonTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Occasion Tags</label>
      <div id="iOccasionTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Purchase Price</label><input class="form-input" type="number" id="iPrice" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Purchase Date</label><input class="form-input" type="date" id="iPDate"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="iStatus" onchange="toggleStatusFields()"><option value="active">Active</option></select>
    </div>
    <div id="soldFields" style="display:none">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sale Price</label><input class="form-input" type="number" id="iSoldPrice"></div>
        <div class="form-group"><label class="form-label">Sale Date</label><input class="form-input" type="date" id="iSoldDate"></div>
      </div>
      <div class="form-group"><label class="form-label">Platform</label>
        <select class="form-select" id="iSoldPlatform"><option value="">— select —</option></select>
      </div>
    </div>
    <div id="donatedFields" style="display:none">
      <div class="form-group"><label class="form-label">Organization</label>
        <div id="iDonatedOrg"></div>
      </div>
      <div class="form-group"><label class="form-label">Fair Market Value</label><input class="form-input" type="number" id="iDonatedFmv"></div>
    </div>
    <div id="discardedFields" style="display:none">
      <div class="form-group"><label class="form-label">Reason</label><input class="form-input" id="iDiscardReason"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="iNotes" style="min-height:70px"></textarea></div>

    <!-- Photos panel (greyed when no _editingItemId, photo strip when item exists) -->
    <div class="wrd-photo-panel" id="iPhotoPanel">
      <div class="wrd-photo-panel-hdr">
        <span>Photos</span>
        <span id="iPhotoPanelCount" style="font-weight:400;color:var(--text3);font-size:11px"></span>
      </div>
      <div id="iPhotoPanelBody"></div>
    </div>

    <div style="display:flex;gap:8px;padding-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveItem()">Save</button>
      <button class="btn btn-ghost" id="iDeleteBtn" style="display:none" onclick="deleteItem()">Delete</button>
    </div>
  </div>
</div>

<!-- Outfit Drawer -->
<div class="gh-drawer" id="outfitDrawer">
  <div class="gh-drawer-header">
    <div class="gh-drawer-title" id="outfitDrawerTitle">New Outfit</div>
    <button class="gh-drawer-close" onclick="closeDrawer('outfitDrawer')">×</button>
  </div>
  <div class="gh-drawer-body">
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="oName" placeholder="e.g. Monday School"></div>
    <div class="form-group"><label class="form-label">Family Member</label>
      <select class="form-select" id="oMember"><option value="">— all —</option></select>
    </div>
    <div class="form-group"><label class="form-label">Season Tags</label>
      <div id="oSeasonTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Occasion Tags</label>
      <div id="oOccasionTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Items in this outfit</label>
      <div id="oItemPicker" style="margin-top:6px"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="oNotes" style="min-height:60px"></textarea></div>

    <!-- Cover photo panel (greyed when no _editingOutfitId) -->
    <div class="wrd-photo-panel" id="oPhotoPanel">
      <div class="wrd-photo-panel-hdr">
        <span>Cover Photo</span>
        <span id="oPhotoPanelCount" style="font-weight:400;color:var(--text3);font-size:11px"></span>
      </div>
      <div id="oPhotoPanelBody"></div>
    </div>

    <div style="display:flex;gap:8px;padding-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveOutfit()">Save</button>
      <button class="btn btn-ghost" id="oDeleteBtn" style="display:none" onclick="deleteOutfit()">Delete</button>
    </div>
  </div>
</div>

<!-- Planner add-outfit modal (replaces broken LT.modal call) -->
<div id="wrdPlannerOverlay" onclick="if(event.target===this)closePlannerModal()">
  <div class="wrd-modal" id="wrdPlannerBody"></div>
</div>

<button class="fab" id="fabBtn" onclick="onFab()">+</button>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEATHER_ICONS = { Clear:'☀️', Clouds:'⛅', Rain:'🌧️', Drizzle:'🌦️', Thunderstorm:'⛈️', Snow:'❄️', Mist:'🌫️' };
const SEASON_OPTS   = ['Spring','Summer','Fall','Winter','Rainy','All-season'];
const OCCASION_OPTS = ['Casual','School','Sports','Work','Formal','Outdoor','Evening'];

let _members = [], _activeMember = null, _currentTab = 'planner';
let _editingItemId = null, _editingOutfitId = null;
let _allItems = [], _iSeasonSel = [], _iOccasionSel = [];
let _oSeasonSel = [], _oOccasionSel = [], _oItemIds = [];
let _iPhotos = [], _oPhotos = [];
let _itemView = 'grid', _itemCols = 2, _itemFilters = {};
let _outfitView = 'grid', _outfitCols = 2, _outfitFilters = {};

function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
function openDrawer(id)  { document.getElementById(id).classList.add('open'); }

async function init() {
  AttachmentManager.injectStyles();
  await loadMembers();
  initItemView();
  initOutfitView();
  renderDays();
  loadWeather();
  loadTabContent();
}

function initItemView() {
  GH_VIEW.init('itemViewToolbar', 'wrd_item', state => {
    _itemView = state.view; _itemCols = state.cols; _itemFilters = state.filters || {};
    if (_currentTab === 'items') loadItems();
  }, {
    defaultView: 'grid', defaultCols: 2,
    filterFields: [
      { key:'category', type:'select', label:'Category', options:[{value:'',label:'All'},{value:'Clothing',label:'Clothing'},{value:'Shoes',label:'Shoes'},{value:'Accessories',label:'Accessories'},{value:'Jewelry',label:'Jewelry'},{value:'Hats',label:'Hats'},{value:'Bags',label:'Bags'}]},
      { key:'season',   type:'select', label:'Season',   options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'},{value:'All-season',label:'All-season'}]},
      { key:'occasion', type:'select', label:'Occasion', options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'School',label:'School'},{value:'Sports',label:'Sports'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'}]},
    ]
  });
}

function initOutfitView() {
  GH_VIEW.init('outfitViewToolbar', 'wrd_outfit', state => {
    _outfitView = state.view; _outfitCols = state.cols; _outfitFilters = state.filters || {};
    if (_currentTab === 'outfits') loadOutfits();
  }, {
    defaultView: 'grid', defaultCols: 2,
    filterFields: [
      { key:'season',   type:'select', label:'Season',   options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'}]},
      { key:'occasion', type:'select', label:'Occasion', options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'School',label:'School'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'},{value:'Evening',label:'Evening'}]},
    ]
  });
}
async function loadMembers() {
  try {
    _members = await window.api('GET', '/settings/family');
    const pills = document.getElementById('memberPills');
    pills.innerHTML = `<div class="member-pill active" data-id="" onclick="selectMember(null,this)">All</div>`;
    _members.forEach(m => {
      const p = document.createElement('div');
      p.className = 'member-pill'; p.dataset.id = m.id;
      p.textContent = m.display_name;
      p.onclick = () => selectMember(m.id, p);
      pills.appendChild(p);
    });
    // Populate owner selects
    ['iOwner','oMember'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      _members.forEach(m => {
        const o = document.createElement('option'); o.value = m.id; o.textContent = m.display_name;
        sel.appendChild(o);
      });
    });
  } catch(e) {}
}

function selectMember(id, el) {
  _activeMember = id;
  document.querySelectorAll('.member-pill').forEach(p => p.classList.toggle('active', p === el));
  loadTabContent();
}

function switchTab(tab, el) {
  _currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['planner','items','outfits','insights'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  // Update FAB
  const fab = document.getElementById('fabBtn');
  fab.style.display = (tab === 'planner') ? 'none' : '';
  loadTabContent();
}

function onFab() {
  if (_currentTab === 'items')   openItemDrawer();
  if (_currentTab === 'outfits') openOutfitDrawer();
}

function loadTabContent() {
  if (_currentTab === 'planner')  { /* already rendered */ }
  if (_currentTab === 'items')    loadItems();
  if (_currentTab === 'outfits')  loadOutfits();
  if (_currentTab === 'insights') loadInsights();
}

// ── Planner ──────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WKD_SHORT    = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// Map an occasion tag to a CSS class controlling the fallback thumbnail tint
function tintClassForOccasion(tag) {
  if (!tag) return 'tint-other';
  const t = tag.toLowerCase();
  if (t.includes('formal') || t.includes('work') || t.includes('evening')) return 'tint-formal';
  if (t.includes('active') || t.includes('gym') || t.includes('sport') || t.includes('outdoor')) return 'tint-active';
  if (t.includes('casual') || t.includes('school'))                                              return 'tint-casual';
  return 'tint-other';
}

// Hanger SVG used as the empty/fallback thumbnail glyph
const HANGER_SVG = `<svg class="day-card-thumb-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 7a2 2 0 1 1 .001-3.999A2 2 0 0 1 12 7Z"/>
  <path d="M12 7v2.2a1 1 0 0 1-.45.83L3 16h18l-8.55-5.97A1 1 0 0 1 12 9.2V7Z"/>
</svg>`;

function renderDays() {
  const scroll = document.getElementById('dayScroll');
  const strip  = document.getElementById('weatherStrip');
  const today  = new Date();
  scroll.innerHTML = strip.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const isToday = i === 0;
    const dateKey = d.toISOString().slice(0,10);
    const wkd     = WKD_SHORT[d.getDay()];
    const dayNum  = d.getDate();
    const moStr   = MONTHS_SHORT[d.getMonth()];

    // Weather column above (kept for compatibility, but the card also shows
    // a compact weather row inline so a user scanning a single column sees temp)
    const wCol = document.createElement('div');
    wCol.className = 'weather-col'; wCol.id = 'wcol_'+i;
    wCol.innerHTML = `<div class="weather-cell${isToday?' today':''}">
      <span style="font-size:20px" id="wicon_${i}">—</span>
      <div><div style="font-weight:600" id="wtemp_${i}">—°F</div><div style="font-size:11px;opacity:.8" id="wdesc_${i}">Loading…</div></div>
    </div>`;
    strip.appendChild(wCol);

    const col = document.createElement('div');
    col.className = `day-card${isToday?' today':''}`;
    col.id = 'dcol_'+i; col.dataset.date = dateKey;
    col.innerHTML = `
      ${isToday ? '<div class="day-card-today-badge">TODAY</div>' : ''}
      <div class="day-card-wkd">${wkd}</div>
      <div class="day-card-num">${dayNum}</div>
      <div class="day-card-mo">${moStr}</div>
      <div class="day-card-wx" id="wxi_${i}"><span style="opacity:.6">—</span></div>
      <div class="day-card-body" id="doutfits_${i}">
        <button class="day-card-empty" onclick="addPlannerEntry(${i},'${dateKey}')">+</button>
        <div class="day-card-empty-hint">No outfit</div>
      </div>`;
    scroll.appendChild(col);
  }

  // Scroll arrows
  const sc = scroll;
  const la = document.getElementById('scrollLeft');
  const ra = document.getElementById('scrollRight');
  function upd() {
    la.style.opacity = sc.scrollLeft > 10 ? '1' : '0.3';
    ra.style.opacity = sc.scrollLeft < sc.scrollWidth - sc.clientWidth - 10 ? '1' : '0.3';
  }
  sc.addEventListener('scroll', upd); upd();
  la.onclick = () => sc.scrollBy({left:-160,behavior:'smooth'});
  ra.onclick = () => sc.scrollBy({left:160,behavior:'smooth'});

  loadPlannerEntries();
}

async function loadPlannerEntries() {
  try {
    const today = new Date();
    const end   = new Date(today); end.setDate(today.getDate()+6);
    const params = `start=${today.toISOString().slice(0,10)}&end=${end.toISOString().slice(0,10)}${_activeMember?'&member_id='+_activeMember:''}`;
    const entries = await window.api('GET', `/wardrobe/planner?${params}`);

    // Pull all outfits once so we can decorate each entry with cover photo +
    // item count + occasion tag (planner GET doesn't include these).
    let outfitMap = {};
    try {
      const outfits = await window.api('GET', '/wardrobe/outfits');
      outfitMap = Object.fromEntries((outfits||[]).map(o => [o.id, o]));
    } catch(e) {}

    for (let i = 0; i < 7; i++) {
      const d = new Date(today); d.setDate(today.getDate()+i);
      const dateKey = d.toISOString().slice(0,10);
      const dayEntries = entries.filter(e => e.plan_date === dateKey);
      const el = document.getElementById('doutfits_'+i);
      if (!el) continue;

      if (!dayEntries.length) {
        el.innerHTML = `<button class="day-card-empty" onclick="addPlannerEntry(${i},'${dateKey}')" title="Add outfit">+</button>
          <div class="day-card-empty-hint">No outfit</div>`;
        continue;
      }

      el.innerHTML = dayEntries.map(e => {
        const outfit = outfitMap[e.outfit_id] || {};
        const itemCount = outfit.items?.length || 0;
        const firstOcc = (outfit.occasion_tags||[])[0] || e.occasion || '';
        const tint = tintClassForOccasion(firstOcc);
        const thumb = outfit.primary_photo
          ? `<div class="day-card-thumb"><img src="/api/v1/attachments/thumb/${outfit.primary_photo.id}" alt="${esc(e.outfit_name||'Outfit')}" onerror="this.parentElement.classList.add('${tint}');this.outerHTML='${HANGER_SVG.replace(/'/g,'&#39;')}'"></div>`
          : `<div class="day-card-thumb ${tint}">${HANGER_SVG}</div>`;
        const subtitle = [
          itemCount ? `${itemCount} item${itemCount===1?'':'s'}` : '',
          firstOcc ? esc(firstOcc) : ''
        ].filter(Boolean).join(' · ');
        return `<div onclick="removePlannerEntry(${e.id})" style="cursor:pointer">
          ${thumb}
          <div class="day-card-outfit-name" style="margin-top:6px">${esc(e.outfit_name||'Outfit')}</div>
          ${subtitle ? `<div class="day-card-outfit-meta">${subtitle}</div>` : ''}
        </div>`;
      }).join('');
    }
  } catch(e) {}
}

async function addPlannerEntry(dayIdx, dateKey) {

    if (!outfits.length) { toast('No outfits saved yet — create one in the Outfits tab first', 'info'); return; }

async function loadWeather() {
  try {
    const d = await window.api('GET', '/app/weather');
    if (!d || !d.list && !d.daily) return;
    const days = d.daily || d.list?.filter((_,i) => i%8===0) || [];
    days.slice(0,7).forEach((day, i) => {
      const weather = day.weather?.[0];
      const icon = WEATHER_ICONS[weather?.main] || '🌤️';
      const temp = day.temp?.day
        ? Math.round(day.temp.day) // already imperial if configured
        : Math.round((day.main?.temp || 293) - 273.15) * 9/5 + 32;
      const desc = weather?.description || '';
      const tempStr = `${Math.round(temp)}°F`;
      const wIcon = document.getElementById('wicon_'+i);
      const wTemp = document.getElementById('wtemp_'+i);
      const wDesc = document.getElementById('wdesc_'+i);
      if (wIcon) wIcon.textContent = icon;
      if (wTemp) wTemp.textContent = tempStr;
      if (wDesc) wDesc.textContent = desc;

      // Mirror into the day-card inline weather row
      const wxi = document.getElementById('wxi_'+i);
      if (wxi) wxi.innerHTML = `<span style="font-size:13px">${icon}</span><span>${tempStr}</span>`;
    });
  } catch(e) {}
}

async function loadItems() {
  try {
    const cat     = _itemFilters.category || '';
    const season  = _itemFilters.season   || '';
    const occasion= _itemFilters.occasion || '';
    let url = '/wardrobe/items?';
    if (_activeMember) url += `member_id=${_activeMember}&`;
    if (cat)     url += `category=${encodeURIComponent(cat)}&`;
    if (season)  url += `season=${encodeURIComponent(season)}&`;
    if (occasion)url += `occasion=${encodeURIComponent(occasion)}&`;
    _allItems = await window.api('GET', url);
    const grid = document.getElementById('itemGrid');
    if (!_allItems.length) { grid.innerHTML = emptyState('👔','No wardrobe items yet','Add items using the + button above'); return; }
    const stripeFor = item => item.wardrobe_status === 'donated' ? 'gh-s-amber'
      : item.wardrobe_status === 'sold' ? 'gh-s-gray'
      : (item.times_worn||0) > 10 ? 'gh-s-green' : 'gh-s-blue';
    grid.innerHTML = `<div style="display:grid;grid-template-columns:repeat(${_itemCols},minmax(0,1fr));gap:10px">` +
      _allItems.map(item => `
        <div class="gh-card ${stripeFor(item)}" onclick="openItemDrawer(${item.id})">
          <div class="gh-card-head">
            <div class="gh-card-title">${esc(item.wardrobe_nickname||item.name)}</div>
            ${item.attachment_count ? AttachmentManager.staticBadge('item', item.id, item.attachment_count) : ''}
          </div>
          <div class="gh-card-meta">${esc(item.category||'')}${item.brand?' · '+esc(item.brand):''}</div>
          <div class="gh-card-body">
            ${item.owner_name?`<div class="gh-card-row"><span>Owner</span><span class="ghv-dim">${esc(item.owner_name)}</span></div>`:''}
            ${item.times_worn?`<div class="gh-card-row"><span>Worn</span><span class="ghv">${item.times_worn}×</span></div>`:''}
            ${item.last_worn?`<div class="gh-card-row"><span>Last worn</span><span class="ghv-dim">${item.last_worn}</span></div>`:''}
          </div>
        </div>`).join('') + '</div>';

async function openItemDrawer(id) {

  _iPhotos = [];

  // Populate platform dropdown
  await GH_SELECT.init('iSoldPlatform', 'sold_platform', '', { placeholder: '— select —', allowAdd: false });

  document.getElementById('iName').value = '';
  document.getElementById('iBrand').value = '';
  document.getElementById('iNickname').value = '';
  document.getElementById('iPrice').value = '';

      document.getElementById('iPDate').value    = item.purchase_date||'';

      await GH_SELECT.init('iCategory', 'wardrobe_category', item.category||'Clothing', { allowAdd: false });
      document.getElementById('iOwner').value    = item.wardrobe_owner_id||'';
      await GH_SELECT.init('iStatus', 'wardrobe_status', item.wardrobe_status||'active', { allowAdd: false });
      toggleStatusFields();
      document.getElementById('iSoldPrice').value  = item.sold_price||'';
      document.getElementById('iSoldDate').value   = item.sold_date||'';
      GH_SELECT.init('iSoldPlatform','sold_platform',item.sold_platform||'',{placeholder:'— select —',allowAdd:false});
      document.getElementById('iDonatedFmv').value    = item.donated_fmv||'';
      document.getElementById('iDiscardReason').value = item.discarded_reason||'';

      try { _iOccasionSel = item.occasion_tags ? JSON.parse(item.occasion_tags) : []; } catch { _iOccasionSel=[]; }
    } catch(e) {}

// Greyed "Save first" hint when no _editingItemId; thumbnail strip + "+ Add Photo"
// when item exists. Pulls photos from /api/v1/attachments?entity_type=item&entity_id=N
async function renderItemPhotoPanel() {
  const panel = document.getElementById('iPhotoPanel');
  const body  = document.getElementById('iPhotoPanelBody');
  const count = document.getElementById('iPhotoPanelCount');
  if (!panel || !body) return;

  if (!_editingItemId) {
    panel.classList.add('locked');
    count.textContent = '';
    body.innerHTML = `<div style="font-size:12px;color:var(--text3);text-align:center;padding:6px 0">
      📷 Save the item first to add photos
    </div>`;
    return;
  }

  panel.classList.remove('locked');
  // Fetch photos from attachments API
  try {
    const list = await window.api('GET', `/attachments/item/${_editingItemId}`);
    const imgs = (list||[]).filter(a => a.is_image);
    _iPhotos = imgs;
    count.textContent = imgs.length ? `${imgs.length} photo${imgs.length===1?'':'s'}` : '';
    body.innerHTML = (imgs.length
        ? `<div class="wrd-photo-strip">${imgs.slice(0,8).map(p => `
            <div class="wrd-photo-strip-thumb${p.is_primary_photo?' primary':''}"
                 onclick="AttachmentManager._viewImage(${p.id},'${esc((p.label||p.original_filename||'').replace(/'/g,'&#39;'))}')">
              <img src="/api/v1/attachments/thumb/${p.id}" alt="${esc(p.label||p.original_filename||'')}"
                   onerror="this.parentElement.innerHTML='&#128247;'">
            </div>`).join('')}</div>`
        : '')
      + `<button type="button" class="wrd-photo-add" onclick="openItemPhotos()">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           ${imgs.length ? 'Manage Photos' : '+ Add Photo'}
         </button>`;
  } catch(e) {
    count.textContent = '';
    body.innerHTML = `<button type="button" class="wrd-photo-add" onclick="openItemPhotos()">+ Add Photo</button>`;
  }
}

async function openItemPhotos() {
  try {
    if (!_editingItemId) {
      const saved = await saveItem({ keepOpen: true });
      if (!saved) return;
      // After successful save we have an _editingItemId; refresh panel
      renderItemPhotoPanel();
    }
    const name = document.getElementById('iName').value.trim();
    // Force z-index inline so CSS caching can't hide the modal behind the drawer
    const attDrawer = document.getElementById('attDrawer');
    if (attDrawer) attDrawer.style.zIndex = '600';
    AttachmentManager.open('item', _editingItemId, name);
    // Refresh the panel after AttachmentManager closes — best-effort poll on drawer close
    const drawer = document.getElementById('attDrawer');
    if (drawer) {
      const observer = new MutationObserver(() => {
        if (!drawer.classList.contains('open')) {
          renderItemPhotoPanel();
          observer.disconnect();
        }
      });
      observer.observe(drawer, { attributes: true, attributeFilter: ['class'] });
    }
  } catch(e) {
    console.error('openItemPhotos:', e);
    toast('Photos error: ' + e.message, 'err');
  }
}

async function saveItem(opts = {}) {
  const name = document.getElementById('iName').value.trim();
  if (!name) { toast('Name is required', 'err'); return false; }

  const payload = {
    name:                document.getElementById('iName').value.trim() || null,
    brand:               document.getElementById('iBrand').value.trim() || null,
    category:            document.getElementById('iCategory').value || null,
    purchase_price:      parseFloat(document.getElementById('iPrice').value) || null,
    purchase_date:       document.getElementById('iPDate').value || null,
    notes:               document.getElementById('iNotes').value.trim() || null,
    wardrobe_owner_id:   parseInt(document.getElementById('iOwner').value)||null,
    wardrobe_nickname:   document.getElementById('iNickname').value.trim()||null,
    season_tags:         _iSeasonSel,
    occasion_tags:       _iOccasionSel,
    wardrobe_status:     document.getElementById('iStatus').value,
    sold_price:          parseFloat(document.getElementById('iSoldPrice').value)||null,
    sold_date:           document.getElementById('iSoldDate').value||null,
    sold_platform:       document.getElementById('iSoldPlatform').value||null,
    donated_fmv:         parseFloat(document.getElementById('iDonatedFmv').value)||null,
    donated_org_contact_id: parseInt(document.getElementById('iDonatedOrg')?.value)||null,
    discarded_reason:    document.getElementById('iDiscardReason').value.trim()||null,
  };

  try {
    if (_editingItemId) {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}`, payload);
      toast('Item updated', 'ok');
    } else {
      // New item — needs to go through inventory first with wardrobe category
      // then update wardrobe fields
      // For now create via inventory with wardrobe category
      // Get first available location, or use ID 1 as fallback
      let parentId = 1;
      try {
        const locs = await window.api('GET', '/inventory/locations/flat');
        if (locs?.length) parentId = locs[0].id;
      } catch(e) {}
      const invPayload = {
        name, brand: document.getElementById('iBrand').value.trim()||null,
        category: document.getElementById('iCategory').value,
        purchase_price: parseFloat(document.getElementById('iPrice').value)||null,
        purchase_date:  document.getElementById('iPDate').value||null,
        notes: document.getElementById('iNotes').value.trim()||null,
        parent_type: 'location', parent_id: parentId, quantity: 1
      };
      const created = await window.api('POST', '/inventory/items', invPayload);
      if (created.id) {
        _editingItemId = created.id;
        await window.api('PUT', `/wardrobe/items/${created.id}`, payload);
      }
      toast('Item added', 'ok');
    }
    if (!opts.keepOpen) { closeDrawer('itemDrawer'); loadItems(); }
    return true;
  } catch(e) { toast('Save failed: '+e.message, 'err'); return false; }
}

  try {
  _editingOutfitId = id||null;
  _oSeasonSel = []; _oOccasionSel = []; _oItemIds = [];
  _oPhotos = [];

  document.getElementById('outfitDrawerTitle').textContent = id ? 'Edit Outfit' : 'New Outfit';
  document.getElementById('oDeleteBtn').style.display = id ? '' : 'none';
  document.getElementById('oName').value = '';
  document.getElementById('oMember').value = '';
  document.getElementById('oNotes').value = '';

  if (id) {
    try {
      const outfits = await window.api('GET', '/wardrobe/outfits');
      const o = outfits.find(x => x.id === id);
      if (o) {
        document.getElementById('oName').value   = o.name||'';
        document.getElementById('oMember').value = o.family_member_id||'';
        document.getElementById('oNotes').value  = o.notes||'';
        _oSeasonSel   = o.season_tags   || [];
        _oOccasionSel = o.occasion_tags || [];
        _oItemIds     = (o.items||[]).map(i => i.id);
      }
    } catch(e) {}
  }

  renderTagPicker('oSeasonTags',   SEASON_OPTS,   _oSeasonSel,   'toggleOSeason');
  renderTagPicker('oOccasionTags', OCCASION_OPTS, _oOccasionSel, 'toggleOOccasion');
  await renderItemPicker();
  renderOutfitPhotoPanel();
  openDrawer('outfitDrawer');
  } catch(e) { console.error('openOutfitDrawer error:', e); toast('Could not open outfit drawer: ' + e.message, 'err'); }
}

// ── Outfit cover-photo panel ──────────────────────────────────
async function renderOutfitPhotoPanel() {
  const panel = document.getElementById('oPhotoPanel');
  const body  = document.getElementById('oPhotoPanelBody');
  const count = document.getElementById('oPhotoPanelCount');
  if (!panel || !body) return;

  if (!_editingOutfitId) {
    panel.classList.add('locked');
    count.textContent = '';
    body.innerHTML = `<div style="font-size:12px;color:var(--text3);text-align:center;padding:6px 0">
      📷 Save the outfit first to add a cover photo
    </div>`;
    return;
  }

  panel.classList.remove('locked');
  try {
    const list = await window.api('GET', `/attachments/outfit/${_editingOutfitId}`);
    const imgs = (list||[]).filter(a => a.is_image);
    _oPhotos = imgs;
    count.textContent = imgs.length ? `${imgs.length} photo${imgs.length===1?'':'s'}` : '';
    body.innerHTML = (imgs.length
        ? `<div class="wrd-photo-strip">${imgs.slice(0,8).map(p => `
            <div class="wrd-photo-strip-thumb${p.is_primary_photo?' primary':''}"
                 onclick="AttachmentManager._viewImage(${p.id},'${esc((p.label||p.original_filename||'').replace(/'/g,'&#39;'))}')">
              <img src="/api/v1/attachments/thumb/${p.id}" alt="${esc(p.label||p.original_filename||'')}"
                   onerror="this.parentElement.innerHTML='&#128247;'">
            </div>`).join('')}</div>`
        : '')
      + `<button type="button" class="wrd-photo-add" onclick="openOutfitPhotos()">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           ${imgs.length ? 'Manage Photos' : '+ Add Cover Photo'}
         </button>`;
  } catch(e) {
    count.textContent = '';
    body.innerHTML = `<button type="button" class="wrd-photo-add" onclick="openOutfitPhotos()">+ Add Cover Photo</button>`;
  }
}

async function openOutfitPhotos() {
  try {
    if (!_editingOutfitId) {
      const saved = await saveOutfit({ keepOpen: true });
      if (!saved) return;
      renderOutfitPhotoPanel();
    }
    const name = document.getElementById('oName').value.trim();
    const attDrawer = document.getElementById('attDrawer');
    if (attDrawer) attDrawer.style.zIndex = '600';
    AttachmentManager.open('outfit', _editingOutfitId, name);
    const drawer = document.getElementById('attDrawer');
    if (drawer) {
      const observer = new MutationObserver(() => {
        if (!drawer.classList.contains('open')) {
          renderOutfitPhotoPanel();
          observer.disconnect();
        }
      });
      observer.observe(drawer, { attributes: true, attributeFilter: ['class'] });
    }
  } catch(e) {
    console.error('openOutfitPhotos:', e);
    toast('Photos error: ' + e.message, 'err');
  }
}

async function renderItemPicker() {
  const memberId = document.getElementById('oMember').value;
  try {
    const items = await window.api('GET', `/wardrobe/items${memberId?'?member_id='+memberId:''}`);
    const el = document.getElementById('oItemPicker');
    if (!items.length) { el.innerHTML = '<div style="color:var(--text3);font-size:12px">No wardrobe items — add items in the Items tab first</div>'; return; }
    el.innerHTML = items.map(item => `
      <div onclick="toggleOItem(${item.id})" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;cursor:pointer;margin-bottom:4px;
        background:${_oItemIds.includes(item.id)?'var(--accent-bg)':'var(--bg2)'};
        border:1.5px solid ${_oItemIds.includes(item.id)?'var(--accent)':'var(--border)'}">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${_oItemIds.includes(item.id)?'var(--accent)':'var(--border)'};
          background:${_oItemIds.includes(item.id)?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${_oItemIds.includes(item.id)?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 3.5,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none"/></svg>':''}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(item.wardrobe_nickname||item.name)}</div>
          <div style="font-size:11px;color:var(--text3)">${esc(item.category||'')} ${esc(item.brand?'· '+item.brand:'')}</div>
        </div>
      </div>`).join('');
  } catch(e) {}
}

function toggleOItem(id) {
  _oItemIds = _oItemIds.includes(id) ? _oItemIds.filter(x=>x!==id) : [..._oItemIds,id];
  renderItemPicker();
}

async function saveOutfit(opts = {}) {
  const name = document.getElementById('oName').value.trim();
  if (!name) { toast('Name is required', 'err'); return false; }
  const payload = {
    name, family_member_id: parseInt(document.getElementById('oMember').value)||null,
    season_tags: _oSeasonSel, occasion_tags: _oOccasionSel,
    notes: document.getElementById('oNotes').value.trim()||null,
    item_ids: _oItemIds
  };
  try {
    if (_editingOutfitId) {
      await window.api('PUT', `/wardrobe/outfits/${_editingOutfitId}`, payload);
      toast('Outfit updated', 'ok');
    } else {
      const created = await window.api('POST', '/wardrobe/outfits', payload);
      if (created && created.id) _editingOutfitId = created.id;
      toast('Outfit created', 'ok');
    }
    if (!opts.keepOpen) { closeDrawer('outfitDrawer'); loadOutfits(); }
    return true;
  } catch(e) { toast('Save failed: '+e.message, 'err'); return false; }
}

async function deleteOutfit() {
  LT.confirm({
    title: 'Delete this outfit?',
    msg: 'This removes the outfit and unschedules it from any planner days. Items in your wardrobe are not affected.',
    confirmLabel: 'Delete',
    onConfirm: async () => {
      await window.api('DELETE', `/wardrobe/outfits/${_editingOutfitId}`);
      closeDrawer('outfitDrawer');
      loadOutfits();
      toast('Outfit deleted', 'ok');
    }
  });
}

// ── Insights ─────────────────────────────────────────────────
async function loadInsights() {
  try {
    const url = `/wardrobe/insights${_activeMember?'?member_id='+_activeMember:''}`;
    const d = await window.api('GET', url);
    document.getElementById('insightsGrid').innerHTML = [
      [d.total||0,      'Items'],
      [d.outfits||0,    'Outfits'],
      [d.never_worn||0, 'Never Worn'],
      [`$${(d.total_value||0).toFixed(0)}`, 'Wardrobe Value'],
    ].map(([v,l]) => `
      <div class="insight-card">
        <div class="insight-val">${v}</div>
        <div class="insight-label">${l}</div>
      </div>`).join('');

    const mw = document.getElementById('mostWornList');
    mw.innerHTML = (d.most_worn||[]).length
      ? d.most_worn.map(i => `
          <div class="card" style="padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between">
            <div><div style="font-weight:600">${esc(i.wardrobe_nickname||i.name)}</div>
              <div style="font-size:12px;color:var(--text3)">${esc(i.category||'')} ${i.brand?'· '+esc(i.brand):''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-weight:700;color:var(--accent)">${i.times_worn}×</div>
              ${i.cost_per_wear?`<div style="font-size:11px;color:var(--text3)">$${i.cost_per_wear}/wear</div>`:''}
            </div>
          </div>`).join('')
      : '<div style="color:var(--text3);padding:16px">No wear log entries yet</div>';
  } catch(e) {}
}

function esc(s) { const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function emptyState(icon,title,sub) {
  return `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
    <div style="font-size:48px;margin-bottom:12px">${icon}</div>
    <div style="font-weight:700;font-size:15px;margin-bottom:6px">${title}</div>
    <div style="font-size:13px">${sub}</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
