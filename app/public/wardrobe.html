<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wardrobe — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') !== '0') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    /* ── LOOKBOOK · Direction B styles ─────────────────────────
       Photo-led, generous whitespace, polaroid garments.
       Built on the existing token palette only. */

    /* ── Page header with eyebrow + light display title ── */
    .lb-page-hdr{padding:14px 18px 8px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
    .lb-eyebrow{font-family:var(--mono);font-size:10px;color:var(--text3);
      letter-spacing:.16em;text-transform:uppercase;flex-shrink:0;order:2}
    .lb-display{font-size:24px;font-weight:300;letter-spacing:-.03em;color:var(--text);line-height:1.05;order:1}
    @media(min-width:768px){
      .lb-page-hdr{padding:18px 28px 10px}
      .lb-display{font-size:32px;letter-spacing:-.035em}
      .lb-eyebrow{font-size:11px;letter-spacing:.18em}
    }

    /* Toolbar row: pills on the left, view/sort/filter toolbar on the right */
    .lb-toolbar-row{display:flex;align-items:center;gap:12px;padding:6px 14px 8px;flex-wrap:wrap}
    .lb-toolbar-row .member-pills{flex:1 1 auto;padding:0;min-width:0}
    .lb-toolbar-row .lb-toolbar-actions{flex:0 0 auto;display:flex;align-items:center;gap:8px}

    /* ── Member pill strip ── */
    .member-pills{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 6px;overflow-x:auto;scrollbar-width:none}
    .member-pills::-webkit-scrollbar{display:none}
    .member-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 12px 3px 4px;border-radius:99px;
      font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);
      color:var(--text2);background:var(--bg2);transition:all .15s;flex-shrink:0;user-select:none}
    .member-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .member-pill .gh-avatar{width:22px !important;height:22px !important;font-size:9px !important}
    .member-pill .member-pill-name{line-height:22px}
    .member-pill .member-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    /* ── Tab bar (underline) ── */
    .tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 14px;gap:0;
      overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text3);
      cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Photo placeholder fallbacks ──────────────────────────
       Used when an item/outfit has no primary_photo attachment.
       Hanger SVG with a soft tinted bg, OR a category-tinted tile with mono caption. */
    .lb-ph{position:relative;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .lb-ph-hanger{background:linear-gradient(135deg, rgba(236,72,153,.06), rgba(92,114,250,.04));
      color:var(--text4)}
    .lb-ph-hanger svg{width:42%;max-width:60px;opacity:.65}
    .lb-ph-tile{font-family:var(--mono);font-size:9px;letter-spacing:.06em;
      text-transform:uppercase;color:var(--text3);background:var(--bg3);padding:6px;
      text-align:center;line-height:1.2}
    .lb-ph-tile.cat-clothing{background:rgba(236,72,153,.08);color:#ec4899}
    .lb-ph-tile.cat-shoes{background:rgba(245,158,11,.08);color:#f59e0b}
    .lb-ph-tile.cat-accessories{background:rgba(167,139,250,.08);color:#a78bfa}
    .lb-ph-tile.cat-bags{background:rgba(34,197,94,.08);color:#22c55e}
    .lb-ph-tile.cat-hats{background:rgba(92,114,250,.08);color:#5c72fa}
    .lb-ph-tile.cat-jewelry{background:rgba(167,139,250,.08);color:#a78bfa}
    .lb-ph::before{content:"";position:absolute;inset:0;
      background-image:repeating-linear-gradient(45deg,transparent 0 8px,rgba(255,255,255,.02) 8px 16px);
      pointer-events:none}
    .lb-ph img{position:absolute;top:8px;left:0;right:0;bottom:0;z-index:1;width:100%;height:calc(100% - 8px);object-fit:contain;object-position:top;display:block}

    /* ─────────────────────────────────────────────────────────────────────
       LOCKED — Polaroid sizing/spacing (v202604.075, Apr 28 2026)
       Took multiple iterations to land. Do NOT change without intent.
       Spec:
       - photo well: square (1/1), 8px cream margin on left/right/top
       - image: object-fit:contain, anchored to top (top:8px, height:calc(100% - 8px))
       - caption: 2-line clamp, 4px bottom padding
       - polaroid wrapper: padding-bottom:0
       Visual reference: HANDOFF.md → "Polaroid spec screenshot"
       If a problem arises, change deliberately and update HANDOFF screenshot.
       ───────────────────────────────────────────────────────────────────── */
    /* ── Polaroid frame — cream paper backing, drop shadow, mono caption ── */
    .lb-polaroid{background:#f4ece0;border-radius:3px;
      box-shadow:0 4px 12px rgba(0,0,0,.35);position:relative;display:block;padding-bottom:0}
    .lb-polaroid-photo{width:calc(100% - 16px);aspect-ratio:1/1;overflow:hidden;
      display:flex;align-items:center;justify-content:center;position:relative;
      margin:8px auto 0}
    .lb-polaroid-photo.tall{aspect-ratio:1/1}
    .lb-polaroid-photo.primary{outline:2px solid var(--green);outline-offset:-2px}
    .lb-polaroid-cap{text-align:center;font-family:var(--mono);font-size:9px;
      color:#3a2c20;letter-spacing:.06em;margin-top:4px;text-transform:uppercase;
      overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
      padding:0 6px 4px;line-height:1.3}
    .lb-polaroid.big .lb-polaroid-cap{font-size:10px}

    /* Pleasing tilt cycle — index%4 picks one of these */
    .lb-tilt-0{transform:rotate(-.8deg)}
    .lb-tilt-1{transform:rotate(.6deg)}
    .lb-tilt-2{transform:rotate(-.4deg)}
    .lb-tilt-3{transform:rotate(1deg)}

    /* ── Planner · vertical day rows ── */
    .lb-day-list{padding-bottom:90px}
    .lb-day-row{padding:18px 0 14px;border-bottom:1px solid var(--border)}
    .lb-day-row:last-child{border-bottom:none}
    .lb-day-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 18px 10px}
    .lb-day-hdr-left{display:flex;align-items:baseline;gap:10px}
    .lb-day-num{font-size:32px;font-weight:300;letter-spacing:-.03em;color:var(--text);
      line-height:1;font-feature-settings:"tnum"}
    .lb-day-num.today{color:var(--accent)}
    .lb-day-dow{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em}
    .lb-day-today-badge{font-size:9px;font-weight:700;color:var(--accent);
      font-family:var(--mono);letter-spacing:.14em}
    .lb-day-wx{font-size:11px;font-family:var(--mono);color:var(--text3);
      letter-spacing:.04em;display:flex;align-items:center;gap:5px}
    .lb-day-wx.exceptional{color:var(--amber)}
    .lb-day-wx.past{color:var(--text4)}
    .lb-day-row.past .lb-day-num,
    .lb-day-row.past .lb-day-dow{color:var(--text3)}
    .lb-day-row.past .lb-polaroid{filter:saturate(.7) brightness(.85)}

    .lb-day-scroll{display:flex;gap:14px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none}
    .lb-day-scroll::-webkit-scrollbar{display:none}
    .lb-day-card{flex-shrink:0;width:130px;cursor:pointer}
    .lb-day-card-meta{display:flex;align-items:center;justify-content:space-between;
      margin-top:7px;padding:0 4px}
    .lb-day-card-owner{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
    .lb-day-card-owner .member-dot{width:6px;height:6px;border-radius:50%}
    .lb-day-card-pcs{font-size:10px;font-family:var(--mono);color:var(--text3)}

    .lb-day-empty{margin:0 18px;padding:24px 14px;border:1px dashed var(--border);
      border-radius:6px;text-align:center;color:var(--text4);
      font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;
      transition:all .15s}
    .lb-day-empty:hover{border-color:var(--accent);color:var(--accent)}
    .lb-day-empty.past{cursor:default}
    .lb-day-empty.past:hover{border-color:var(--border);color:var(--text4)}

    /* ── Items · polaroid grid ──
       Columns are controlled by a user-facing toggle (`_itemCols`), not by
       CSS breakpoints — see loadItems(). The grid-template-columns is set
       inline at render time. CSS only owns gap/padding/row-gap. */
    .lb-items-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
      row-gap:22px;padding:14px 14px 90px}
    @media(min-width:768px){
      .lb-items-grid{gap:22px;row-gap:28px;padding:18px 28px 80px}
    }
    @media(min-width:1100px){
      .lb-items-grid{gap:24px;row-gap:30px}
    }
    .lb-item-card{display:block;cursor:pointer}
    .lb-item-meta{display:flex;justify-content:space-between;margin-top:6px;
      padding:0 6px;font-size:10px;color:var(--text3)}
    .lb-item-meta-owner{display:flex;gap:4px;align-items:center}
    .lb-item-meta-owner .member-dot{width:5px;height:5px;border-radius:50%}
    .lb-item-meta-stat{font-family:var(--mono)}
    .wrd-card-edit-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;
      background:rgba(0,0,0,.55);border:none;cursor:pointer;display:flex;align-items:center;
      justify-content:center;opacity:0;transition:opacity .15s;z-index:2}
    .lb-item-card:hover .wrd-card-edit-btn{opacity:1}
    .wrd-list-grid{display:flex;flex-direction:column}
    .wrd-list-card{display:flex;align-items:center;gap:10px;padding:10px 12px;
      border-bottom:1px solid var(--border);cursor:pointer;position:relative;
      background:var(--bg2);transition:background .1s}
    .wrd-list-card:hover{background:var(--bg3)}
    .wrd-list-thumb{width:44px;height:44px;border-radius:var(--r);object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
    .wrd-list-placeholder{width:44px;height:44px;border-radius:var(--r);flex-shrink:0;
      background:var(--bg3);display:flex;align-items:center;justify-content:center;
      font-size:18px;color:var(--text3);border:1px solid var(--border)}
    .wrd-list-body{flex:1;min-width:0}
    .wrd-list-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wrd-list-meta{font-size:11px;color:var(--text3);margin-top:2px}
    .wrd-list-owner{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);white-space:nowrap;margin-right:8px}
    .wrd-list-edit-btn{width:30px;height:30px;border-radius:50%;background:var(--accent);border:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s}
    .wrd-list-card:hover .wrd-list-edit-btn{opacity:1}
    /* Outfit item picker thumbnail grid */
    .wrd-item-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-height:260px;overflow-y:auto;padding:4px 2px}
    .wrd-item-pick-card{position:relative;cursor:pointer;border-radius:var(--r);border:2px solid var(--border);overflow:hidden;transition:border-color .15s}
    .wrd-item-pick-card.selected{border-color:var(--accent)}
    .wrd-item-pick-thumb{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg3)}
    .wrd-item-pick-check{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
    .wrd-item-pick-label{font-size:9px;color:var(--text2);padding:2px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--bg2)}

    /* ── Outfits · full-bleed cover cards (2-col mobile, 3-col desktop) ── */
    .lb-outfits-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
      padding:14px 16px 90px}
    @media(min-width:768px){
      .lb-outfits-grid{gap:16px;padding:18px 28px 80px}
    }
    @media(min-width:1100px){
      .lb-outfits-grid{gap:18px}
    }
    .lb-outfit-card{position:relative;border-radius:10px;overflow:hidden;
      background:var(--bg2);border:1px solid var(--border);cursor:pointer;
      aspect-ratio:3/4;transition:transform .15s, border-color .15s}
    .lb-outfit-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .lb-outfit-card-photo{position:absolute;inset:0}
    .lb-outfit-card-photo img{width:100%;height:100%;object-fit:cover}
    .lb-outfit-card-photo .lb-ph{width:100%;height:100%;border-radius:0}
    .lb-outfit-card-grad{position:absolute;inset:0;
      background:linear-gradient(180deg,transparent 38%,rgba(8,12,20,.92) 100%);
      pointer-events:none}
    .lb-outfit-card-owner{position:absolute;top:8px;right:8px;display:inline-flex;
      align-items:center;gap:5px;padding:3px 10px;border-radius:99px;
      background:rgba(8,12,20,.6);backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);font-size:10px;font-weight:600;color:var(--text)}
    .lb-outfit-card-owner .member-dot{width:5px;height:5px;border-radius:50%}
    .lb-outfit-card-body{position:absolute;left:0;right:0;bottom:0;padding:10px 10px 9px}
    .lb-outfit-card-name{font-size:13px;font-weight:600;color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;
      white-space:nowrap}
    .lb-outfit-card-items{display:flex;gap:3px;margin-top:6px}
    .lb-outfit-card-item-thumb{width:18px;height:18px;border-radius:3px;overflow:hidden;
      background:var(--bg3);opacity:.95}
    .lb-outfit-card-item-thumb img{width:100%;height:100%;object-fit:cover}
    .lb-outfit-card-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
    .lb-outfit-card-tag{font-size:9px;padding:2px 7px;border-radius:99px;
      background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-weight:500;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}

    /* ── Insights · Season Review ── */
    .lb-insights{padding:18px 18px 90px}
    @media(min-width:768px){.lb-insights{padding:24px 28px 60px}}
    .lb-hero{margin-bottom:30px}
    .lb-hero-eyebrow{font-family:var(--mono);font-size:11px;color:var(--text3);
      letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
    .lb-hero-num{font-size:32px;font-weight:300;letter-spacing:-.035em;
      line-height:1.1;color:var(--text);max-width:880px}
    .lb-hero-num .neverworn{color:var(--amber)}
    @media(min-width:768px){.lb-hero-num{font-size:46px;letter-spacing:-.04em}}

    .lb-section-hdr{display:flex;align-items:baseline;justify-content:space-between;
      border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px}
    .lb-section-hdr-title{font-size:18px;font-weight:600;letter-spacing:-.02em}
    .lb-section-hdr-count{font-family:var(--mono);color:var(--text3);font-size:13px;
      font-weight:400;margin-left:6px}

    .lb-triage-grid{display:grid;gap:18px;margin-bottom:32px}

    .lb-triage-actions{display:flex;justify-content:center;gap:6px;margin-top:10px}
    .lb-triage-actions button{padding:4px 12px;font-size:11px;border-radius:99px;
      font-weight:600;cursor:pointer;border:1px solid;font-family:inherit}
    .lb-triage-actions .keep{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
    .lb-triage-actions .donate{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
    .lb-triage-actions .sell{background:var(--bg3);border-color:var(--border2);color:var(--text2)}

    .lb-most-grid{display:grid;gap:14px;margin-bottom:30px}

    .lb-most-card .lb-ph{aspect-ratio:1/1;width:100%}
    .lb-most-name{font-size:13px;font-weight:600;margin-top:8px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-most-stat{font-size:10px;color:var(--text3);font-family:var(--mono);
      letter-spacing:.04em;margin-top:2px}

    .lb-spend-row{display:flex;gap:10px;margin-bottom:8px}
    .lb-spend-cell{padding:18px 14px;background:var(--bg2);border:1px solid var(--border);
      border-radius:8px;border-left:3px solid var(--text3);min-width:0}
    .lb-spend-cell-name{font-size:10px;font-family:var(--mono);letter-spacing:.1em;
      color:var(--text3);text-transform:uppercase;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-spend-cell-val{font-size:24px;font-weight:300;margin-top:2px}

    /* "+ Triage all" pill button */
    .lb-pill-btn{padding:6px 14px;border-radius:99px;background:var(--accent);
      border:none;color:#fff;font-weight:600;font-size:12px;cursor:pointer;
      font-family:inherit;display:inline-flex;align-items:center;gap:4px}
    .lb-pill-btn:hover{background:var(--accent-h)}

    /* ── Empty states ── */
    .lb-empty{text-align:center;padding:60px 20px;color:var(--text3)}
    .lb-empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
    .lb-empty-title{font-weight:700;font-size:15px;margin-bottom:6px;color:var(--text2)}
    .lb-empty-sub{font-size:13px}

    /* ── Photo panel inside drawers (item + outfit) ─────────── */
    .wrd-photo-panel{margin:14px 0 10px;padding:12px;border:1px dashed var(--border);
      border-radius:var(--r-sm,8px);background:var(--bg);display:flex;
      flex-direction:column;gap:8px}
    .wrd-photo-panel.locked{opacity:.55;cursor:not-allowed}
    .wrd-photo-panel-hdr{display:flex;align-items:center;justify-content:space-between;
      font-size:12px;color:var(--text2);font-weight:600}
    .wrd-photo-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .wrd-photo-strip-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;
      border:1px solid var(--border);cursor:pointer;background:var(--bg2);
      display:flex;align-items:center;justify-content:center}
    .wrd-photo-strip-thumb.primary{border-color:var(--green)}
    .wrd-photo-strip-thumb img{width:100%;height:100%;object-fit:cover}
    .wrd-photo-add{width:100%;padding:8px 12px;border:1px solid var(--border);
      border-radius:6px;background:var(--bg2);color:var(--text2);font-size:12px;
      cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;
      justify-content:center;gap:6px}
    .wrd-photo-add:hover{border-color:var(--accent);color:var(--accent)}

    /* ── Planner add-outfit modal (kept from 202604.038) ── */
    #wrdPlannerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
      align-items:flex-end;justify-content:center;z-index:550}
    #wrdPlannerOverlay.open{display:flex}
    #wrdPlannerOverlay .wrd-modal{width:min(440px,100%);background:var(--bg2);
      border-radius:16px 16px 0 0;padding:18px;border:1px solid var(--border);
      border-bottom:none}
    @media(min-width:600px){
      #wrdPlannerOverlay{align-items:center}
      #wrdPlannerOverlay .wrd-modal{border-radius:16px;border-bottom:1px solid var(--border)}
    }
    .lb-modal-title{font-family:var(--mono);font-size:10px;color:var(--text3);
      letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
    /* ── Barcode scanner (ported from inventory) ─────────────── */
    .scanner-overlay {
      position:fixed; inset:0; z-index:600; background:#000;
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .scanner-overlay.open { display:flex; }
    #wrdScannerVideo { width:100%; max-width:400px; border-radius:var(--r,10px); }
    .scanner-guide {
      position:absolute; width:260px; height:160px;
      border:3px solid var(--accent); border-radius:12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.6);
      pointer-events:none;
    }
    .scanner-line {
      position:absolute; width:100%; height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
      animation:wrdScan 2s ease-in-out infinite;
      top:50%;
    }
    @keyframes wrdScan { 0%,100%{top:10%} 50%{top:90%} }
    .scanner-label {
      color:white; font-size:13px; margin-top:16px; opacity:.7;
      font-family:var(--mono);
    }
    .scanner-close {
      position:absolute; top:20px; right:20px;
      width:40px; height:40px; background:rgba(255,255,255,.15);
      border:none; border-radius:50%; color:white; font-size:20px;
      cursor:pointer;
    }
    .upc-warn {
      background:rgba(245,158,11,.10); border:1px solid rgba(245,158,11,.32);
      color:var(--amber); padding:8px 12px; border-radius:6px; font-size:12px;
      margin-top:8px; line-height:1.45;
    }
    .upc-manual-link a { color:var(--accent); text-decoration:underline; }

<!-- Archive item modal -->

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEATHER_ICONS = { Clear:'☀️', Clouds:'⛅', Rain:'🌧️', Drizzle:'🌦️', Thunderstorm:'⛈️', Snow:'❄️', Mist:'🌫️' };
const SEASON_OPTS   = ['Spring','Summer','Fall','Winter','Rainy','All-season'];
const OCCASION_OPTS = ['Casual','School','Sports','Work','Formal','Outdoor','Evening'];

let _members = [], _activeMember = null, _currentTab = 'planner';
let _editingItemId = null, _editingOutfitId = null;
let _allItems = [], _iSeasonSel = [], _iOccasionSel = [];
let _oSeasonSel = [], _oOccasionSel = [], _oItemIds = [];
let _iPhotos = [], _oPhotos = [];
let _itemView = localStorage.getItem('wrd_item_view') || 'grid', _itemCols = +(localStorage.getItem('wrd_item_cols')||4), _itemFilters = {};
// Wardrobe items pagination — see loadItems() and loadMoreWrdItems().
const WRD_BATCH_SIZE = 60;
let _wrdRenderedCount = 0;
let _outfitView = 'grid', _outfitCols = +(localStorage.getItem('wrd_outfit_cols')||4), _outfitFilters = {};

function openWrdItemArchive() {
  document.getElementById('wrdArchiveStatus').value = 'donated';
  document.getElementById('wrdArchiveNotes').value = '';
  document.getElementById('wrdArchiveOverlay').classList.add('open');
}

// Context-aware: archive if item is active, restore if archived
async function toggleWrdItemArchive() {
  const btn = document.getElementById('wrdItemArchiveBtn');
  if (btn?.dataset.archived === '1') {
    // Currently archived → restore
    if (!_editingItemId) return;
    if (!confirm('Restore this item from archive?')) return;
    try {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}/unarchive`, {});
      closeDrawer('itemDrawer');
      toast('Item restored', 'ok');
      loadItems();
    } catch(e) { toast('Restore failed: ' + e.message, 'err'); }
  } else {
    openWrdItemArchive();
  }
}

async function saveWrdItemArchive() {
  if (!_editingItemId) return;
  const status = document.getElementById('wrdArchiveStatus').value;
  const notes  = document.getElementById('wrdArchiveNotes').value.trim();
  try {
    await window.api('PATCH', `/wardrobe/items/${_editingItemId}/archive`, {
      archive: true,
      wardrobe_status: status,
      wardrobe_status_notes: notes || null,
      reason: notes || null
    });
    document.getElementById('wrdArchiveOverlay').classList.remove('open');
    closeDrawer('itemDrawer');
    toast('Item archived', 'ok');
    loadItems();
  } catch(e) { toast('Archive failed: ' + e.message, 'err'); }
}

function confirmWrdItemDelete() {
  if (!_editingItemId) return;
  LT.confirm({
    title: 'Delete this item?',
    msg: 'Permanently removes the item, photos and wear history. Cannot be undone.',
    confirmLabel: 'Delete',
    danger: true,
    onConfirm: async () => {
      try {
        await window.api('DELETE', `/wardrobe/items/${_editingItemId}`);
        closeDrawer('itemDrawer');
        toast('Item deleted', 'ok');
        loadItems();
      } catch(e) { toast('Delete failed: ' + e.message, 'err'); }
    }
  });
}

function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
function openDrawer(id)  { document.getElementById(id).classList.add('open'); }

async function init() {
  AttachmentManager.injectStyles();
  await loadMembers();
  initItemView();
  initOutfitView();
  initInsightsView();
  updatePageHeader('planner');
  renderDays();
  loadWeather();
  loadTabContent();
}

function initItemView() {
  function lensToItemFilters(lensFilters) {
    const out = {};
    for (const f of lensFilters) {
      if (f.dim === 'status') out.status = f.value;
      if (f.dim === 'person') out.owner  = f.value;
      if (f.dim === 'time')   out.last_worn = f.value;
      if (f.dim === 'tag')    out.tag    = f.value;
    }
    return out;
  }
  GH_LENS.init({
    container: 'itemLens',
    moduleId: 'wardrobe',
    views: ['grid','list','card'],
    defaultView: 'grid',
    sortFields: [
      { key: 'name',           label: 'Name' },
      { key: 'category',       label: 'Category' },
      { key: 'last_worn',      label: 'Recently worn' },
      { key: 'purchase_price', label: 'Price' },
    ],
    onChange: ({ filters, view }) => {
      _itemView = view;
      _itemFilters = lensToItemFilters(filters);
      if (_currentTab === 'items')    loadItems();
      if (_currentTab === 'outfits')  loadOutfits();
      if (_currentTab === 'insights') loadInsights();
    },
  });
  // GH_BULK on items: archive / restore / delete
  GH_BULK.init({
    toolbarId:    'itemViewToolbar',
    containerId:  'itemGrid',
    cardSelector: '.lb-item-card, .wrd-list-card',
    getId:        (el) => parseInt(el.dataset.id, 10),
    isArchived:   (el) => el.classList.contains('is-archived'),
    refresh:      () => loadItems(),
    onArchive:    async (ids) => { for (const id of ids) await window.api('PATCH', `/wardrobe/items/${id}/archive`, { archive:true, wardrobe_status:'donated' }); },
    onUnarchive:  async (ids) => { for (const id of ids) await window.api('PUT', `/wardrobe/items/${id}/unarchive`, {}); },
    onDelete:     async (ids) => { for (const id of ids) await window.api('DELETE', `/wardrobe/items/${id}`, {}); },
  });
}

function initInsightsView() {
  GH_VIEW.init('insightsViewToolbar', 'wrd_item', state => {
    _itemCols = state.cols; _itemView = state.view;
    if (_currentTab === 'items')    loadItems();
    if (_currentTab === 'outfits')  loadOutfits();
    if (_currentTab === 'insights') loadInsights();
  }, { defaultView: 'grid', defaultCols: 4 });
}

function initOutfitView() {
  GH_VIEW.init('outfitViewToolbar', 'wrd_outfit', state => {
    _outfitView = state.view; _outfitCols = state.cols;
    _itemCols = state.cols; // keep in sync
    _outfitFilters = state.filters || {};
    if (_currentTab === 'items')    loadItems();
    if (_currentTab === 'outfits')  loadOutfits();
    if (_currentTab === 'insights') loadInsights();
  }, {
    defaultView: 'grid', defaultCols: 4,
    filterFields: [
      { key:'season',   type:'select', label:'Season',   options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'}]},
      { key:'occasion', type:'select', label:'Occasion', options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'School',label:'School'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'},{value:'Evening',label:'Evening'}]},
    ]
  });
}
// Deterministic color palette for member dots — derived from the existing token palette only.
const MEMBER_COLORS = ['var(--accent)','var(--green)','var(--amber)','var(--purple)','var(--cat-clothing)','var(--red)'];

async function loadMembers() {
  try {
    _members = await window.api('GET', '/settings/family');
    // Decorate each with a stable color (index-based)
    _members.forEach((m, i) => { m.color = MEMBER_COLORS[i % MEMBER_COLORS.length]; });
    refreshMemberCache();
    // Hydrate the global avatar cache so pills show photos and unique initials
    if (window.GH_AVATAR) { try { await GH_AVATAR.preload(); } catch(_) {} }
    // Populate one pill strip per tab (so each tab's row is self-contained
    // and we don't have to move a single strip around when tabs switch).
    ['planner','items','outfits','insights'].forEach(tab => {
      const pills = document.getElementById('memberPills_'+tab);
      if (!pills) return;
      pills.innerHTML = '';
      const all = document.createElement('div');
      all.className = 'member-pill active'; all.dataset.id = '';
      all.textContent = 'All';
      all.onclick = () => selectMember(null, all);
      pills.appendChild(all);
      _members.forEach(m => {
        const p = document.createElement('div');
        p.className = 'member-pill'; p.dataset.id = m.id;
        const avatar = window.GH_AVATAR ? GH_AVATAR.render(m, 'sm') : '';
        p.innerHTML = `${avatar}<span class="member-pill-name">${esc(m.display_name)}</span>`;
        p.onclick = () => selectMember(m.id, p);
        pills.appendChild(p);
      });
    });
    // Populate owner selects
    ['iOwner','oMember'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      // Reset to placeholder option only (to avoid duplicates on reload)
      sel.innerHTML = id === 'oMember'
        ? '<option value="">— all —</option>'
        : '<option value="">— select —</option>';
      _members.forEach(m => {
        const o = document.createElement('option'); o.value = m.id; o.textContent = m.display_name;
        sel.appendChild(o);
      });
    });
  } catch(e) {}
}

// Sync active state across all 4 per-tab pill strips so the user sees the
// same selection regardless of which tab they're on.
function selectMember(id, el) {
  _activeMember = id;
  const targetId = id === null || id === undefined ? '' : String(id);
  document.querySelectorAll('.member-pills .member-pill').forEach(p => {
    p.classList.toggle('active', String(p.dataset.id||'') === targetId);
  });
  loadTabContent();
}

// Lookbook page header copy per tab — week number computed once
function isoWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
const TAB_HEADER = {
  planner:  () => ({ eyebrow: `WARDROBE · WK ${isoWeekNumber(new Date())}`, title: 'This Week' }),
  items:    () => ({ eyebrow: `${(_allItems||[]).length || ''} GARMENTS`.trim() || 'WARDROBE', title: 'The Closet' }),
  outfits:  () => ({ eyebrow: 'OUTFITS', title: 'Looks' }),
  insights: () => ({ eyebrow: `SEASON REVIEW`, title: 'How was the season?' }),
};
function updatePageHeader(tab) {
  const h = (TAB_HEADER[tab] || TAB_HEADER.planner)();
  const eyebrow = document.getElementById('lbEyebrow');
  const title   = document.getElementById('lbTitle');
  if (eyebrow) eyebrow.textContent = h.eyebrow;
  if (title)   title.textContent   = h.title;
}

function switchTab(tab, el) {
  _currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['planner','items','outfits','insights'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  // Update FAB
  const fab = document.getElementById('fabBtn');
  fab.style.display = (tab === 'planner') ? 'none' : '';
  updatePageHeader(tab);
  loadTabContent();
}

function onFab() {
  if (_currentTab === 'items')   openItemDrawer();
  if (_currentTab === 'outfits') openOutfitDrawer();
}

function loadTabContent() {
  if (_currentTab === 'planner')  { /* already rendered */ }
  if (_currentTab === 'items')    loadItems();
  if (_currentTab === 'outfits')  loadOutfits();
  if (_currentTab === 'insights') loadInsights();
}

// ── Barcode scanner + UPC lookup (ported from inventory) ────────
// All functions prefixed wrd_ to avoid colliding with anything else on the page.
// Uses BarcodeDetector when available, ZXing as fallback.
const WRD_CLOTHING_CATS = ['Clothing','Shoes','Accessories','Jewelry','Hats','Bags'];
let _wrdScannerActive = false;
let _wrdScanStream = null;
let _wrdCodeReader = null;

async function wrdStartScan() {
  try {
    const video = document.getElementById('wrdScannerVideo');
    _wrdScanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = _wrdScanStream;
    await video.play();
    document.getElementById('wrdScannerOverlay').classList.add('open');
    _wrdScannerActive = true;

    if (typeof BarcodeDetector !== 'undefined') {
      await _wrdScanWithNativeDetector(video);
    } else if (typeof ZXing !== 'undefined') {
      await _wrdScanWithZXing();
    } else {
      wrdCloseScanner();
      toast('Barcode scanning not supported on this browser', 'err');
    }
  } catch(err) {
    wrdCloseScanner();
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      toast('Camera permission denied — tap Allow when prompted', 'err');
    } else if (err.name === 'NotFoundError') {
      toast('No camera found on this device', 'err');
    } else if (err.name === 'NotReadableError') {
      toast('Camera in use by another app', 'err');
    } else {
      toast('Camera error: ' + err.message, 'err');
    }
  }
}

async function _wrdScanWithNativeDetector(video) {
  const wantFormats = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code','itf'];
  let formats = wantFormats;
  try {
    const supported = await BarcodeDetector.getSupportedFormats();
    formats = wantFormats.filter(f => supported.includes(f));
    if (!formats.length) formats = wantFormats;
  } catch {}
  const detector = new BarcodeDetector({ formats });
  const poll = async () => {
    if (!_wrdScannerActive) return;
    try {
      const results = await detector.detect(video);
      if (results.length > 0 && _wrdScannerActive) {
        const raw = results[0].rawValue;
        _wrdScannerActive = false;
        wrdCloseScanner();
        document.getElementById('iBarcode').value = raw;
        const fb = document.getElementById('wrdUpcFeedback');
        fb.innerHTML = `<div style="color:var(--green);font-size:13px;padding:6px 0">📷 Scanned: <strong>${esc(raw)}</strong></div>`;
        fb.style.display = 'block';
        wrdTriggerUPCLookup();
        return;
      }
    } catch {}
    if (_wrdScannerActive) requestAnimationFrame(poll);
  };
  requestAnimationFrame(poll);
}

async function _wrdScanWithZXing() {
  let hints = null;
  try {
    if (ZXing.BarcodeFormat && ZXing.DecodeHintType) {
      hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,  ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.QR_CODE,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    }
  } catch {}
  _wrdCodeReader = new ZXing.BrowserMultiFormatReader(hints);
  let deviceId = null;
  try {
    const devices = await _wrdCodeReader.listVideoInputDevices();
    const back = devices.find(d =>
      d.label.toLowerCase().includes('back') ||
      d.label.toLowerCase().includes('rear') ||
      d.label.toLowerCase().includes('environment'));
    deviceId = back?.deviceId || devices[0]?.deviceId || null;
  } catch {}
  await _wrdCodeReader.decodeFromVideoDevice(deviceId, 'wrdScannerVideo', (result) => {
    if (result && _wrdScannerActive) {
      _wrdScannerActive = false;
      const raw = result.getText();
      wrdCloseScanner();
      document.getElementById('iBarcode').value = raw;
      const fb = document.getElementById('wrdUpcFeedback');
      fb.innerHTML = `<div style="color:var(--green);font-size:13px;padding:6px 0">📷 Scanned: <strong>${esc(raw)}</strong></div>`;
      fb.style.display = 'block';
      wrdTriggerUPCLookup();
    }
  });
}

function wrdCloseScanner() {
  if (_wrdScanStream) { _wrdScanStream.getTracks().forEach(t => t.stop()); _wrdScanStream = null; }
  const video = document.getElementById('wrdScannerVideo');
  if (video) video.srcObject = null;
  _wrdCodeReader?.reset();
  document.getElementById('wrdScannerOverlay').classList.remove('open');
  _wrdScannerActive = false;
}

// Map a UPC category breadcrumb to one of our wardrobe categories.
// Returns '' if no clothing-adjacent match found.
function wrdMapCategory(upcCat) {
  if (!upcCat) return '';
  const s = upcCat.toLowerCase();
  if (/shoe|boot|sneaker|sandal|loafer|footwear/.test(s))                  return 'Shoes';
  if (/bag|luggage|backpack|purse|handbag|wallet|tote/.test(s))            return 'Bags';
  if (/hat|cap|beanie|headwear/.test(s))                                   return 'Hats';
  if (/jewelry|jewellery|necklace|earring|bracelet|ring(?!gtone)|watch/.test(s)) return 'Jewelry';
  if (/accessor|scarf|tie|belt|glove|sock|tights|hosiery|sunglass/.test(s))     return 'Accessories';
  if (/clothing|apparel|shirt|pant|jean|dress|skirt|jacket|coat|sweater|hoodie|t-shirt|tshirt|underwear|outerwear/.test(s)) return 'Clothing';
  return ''; // not clothing-adjacent
}

async function wrdTriggerUPCLookup() {
  const upc = document.getElementById('iBarcode').value.trim();
  if (!upc) { toast('Enter a UPC barcode', 'err'); return; }
  const btn = document.getElementById('wrdUpcBtn'); btn.textContent = '…'; btn.disabled = true;
  const fb = document.getElementById('wrdUpcFeedback');
  fb.style.display = 'none';
  try {
    let d;
    try {
      d = await window.api('GET', `/inventory/upc/${upc}`);
    } catch {
      fb.innerHTML = `<div class="upc-manual-link" style="font-size:12px;color:var(--text2);padding:6px 0">Product not found in UPC database. <a href="https://www.google.com/search?q=${encodeURIComponent(upc)}" target="_blank">Search Google ↗</a></div>`;
      fb.style.display = 'block';
      return;
    }
    fb.innerHTML = `<div style="color:var(--text2);font-size:12px;padding:6px 0">⏳ Parsing product details…</div>`;
    fb.style.display = 'block';
    const parsed = await wrdParseTitle(d.name || '', d);
    wrdShowConfirmPanel(d, parsed);
  } catch(err) {
    toast('Lookup failed: ' + (err.message||err), 'err');
  } finally {
    btn.textContent = 'Lookup'; btn.disabled = false;
  }
}

async function wrdParseTitle(rawTitle, upcData) {
  try {
    const parsed = await window.api('POST', '/inventory/parse-title', { title: rawTitle });
    return {
      name:        parsed.name        || upcData.name        || '',
      brand:       upcData.brand      || parsed.brand        || '',
      category:    parsed.category    || upcData.category    || '',
      description: parsed.description || upcData.description || '',
      size:        parsed.size        || '',
      source:      parsed.source,
    };
  } catch {
    return {
      name:        upcData.name      || '',
      brand:       upcData.brand     || '',
      category:    upcData.category  || '',
      description: upcData.description || '',
      size:        '',
      source:      'upc_raw',
    };
  }
}

          <input class="form-input" id="wrdPcName" value="${esc(parsed.name)}" style="font-size:13px;padding:8px 10px">
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Brand</div>
          <input class="form-input" id="wrdPcBrand" value="${esc(parsed.brand)}" style="font-size:13px;padding:8px 10px">
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Category</div>
          ${upcRawCat ? `<div style="font-size:10px;color:var(--text3);margin-bottom:4px;padding:4px 8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)">UPC: ${esc(upcRawCat)}</div>` : ''}

async function wrdApplyParsedFields() {
  const name   = document.getElementById('wrdPcName')?.value?.trim();
  const brand  = document.getElementById('wrdPcBrand')?.value?.trim();
  const cat    = document.getElementById('wrdPcCat')?.value?.trim();
  const desc   = document.getElementById('wrdPcDesc')?.value?.trim();
  const size   = document.getElementById('wrdPcSize')?.value?.trim();
  const upcCat = document.getElementById('wrdPcUpcCat')?.value?.trim();

  if (name)  document.getElementById('iName').value  = name;
  if (brand) document.getElementById('iBrand').value = brand;
  if (cat) {
    const sel = document.getElementById('iCategory');
    if (sel) {
      // Make sure the option exists, then select it
      let opt = Array.from(sel.options).find(o => o.value === cat);
      if (!opt) { opt = new Option(cat, cat); sel.appendChild(opt); }
      sel.value = cat;
    }
  }
  // Size + UPC raw category are appended to notes (no dedicated wardrobe field)
  const notesEl = document.getElementById('iNotes');
  if (notesEl && !notesEl.value.trim()) {
    const parts = [];
    if (desc)   parts.push(desc);
    if (size)   parts.push(`Size: ${size}`);
    if (upcCat) parts.push(`Product category (from barcode): ${upcCat}`);
    if (parts.length) notesEl.value = parts.join('\n');
  }
  const fb = document.getElementById('wrdUpcFeedback');
  fb.innerHTML = `<div style="color:var(--green);font-size:13px;padding:6px 0">✓ Fields applied — review and save</div>`;
  setTimeout(() => { fb.style.display = 'none'; }, 2500);
  document.getElementById('iName').focus();
}

// ── Planner (Lookbook) ──────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WKD_SHORT    = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const CAT_PH_KEY = { Clothing:'clothing', Shoes:'shoes', Accessories:'accessories', Bags:'bags', Hats:'hats', Jewelry:'jewelry' };

const HANGER_SVG = `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:42%;max-width:60px;opacity:.65">
  <path d="M32 14 L32 22 M32 22 C26 22 26 30 32 30 L 8 44 L 56 44 L 32 30 C 38 30 38 22 32 22 Z"/>
</svg>`;

// Safe image error handler — avoids outerHTML injection breaking adjacent text nodes
function lbImgError(img) {
  const p = img.parentElement;
  if (!p) return;
  p.innerHTML = HANGER_SVG;
  p.classList.add('lb-ph-hanger');
}

// Photo placeholder — used when an item/outfit has no real attachment thumbnail.
// Uses category color when known; falls back to hanger SVG. Always builds the
// real <img> when a primary_photo id exists, with onerror fallback to hanger.
function lbPhoto(opts) {
  const { primary_photo, category, name, ratio = 'tall', primary = false } = opts || {};
  const ratioCls = ratio === 'square' ? '' : 'tall';
  const primaryCls = primary ? ' primary' : '';
  if (primary_photo && primary_photo.id) {
    return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph">
      <img src="/api/v1/attachments/thumb/${primary_photo.id}" alt="${esc(name||'')}"
           onerror="lbImgError(this)">
    </div>`;
  }
  const catKey = CAT_PH_KEY[category] || '';
  if (catKey) {
    return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph lb-ph-tile cat-${catKey}">
      <span style="position:relative;z-index:1">${esc((category||'').toUpperCase())}</span>
    </div>`;
  }
  return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph lb-ph-hanger">${HANGER_SVG}</div>`;
}

// Compact polaroid card (used in day strips and items grid)
function lbPolaroid({ primary_photo, category, name, label, ratio='square', big=false, primary=false }) {
  const photo = lbPhoto({ primary_photo, category, name, ratio, primary });
  const cap = label != null ? label : (name || '');
  return `<div class="lb-polaroid${big?' big':''}">
    ${photo}
    ${cap ? `<div class="lb-polaroid-cap">${esc(cap)}</div>` : ''}
  </div>`;
}

// Member dot helper (uses member color if available, else accent)
function lbMemberDot(member, size = 6) {
  const color = (member && member.color) || 'var(--accent)';
  return `<span class="member-dot" style="width:${size}px;height:${size}px;background:${color}"></span>`;
}

// Cache members by id for quick lookup in day cards
let _memberById = {};
function refreshMemberCache() {
  _memberById = Object.fromEntries(_members.map(m => [m.id, m]));
}

function renderDays() {
  const list = document.getElementById('dayList');
  if (!list) return;
  const today = new Date();
  list.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const isToday = i === 0;
    const dateKey = d.toISOString().slice(0,10);
    const wkd     = WKD_SHORT[d.getDay()];
    const dayNum  = d.getDate();

    const row = document.createElement('div');
    row.className = `lb-day-row${isToday ? ' today' : ''}`;
    row.id = 'lb-day-'+i;
    row.dataset.date = dateKey;
    row.innerHTML = `
      <div class="lb-day-hdr">
        <div class="lb-day-hdr-left">
          <span class="lb-day-num${isToday?' today':''}">${dayNum}</span>
          <span class="lb-day-dow">${wkd}</span>
          ${isToday ? '<span class="lb-day-today-badge">TODAY</span>' : ''}
        </div>
        <span class="lb-day-wx" id="lbWx_${i}"><span style="opacity:.5">—</span></span>
      </div>
      <div id="lbBody_${i}">
        <div class="lb-day-empty" onclick="addPlannerEntry(${i},'${dateKey}')">+ plan an outfit</div>
      </div>`;
    list.appendChild(row);
  }
  loadPlannerEntries();
}

async function loadPlannerEntries() {
  try {
    const today = new Date();
    const end   = new Date(today); end.setDate(today.getDate()+6);
    const params = `start=${today.toISOString().slice(0,10)}&end=${end.toISOString().slice(0,10)}${_activeMember?'&member_id='+_activeMember:''}`;
    const entries = await window.api('GET', `/wardrobe/planner?${params}`);

    let outfitMap = {};
    try {
      const outfits = await window.api('GET', '/wardrobe/outfits');
      outfitMap = Object.fromEntries((outfits||[]).map(o => [o.id, o]));
    } catch(e) {}

    refreshMemberCache();

    for (let i = 0; i < 7; i++) {
      const d = new Date(today); d.setDate(today.getDate()+i);
      const dateKey = d.toISOString().slice(0,10);
      const dayEntries = entries.filter(e => e.plan_date === dateKey);
      const body = document.getElementById('lbBody_'+i);
      if (!body) continue;

      if (!dayEntries.length) {
        body.innerHTML = `<div class="lb-day-empty" onclick="addPlannerEntry(${i},'${dateKey}')">+ plan an outfit</div>`;
        continue;
      }

      body.innerHTML = `<div class="lb-day-scroll">
        ${dayEntries.map(e => {
          const outfit = outfitMap[e.outfit_id] || {};
          const itemCount = outfit.items?.length || 0;
          const member = e.family_member_id ? _memberById[e.family_member_id] : null;
          const memberName = member?.display_name || e.member_name || '';
          const polaroid = lbPolaroid({
            primary_photo: outfit.primary_photo,
            category: 'Clothing',
            name: e.outfit_name || 'Outfit',
            label: e.outfit_name || 'Outfit',
            ratio: 'tall',
            big: true
          });
          return `<div class="lb-day-card" data-entry="${e.id}" data-outfit="${e.outfit_id}" data-name="${esc(e.outfit_name||'Outfit')}" onclick="showPlannerCardMenu(this)">
            ${polaroid}
            <div class="lb-day-card-meta">
              <span class="lb-day-card-owner">${memberName ? lbMemberDot(member, 6) + esc(memberName) : ''}</span>
              ${itemCount ? `<span class="lb-day-card-pcs">${itemCount} pc${itemCount===1?'':'s'}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }
  } catch(e) {}
}

async function addPlannerEntry(dayIdx, dateKey) {
  try {
    const outfits = await window.api('GET', `/wardrobe/outfits${_activeMember?'?member_id='+_activeMember:''}`);
    if (!outfits.length) { toast('No outfits saved yet — create one in the Outfits tab first', 'info'); return; }
    const opts = outfits.map(o => `<option value="${o.id}">${esc(o.name)} ${o.owner_name?'('+esc(o.owner_name)+')':''}</option>`).join('');
    const body = document.getElementById('wrdPlannerBody');
    body.innerHTML = `
      <div class="lb-modal-title">Day plan · ${dateKey}</div>
      <div class="lb-modal-display">Add outfit to day</div>
      <div class="form-group"><label class="form-label">Outfit</label>
        <select class="form-select" id="planOutfitSel">${opts}</select>
      </div>
      <div class="form-group"><label class="form-label">Occasion</label>
        <input class="form-input" id="planOccasion" placeholder="e.g. School">
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="lb-pill-btn" style="flex:1;padding:10px 16px;font-size:13px" onclick="confirmPlannerAdd('${dateKey}')">Add</button>
        <button class="btn btn-ghost" onclick="closePlannerModal()">Cancel</button>
      </div>`;
    document.getElementById('wrdPlannerOverlay').classList.add('open');
  } catch(e) { toast('Failed to load outfits', 'err'); }
}

function closePlannerModal() {
  document.getElementById('wrdPlannerOverlay').classList.remove('open');
}

async function confirmPlannerAdd(dateKey) {
  try {
    const outfitId  = document.getElementById('planOutfitSel').value;
    const occasion  = document.getElementById('planOccasion').value.trim();
    await window.api('POST', '/wardrobe/planner', {
      plan_date: dateKey, outfit_id: outfitId,
      family_member_id: _activeMember||null, occasion: occasion||null
    });
    closePlannerModal();
    loadPlannerEntries();
  } catch(e) { toast('Failed to add', 'err'); }
}

async function loadWeather() {
  try {
    const d = await window.api('GET', '/app/weather');
    if (!d || !d.list && !d.daily) return;
    const days = d.daily || d.list?.filter((_,i) => i%8===0) || [];
    days.slice(0,7).forEach((day, i) => {
      const weather = day.weather?.[0];
      const icon = WEATHER_ICONS[weather?.main] || '🌤️';
      const temp = day.temp?.day
        ? Math.round(day.temp.day)
        : Math.round((day.main?.temp || 293) - 273.15) * 9/5 + 32;
      const tempStr = `${Math.round(temp)}°${'F'}`;
      const cond = (weather?.main || '').toLowerCase();
      const exceptional = cond.includes('rain') || cond.includes('snow') || cond.includes('thunder') || temp >= 90 || temp <= 32;
      const wx = document.getElementById('lbWx_'+i);
      if (wx) {
        wx.innerHTML = `<span>${icon}</span><span>${tempStr}</span>`;
        wx.classList.toggle('exceptional', exceptional);
      }
    });
  } catch(e) {}
}

// Card rendering extracted so loadItems() and loadMoreWrdItems() share it.
function _renderWrdItemCard(item, k) {
  const tilt = `lb-tilt-${k % 4}`;
  const member = item.wardrobe_owner_id ? _memberById[item.wardrobe_owner_id] : null;
  const ownerName = item.owner_name || (member?.display_name || '');
  const polaroid = lbPolaroid({
    primary_photo: item.primary_photo,
    category: item.category,
    name: item.wardrobe_nickname || item.name,
    label: item.wardrobe_nickname || item.name,
    ratio: 'square'
  });
  return `<div class="lb-item-card ${tilt}${item.is_archived?' is-archived':''}" data-id="${item.id}" style="position:relative" onclick="openItemDrawer(${item.id})">
    ${polaroid}
    <div class="lb-item-meta">
      <span class="lb-item-meta-owner">${ownerName ? lbMemberDot(member, 5) + esc(ownerName) : ''}</span>
      ${item.wardrobe_color ? `<span class="lb-item-meta-color" style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">${esc(item.wardrobe_color)}</span>` : ''}
      <span class="lb-item-meta-stat">${(item.times_worn||0) ? `${item.times_worn}w` : '·'}</span>
    </div>
    <button class="wrd-card-edit-btn" title="Edit" onclick="event.stopPropagation();openItemDrawer(${item.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
  </div>`;
}

function _wrdRenderLoadMoreBtn() {
  const remaining = (_allItems?.length || 0) - _wrdRenderedCount;
  if (remaining <= 0) return '';
  return `<div id="wrdLoadMore" style="display:flex;justify-content:center;padding:14px 14px 90px">
    <button onclick="loadMoreWrdItems()" style="padding:9px 24px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans)">
      Load more <span style="color:var(--text3);font-weight:400">· ${remaining} remaining</span>
    </button>
  </div>`;
}

function loadMoreWrdItems() {
  const grid = document.getElementById('itemGrid');
  if (!grid || !_allItems) return;
  const next = _allItems.slice(_wrdRenderedCount, _wrdRenderedCount + WRD_BATCH_SIZE);
  const startIdx = _wrdRenderedCount;
  _wrdRenderedCount += next.length;
  const html = next.map((item, i) => _renderWrdItemCard(item, startIdx + i)).join('');
  grid.insertAdjacentHTML('beforeend', html);
  // Replace or remove the "Load more" button
  const wrap = document.getElementById('wrdLoadMore');
  if (wrap) {
    if (_wrdRenderedCount < _allItems.length) {
      wrap.outerHTML = _wrdRenderLoadMoreBtn();
    } else {
      wrap.remove();
    }
  }
}
window.loadMoreWrdItems = loadMoreWrdItems;

async function loadItems() {
  try {
    const cat     = _itemFilters.category || '';
    const season  = _itemFilters.season   || '';
    const occasion= _itemFilters.occasion || '';
    const owner   = _itemFilters.owner;  // from lens
    let url = '/wardrobe/items?';
    if (owner != null)  url += `member_id=${owner}&`;
    else if (_activeMember) url += `member_id=${_activeMember}&`;
    if (cat)     url += `category=${encodeURIComponent(cat)}&`;
    if (season)  url += `season=${encodeURIComponent(season)}&`;
    if (occasion)url += `occasion=${encodeURIComponent(occasion)}&`;
    _allItems = await window.api('GET', url);
    if (_itemFilters.tag) {
      _allItems = _allItems.filter(r => (r.tags || []).includes(_itemFilters.tag));
    }
    if (window.GH_LENS && typeof GH_LENS.setCount === 'function') GH_LENS.setCount(_allItems.length);
    const grid = document.getElementById('itemGrid');

    // Card view: render via GH_CARD when user picks "card" in the toolbar.
    if (_itemView === 'card' && window.GH_MOUNT) {
      // Bridge our local family cache into the global the cards' helpers
      // read from. _members is populated by refreshMemberCache() before this.
      if (Array.isArray(_members) && _members.length) window.familyMembers = _members;
      const mounted = window.GH_MOUNT.intoContainer({
        containerId: 'itemGrid',
        moduleId:    'wardrobe',
        records:     _allItems,
        onClick:     (r) => openItemDrawer(r.id),
        derive: (r) => ({
          // wardrobe stores tags as JSON strings — keep them as-is for the config
          // photo: API uses primary_photo.{id} or attachment_id
          photo_attachment_id: r.primary_photo?.id || r.attachment_id || null,
          // API already returns times_worn + last_worn via subqueries in
          // /wardrobe/items. Card config reads last_worn_at (with suffix);
          // alias here. cost_per_wear = purchase_price / times_worn,
          // null when unworn so the row simply doesn't render.
          last_worn_at: r.last_worn_at || r.last_worn || null,
          cost_per_wear: (r.purchase_price && r.times_worn)
            ? Math.round((r.purchase_price / r.times_worn) * 100) / 100
            : null,
        }),
        onEmpty: () => `<div class="lb-empty">
          <div class="lb-empty-icon">👔</div>
          <div class="lb-empty-title">The closet's empty</div>
          <div class="lb-empty-sub">Tap + to add your first piece. Photo + tag = 10 seconds.</div>
        </div>`,
      });
      if (mounted) { refreshMemberCache(); return; }
    }

    if (!_allItems.length) {
      grid.className = '';
      grid.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👔</div>
        <div class="lb-empty-title">The closet's empty</div>
        <div class="lb-empty-sub">Tap + to add your first piece. Photo + tag = 10 seconds.</div>
      </div>`;
      return;
    }
    refreshMemberCache();

    if (_itemView === 'list') {
      grid.className = 'wrd-list-grid';
      grid.innerHTML = _allItems.map(item => {
        const member = item.wardrobe_owner_id ? _memberById[item.wardrobe_owner_id] : null;
        const ownerName = item.owner_name || (member?.display_name || '');
        const thumbSrc = item.primary_photo?.id ? `/api/v1/attachments/thumb/${item.primary_photo.id}` : null;
        return `<div class="wrd-list-card${item.is_archived?' is-archived':''}" data-id="${item.id}" onclick="openItemDrawer(${item.id})">
          ${thumbSrc
            ? `<img class="wrd-list-thumb" src="${thumbSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''
          }
          <div class="wrd-list-placeholder" style="${thumbSrc?'display:none':''}">${(item.category||'?').charAt(0)}</div>
          <div class="wrd-list-body">
            <div class="wrd-list-name">${esc(item.wardrobe_nickname||item.name)}</div>
            <div class="wrd-list-meta">${esc(item.category||'')}${item.brand?' · '+esc(item.brand):''}${item.wardrobe_color?' · '+esc(item.wardrobe_color):''}</div>
          </div>
          ${ownerName ? `<span class="wrd-list-owner">${lbMemberDot(member,5)}${esc(ownerName)}</span>` : ''}
          <button class="wrd-list-edit-btn" title="Edit" onclick="event.stopPropagation();openItemDrawer(${item.id})"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        </div>`;
      }).join('');
    } else {
      const cols = _itemCols || 2;
      grid.className = 'lb-items-grid';
      grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
      // "Load more" pagination: render the first WRD_BATCH items, then a
      // button at the bottom appends the next batch. Keeps the DOM small
      // even for 1000s of items. Filters still run against full _allItems.
      _wrdRenderedCount = Math.min(WRD_BATCH_SIZE, _allItems.length);
      const firstBatch = _allItems.slice(0, _wrdRenderedCount);
      grid.innerHTML = firstBatch.map((item, k) => _renderWrdItemCard(item, k)).join('');
      // Append the load-more button below the grid (sibling, not inside grid)
      let lm = document.getElementById('wrdLoadMore');
      if (lm) lm.remove();
      if (_wrdRenderedCount < _allItems.length) {
        grid.insertAdjacentHTML('afterend', _wrdRenderLoadMoreBtn());
      }
    }
  } catch(e) { toast('Failed to load items', 'err'); }
}

  const el = document.getElementById(containerId);
  el.innerHTML = opts.map(o => `
    <div onclick="${onToggle}('${o}')" style="padding:4px 10px;border-radius:99px;font-size:12px;cursor:pointer;
      border:1.5px solid ${selected.includes(o)?'var(--accent)':'var(--border)'};
      background:${selected.includes(o)?'var(--accent-bg)':'var(--bg2)'};
      color:${selected.includes(o)?'var(--accent)':'var(--text2)'}">
      ${esc(o)}
    </div>`).join('');
}
