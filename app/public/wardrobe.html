<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icon-192.png">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f4f8"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wardrobe — Ghrava</title><link rel="stylesheet" href="/shared.css"><script src="/theme.js"></script>
  <script>if (localStorage.getItem('gh_nav_collapsed') !== '0') document.documentElement.classList.add('nav-collapsed-init');</script>
  <style>
    /* ── LOOKBOOK · Direction B styles ─────────────────────────
       Photo-led, generous whitespace, polaroid garments.
       Built on the existing token palette only. */

    /* ── Page header with eyebrow + light display title ── */
    .lb-page-hdr{padding:18px 18px 10px}
    .lb-eyebrow{font-family:var(--mono);font-size:10px;color:var(--text3);
      letter-spacing:.16em;text-transform:uppercase;margin-bottom:2px}
    .lb-display{font-size:26px;font-weight:300;letter-spacing:-.03em;color:var(--text);line-height:1.05}
    @media(min-width:768px){
      .lb-page-hdr{padding:24px 28px 12px}
      .lb-display{font-size:38px;letter-spacing:-.035em}
      .lb-eyebrow{font-size:11px;letter-spacing:.18em}
    }

    /* ── Member pill strip ── */
    .member-pills{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px 6px;overflow-x:auto;scrollbar-width:none}
    .member-pills::-webkit-scrollbar{display:none}
    .member-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;
      font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);
      color:var(--text2);background:var(--bg2);transition:all .15s;flex-shrink:0;user-select:none}
    .member-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .member-pill .member-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    /* ── Tab bar (underline) ── */
    .tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 14px;gap:0;
      overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text3);
      cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Photo placeholder fallbacks ──────────────────────────
       Used when an item/outfit has no primary_photo attachment.
       Hanger SVG with a soft tinted bg, OR a category-tinted tile with mono caption. */
    .lb-ph{position:relative;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .lb-ph-hanger{background:linear-gradient(135deg, rgba(236,72,153,.06), rgba(92,114,250,.04));
      color:var(--text4)}
    .lb-ph-hanger svg{width:42%;max-width:60px;opacity:.65}
    .lb-ph-tile{font-family:var(--mono);font-size:9px;letter-spacing:.06em;
      text-transform:uppercase;color:var(--text3);background:var(--bg3);padding:6px;
      text-align:center;line-height:1.2}
    .lb-ph-tile.cat-clothing{background:rgba(236,72,153,.08);color:#ec4899}
    .lb-ph-tile.cat-shoes{background:rgba(245,158,11,.08);color:#f59e0b}
    .lb-ph-tile.cat-accessories{background:rgba(167,139,250,.08);color:#a78bfa}
    .lb-ph-tile.cat-bags{background:rgba(34,197,94,.08);color:#22c55e}
    .lb-ph-tile.cat-hats{background:rgba(92,114,250,.08);color:#5c72fa}
    .lb-ph-tile.cat-jewelry{background:rgba(167,139,250,.08);color:#a78bfa}
    .lb-ph::before{content:"";position:absolute;inset:0;
      background-image:repeating-linear-gradient(45deg,transparent 0 8px,rgba(255,255,255,.02) 8px 16px);
      pointer-events:none}
    .lb-ph img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover;display:block}

    /* ── Polaroid frame — cream paper backing, drop shadow, mono caption ── */
    .lb-polaroid{padding:5px 5px 17px;background:#f4ece0;border-radius:3px;
      box-shadow:0 4px 12px rgba(0,0,0,.35);position:relative;display:block}
    .lb-polaroid.big{padding:8px 8px 20px}
    .lb-polaroid-photo{width:100%;aspect-ratio:1/1;border-radius:1px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;position:relative}
    .lb-polaroid-photo.tall{aspect-ratio:3/4}
    .lb-polaroid-photo.primary{outline:2px solid var(--green);outline-offset:-2px}
    .lb-polaroid-cap{text-align:center;font-family:var(--mono);font-size:9px;
      color:#3a2c20;letter-spacing:.06em;margin-top:4px;text-transform:uppercase;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
    .lb-polaroid.big .lb-polaroid-cap{font-size:10px}

    /* Pleasing tilt cycle — index%4 picks one of these */
    .lb-tilt-0{transform:rotate(-.8deg)}
    .lb-tilt-1{transform:rotate(.6deg)}
    .lb-tilt-2{transform:rotate(-.4deg)}
    .lb-tilt-3{transform:rotate(1deg)}

    /* ── Planner · vertical day rows ── */
    .lb-day-list{padding-bottom:90px}
    .lb-day-row{padding:18px 0 14px;border-bottom:1px solid var(--border)}
    .lb-day-row:last-child{border-bottom:none}
    .lb-day-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:0 18px 10px}
    .lb-day-hdr-left{display:flex;align-items:baseline;gap:10px}
    .lb-day-num{font-size:32px;font-weight:300;letter-spacing:-.03em;color:var(--text);
      line-height:1;font-feature-settings:"tnum"}
    .lb-day-num.today{color:var(--accent)}
    .lb-day-dow{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em}
    .lb-day-today-badge{font-size:9px;font-weight:700;color:var(--accent);
      font-family:var(--mono);letter-spacing:.14em}
    .lb-day-wx{font-size:11px;font-family:var(--mono);color:var(--text3);
      letter-spacing:.04em;display:flex;align-items:center;gap:5px}
    .lb-day-wx.exceptional{color:var(--amber)}
    .lb-day-wx.past{color:var(--text4)}
    .lb-day-row.past .lb-day-num,
    .lb-day-row.past .lb-day-dow{color:var(--text3)}
    .lb-day-row.past .lb-polaroid{filter:saturate(.7) brightness(.85)}

    .lb-day-scroll{display:flex;gap:14px;overflow-x:auto;padding:2px 18px 6px;scrollbar-width:none}
    .lb-day-scroll::-webkit-scrollbar{display:none}
    .lb-day-card{flex-shrink:0;width:172px;cursor:pointer}
    .lb-day-card-meta{display:flex;align-items:center;justify-content:space-between;
      margin-top:7px;padding:0 4px}
    .lb-day-card-owner{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
    .lb-day-card-owner .member-dot{width:6px;height:6px;border-radius:50%}
    .lb-day-card-pcs{font-size:10px;font-family:var(--mono);color:var(--text3)}

    .lb-day-empty{margin:0 18px;padding:24px 14px;border:1px dashed var(--border);
      border-radius:6px;text-align:center;color:var(--text4);
      font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;
      transition:all .15s}
    .lb-day-empty:hover{border-color:var(--accent);color:var(--accent)}
    .lb-day-empty.past{cursor:default}
    .lb-day-empty.past:hover{border-color:var(--border);color:var(--text4)}

    /* ── Items · polaroid grid (2-col mobile, 5-col desktop) ── */
    .lb-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;
      row-gap:22px;padding:14px 14px 90px}
    @media(min-width:768px){
      .lb-items-grid{grid-template-columns:repeat(4,1fr);gap:22px;row-gap:28px;padding:18px 28px 80px}
    }
    @media(min-width:1100px){
      .lb-items-grid{grid-template-columns:repeat(5,1fr);gap:24px;row-gap:30px}
    }
    .lb-item-card{display:block;cursor:pointer}
    .lb-item-meta{display:flex;justify-content:space-between;margin-top:6px;
      padding:0 6px;font-size:10px;color:var(--text3)}
    .lb-item-meta-owner{display:flex;gap:4px;align-items:center}
    .lb-item-meta-owner .member-dot{width:5px;height:5px;border-radius:50%}
    .lb-item-meta-stat{font-family:var(--mono)}

    /* ── Outfits · full-bleed cover cards (2-col mobile, 3-col desktop) ── */
    .lb-outfits-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;
      padding:14px 16px 90px}
    @media(min-width:768px){
      .lb-outfits-grid{grid-template-columns:repeat(3,1fr);gap:16px;padding:18px 28px 80px}
    }
    @media(min-width:1100px){
      .lb-outfits-grid{grid-template-columns:repeat(4,1fr)}
    }
    .lb-outfit-card{position:relative;border-radius:10px;overflow:hidden;
      background:var(--bg2);border:1px solid var(--border);cursor:pointer;
      aspect-ratio:3/4;transition:transform .15s, border-color .15s}
    .lb-outfit-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .lb-outfit-card-photo{position:absolute;inset:0}
    .lb-outfit-card-photo img{width:100%;height:100%;object-fit:cover}
    .lb-outfit-card-photo .lb-ph{width:100%;height:100%;border-radius:0}
    .lb-outfit-card-grad{position:absolute;inset:0;
      background:linear-gradient(180deg,transparent 38%,rgba(8,12,20,.92) 100%);
      pointer-events:none}
    .lb-outfit-card-owner{position:absolute;top:8px;right:8px;display:inline-flex;
      align-items:center;gap:5px;padding:3px 10px;border-radius:99px;
      background:rgba(8,12,20,.6);backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);font-size:10px;font-weight:600;color:var(--text)}
    .lb-outfit-card-owner .member-dot{width:5px;height:5px;border-radius:50%}
    .lb-outfit-card-body{position:absolute;left:0;right:0;bottom:0;padding:10px 10px 9px}
    .lb-outfit-card-name{font-size:13px;font-weight:600;color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;
      white-space:nowrap}
    .lb-outfit-card-items{display:flex;gap:3px;margin-top:6px}
    .lb-outfit-card-item-thumb{width:18px;height:18px;border-radius:3px;overflow:hidden;
      background:var(--bg3);opacity:.95}
    .lb-outfit-card-item-thumb img{width:100%;height:100%;object-fit:cover}
    .lb-outfit-card-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
    .lb-outfit-card-tag{font-size:9px;padding:2px 7px;border-radius:99px;
      background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-weight:500;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}

    /* ── Insights · Season Review ── */
    .lb-insights{padding:18px 18px 90px}
    @media(min-width:768px){.lb-insights{padding:24px 28px 60px}}
    .lb-hero{margin-bottom:30px}
    .lb-hero-eyebrow{font-family:var(--mono);font-size:11px;color:var(--text3);
      letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}
    .lb-hero-num{font-size:32px;font-weight:300;letter-spacing:-.035em;
      line-height:1.1;color:var(--text);max-width:880px}
    .lb-hero-num .neverworn{color:var(--amber)}
    @media(min-width:768px){.lb-hero-num{font-size:46px;letter-spacing:-.04em}}

    .lb-section-hdr{display:flex;align-items:baseline;justify-content:space-between;
      border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px}
    .lb-section-hdr-title{font-size:18px;font-weight:600;letter-spacing:-.02em}
    .lb-section-hdr-count{font-family:var(--mono);color:var(--text3);font-size:13px;
      font-weight:400;margin-left:6px}

    .lb-triage-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:32px}
    @media(min-width:768px){.lb-triage-grid{grid-template-columns:repeat(4,1fr)}}
    .lb-triage-actions{display:flex;justify-content:center;gap:6px;margin-top:10px}
    .lb-triage-actions button{padding:4px 12px;font-size:11px;border-radius:99px;
      font-weight:600;cursor:pointer;border:1px solid;font-family:inherit}
    .lb-triage-actions .keep{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
    .lb-triage-actions .donate{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
    .lb-triage-actions .sell{background:var(--bg3);border-color:var(--border2);color:var(--text2)}

    .lb-most-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:30px}
    @media(min-width:768px){.lb-most-grid{grid-template-columns:repeat(5,1fr)}}
    .lb-most-card .lb-ph{aspect-ratio:1/1;width:100%}
    .lb-most-name{font-size:13px;font-weight:600;margin-top:8px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-most-stat{font-size:10px;color:var(--text3);font-family:var(--mono);
      letter-spacing:.04em;margin-top:2px}

    .lb-spend-row{display:flex;gap:10px;margin-bottom:8px}
    .lb-spend-cell{padding:18px 14px;background:var(--bg2);border:1px solid var(--border);
      border-radius:8px;border-left:3px solid var(--text3);min-width:0}
    .lb-spend-cell-name{font-size:10px;font-family:var(--mono);letter-spacing:.1em;
      color:var(--text3);text-transform:uppercase;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-spend-cell-val{font-size:24px;font-weight:300;margin-top:2px}

    /* "+ Triage all" pill button */
    .lb-pill-btn{padding:6px 14px;border-radius:99px;background:var(--accent);
      border:none;color:#fff;font-weight:600;font-size:12px;cursor:pointer;
      font-family:inherit;display:inline-flex;align-items:center;gap:4px}
    .lb-pill-btn:hover{background:var(--accent-h)}

    /* ── Empty states ── */
    .lb-empty{text-align:center;padding:60px 20px;color:var(--text3)}
    .lb-empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
    .lb-empty-title{font-weight:700;font-size:15px;margin-bottom:6px;color:var(--text2)}
    .lb-empty-sub{font-size:13px}

    /* ── Photo panel inside drawers (item + outfit) ─────────── */
    .wrd-photo-panel{margin:14px 0 10px;padding:12px;border:1px dashed var(--border);
      border-radius:var(--r-sm,8px);background:var(--bg);display:flex;
      flex-direction:column;gap:8px}
    .wrd-photo-panel.locked{opacity:.55;cursor:not-allowed}
    .wrd-photo-panel-hdr{display:flex;align-items:center;justify-content:space-between;
      font-size:12px;color:var(--text2);font-weight:600}
    .wrd-photo-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .wrd-photo-strip-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;
      border:1px solid var(--border);cursor:pointer;background:var(--bg2);
      display:flex;align-items:center;justify-content:center}
    .wrd-photo-strip-thumb.primary{border-color:var(--green)}
    .wrd-photo-strip-thumb img{width:100%;height:100%;object-fit:cover}
    .wrd-photo-add{width:100%;padding:8px 12px;border:1px solid var(--border);
      border-radius:6px;background:var(--bg2);color:var(--text2);font-size:12px;
      cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;
      justify-content:center;gap:6px}
    .wrd-photo-add:hover{border-color:var(--accent);color:var(--accent)}

    /* ── Planner add-outfit modal (kept from 202604.038) ── */
    #wrdPlannerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
      align-items:flex-end;justify-content:center;z-index:550}
    #wrdPlannerOverlay.open{display:flex}
    #wrdPlannerOverlay .wrd-modal{width:min(440px,100%);background:var(--bg2);
      border-radius:16px 16px 0 0;padding:18px;border:1px solid var(--border);
      border-bottom:none}
    @media(min-width:600px){
      #wrdPlannerOverlay{align-items:center}
      #wrdPlannerOverlay .wrd-modal{border-radius:16px;border-bottom:1px solid var(--border)}
    }
    .lb-modal-title{font-family:var(--mono);font-size:10px;color:var(--text3);
      letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
    .lb-modal-display{font-size:22px;font-weight:300;letter-spacing:-.03em;margin-bottom:14px}
  </style>
</head>
<body>
<script src="/nav.js"></script>
<script>window.GH_PAGE = { module:'wardrobe', title:'Wardrobe' };</script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>
<script src="/attachments.js"></script>

<div id="app">
  <div class="gh-page-header"></div>

  <!-- Lookbook page header — eyebrow + light display title; updated per tab -->
  <div class="lb-page-hdr">
    <div class="lb-eyebrow" id="lbEyebrow">WARDROBE</div>
    <div class="lb-display" id="lbTitle">This Week</div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('planner',this)">Planner</div>
    <div class="tab" onclick="switchTab('items',this)">Items</div>
    <div class="tab" onclick="switchTab('outfits',this)">Outfits</div>
    <div class="tab" onclick="switchTab('insights',this)">Insights</div>
  </div>

  <!-- Member filter -->
  <div class="member-pills" id="memberPills"></div>

  <!-- Planner tab — vertical day rows -->
  <div id="tab-planner">
    <div class="lb-day-list" id="dayList"></div>
  </div>

  <!-- Items tab — polaroid grid -->
  <div id="tab-items" style="display:none">
    <div style="display:flex;align-items:center;padding:6px 16px 0">
      <div style="flex:1"></div>
      <div id="itemViewToolbar"></div>
    </div>
    <div id="itemGrid"></div>
  </div>

  <!-- Outfits tab — full-bleed cover cards -->
  <div id="tab-outfits" style="display:none">
    <div style="display:flex;justify-content:flex-end;padding:12px 16px 0">
      <button class="lb-pill-btn" onclick="openOutfitDrawer()">+ New Outfit</button>
    </div>
    <div id="outfitList"></div>
  </div>

  <!-- Insights tab — Season Review -->
  <div id="tab-insights" style="display:none">
    <div id="lbInsights"></div>
  </div>
</div>

<!-- Item Drawer -->
<div class="gh-drawer" id="itemDrawer">
  <div class="gh-drawer-header">
    <div class="gh-drawer-title" id="itemDrawerTitle">Add Item</div>
    <button class="gh-drawer-close" onclick="closeDrawer('itemDrawer')">×</button>
  </div>
  <div class="gh-drawer-body">
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="iName"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="iCategory"><option value="">Loading…</option></select>
      </div>
      <div class="form-group"><label class="form-label">Owner</label>
        <select class="form-select" id="iOwner"><option value="">— select —</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Brand</label><input class="form-input" id="iBrand"></div>
      <div class="form-group"><label class="form-label">Nickname</label><input class="form-input" id="iNickname" placeholder="Optional label"></div>
    </div>
    <div class="form-group"><label class="form-label">Season Tags</label>
      <div id="iSeasonTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-group"><label class="form-label">Occasion Tags</label>
      <div id="iOccasionTags" style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Purchase Price</label><input class="form-input" type="number" id="iPrice" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">Purchase Date</label><input class="form-input" type="date" id="iPDate"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="iStatus" onchange="toggleStatusFields()"><option value="active">Active</option></select>
    </div>
    <div id="soldFields" style="display:none">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sale Price</label><input class="form-input" type="number" id="iSoldPrice"></div>
        <div class="form-group"><label class="form-label">Sale Date</label><input class="form-input" type="date" id="iSoldDate"></div>
      </div>
      <div class="form-group"><label class="form-label">Platform</label>
        <select class="form-select" id="iSoldPlatform"><option value="">— select —</option></select>
      </div>
    </div>
    <div id="donatedFields" style="display:none">
      <div class="form-group"><label class="form-label">Organization</label>
        <div id="iDonatedOrg"></div>
      </div>
      <div class="form-group"><label class="form-label">Fair Market Value</label><input class="form-input" type="number" id="iDonatedFmv"></div>
    </div>
    <div id="discardedFields" style="display:none">
      <div class="form-group"><label class="form-label">Reason</label><input class="form-input" id="iDiscardReason"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="iNotes" style="min-height:70px"></textarea></div>

    <!-- Photos panel (greyed when no _editingItemId, photo strip when item exists) -->
    <div class="wrd-photo-panel" id="iPhotoPanel">
      <div class="wrd-photo-panel-hdr">
        <span>Photos</span>
        <span id="iPhotoPanelCount" style="font-weight:400;color:var(--text3);font-size:11px"></span>
      </div>
      <div id="iPhotoPanelBody"></div>

    <div style="display:flex;gap:8px;padding-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveItem()">Save</button>
      <button class="btn btn-ghost" id="iDeleteBtn" style="display:none" onclick="deleteItem()">Delete</button>
    </div>
  </div>
</div>

<!-- Outfit Drawer -->
<div class="gh-drawer" id="outfitDrawer">
  <div class="gh-drawer-header">

<!-- Planner add-outfit modal (replaces broken LT.modal call) -->
<div id="wrdPlannerOverlay" onclick="if(event.target===this)closePlannerModal()">
  <div class="wrd-modal" id="wrdPlannerBody"></div>
</div>

<button class="fab" id="fabBtn" onclick="onFab()">+</button>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEATHER_ICONS = { Clear:'☀️', Clouds:'⛅', Rain:'🌧️', Drizzle:'🌦️', Thunderstorm:'⛈️', Snow:'❄️', Mist:'🌫️' };
const SEASON_OPTS   = ['Spring','Summer','Fall','Winter','Rainy','All-season'];
const OCCASION_OPTS = ['Casual','School','Sports','Work','Formal','Outdoor','Evening'];

let _members = [], _activeMember = null, _currentTab = 'planner';
let _editingItemId = null, _editingOutfitId = null;
let _allItems = [], _iSeasonSel = [], _iOccasionSel = [];
let _oSeasonSel = [], _oOccasionSel = [], _oItemIds = [];
let _iPhotos = [], _oPhotos = [];
let _itemView = 'grid', _itemCols = 2, _itemFilters = {};
let _outfitView = 'grid', _outfitCols = 2, _outfitFilters = {};

function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
function openDrawer(id)  { document.getElementById(id).classList.add('open'); }

async function init() {
  AttachmentManager.injectStyles();
  await loadMembers();
  initItemView();
  initOutfitView();
  updatePageHeader('planner');
  renderDays();
  loadWeather();
  loadTabContent();
}

function initItemView() {
  GH_VIEW.init('itemViewToolbar', 'wrd_item', state => {
    _itemView = state.view; _itemCols = state.cols; _itemFilters = state.filters || {};
    if (_currentTab === 'items') loadItems();
  }, {
    defaultView: 'grid', defaultCols: 2,
    filterFields: [
      { key:'category', type:'select', label:'Category', options:[{value:'',label:'All'},{value:'Clothing',label:'Clothing'},{value:'Shoes',label:'Shoes'},{value:'Accessories',label:'Accessories'},{value:'Jewelry',label:'Jewelry'},{value:'Hats',label:'Hats'},{value:'Bags',label:'Bags'}]},
      { key:'season',   type:'select', label:'Season',   options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'},{value:'All-season',label:'All-season'}]},
      { key:'occasion', type:'select', label:'Occasion', options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'School',label:'School'},{value:'Sports',label:'Sports'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'}]},
    ]
  });
}

function initOutfitView() {
  GH_VIEW.init('outfitViewToolbar', 'wrd_outfit', state => {
    _outfitView = state.view; _outfitCols = state.cols; _outfitFilters = state.filters || {};
    if (_currentTab === 'outfits') loadOutfits();
  }, {
    defaultView: 'grid', defaultCols: 2,
    filterFields: [
      { key:'season',   type:'select', label:'Season',   options:[{value:'',label:'All'},{value:'Spring',label:'Spring'},{value:'Summer',label:'Summer'},{value:'Fall',label:'Fall'},{value:'Winter',label:'Winter'}]},
      { key:'occasion', type:'select', label:'Occasion', options:[{value:'',label:'All'},{value:'Casual',label:'Casual'},{value:'School',label:'School'},{value:'Work',label:'Work'},{value:'Formal',label:'Formal'},{value:'Evening',label:'Evening'}]},
    ]
  });
}
// Deterministic color palette for member dots — derived from the existing token palette only.
const MEMBER_COLORS = ['var(--accent)','var(--green)','var(--amber)','var(--purple)','var(--cat-clothing)','var(--red)'];

async function loadMembers() {
  try {
    _members = await window.api('GET', '/settings/family');
    // Decorate each with a stable color (index-based)
    _members.forEach((m, i) => { m.color = MEMBER_COLORS[i % MEMBER_COLORS.length]; });
    refreshMemberCache();
    const pills = document.getElementById('memberPills');
    pills.innerHTML = `<div class="member-pill active" data-id="" onclick="selectMember(null,this)">All</div>`;
    _members.forEach(m => {
      const p = document.createElement('div');
      p.className = 'member-pill'; p.dataset.id = m.id;
      p.innerHTML = `<span class="member-dot" style="background:${m.color}"></span>${esc(m.display_name)}`;
      p.onclick = () => selectMember(m.id, p);
      pills.appendChild(p);
    });
    // Populate owner selects
    ['iOwner','oMember'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      // Reset to placeholder option only (to avoid duplicates on reload)
      sel.innerHTML = id === 'oMember'
        ? '<option value="">— all —</option>'
        : '<option value="">— select —</option>';
      _members.forEach(m => {
        const o = document.createElement('option'); o.value = m.id; o.textContent = m.display_name;
        sel.appendChild(o);
      });
    });
  } catch(e) {}
}

function selectMember(id, el) {
  _activeMember = id;
  document.querySelectorAll('.member-pill').forEach(p => p.classList.toggle('active', p === el));
  loadTabContent();
}

// Lookbook page header copy per tab — week number computed once
function isoWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
const TAB_HEADER = {
  planner:  () => ({ eyebrow: `WARDROBE · WK ${isoWeekNumber(new Date())}`, title: 'This Week' }),
  items:    () => ({ eyebrow: `${(_allItems||[]).length || ''} GARMENTS`.trim() || 'WARDROBE', title: 'The Closet' }),
  outfits:  () => ({ eyebrow: 'OUTFITS', title: 'Looks' }),
  insights: () => ({ eyebrow: `SEASON REVIEW`, title: 'How was the season?' }),
};
function updatePageHeader(tab) {
  const h = (TAB_HEADER[tab] || TAB_HEADER.planner)();
  const eyebrow = document.getElementById('lbEyebrow');
  const title   = document.getElementById('lbTitle');
  if (eyebrow) eyebrow.textContent = h.eyebrow;
  if (title)   title.textContent   = h.title;
}

function switchTab(tab, el) {
  _currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['planner','items','outfits','insights'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  // Update FAB
  const fab = document.getElementById('fabBtn');
  fab.style.display = (tab === 'planner') ? 'none' : '';
  updatePageHeader(tab);
  loadTabContent();
}

function onFab() {
  if (_currentTab === 'items')   openItemDrawer();
  if (_currentTab === 'outfits') openOutfitDrawer();
}

function loadTabContent() {
  if (_currentTab === 'planner')  { /* already rendered */ }
  if (_currentTab === 'items')    loadItems();
  if (_currentTab === 'outfits')  loadOutfits();
  if (_currentTab === 'insights') loadInsights();
}

// ── Planner (Lookbook) ──────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WKD_SHORT    = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const CAT_PH_KEY = { Clothing:'clothing', Shoes:'shoes', Accessories:'accessories', Bags:'bags', Hats:'hats', Jewelry:'jewelry' };

const HANGER_SVG = `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:42%;max-width:60px;opacity:.65">
  <path d="M32 14 L32 22 M32 22 C26 22 26 30 32 30 L 8 44 L 56 44 L 32 30 C 38 30 38 22 32 22 Z"/>
</svg>`;

// Photo placeholder — used when an item/outfit has no real attachment thumbnail.
// Uses category color when known; falls back to hanger SVG. Always builds the
// real <img> when a primary_photo id exists, with onerror fallback to hanger.
function lbPhoto(opts) {
  const { primary_photo, category, name, ratio = 'tall', primary = false } = opts || {};
  const ratioCls = ratio === 'square' ? '' : 'tall';
  const primaryCls = primary ? ' primary' : '';
  if (primary_photo && primary_photo.id) {
    return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph">
      <img src="/api/v1/attachments/thumb/${primary_photo.id}" alt="${esc(name||'')}"
           onerror="this.outerHTML='${HANGER_SVG.replace(/'/g,'&#39;')}';this.parentElement.classList.add('lb-ph-hanger')">
    </div>`;
  }
  const catKey = CAT_PH_KEY[category] || '';
  if (catKey) {
    return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph lb-ph-tile cat-${catKey}">
      <span style="position:relative;z-index:1">${esc((category||'').toUpperCase())}</span>
    </div>`;
  }
  return `<div class="lb-polaroid-photo ${ratioCls}${primaryCls} lb-ph lb-ph-hanger">${HANGER_SVG}</div>`;
}

// Compact polaroid card (used in day strips and items grid)
function lbPolaroid({ primary_photo, category, name, label, ratio='square', big=false, primary=false }) {
  const photo = lbPhoto({ primary_photo, category, name, ratio, primary });
  const cap = label != null ? label : (name || '');
  return `<div class="lb-polaroid${big?' big':''}">
    ${photo}
    ${cap ? `<div class="lb-polaroid-cap">${esc(cap)}</div>` : ''}
  </div>`;
}

// Member dot helper (uses member color if available, else accent)
function lbMemberDot(member, size = 6) {
  const color = (member && member.color) || 'var(--accent)';
  return `<span class="member-dot" style="width:${size}px;height:${size}px;background:${color}"></span>`;
}

// Cache members by id for quick lookup in day cards
let _memberById = {};
function refreshMemberCache() {
  _memberById = Object.fromEntries(_members.map(m => [m.id, m]));
}

function renderDays() {
  const list = document.getElementById('dayList');
  if (!list) return;
  const today = new Date();
  list.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const isToday = i === 0;
    const dateKey = d.toISOString().slice(0,10);
    const wkd     = WKD_SHORT[d.getDay()];
    const dayNum  = d.getDate();

    const row = document.createElement('div');
    row.className = `lb-day-row${isToday ? ' today' : ''}`;
    row.id = 'lb-day-'+i;
    row.dataset.date = dateKey;
    row.innerHTML = `
      <div class="lb-day-hdr">
        <div class="lb-day-hdr-left">
          <span class="lb-day-num${isToday?' today':''}">${dayNum}</span>
          <span class="lb-day-dow">${wkd}</span>
          ${isToday ? '<span class="lb-day-today-badge">TODAY</span>' : ''}
        </div>
        <span class="lb-day-wx" id="lbWx_${i}"><span style="opacity:.5">—</span></span>
      </div>
      <div id="lbBody_${i}">
        <div class="lb-day-empty" onclick="addPlannerEntry(${i},'${dateKey}')">+ plan an outfit</div>
      </div>`;
    list.appendChild(row);
  }
  loadPlannerEntries();
}

async function loadPlannerEntries() {
  try {
    const today = new Date();
    const end   = new Date(today); end.setDate(today.getDate()+6);
    const params = `start=${today.toISOString().slice(0,10)}&end=${end.toISOString().slice(0,10)}${_activeMember?'&member_id='+_activeMember:''}`;
    const entries = await window.api('GET', `/wardrobe/planner?${params}`);

    let outfitMap = {};
    try {
      const outfits = await window.api('GET', '/wardrobe/outfits');
      outfitMap = Object.fromEntries((outfits||[]).map(o => [o.id, o]));
    } catch(e) {}

    refreshMemberCache();

    for (let i = 0; i < 7; i++) {
      const d = new Date(today); d.setDate(today.getDate()+i);
      const dateKey = d.toISOString().slice(0,10);
      const dayEntries = entries.filter(e => e.plan_date === dateKey);
      const body = document.getElementById('lbBody_'+i);
      if (!body) continue;

      if (!dayEntries.length) {
        body.innerHTML = `<div class="lb-day-empty" onclick="addPlannerEntry(${i},'${dateKey}')">+ plan an outfit</div>`;
        continue;
      }

      body.innerHTML = `<div class="lb-day-scroll">
        ${dayEntries.map(e => {
          const outfit = outfitMap[e.outfit_id] || {};
          const itemCount = outfit.items?.length || 0;
          const member = e.family_member_id ? _memberById[e.family_member_id] : null;
          const memberName = member?.display_name || e.member_name || '';
          const polaroid = lbPolaroid({
            primary_photo: outfit.primary_photo,
            category: 'Clothing',
            name: e.outfit_name || 'Outfit',
            label: e.outfit_name || 'Outfit',
            ratio: 'tall',
            big: true
          });
          return `<div class="lb-day-card" onclick="removePlannerEntry(${e.id})" title="Remove from day">
            ${polaroid}
            <div class="lb-day-card-meta">
              <span class="lb-day-card-owner">${memberName ? lbMemberDot(member, 6) + esc(memberName) : ''}</span>
              ${itemCount ? `<span class="lb-day-card-pcs">${itemCount} pc${itemCount===1?'':'s'}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }
  } catch(e) {}
}

async function addPlannerEntry(dayIdx, dateKey) {
  try {
    const outfits = await window.api('GET', `/wardrobe/outfits${_activeMember?'?member_id='+_activeMember:''}`);
    if (!outfits.length) { toast('No outfits saved yet — create one in the Outfits tab first', 'info'); return; }
    const opts = outfits.map(o => `<option value="${o.id}">${esc(o.name)} ${o.owner_name?'('+esc(o.owner_name)+')':''}</option>`).join('');
    const body = document.getElementById('wrdPlannerBody');
    body.innerHTML = `
      <div class="lb-modal-title">Day plan · ${dateKey}</div>
      <div class="lb-modal-display">Add outfit to day</div>
      <div class="form-group"><label class="form-label">Outfit</label>
        <select class="form-select" id="planOutfitSel">${opts}</select>
      </div>
      <div class="form-group"><label class="form-label">Occasion</label>
        <input class="form-input" id="planOccasion" placeholder="e.g. School">
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="lb-pill-btn" style="flex:1;padding:10px 16px;font-size:13px" onclick="confirmPlannerAdd('${dateKey}')">Add</button>
        <button class="btn btn-ghost" onclick="closePlannerModal()">Cancel</button>
      </div>`;
    document.getElementById('wrdPlannerOverlay').classList.add('open');
  } catch(e) { toast('Failed to load outfits', 'err'); }
}

function closePlannerModal() {
  document.getElementById('wrdPlannerOverlay').classList.remove('open');
}

async function confirmPlannerAdd(dateKey) {
  try {
    const outfitId  = document.getElementById('planOutfitSel').value;
    const occasion  = document.getElementById('planOccasion').value.trim();
    await window.api('POST', '/wardrobe/planner', {
      plan_date: dateKey, outfit_id: outfitId,
      family_member_id: _activeMember||null, occasion: occasion||null
    });
    closePlannerModal();
    loadPlannerEntries();
  } catch(e) { toast('Failed to add', 'err'); }
}

async function removePlannerEntry(id) {
  LT.confirm({
    title: 'Remove outfit from day?',
    msg: '',
    confirmLabel: 'Remove',
    onConfirm: async () => {
      await window.api('DELETE', `/wardrobe/planner/${id}`);
      loadPlannerEntries();
    }
  });
}

async function loadWeather() {
  try {
    const d = await window.api('GET', '/app/weather');
    if (!d || !d.list && !d.daily) return;
    const days = d.daily || d.list?.filter((_,i) => i%8===0) || [];
    days.slice(0,7).forEach((day, i) => {
      const weather = day.weather?.[0];
      const icon = WEATHER_ICONS[weather?.main] || '🌤️';
      const temp = day.temp?.day
        ? Math.round(day.temp.day)
        : Math.round((day.main?.temp || 293) - 273.15) * 9/5 + 32;
      const tempStr = `${Math.round(temp)}°${'F'}`;
      const cond = (weather?.main || '').toLowerCase();
      const exceptional = cond.includes('rain') || cond.includes('snow') || cond.includes('thunder') || temp >= 90 || temp <= 32;
      const wx = document.getElementById('lbWx_'+i);
      if (wx) {
        wx.innerHTML = `<span>${icon}</span><span>${tempStr}</span>`;
        wx.classList.toggle('exceptional', exceptional);
      }
    });
  } catch(e) {}
}

// ── Items ─────────────────────────────────────────────────────
async function loadItems() {
  try {
    const cat     = _itemFilters.category || '';
    const season  = _itemFilters.season   || '';
    const occasion= _itemFilters.occasion || '';
    let url = '/wardrobe/items?';
    if (_activeMember) url += `member_id=${_activeMember}&`;
    if (cat)     url += `category=${encodeURIComponent(cat)}&`;
    if (season)  url += `season=${encodeURIComponent(season)}&`;
    if (occasion)url += `occasion=${encodeURIComponent(occasion)}&`;
    _allItems = await window.api('GET', url);
    const grid = document.getElementById('itemGrid');
    if (!_allItems.length) {
      grid.className = '';
      grid.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👔</div>
        <div class="lb-empty-title">The closet's empty</div>
        <div class="lb-empty-sub">Tap + to add your first piece. Photo + tag = 10 seconds.</div>
      </div>`;
      return;
    }
    refreshMemberCache();
    grid.className = 'lb-items-grid';
    grid.innerHTML = _allItems.map((item, k) => {
      const tilt = `lb-tilt-${k % 4}`;
      const member = item.wardrobe_owner_id ? _memberById[item.wardrobe_owner_id] : null;
      const ownerName = item.owner_name || (member?.display_name || '');
      const polaroid = lbPolaroid({
        primary_photo: item.primary_photo,
        category: item.category,
        name: item.wardrobe_nickname || item.name,
        label: item.wardrobe_nickname || item.name,
        ratio: 'square'
      });
      return `<div class="lb-item-card ${tilt}" onclick="openItemDrawer(${item.id})">
        ${polaroid}
        <div class="lb-item-meta">
          <span class="lb-item-meta-owner">${ownerName ? lbMemberDot(member, 5) + esc(ownerName) : ''}</span>
          <span class="lb-item-meta-stat">${(item.times_worn||0) ? `${item.times_worn}w` : '·'}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) { toast('Failed to load items', 'err'); }
}

function renderTagPicker(containerId, opts, selected, onToggle) {
  const el = document.getElementById(containerId);
  el.innerHTML = opts.map(o => `
    <div onclick="${onToggle}('${o}')" style="padding:4px 10px;border-radius:99px;font-size:12px;cursor:pointer;
      border:1.5px solid ${selected.includes(o)?'var(--accent)':'var(--border)'};
      background:${selected.includes(o)?'var(--accent-bg)':'var(--bg2)'};
      color:${selected.includes(o)?'var(--accent)':'var(--text2)'}">
      ${esc(o)}
    </div>`).join('');
}

function toggleISeason(v) {
  _iSeasonSel = _iSeasonSel.includes(v) ? _iSeasonSel.filter(x=>x!==v) : [..._iSeasonSel,v];
  renderTagPicker('iSeasonTags', SEASON_OPTS, _iSeasonSel, 'toggleISeason');
}
function toggleIOccasion(v) {
  _iOccasionSel = _iOccasionSel.includes(v) ? _iOccasionSel.filter(x=>x!==v) : [..._iOccasionSel,v];
  renderTagPicker('iOccasionTags', OCCASION_OPTS, _iOccasionSel, 'toggleIOccasion');
}
function toggleOSeason(v) {
  _oSeasonSel = _oSeasonSel.includes(v) ? _oSeasonSel.filter(x=>x!==v) : [..._oSeasonSel,v];
  renderTagPicker('oSeasonTags', SEASON_OPTS, _oSeasonSel, 'toggleOSeason');
}
function toggleOOccasion(v) {
  _oOccasionSel = _oOccasionSel.includes(v) ? _oOccasionSel.filter(x=>x!==v) : [..._oOccasionSel,v];
  renderTagPicker('oOccasionTags', OCCASION_OPTS, _oOccasionSel, 'toggleOOccasion');
}

function toggleStatusFields() {
  const s = document.getElementById('iStatus').value;
  document.getElementById('soldFields').style.display     = s==='sold'      ? '' : 'none';
  document.getElementById('donatedFields').style.display  = s==='donated'   ? '' : 'none';
  document.getElementById('discardedFields').style.display= s==='discarded' ? '' : 'none';
}

async function openItemDrawer(id) {
  _editingItemId = id||null;
  _iSeasonSel = []; _iOccasionSel = [];
  _iPhotos = [];

  // Populate platform dropdown
  await GH_SELECT.init('iSoldPlatform', 'sold_platform', '', { placeholder: '— select —', allowAdd: false });
  await GH_SELECT.init('iCategory', 'wardrobe_category', 'Clothing', { allowAdd: false });
  await GH_SELECT.init('iStatus',   'wardrobe_status',   'active',   { allowAdd: false });

  document.getElementById('itemDrawerTitle').textContent = id ? 'Edit Item' : 'Add Item';
  document.getElementById('iDeleteBtn').style.display = id ? '' : 'none';
  document.getElementById('iName').value = '';
  document.getElementById('iBrand').value = '';
  document.getElementById('iNickname').value = '';
  document.getElementById('iPrice').value = '';
  document.getElementById('iPDate').value = '';
  document.getElementById('iNotes').value = '';
  document.getElementById('iStatus').value = 'active';
  toggleStatusFields();

  if (id) {

// Greyed "Save first" hint when no _editingItemId; thumbnail strip + "+ Add Photo"
// when item exists. Pulls photos from /api/v1/attachments?entity_type=item&entity_id=N
async function renderItemPhotoPanel() {
  const panel = document.getElementById('iPhotoPanel');
  const body  = document.getElementById('iPhotoPanelBody');
  const count = document.getElementById('iPhotoPanelCount');
  if (!panel || !body) return;

  if (!_editingItemId) {

      📷 Save the item first to add photos
    </div>`;
    return;
  }

  panel.classList.remove('locked');
  // Fetch photos from attachments API
  try {
    const list = await window.api('GET', `/attachments/item/${_editingItemId}`);
    const imgs = (list||[]).filter(a => a.is_image);
    _iPhotos = imgs;
    count.textContent = imgs.length ? `${imgs.length} photo${imgs.length===1?'':'s'}` : '';
    body.innerHTML = (imgs.length
        ? `<div class="wrd-photo-strip">${imgs.slice(0,8).map(p => `
            <div class="wrd-photo-strip-thumb${p.is_primary_photo?' primary':''}"
                 onclick="AttachmentManager._viewImage(${p.id},'${esc((p.label||p.original_filename||'').replace(/'/g,'&#39;'))}')">
              <img src="/api/v1/attachments/thumb/${p.id}" alt="${esc(p.label||p.original_filename||'')}"
                   onerror="this.parentElement.innerHTML='&#128247;'">
            </div>`).join('')}</div>`
        : '')
      + `<button type="button" class="wrd-photo-add" onclick="openItemPhotos()">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           ${imgs.length ? 'Manage Photos' : '+ Add Photo'}
         </button>`;

async function openItemPhotos() {
  try {
    if (!_editingItemId) {
      const saved = await saveItem({ keepOpen: true });
      if (!saved) return;
      // After successful save we have an _editingItemId; refresh panel
      renderItemPhotoPanel();
    }
    const name = document.getElementById('iName').value.trim();
    // Force z-index inline so CSS caching can't hide the modal behind the drawer
    const attDrawer = document.getElementById('attDrawer');
    if (attDrawer) attDrawer.style.zIndex = '600';
    AttachmentManager.open('item', _editingItemId, name);
    // Refresh the panel after AttachmentManager closes — best-effort poll on drawer close
    const drawer = document.getElementById('attDrawer');
    if (drawer) {
      const observer = new MutationObserver(() => {
        if (!drawer.classList.contains('open')) {
          renderItemPhotoPanel();
          observer.disconnect();
        }
      });
      observer.observe(drawer, { attributes: true, attributeFilter: ['class'] });
    }
  } catch(e) {
    console.error('openItemPhotos:', e);
    toast('Photos error: ' + e.message, 'err');
  }
}

async function saveItem(opts = {}) {
  const name = document.getElementById('iName').value.trim();
  if (!name) { toast('Name is required', 'err'); return false; }

  const payload = {
    name:                document.getElementById('iName').value.trim() || null,
    brand:               document.getElementById('iBrand').value.trim() || null,
    category:            document.getElementById('iCategory').value || null,
    purchase_price:      parseFloat(document.getElementById('iPrice').value) || null,
    purchase_date:       document.getElementById('iPDate').value || null,
    notes:               document.getElementById('iNotes').value.trim() || null,
    wardrobe_owner_id:   parseInt(document.getElementById('iOwner').value)||null,
    wardrobe_nickname:   document.getElementById('iNickname').value.trim()||null,
    season_tags:         _iSeasonSel,
    occasion_tags:       _iOccasionSel,
    wardrobe_status:     document.getElementById('iStatus').value,
    sold_price:          parseFloat(document.getElementById('iSoldPrice').value)||null,
    sold_date:           document.getElementById('iSoldDate').value||null,
    sold_platform:       document.getElementById('iSoldPlatform').value||null,
    donated_fmv:         parseFloat(document.getElementById('iDonatedFmv').value)||null,
    donated_org_contact_id: parseInt(document.getElementById('iDonatedOrg')?.value)||null,
    discarded_reason:    document.getElementById('iDiscardReason').value.trim()||null,
  };

  try {
    if (_editingItemId) {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}`, payload);
      toast('Item updated', 'ok');
    } else {
      // New item — needs to go through inventory first with wardrobe category
      // then update wardrobe fields
      // For now create via inventory with wardrobe category
      // Get first available location, or use ID 1 as fallback
      let parentId = 1;
      try {
        const locs = await window.api('GET', '/inventory/locations/flat');
        if (locs?.length) parentId = locs[0].id;
      } catch(e) {}
      const invPayload = {
        name, brand: document.getElementById('iBrand').value.trim()||null,
        category: document.getElementById('iCategory').value,
        purchase_price: parseFloat(document.getElementById('iPrice').value)||null,
        purchase_date:  document.getElementById('iPDate').value||null,
        notes: document.getElementById('iNotes').value.trim()||null,
        parent_type: 'location', parent_id: parentId, quantity: 1
      };
      const created = await window.api('POST', '/inventory/items', invPayload);
      if (created.id) {
        _editingItemId = created.id;
        await window.api('PUT', `/wardrobe/items/${created.id}`, payload);
      }
      toast('Item added', 'ok');
    }
    if (!opts.keepOpen) { closeDrawer('itemDrawer'); loadItems(); }
    return true;
  } catch(e) { toast('Save failed: '+e.message, 'err'); return false; }
}

async function deleteItem() {
  LT.confirm({
    title: 'Remove from wardrobe?',
    msg: 'This only updates the wardrobe status — the inventory item remains.',
    confirmLabel: 'Remove',
    onConfirm: async () => {
      await window.api('PUT', `/wardrobe/items/${_editingItemId}`, { wardrobe_status: 'discarded' });
      closeDrawer('itemDrawer');
      loadItems();
      toast('Item removed from wardrobe', 'ok');
    }
  });
}

async function loadOutfits() {
  try {
    const url = `/wardrobe/outfits${_activeMember?'?member_id='+_activeMember:''}`;
    const outfits = await window.api('GET', url);
    const el = document.getElementById('outfitList');
    if (!outfits.length) {
      el.className = '';
      el.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👗</div>
        <div class="lb-empty-title">No outfits yet</div>
        <div class="lb-empty-sub">Create an outfit to start planning your week</div>
      </div>`;
      return;
    }
    let filtered = outfits;
    if (_outfitFilters.season)   filtered = filtered.filter(o => (o.season_tags||[]).includes(_outfitFilters.season));
    if (_outfitFilters.occasion) filtered = filtered.filter(o => (o.occasion_tags||[]).includes(_outfitFilters.occasion));
    if (!filtered.length) {
      el.className = '';
      el.innerHTML = `<div class="lb-empty">
        <div class="lb-empty-icon">👗</div>
        <div class="lb-empty-title">No outfits match</div>
        <div class="lb-empty-sub">Try changing filters</div>
      </div>`;
      return;
    }
    refreshMemberCache();
    el.className = 'lb-outfits-grid';
    el.innerHTML = filtered.map(o => {
      const member = o.family_member_id ? _memberById[o.family_member_id] : null;
      const ownerName = member?.display_name || o.owner_name || '';
      // Cover photo (real or fallback)
      const cover = o.primary_photo
        ? `<img src="/api/v1/attachments/thumb/${o.primary_photo.id}" alt="${esc(o.name)}" onerror="this.outerHTML='${HANGER_SVG.replace(/'/g,'&#39;')}';this.parentElement.classList.add('lb-ph','lb-ph-hanger')">`
        : `<div class="lb-ph lb-ph-hanger" style="width:100%;height:100%;border-radius:0">${HANGER_SVG}</div>`;
      // Tags shown on the card (top 3, occasion first then season)
      const allTags = [...(o.occasion_tags||[]), ...(o.season_tags||[])].slice(0,3);
      // Item thumbnails strip (up to 5 small dots — placeholder color tiles since item primary_photo isn't on outfit GET)
      const itemDots = (o.items||[]).slice(0,5).map(it => {
        const catKey = CAT_PH_KEY[it.category] || '';
        return `<div class="lb-outfit-card-item-thumb lb-ph${catKey?' lb-ph-tile cat-'+catKey:' lb-ph-hanger'}" title="${esc(it.wardrobe_nickname||it.name||'')}"></div>`;
      }).join('');
      return `<div class="lb-outfit-card" onclick="openOutfitDrawer(${o.id})">
        <div class="lb-outfit-card-photo">${cover}</div>
        <div class="lb-outfit-card-grad"></div>
        ${ownerName ? `<div class="lb-outfit-card-owner">${lbMemberDot(member, 5)}<span>${esc(ownerName)}</span></div>` : ''}
        <div class="lb-outfit-card-body">
          <div class="lb-outfit-card-name">${esc(o.name)}</div>
          ${itemDots ? `<div class="lb-outfit-card-items">${itemDots}</div>` : ''}
          ${allTags.length ? `<div class="lb-outfit-card-tags">${allTags.map(t=>`<span class="lb-outfit-card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function saveOutfit(opts = {}) {

// ── Insights ─────────────────────────────────────────────────
async function loadInsights() {
  try {
    const url = `/wardrobe/insights${_activeMember?'?member_id='+_activeMember:''}`;
    const d = await window.api('GET', url);
    const root = document.getElementById('lbInsights');
    if (!root) return;
    refreshMemberCache();

    const nowMonth = new Date().toLocaleString('en-US', { month:'long' });
    const year = new Date().getFullYear();
    const total = d.total || 0;
    const worn  = total - (d.never_worn || 0);
    const neverWorn = d.never_worn || 0;
    const value = Math.round(d.total_value || 0);

    const heroEyebrow = `SEASON · ${nowMonth.toUpperCase()} ${year}`;
    const heroSentence = `${worn} worn, <span class="neverworn">${neverWorn} never worn,</span> $${value.toLocaleString()} on the rack.`;

    // Section: Never worn (top 8 in triage cards)
    const neverWornItems = d.never_worn_items || [];
    const triageHTML = neverWornItems.length ? `
      <div class="lb-section-hdr">
        <div>
          <span class="lb-section-hdr-title">Never worn</span>
          <span class="lb-section-hdr-count">· ${neverWornItems.length}</span>
        </div>
        <button class="lb-pill-btn" onclick="toast('Bulk triage coming soon','info')">Triage all</button>
      </div>
      <div class="lb-triage-grid">
        ${neverWornItems.slice(0,8).map((it, k) => {
          const polaroid = lbPolaroid({
            primary_photo: it.primary_photo,
            category: it.category,
            name: it.wardrobe_nickname || it.name,
            label: it.wardrobe_nickname || it.name,
            ratio: 'square',
            big: true
          });
          return `<div class="lb-tilt-${k%4}">
            <div onclick="openItemDrawer(${it.id})" style="cursor:pointer">${polaroid}</div>
            <div class="lb-triage-actions">
              <button class="keep" onclick="event.stopPropagation();toast('Tagged keep','ok')">Keep</button>
              <button class="donate" onclick="event.stopPropagation();toast('Tagged donate','ok')">Donate</button>
              <button class="sell" onclick="event.stopPropagation();toast('Tagged sell','ok')">Sell</button>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    // Section: Most worn (5 across)
    const mostWornHTML = (d.most_worn || []).length ? `
      <div class="lb-section-hdr">
        <div>
          <span class="lb-section-hdr-title">Most worn</span>
          <span class="lb-section-hdr-count">· ${d.most_worn.length}</span>
        </div>
      </div>
      <div class="lb-most-grid">
        ${d.most_worn.map(it => {
          const photo = lbPhoto({
            primary_photo: it.primary_photo,
            category: it.category,
            name: it.wardrobe_nickname || it.name,
            ratio: 'square'
          });
          const cpw = it.cost_per_wear ? `$${it.cost_per_wear}/W` : '—';
          return `<div class="lb-most-card" onclick="openItemDrawer(${it.id})" style="cursor:pointer">
            ${photo}
            <div class="lb-most-name">${esc(it.wardrobe_nickname || it.name)}</div>
            <div class="lb-most-stat">${it.times_worn} WEARS · ${cpw}</div>
          </div>`;
        }).join('')}
      </div>` : '';

    // Section: Spend by member (proportional bar)
    const spendByMember = d.spend_by_member || [];
    const spendHTML = spendByMember.length ? `
      <div class="lb-section-hdr">
        <div><span class="lb-section-hdr-title">Spend by member</span></div>
      </div>
      <div class="lb-spend-row">
        ${spendByMember.map(s => {
          const member = _memberById[s.member_id] || {};
          const color = member.color || 'var(--text3)';
          const flex = Math.max(s.total, 1);
          return `<div class="lb-spend-cell" style="flex:${flex};border-left-color:${color}">
            <div class="lb-spend-cell-name">${esc((s.name||'?').toUpperCase())}</div>
            <div class="lb-spend-cell-val">$${Math.round(s.total).toLocaleString()}</div>
          </div>`;
        }).join('')}
      </div>` : '';

    root.innerHTML = `
      <div class="lb-insights">
        <div class="lb-hero">
          <div class="lb-hero-eyebrow">${heroEyebrow}</div>
          <div class="lb-hero-num">${heroSentence}</div>
        </div>
        ${triageHTML}
        ${mostWornHTML}
        ${spendHTML}
      </div>`;
  } catch(e) {}
}

function esc(s) { const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function emptyState(icon,title,sub) {
  return `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
    <div style="font-size:48px;margin-bottom:12px">${icon}</div>
    <div style="font-weight:700;font-size:15px;margin-bottom:6px">${title}</div>
    <div style="font-size:13px">${sub}</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
