<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Templates — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
</head>
<body>
<script>window.GH_PAGE = { module:'templates', title:'Task Templates' };</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-messages.js"></script>
<div id="app">
  <div style="padding:0 16px 80px">
    <div style="padding:12px 0 16px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="openDrawer()">+ New Template</button>
    </div>
    <div id="templateList"><div class="spinner"><div class="spin"></div>Loading…</div></div>
  </div>
</div>

<!-- Template Drawer -->
<div class="drawer-overlay" id="tplDrawer" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="tplDrawerTitle">New Template</div>
    <div class="drawer-body">
      <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="tplName" placeholder="e.g. Monthly Finance Review"></div>
      <div class="form-group"><label class="form-label">Category</label><input class="form-input" id="tplCategory" placeholder="e.g. Finance, Home, Kids"></div>
      <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="tplDesc" placeholder="Optional description"></div>
      <div style="margin-top:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span class="form-label" style="margin:0">Tasks</span>
          <button class="btn btn-ghost" style="padding:3px 10px;font-size:12px" onclick="addTaskRow()">+ Add</button>
        </div>
        <div id="tplTasks"></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTemplate()">Save</button>
    </div>
  </div>
</div>

<script>
let editingId = null;
let taskRows = [];

async function load() {
  const el = document.getElementById('templateList');
  try {
    const templates = await window.api('GET', '/templates');
    if (!templates.length) {
      el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">No templates yet. Create one to apply checklists to your todos.</div>';
      return;
    }
    el.innerHTML = templates.map(t => `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div>
            <span style="font-weight:700;color:var(--text)">${esc(t.name)}</span>
            ${t.category ? `<span style="margin-left:8px;font-size:11px;color:var(--accent)">${esc(t.category)}</span>` : ''}
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary" style="padding:4px 12px;font-size:12px" onclick="applyTemplate(${t.id},'${esc(t.name)}')">▶ Apply</button>
            <button class="btn btn-ghost" style="padding:4px 8px" onclick="editTemplate(${t.id})">✏️</button>
            <button class="btn btn-ghost" style="padding:4px 8px;color:var(--red)" onclick="deleteTemplate(${t.id})">✕</button>
          </div>
        </div>
        ${t.description ? `<div style="font-size:13px;color:var(--text2);margin-bottom:4px">${esc(t.description)}</div>` : ''}
        <div style="font-size:12px;color:var(--text3)">${t.item_count} task${t.item_count!==1?'s':''}</div>
      </div>`).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--red);padding:16px">${esc(e.message)}</div>`; }
}

async function applyTemplate(id, name) {
  if (!confirm(`Apply "${name}"? This will create ${await getItemCount(id)} new todos.`)) return;
  try {
    const r = await window.api('POST', `/templates/${id}/apply`, {});
    toast(`Created ${r.created} todo${r.created!==1?'s':''}`);
  } catch(e) { toast(e.message, 'err'); }
}

async function getItemCount(id) {
  try { const t = await window.api('GET', `/templates/${id}`); return t.items?.length || 0; } catch { return '?'; }
}

function openDrawer(template=null) {
  editingId = template?.id || null;
  document.getElementById('tplDrawerTitle').textContent = template ? 'Edit Template' : 'New Template';
  document.getElementById('tplName').value = template?.name || '';
  document.getElementById('tplCategory').value = template?.category || '';
  document.getElementById('tplDesc').value = template?.description || '';
  taskRows = (template?.items || []).map(i => ({title:i.title,priority:i.priority||'medium',offset:i.due_days_offset||0}));
  if (!taskRows.length) taskRows = [{title:'',priority:'medium',offset:0}];
  renderTaskRows();
  document.getElementById('tplDrawer').classList.add('open');
}

function renderTaskRows() {
  document.getElementById('tplTasks').innerHTML = taskRows.map((row, i) => `
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      <input class="form-input" value="${esc(row.title)}" placeholder="Task title" oninput="taskRows[${i}].title=this.value" style="flex:1">
      <select class="form-select" style="width:90px" onchange="taskRows[${i}].priority=this.value">
        ${['low','medium','high','urgent'].map(p=>`<option value="${p}" ${row.priority===p?'selected':''}>${p}</option>`).join('')}
      </select>
      <button class="btn btn-ghost" style="padding:4px 8px;color:var(--red);flex-shrink:0" onclick="removeRow(${i})">✕</button>
    </div>`).join('');
}

function addTaskRow() { taskRows.push({title:'',priority:'medium',offset:0}); renderTaskRows(); }
function removeRow(i) { taskRows.splice(i,1); renderTaskRows(); }

async function saveTemplate() {
  const name = document.getElementById('tplName').value.trim();
  if (!name) { toast('Name required','err'); return; }
  const payload = {
    name,
    category: document.getElementById('tplCategory').value.trim()||null,
    description: document.getElementById('tplDesc').value.trim()||null,
    items: taskRows.filter(r=>r.title.trim()).map((r,i)=>({...r,sort_order:i}))
  };
  try {
    if (editingId) { await window.api('PUT', `/templates/${editingId}`, payload); toast('Updated'); }
    else { await window.api('POST', '/templates', payload); toast('Created'); }
    closeDrawer(); load();
  } catch(e) { toast(e.message,'err'); }
}

async function editTemplate(id) {
  try { const t = await window.api('GET', `/templates/${id}`); openDrawer(t); } catch(e) { toast(e.message,'err'); }
}

async function deleteTemplate(id) {
  if (!confirm('Delete this template?')) return;
  try { await window.api('DELETE', `/templates/${id}`); toast('Deleted'); load(); } catch(e) { toast(e.message,'err'); }
}

function closeDrawer() { document.getElementById('tplDrawer').classList.remove('open'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
