<html lang="en">

<style>
/* ── Kids module — warm, engaging, kid-friendly layout ── */

/* Kid selector — horizontal avatar strip instead of plain text tabs */
#kidsTabs {
  display: flex;
  gap: 10px;
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: none;
  background: transparent;
}
#kidsTabs::-webkit-scrollbar { display: none; }

.kid-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0 4px 10px;
  position: relative;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.kid-tab-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  border: 2px solid transparent;
  transition: transform .15s, border-color .15s;
  position: relative;
}
.kid-tab.active .kid-tab-avatar {
  border-color: #fff;
  transform: scale(1.06);
  box-shadow: 0 4px 12px rgba(0,0,0,.18);
}
.kid-tab-name {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: .02em; white-space: nowrap;
}
.kid-tab.active .kid-tab-name { color: #ec4899; }

/* Active indicator line under selected */
.kid-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 3px;
  background: #ec4899;
  border-radius: 2px;
}

/* Divider under avatar strip */
.kid-strip-divider {
  height: 1px;
  background: var(--border);
  margin: 0 16px;
}

/* Hero banner — shows on profile tab */
.kid-hero {
  background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.kid-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.kid-hero-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  border: 3px solid rgba(255,255,255,.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800; color: #fff;
  flex-shrink: 0;
  position: relative;
}
.kid-hero-name {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -.02em; line-height: 1.1;
}
.kid-hero-sub {
  font-size: 13px; color: rgba(255,255,255,.8);
  margin-top: 3px;
}

/* Stats strip below hero */
.kid-stats-strip {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.kid-stat-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 8px 8px;
  border-right: 1px solid var(--border);
}
.kid-stat-item:last-child { border-right: none; }
.kid-stat-val {
  font-size: 20px; font-weight: 800; color: #ec4899;
  letter-spacing: -.02em; line-height: 1;
}
.kid-stat-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--text3);
  margin-top: 3px; font-family: var(--mono);
}

/* Profile section label */
.kid-section-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); padding: 14px 16px 6px;
}

/* Info rows */
.info-row {
  display: flex; justify-content: space-between;
  align-items: flex-start; padding: 9px 16px;
  border-bottom: 1px solid var(--border); gap: 12px;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text3); flex-shrink: 0; }
.info-value { font-size: 13px; color: var(--text); text-align: right; flex: 1; }

/* Alert card (health/safety) */
.kid-alert-card {
  margin: 0 16px 8px;
  padding: 10px 14px;
  border-radius: var(--r);
  background: var(--bg2);
  border-left: 3px solid var(--red);
}
.kid-alert-label {
  font-size: 10px; color: var(--red); font-family: var(--mono);
  font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 3px;
}
.kid-alert-value { font-size: 14px; color: var(--text); line-height: 1.5; }
.kid-alert-card.amber { border-color: var(--amber); }
.kid-alert-card.amber .kid-alert-label { color: var(--amber); }

/* Activity row */
.activity-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.activity-row:last-child { border-bottom: none; }
.activity-row:hover { background: var(--bg3); }
.activity-icon {
  width: 38px; height: 38px; border-radius: 10px;
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
  background: rgba(236,72,153,.1);
}
.activity-name { font-size: 14px; font-weight: 600; color: var(--text); }
.activity-meta { font-size: 12px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
.activity-inactive { opacity: .45; }

/* Note row */
.note-row {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.note-row:last-child { border-bottom: none; }
.note-row:hover { background: var(--bg3); }
.note-header {
  display: flex; justify-content: space-between;
  align-items: baseline; gap: 8px;
}
.note-title { font-size: 13px; font-weight: 600; color: var(--text); }
.note-date { font-size: 11px; color: var(--text3); font-family: var(--mono); flex-shrink: 0; }
.note-body {
  font-size: 12px; color: var(--text3); margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.note-cat-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: var(--bg3); color: var(--text3);
  font-family: var(--mono); border: 1px solid var(--border);
  display: inline-block; margin-top: 4px;
}

  margin: 12px 16px 0;
  background: linear-gradient(135deg, rgba(236,72,153,.1) 0%, rgba(139,92,246,.1) 100%);
  border: 1px solid rgba(236,72,153,.2);
  border-radius: var(--r-lg);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
  font-size: 28px; flex-shrink: 0;
}
  font-size: 24px; font-weight: 800; color: #ec4899; line-height: 1;
}
  font-size: 11px; color: var(--text3); margin-top: 2px;
  font-family: var(--mono); text-transform: uppercase; letter-spacing: .06em;
}
  font-size: 13px; color: var(--text3); font-style: italic;
}
</style>
</head>

<script>
window.GH_PAGE = { module: 'kids', title: 'Kids' };
</script>

<script src="/js/lens-config.js"></script>
<script src="/js/gh-lens.js"></script>
<div id="nav-container"></div>

<div id="app" style="padding-bottom:80px">

  <!-- Kid avatar strip — rendered by renderKidsTabs() -->
  <div id="kidsTabs">
    <div style="color:var(--text3);font-style:italic;font-size:13px;padding:20px 16px">Loading…</div>
  </div>
  <div class="kid-strip-divider"></div>

  <!-- Search bar — filters across all kids data when typing -->
  <!-- HIDDEN per session-12 search consolidation. Live-filter logic preserved in JS; remove .legacy-hidden to restore. Use Cmd+K (or nav search icon) for unified search; Filter/Advanced Filter for in-view filtering. -->
  <div class="search-wrap legacy-hidden" id="kidsSearchWrap" style="margin:8px 16px 0;display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="kidsSearch" type="search" placeholder="Search activities, notes…" autocomplete="off">
  </div>

  <!-- Hero banner + sub-tabs — shown after a kid is selected -->
  <div id="kidSectionHeader" style="display:none"></div>

  <!-- v202604.126 Lens (replaces GH_VIEW). Kept-hidden GH_VIEW div for GH_BULK compat. -->
  <div id="kidsViewToolbar" style="display:none"></div>
  <div id="kidsLensWrap" style="padding: 12px 16px 0; display: none">
    <div id="kidsLens"></div>
  </div>

  <!-- Single scrollable detail view — no tabs -->
  <div id="kidDetailView" style="display:none;padding-bottom:100px">
    <div id="kidProfileContent"></div>
    <div id="kidActivitiesContent"></div>
    <div id="kidNotesContent"></div>
  </div>

  <button class="fab" id="mainFab" onclick="openKidDrawer()" title="Add a child profile" style="display:flex;align-items:center;gap:4px;padding:0 18px;font-size:16px;border-radius:28px;width:auto">+ Add Child</button>
</div>

<!-- Kid Drawer -->
<div class="drawer-overlay" id="kidDrawer">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="kidDrawerTitle">Add Child</div>
    <div class="drawer-body">
      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="kfName" placeholder="e.g. Emma" autocomplete="off"></div>
      <div class="form-group"><label class="form-label">Link to Family Member</label><select class="form-select" id="kfFamilyMember"><option value="">— not linked —</option></select></div>
      <div class="form-group"><label class="form-label">Date of Birth</label><input class="form-input" type="date" id="kfDob"></div>
      <div class="form-group"><label class="form-label">Grade</label><input class="form-input" id="kfGrade" placeholder="e.g. 3rd Grade, Pre-K"></div>
      <div class="form-group"><label class="form-label">Teacher</label><select class="form-select" id="kfTeacher"></select></div>
      <div class="form-group"><label class="form-label">Homeroom / Class</label><input class="form-input" id="kfHomeroom" placeholder="e.g. Room 12"></div>
      <div class="form-group"><label class="form-label">Allergies</label><input class="form-input" id="kfAllergies" placeholder="e.g. Peanuts, Penicillin"></div>
      <div class="form-group"><label class="form-label">Medications Note</label><textarea class="form-input" id="kfMeds" rows="2" style="resize:vertical"></textarea></div>
      <div class="form-group"><label class="form-label">Emergency Note</label><textarea class="form-input" id="kfEmergency" rows="2" style="resize:vertical"></textarea></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="kfNotes" rows="2" style="resize:vertical"></textarea></div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-ghost" id="kidCancel">Cancel</button>
      <button class="btn btn-danger" id="kidDelete" style="display:none">Delete</button>
      <button class="btn btn-primary" id="kidSave">Save</button>
    </div>
  </div>
</div>

<!-- Activity Drawer -->
<div class="drawer-overlay" id="actDrawer">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="actDrawerTitle">Add Activity</div>
    <div class="drawer-body">
      <div class="form-group"><label class="form-label">Activity Name *</label><input class="form-input" id="afName" placeholder="e.g. Soccer, Piano, Chess Club" autocomplete="off"></div>
      <div class="form-group"><label class="form-label">Category</label><select class="form-select" id="afCategory" onchange="triggerActSuggest()"></select></div>
      <div class="form-group"><label class="form-label">Day(s) of Week</label><input class="form-input" id="afDays" placeholder="e.g. Mon, Wed, Fri"></div>
      <div class="form-group"><label class="form-label">Time</label><div style="display:flex;gap:8px"><input class="form-input" type="time" id="afStart" style="flex:1"><input class="form-input" type="time" id="afEnd" style="flex:1"></div></div>
      <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="afLocation" placeholder="Location or address"></div>

      <div class="form-group"><label class="form-label">Monthly Cost</label><input class="form-input" type="number" id="afCost" placeholder="0.00" step="0.01" min="0"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="afNotes" rows="2" style="resize:vertical"></textarea></div>
    </div>
    <div id="actFamilyWrap" style="margin:8px 0 4px"></div>
    <div class="drawer-footer">
      <button class="btn btn-ghost" id="actCancel">Cancel</button>
      <button class="btn btn-danger" id="actDelete" style="display:none">Delete</button>

</div>

<!-- Note Drawer -->
<div class="drawer-overlay" id="noteDrawer">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="noteDrawerTitle">Add Note</div>
    <div class="drawer-body">
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="nfDate"></div>
      <div class="form-group"><label class="form-label">Category</label><select class="form-select" id="nfCategory"></select></div>

      <div class="form-group"><label class="form-label">Note *</label><textarea class="form-input" id="nfBody" rows="4" placeholder="What happened? What to remember?" style="resize:vertical"></textarea></div>

      <button class="btn btn-ghost" id="noteCancel">Cancel</button>

      <button class="btn btn-primary" id="noteSave">Save</button>
    </div>
  </div>
</div>

<script>
const API='/api/v1/kids';
const api = window.makeApi('/kids');
const $=id=>document.getElementById(id);
const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
const fmt$=n=>n!=null?'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):'';
const ACT_ICONS={Sports:'🏅',Music:'🎵',Arts:'🎨',Academic:'📚',Social:'👫',Other:'🎯'};
const NOTE_COLORS={Medical:'var(--red)',School:'var(--accent)',Milestone:'var(--green)',Behavior:'var(--amber)',General:'var(--text3)'};
let _kids=[],_currentKid=null,_editingKidId=null,_editingActId=null,_editingNoteId=null;

async function loadKids(){
  try{
    if (window.GH_AVATAR) { try { await GH_AVATAR.preload(); } catch(_) {} }
    _kids=await api('GET', '/');
    renderKidsTabs();
    // Auto-select first child
    if(_kids.length) openKidDetail(_kids[0].id);
  }catch(e){
    $('kidsTabs').innerHTML = errorState(e.message, 'loadKids()');
  }
}

function renderKidsTabs(){
  const tabs = $('kidsTabs');
  if(!_kids.length){ tabs.innerHTML=emptyState(...GH_EMPTY.kids); return; }
  // Use the global family-member avatar for each kid so it matches medical /
  // reports / settings. Falls back to a local gradient circle when a kid has
  // no linked family_member_id (legacy records).
  const GRADS = [
    'linear-gradient(135deg,#ec4899,#8b5cf6)',
    'linear-gradient(135deg,#3b82f6,#06b6d4)',
    'linear-gradient(135deg,#f97316,#f59e0b)',
    'linear-gradient(135deg,#22c55e,#14b8a6)',
  ];
  tabs.innerHTML = _kids.map((k,i)=>{
    const grad = GRADS[i % GRADS.length];
    let avatar;
    if (k.family_member_id && window.GH_AVATAR) {
      const m = GH_AVATAR.getCached(k.family_member_id);
      if (m) {
        avatar = GH_AVATAR.render(m, 'md', { extraClass: 'kid-tab-avatar' });
      }
    }
    if (!avatar) {
      const initial = (k.display_name || '?')[0].toUpperCase();
      avatar = `<div class="kid-tab-avatar" style="background:${grad}">${esc(initial)}</div>`;
    }
    return `<button class="kid-tab${i===0?' active':''}" data-kid-id="${k.id}" onclick="openKidDetail(${k.id})">
      ${avatar}
      <div class="kid-tab-name">${esc(k.display_name.split(' ')[0])}</div>
    </button>`;
  }).join('');
}

function kidCard(k){
  const ageLine=[k.age!=null?k.age+' yrs':'',k.grade||''].filter(Boolean).join(' · ');
  let avatarHtml;
  if (k.family_member_id && window.GH_AVATAR) {
    const m = GH_AVATAR.getCached(k.family_member_id);
    if (m) avatarHtml = GH_AVATAR.render(m, 'md', { extraClass: 'kid-avatar' });
  }
  if (!avatarHtml) {
    const initial = (k.display_name || '?')[0].toUpperCase();
    avatarHtml = `<div class="kid-avatar">${esc(initial)}</div>`;
  }
  return `<div class="gh-card gh-s-blue kid-card"><div class="kid-card-header" style="padding:12px 14px" id="kid-${k.id}">${avatarHtml}<div style="flex:1"><div class="kid-name">${esc(k.display_name)}</div><div class="kid-meta">${esc(ageLine)||'No age/grade set'}</div>${k.allergies?`<div style="font-size:11px;color:var(--red);margin-top:2px">⚠ ${esc(k.allergies)}</div>`:''}</div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div><div class="kid-stats"><div class="kid-stat"><div class="kid-stat-val">${k.activity_count||0}</div><div class="kid-stat-lbl">Activities</div></div><div class="kid-stat"><div class="kid-stat-val">${k.note_count||0}</div><div class="kid-stat-lbl">Notes</div></div>${k.school_name?`<div class="kid-stat" style="text-align:left;flex:1"><div style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(k.school_name)}</div><div class="kid-stat-lbl">School</div></div>`:''}</div></div>`;
}

async function openKidDetail(id){
  try{
    // Update active avatar tab
    document.querySelectorAll('#kidsTabs .kid-tab').forEach(b=>{
      b.classList.toggle('active', +b.dataset.kidId === id);
    });

    _currentKid = await api('GET', `/${id}`);
    const k = _currentKid;

    // Hero banner in section header
    const GRADS = [
      'linear-gradient(135deg,#ec4899,#8b5cf6)',
      'linear-gradient(135deg,#3b82f6,#06b6d4)',
      'linear-gradient(135deg,#f97316,#f59e0b)',
      'linear-gradient(135deg,#22c55e,#14b8a6)',
    ];
    const kidIdx = _kids.findIndex(x=>x.id===id);
    const grad = GRADS[kidIdx % GRADS.length];
    const ageLine = [k.age!=null?k.age+' yrs':'', k.grade?'Grade '+k.grade:'', k.school_name||''].filter(Boolean).join(' · ');
    let heroAvatar;
    if (k.family_member_id && window.GH_AVATAR) {
      const m = GH_AVATAR.getCached(k.family_member_id);
      if (m) heroAvatar = GH_AVATAR.render(m, 'lg', { extraClass: 'kid-hero-avatar' });
    }
    if (!heroAvatar) {
      const initial = (k.display_name || '?')[0].toUpperCase();
      heroAvatar = `<div class="kid-hero-avatar">${esc(initial)}</div>`;
    }
    $('kidSectionHeader').style.display = 'block';
    $('kidSectionHeader').innerHTML = `
      <div class="kid-hero" style="background:${grad}">
        ${heroAvatar}
        <div style="flex:1;min-width:0">
          <div class="kid-hero-name">${esc(k.display_name)}</div>
          <div class="kid-hero-sub">${esc(ageLine)||'No age set'}</div>
        </div>
        <button onclick="editCurrentKid()" style="background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0">Edit</button>
      </div>
      <div class="kid-stats-strip">
        <div class="kid-stat-item">
          <div class="kid-stat-val" style="color:#ec4899">${k.activity_count||0}</div>
          <div class="kid-stat-lbl">Activities</div>
        </div>
        <div class="kid-stat-item">
          <div class="kid-stat-val" style="color:#8b5cf6">${k.note_count||0}</div>
          <div class="kid-stat-lbl">Notes</div>
        </div>
        ${k.school_name?`<div class="kid-stat-item" style="flex:2;align-items:flex-start;padding-left:16px">
          <div class="kid-stat-val" style="font-size:13px;font-weight:700;color:var(--text)">${esc(k.school_name)}</div>
          <div class="kid-stat-lbl">School</div>
        </div>`:''}
      </div>`;

    // Show detail area (no tabs — single scroll)
    $('kidsSearchWrap').style.display='';
    const _kl = $('kidsLensWrap'); if (_kl) _kl.style.display = 'block';
    $('kidDetailView').style.display='block';
    $('mainFab').style.display='none';

    renderProfile();
  }catch(e){toast(ghErrorMsg(e),'err');}
}

function setDetailTab(tab,btn){
  // tabs removed — single scrollable view, scroll to section
  const sectionMap = { profile: 'kidProfileContent', activities: 'kidActivitiesContent', notes: 'kidNotesContent' };
  const el = $(sectionMap[tab]);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  if(tab==='activities')renderActivities();
  if(tab==='notes')renderNotes();
}

function renderProfile(){
  const k=_currentKid; if(!k) return;
  const dob = k.date_of_birth
    ? new Date(k.date_of_birth+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})
    : '—';
  const rows = [
    ['Date of Birth', dob+(k.age!=null?` (age ${k.age})`:' ')],
    ['Grade', k.grade||'—'],
    ['Teacher', k.teacher_name||'—'],
    ['Homeroom', k.homeroom||'—'],
  ];
  const alerts = [
    ['Allergies', k.allergies, ''],
    ['Medications', k.medications_note, 'amber'],
    ['Emergency Note', k.emergency_note, ''],
  ].filter(r=>r[1]);

  let html = '';

  html += '<div class="kid-section-label">Info</div>';
  html += '<div class="card card-static" style="margin:0 16px;padding:0">';
  html += rows.map(r=>`<div class="info-row"><span class="info-label">${r[0]}</span><span class="info-value">${esc(r[1])}</span></div>`).join('');
  html += '</div>';

  if(alerts.length){
    html += '<div class="kid-section-label">Health & Safety</div>';
    alerts.forEach(([l,v,cls])=>{
      html += `<div class="kid-alert-card${cls?' '+cls:''}">
        <div class="kid-alert-label">${l}</div>
        <div class="kid-alert-value">${esc(v)}</div>
      </div>`;
    });
  }

  if(k.notes){
    html += `<div class="kid-section-label">Notes</div>
      <div style="margin:0 16px 16px;font-size:14px;color:var(--text2);line-height:1.6">${esc(k.notes)}</div>`;
  }

  $('kidProfileContent').innerHTML = html;
  // No tabs — render activities and notes below profile on same scroll
  renderActivities();
  renderNotes();
}

function renderActivities(q=''){
  const _q = q || ($('kidsSearch')?.value||'').trim().toLowerCase();
  let acts=(_currentKid?.activities||[]).filter(a=>!_q||
    (a.name||'').toLowerCase().includes(_q)||(a.category||'').toLowerCase().includes(_q)||(a.location||'').toLowerCase().includes(_q));
  if(window._kidsFilters?.category) acts=acts.filter(a=>a.category===window._kidsFilters.category);
  if(window._kidsFilters?.tags?.length) acts=acts.filter(a=>window._kidsFilters.tags.every(t=>(a.tags||[]).includes(t)));
  if(window._kidsFilters?.name) {
    const q = String(window._kidsFilters.name).toLowerCase();
    acts = acts.filter(a => (a.activity_name||'').toLowerCase().includes(q));
  }
  const actsHeader = `<div class="kid-section-label" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">Activities <button class="btn btn-ghost" style="font-size:11px;padding:2px 10px" onclick="openActivityDrawer()">+ Add</button></div>`;
  if(!acts.length&&!_q){$('kidActivitiesContent').innerHTML=actsHeader+'<div style="padding:20px 24px;text-align:center"><div style="font-size:28px;margin-bottom:6px">🏅</div><div style="color:var(--text3);font-size:13px">No activities yet</div></div>';return;}
  const active=acts.filter(a=>a.is_active),inactive=acts.filter(a=>!a.is_active);
  let html=actsHeader;
  if(active.length){html+='<div class="card card-static" style="margin:0 16px;padding:0">'+active.map(a=>actRow(a)).join('')+'</div>';}
  if(inactive.length){html+='<div class="kid-section-label" style="font-size:10px;opacity:.7">Past / Inactive</div><div class="card card-static" style="margin:0 16px;padding:0">'+inactive.map(a=>actRow(a,true)).join('')+'</div>';}
  $('kidActivitiesContent').innerHTML=html;
  $('kidActivitiesContent').querySelectorAll('[data-aid]').forEach(el=>el.addEventListener('click',()=>openActivityDrawer(parseInt(el.dataset.aid))));
}

function actRow(a,inactive){
  const icon=ACT_ICONS[a.category]||'🎯';
  const tline=[a.day_of_week,a.start_time?a.start_time.slice(0,5)+(a.end_time?'–'+a.end_time.slice(0,5):''):''].filter(Boolean).join(' · ');
  const cost=a.cost_per_month?fmt$(a.cost_per_month)+'/mo':'';
  return `<div class="activity-row${inactive?' activity-inactive':''}" data-aid="${a.id}" style="cursor:pointer"><div class="activity-icon" style="background:var(--bg2)">${icon}</div><div style="flex:1"><div class="activity-name">${esc(a.name)}</div><div class="activity-meta">${[a.category,tline,a.location,cost].filter(Boolean).join(' · ')}</div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>`;
}

function renderNotes(q=''){
  const notes=(_currentKid?.notes||[]).filter(n=>!q||
    (n.title||'').toLowerCase().includes(q)||(n.body||'').toLowerCase().includes(q)||(n.category||'').toLowerCase().includes(q));
  const notesHeader = `<div class="kid-section-label" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">Notes <button class="btn btn-ghost" style="font-size:11px;padding:2px 10px" onclick="openNoteDrawer()">+ Add</button></div>`;
  if(!notes.length&&!q){$('kidNotesContent').innerHTML=notesHeader+'<div style="padding:20px 24px;text-align:center"><div style="font-size:28px;margin-bottom:6px">📝</div><div style="color:var(--text3);font-size:13px">No notes yet</div></div>';return;}
  $('kidNotesContent').innerHTML=notesHeader+'<div class="card card-static" style="margin:0 16px;padding:0">'+notes.map(n=>{
    const color=NOTE_COLORS[n.category]||'var(--text3)';
    return `<div class="note-row" data-nid="${n.id}"><div class="note-header"><span class="note-title">${esc(n.title||n.body.slice(0,40))}</span><span class="note-date">${n.note_date||''}</span></div><div style="display:flex;align-items:center;gap:6px;margin-top:4px"><span class="note-cat-badge" style="border:1px solid ${color};color:${color}">${n.category}</span>${n.title?`<span class="note-body" style="margin-top:0">${esc(n.body.slice(0,80))}</span>`:''}</div></div>`;
  }).join('')+'</div>';
  $('kidNotesContent').querySelectorAll('[data-nid]').forEach(el=>el.addEventListener('click',()=>openNoteDrawer(parseInt(el.dataset.nid))));
}

async function openKidDrawer(kid){
  _editingKidId=kid?.id||null;
  $('kidDrawerTitle').textContent=_editingKidId?'Edit Child':'Add Child';
  $('kfName').value=kid?.display_name||'';$('kfDob').value=kid?.date_of_birth||'';$('kfGrade').value=kid?.grade||'';
  await GH_REFS.populateContact('kfTeacher', kid?.teacher_contact_id||null, { type: 'School', placeholder: '— none —', allowAdd: true });$('kfHomeroom').value=kid?.homeroom||'';$('kfAllergies').value=kid?.allergies||'';
  $('kfMeds').value=kid?.medications_note||'';$('kfEmergency').value=kid?.emergency_note||'';$('kfNotes').value=kid?.notes||'';
  $('kidDelete').style.display=_editingKidId?'inline-flex':'none';
  // Populate family member selector — children only
  try {
    const members = await window.api('GET', '/settings/family');
    const children = members.filter(m => ['Son','Daughter','Child','Stepson','Stepdaughter'].includes(m.relationship));
    const sel = $('kfFamilyMember');
    sel.innerHTML = '<option value="">— not linked —</option>' +
      children.map(m => `<option value="${m.id}"${kid?.family_member_id===m.id?' selected':''}>${esc(m.display_name)}</option>`).join('');
    // If no children in family yet, show all non-primary members
    if (!children.length) {
      sel.innerHTML = '<option value="">— not linked —</option>' +
        members.filter(m=>!m.is_primary_user).map(m=>`<option value="${m.id}"${kid?.family_member_id===m.id?' selected':''}>${esc(m.display_name)}</option>`).join('');
    }
  } catch { /* silently skip */ }
  $('kidDrawer').classList.add('open');setTimeout(()=>$('kfName').focus(),300);
}

    // the source entry to the new note id so the daily log can show
    // a forward link.
    if (window._seedDailyLogId && saved && saved.id && !_editingNoteId) {

        await window.api('PATCH', `/daily-log/${window._seedDailyLogId}`, {

function toast(msg,type){if(window.LT?.toast)toast(msg,type);}

// ── Tags (kids) ───────────────────────────────────────────
let actFormTags = [];
function renderActTags() {
  const wrap=$('actTagsWrap'),input=$('actTagInput'); if(!wrap||!input)return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  actFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{actFormTags=actFormTags.filter(x=>x!==t);renderActTags();});
    wrap.insertBefore(chip,input);
  });
}
function addActTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!actFormTags.includes(t)).forEach(t=>actFormTags.push(t));
  renderActTags(); const inp=$('actTagInput'); if(inp)inp.value='';
}
function initActTags(existing){
  actFormTags=(existing||[]).slice(); renderActTags();
  const inp=$('actTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addActTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&actFormTags.length){actFormTags.pop();renderActTags();}};
  inp.onblur=()=>{if(inp.value.trim())addActTag(inp.value);};
  GH_TAGS.init({inputId:'actTagInput',wrapId:'actTagsWrap',module:'kids',getFormTags:()=>actFormTags,addTag:t=>addActTag(t),allowCreate:true});
function triggerActSuggest() {
  const cat  = document.getElementById('afCategory')?.value || '';
  const name = document.getElementById('afName')?.value || '';
  GH_TAGS.suggest('actTagsWrap', ()=>actFormTags, t=>addActTag(t), { category: cat, name });
}

}

// ── Seed-from-daily-log (v202604.139) ──────────────────────────
// When kids.html is opened with ?seed=N, fetch the daily log entry,
// auto-pick the kid (if entry has a kid family member attached),
// and open the Add Note drawer pre-filled with the entry content.
// On save, PATCHes the daily log entry with promoted_to fields so
// the daily log can show the forward link.
async function maybeHandleSeed() {
  const params = new URLSearchParams(window.location.search);
  const seedId = params.get('seed');
  if (!seedId) return;
  let entry;
  try {
    entry = await window.api('GET', `/daily-log/${seedId}`);
  } catch (e) {
    if (window.LT?.toast) LT.toast('Could not load daily log entry to promote', 'err');
    return;
  }
  // Find a kid in memory_members (entries from daily log carry family-member ids)
  const memberIds = (entry.memory_members || []).map(m => m.family_member_id);
  const kidMatch = _kids.find(k => memberIds.includes(k.family_member_id));
  if (kidMatch) {
    await openKidDetail(kidMatch.id);
  } else if (_kids.length === 1) {
    await openKidDetail(_kids[0].id);
  } else {
    if (window.LT?.toast) LT.toast('Pick a kid to add this note to', 'ok');
    return;
  }
  // Pre-fill the note drawer with daily log content
  await openNoteDrawer();
  if ($('nfDate'))  $('nfDate').value  = entry.log_date || new Date().toISOString().slice(0,10);
  if ($('nfTitle')) $('nfTitle').value = (entry.entry_text || '').slice(0, 60);
  if ($('nfBody'))  $('nfBody').value  = entry.entry_text || '';
  // Stash seed id on the save button so saveNote can PATCH it on success
  window._seedDailyLogId = parseInt(seedId, 10);
  // Clean URL so a refresh doesn't re-trigger the flow
  if (window.history?.replaceState) {
    window.history.replaceState({}, '', window.location.pathname);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadKids().then(() => maybeHandleSeed());
  const searchEl = $('kidsSearch');
  if (searchEl) {
    searchEl.addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      renderActivities(q);
      renderNotes(q);
    });
  }
  window._kidsFilters = {};
  // v202604.126 — The Lens replaces GH_VIEW. The existing renderers
  // already read `window._kidsFilters.category` and `.tags` — adapter
  // populates from lens dimensions (status holds category, tag → tags).
  GH_LENS.init({
    container: 'kidsLens',
    moduleId:  'kids_activities',
    viewToolbar: false,  // kids has its own kid-strip + sub-tab UX, no view toggle
    onChange: ({ filters }) => {
      const out = {};
      for (const f of filters) {
        if (f.dim === 'person')   out.person   = f.value;
        if (f.dim === 'category') out.category = f.value;
        if (f.dim === 'tag')      out.tags     = [f.value];
        if (f.dim === 'name')     out.name     = f.value;
      }
      window._kidsFilters = out;
      renderActivities();
      renderNotes();
    },
  });
});
