<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Today — Ghrava</title>
  <meta name="theme-color" content="#f0f4f8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/shared.css">
<script src="/theme.js"></script>
<script>
  // Apply nav-collapsed before first paint to prevent sidebar flash
  if (localStorage.getItem('gh_nav_collapsed') !== '0') {
    document.documentElement.classList.add('nav-collapsed-init');
  }
</script>
  <script>
    // Shared header config — nav.js reads this before injecting the header
    window.GH_PAGE = {
      module:   'home',
      title:    'Today',
      noBack:   true,
      noHeader: true,  // custom greeting header below
    };
  </script>
  <style>
    /* ── Today-specific overrides ─────────────────────────────────── */
    .today-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 80px;
      box-sizing: border-box;
    }
    .today-header {
      margin: 4px 0 24px;
    }
    .today-header__date {
      font-size: 14px;
      color: var(--text2);
      margin: 0 0 4px;
    }
    .today-header__count {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin: 0;
    }
    .today-section {
      margin-bottom: 28px;
    }
    .today-section__label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
    .today-section__label--now  { color: #c0392b; }
    .today-section__label--soon { color: #b8860b; }
    .today-section__label__count {
      font-family: var(--font-sans, inherit);
      font-size: 12px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text3);
    }
    .today-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 8px;
    }
    .today-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: background .12s, border-color .12s;
      min-width: 0;
    }
    .today-row:hover {
      background: var(--bg3);
      border-color: var(--border2);
    }
    .today-row__dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .today-row__dot--now  { background: #e24b4a; }
    .today-row__dot--soon { background: #ef9f27; }
    .today-row__main {
      flex: 1;
      min-width: 0;
    }
    .today-row__title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin: 0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .today-row__sub {
      font-size: 12px;
      color: var(--text3);
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .today-row__actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      position: relative;
    }
    .today-btn {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .today-btn:hover {
      background: var(--bg4);
      color: var(--text);
      border-color: var(--border2);
    }
    .today-snooze-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      z-index: 100;
      display: none;
      min-width: 140px;
    }
    .today-snooze-menu.open { display: block; }
    .today-snooze-menu__btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      text-align: left;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
    }
    .today-snooze-menu__btn:hover {
      background: var(--bg3);
    }
    .today-pipeline {
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text3);
    }
    .today-pipeline a {
      color: var(--text2);
      text-decoration: none;
    }
    .today-pipeline a:hover {
      color: var(--accent);
    }
    .today-empty {
      padding: 48px 16px;
      text-align: center;
    }
    .today-empty__title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin: 0 0 6px;
    }
    .today-empty__sub {
      font-size: 14px;
      color: var(--text3);
      margin: 0;
    }
    .today-spinner {
      padding: 48px 16px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
    }
    @media (max-width: 640px) {
      .today-wrap { padding: 16px 12px 80px; }
      .today-grid { grid-template-columns: 1fr; }
      .today-header__count { font-size: 18px; }
    }

    /* v202604.140 — Mobile hamburger spacing. Sits above the greeting on
       phones; hidden on desktop by .gh-hamburger media query in shared.css. */
    .today-hamburger {
      margin-bottom: 12px;
    }

    /* v202604.127 — Undo toast */
    .today-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--text);
      color: var(--bg);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.24);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 1000;
    }
    .today-toast.open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .today-toast__undo {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.3);
      background: transparent;
      color: var(--bg);
      cursor: pointer;
      font-weight: 500;
    }
    .today-toast__undo:hover {
      background: rgba(255,255,255,.12);
    }
  </style>
</head>
<body>

<div class="today-wrap">

  <!-- v202604.140 — Mobile hamburger. Sidebar is the only nav on Android,
       and this page sets noHeader:true so nav.js doesn't inject the
       standard hamburger. Hidden on desktop (≥900px) by shared.css. -->
  <button class="gh-hamburger today-hamburger" aria-label="Menu"
          onclick="window.GH_NAV && GH_NAV.toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <header class="today-header">
    <p class="today-header__date" id="todayDate">…</p>
    <h1 class="today-header__count" id="todayCount">Today</h1>
  </header>

  <div id="todayContent" class="today-spinner">Loading…</div>

</div>

<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script>
'use strict';

const $ = id => document.getElementById(id);
function esc(s) { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }

// ── Header date string ─────────────────────────────────────────────
function renderHeaderDate() {
  const d = new Date();
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  $('todayDate').textContent = d.toLocaleDateString(undefined, opts);
}

// ── Pluralize helper ───────────────────────────────────────────────
function plural(n, one, many) { return n + ' ' + (n === 1 ? one : many); }

// ── Render ─────────────────────────────────────────────────────────
let _payload = { now: [], soon: [], pipeline_count: 0 };

function render() {
  const { now, soon, pipeline_count } = _payload;

  const totalToday = now.length;
  const totalWeek  = now.length + soon.length;
  $('todayCount').textContent =
    totalWeek === 0
      ? 'Nothing needs your attention'
      : `${plural(totalToday, 'thing', 'things')} today, ${totalWeek} this week`;

  const c = $('todayContent');
  c.classList.remove('today-spinner');

  if (totalWeek === 0 && pipeline_count === 0) {
    c.innerHTML = `
      <div class="today-empty">
        <p class="today-empty__title">All clear ✓</p>
        <p class="today-empty__sub">Nothing on the horizon either.</p>
      </div>`;
    return;
  }

  if (totalWeek === 0) {
    c.innerHTML = `
      <div class="today-empty">
        <p class="today-empty__title">Nothing needs your attention</p>
        <p class="today-empty__sub">${pipeline_count} item${pipeline_count===1?'':'s'} in the pipeline.</p>
      </div>`;
    return;
  }

  const sections = [];
  if (now.length) {
    sections.push(`
      <section class="today-section">
        <p class="today-section__label today-section__label--now">
          Now <span class="today-section__label__count">· ${now.length}</span>
        </p>
        <div class="today-grid">
          ${now.map(item => rowHTML(item, 'now')).join('')}
        </div>
      </section>`);
  }
  if (soon.length) {
    sections.push(`
      <section class="today-section">
        <p class="today-section__label today-section__label--soon">
          Soon <span class="today-section__label__count">· ${soon.length} this week</span>
        </p>
        <div class="today-grid">
          ${soon.map(item => rowHTML(item, 'soon')).join('')}
        </div>
      </section>`);
  }
  if (pipeline_count > 0) {
    sections.push(`
      <p class="today-pipeline">
        ${pipeline_count} more item${pipeline_count===1?'':'s'} in the next month.
      </p>`);
  }

  c.innerHTML = sections.join('');
  wireRows();
}

// ── Friendly relative date ─────────────────────────────────────────
function relDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const t = new Date(); t.setHours(0,0,0,0);
  const days = Math.round((d - t) / 86400000);
  if (days < -1) return `overdue ${-days} days`;
  if (days === -1) return 'overdue 1 day';
  if (days === 0) return 'today';
  if (days === 1) return 'tomorrow';
  if (days <= 7) return `in ${days} days`;
  return iso;
}

function rowHTML(item, severity) {
  const sub = `${esc(item.subtitle)} · ${esc(relDate(item.due_date))}`;
  const dataset = `data-kind="${esc(item.module)}" data-id="${esc(item.record_id)}" data-href="${esc(item.href)}"`;
  return `
    <div class="today-row" ${dataset}>
      <span class="today-row__dot today-row__dot--${severity}"></span>
      <div class="today-row__main">
        <p class="today-row__title">${esc(item.title)}</p>
        <p class="today-row__sub">${sub}</p>
      </div>
      <div class="today-row__actions">
        <button class="today-btn js-open">Open</button>
        <button class="today-btn js-snooze">Snooze</button>
        <div class="today-snooze-menu">
          <button class="today-snooze-menu__btn" data-days="1">Snooze 1 day</button>
          <button class="today-snooze-menu__btn" data-days="7">Snooze 7 days</button>
          <button class="today-snooze-menu__btn" data-days="30">Snooze 30 days</button>
        </div>
      </div>
    </div>`;
}

// ── Wire row interactions (delegated for fewer listeners) ──────────
function wireRows() {
  document.querySelectorAll('.today-row').forEach(row => {
    const href   = row.dataset.href;
    const kind   = row.dataset.kind;
    const id     = row.dataset.id;
    const openBtn   = row.querySelector('.js-open');
    const snoozeBtn = row.querySelector('.js-snooze');
    const menu      = row.querySelector('.today-snooze-menu');

    openBtn.addEventListener('click', () => {
      if (href) location.href = href;
    });

    snoozeBtn.addEventListener('click', e => {
      e.stopPropagation();
      // Close any other open menu first
      document.querySelectorAll('.today-snooze-menu.open').forEach(m => {
        if (m !== menu) m.classList.remove('open');
      });
      menu.classList.toggle('open');
    });

    menu.querySelectorAll('.today-snooze-menu__btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const days = parseInt(btn.dataset.days, 10);
        menu.classList.remove('open');
        try {
          await window.api('POST', '/today/snooze', {
            record_kind: kind,
            record_id:   parseInt(id, 10),
            days,
          });
          // Optimistic: remove row immediately
          row.style.transition = 'opacity .15s, transform .15s';
          row.style.opacity = '0';
          row.style.transform = 'scale(.96)';
          setTimeout(load, 200);
          showToast(`Snoozed for ${days} day${days===1?'':'s'}`, async () => {
            await window.api('DELETE', `/today/snooze/${kind}/${id}`);
            load();
          });
        } catch(err) {
          console.error('[today] snooze failed', err);
          alert('Snooze failed: ' + (err && err.message || 'unknown'));
        }
      });
    });
  });
}

// ── Toast with optional undo button ────────────────────────────────
let _toastTimer = null;
function showToast(message, onUndo) {
  let t = document.getElementById('todayToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'todayToast';
    t.className = 'today-toast';
    document.body.appendChild(t);
  }
  t.innerHTML = `
    <span class="today-toast__msg">${esc(message)}</span>
    ${onUndo ? '<button class="today-toast__undo">Undo</button>' : ''}
  `;
  if (onUndo) {
    t.querySelector('.today-toast__undo').addEventListener('click', () => {
      clearTimeout(_toastTimer);
      hideToast();
      onUndo();
    });
  }
  t.classList.add('open');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() {
  const t = document.getElementById('todayToast');
  if (t) t.classList.remove('open');
}

// Click outside any snooze menu closes it
document.addEventListener('click', e => {
  if (!e.target.closest('.today-snooze-menu') && !e.target.closest('.js-snooze')) {
    document.querySelectorAll('.today-snooze-menu.open').forEach(m => m.classList.remove('open'));
  }
});

// ── Load ───────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await window.api('GET', '/today/?lookahead=30');
    if (!r) throw new Error('Empty response');
    _payload = r;
    render();
  } catch(e) {
    $('todayContent').classList.remove('today-spinner');
    $('todayContent').innerHTML = `
      <div class="today-empty">
        <p class="today-empty__title">Couldn't load Today</p>
        <p class="today-empty__sub">${esc(e.message || 'Network error')}</p>
      </div>`;
  }
}

renderHeaderDate();
load();
</script>

</body>
</html>
