<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notifications — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .notif-list { padding: 8px 16px 100px; }

    .notif-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 8px;
      transition: opacity .2s, border-color .15s;
    }
    .notif-card.is-read { opacity: .55; }
    .notif-card:hover { border-color: var(--border2); }

    .notif-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; margin-top: 4px;
    }
    .notif-dot.overdue { background: var(--red); box-shadow: 0 0 0 3px rgba(239,68,68,.15); }
    .notif-dot.pending { background: var(--amber); }
    .notif-dot.info    { background: var(--accent); }
    .notif-dot.ok      { background: var(--green); }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .notif-card.is-read .notif-title { color: var(--text2); font-weight: 500; }
    .notif-desc  { font-size: 12px; color: var(--text3); line-height: 1.5; }
    .notif-meta  { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; gap: 8px; }

    .notif-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 99px; white-space: nowrap;
    }
    .badge-overdue { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
    .badge-pending { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
    .badge-info    { background: rgba(59,130,246,.12); color: var(--accent); border: 1px solid rgba(59,130,246,.2); }
    .badge-ok      { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }

    .notif-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .notif-act-btn {
      padding: 3px 8px; font-size: 11px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text3); cursor: pointer; white-space: nowrap;
    }
    .notif-act-btn:hover { border-color: var(--accent); color: var(--accent); }

    .notif-group-hdr {
      font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text3);
      padding: 16px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }

    .module-link {
      font-size: 11px; color: var(--accent); text-decoration: none;
      padding: 2px 6px; border-radius: 4px;
    }
    .module-link:hover { background: var(--accent-bg); }

    .controls-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 0;
    }
    .unread-badge {
      background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 99px; margin-left: 4px;
    }
  </style>
</head>
<body class="module-settings">
<div id="app">

  <div class="controls-bar">
    <span style="font-size:15px;font-weight:700;color:var(--text)">Notifications
      <span class="unread-badge" id="unreadBadge" style="display:none">0</span>
    </span>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-ghost" style="font-size:12px" onclick="markAllRead()">✓ Mark all read</button>
      <button class="btn btn-ghost" style="font-size:12px" onclick="loadNotifs()">↺ Refresh</button>
    </div>
  </div>

  <div class="notif-list" id="notifList">
    <div class="spinner"><div class="spin"></div>Loading…</div>
  </div>

</div>

<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script>
window.GH_PAGE = { key: 'notifications', title: 'Notifications' };

const MODULE_LINKS = {
  inventory:  '/inventory.html',
  hsa:        '/finance.html',
  daily_log:  '/daily-log.html',
  medical:    '/medical.html',
  todos:      '/todos.html',
  career:     '/career.html',
  property:   '/property.html',
  finance:    '/finance.html',
  documents:  '/documents.html',
};

const SEV_LABEL  = { overdue:'Overdue', pending:'Due soon', info:'Info', ok:'OK' };

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function loadNotifs() {
  const el = document.getElementById('notifList');
  el.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const notifs = await fetch('/api/v1/notifications').then(r => r.json());
    const unread = notifs.filter(n => !n.is_read).length;
    const badge  = document.getElementById('unreadBadge');
    badge.textContent = unread;
    badge.style.display = unread ? '' : 'none';

    if (!notifs.length) {
      el.innerHTML = `<div style="text-align:center;padding:48px 0">
        <div style="font-size:48px;margin-bottom:12px">🔔</div>
        <div style="font-size:16px;font-weight:700;color:var(--text)">All clear</div>
        <div style="font-size:13px;color:var(--text3);margin-top:6px">No notifications right now</div>
      </div>`;
      return;
    }

    // Group by severity
    const groups = { overdue: [], pending: [], info: [], ok: [] };
    notifs.forEach(n => { (groups[n.severity] || groups.info).push(n); });

    let html = '';
    const groupOrder = [['overdue','Overdue'], ['pending','Upcoming'], ['info','Info'], ['ok','OK']];
    for (const [sev, label] of groupOrder) {
      const items = groups[sev];
      if (!items.length) continue;
      html += `<div class="notif-group-hdr">${label} (${items.length})</div>`;
      html += items.map(n => notifCard(n)).join('');
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div style="padding:24px;color:var(--text3)">Could not load notifications: ${esc(e.message)}</div>`;
  }
}

function notifCard(n) {
  const link = MODULE_LINKS[n.module];
  const badgeClass = `badge-${n.severity}`;
  return `<div class="notif-card${n.is_read ? ' is-read' : ''}" id="notif-${n.id}">
    <div class="notif-dot ${n.severity}"></div>
    <div class="notif-body">
      <div class="notif-title">${esc(n.title)}</div>
      ${n.body ? `<div class="notif-desc">${esc(n.body)}</div>` : ''}
      <div class="notif-meta">
        <span class="notif-badge ${badgeClass}">${SEV_LABEL[n.severity]||n.severity}</span>
        ${link ? `<a href="${link}" class="module-link" onclick="markRead(${n.id})">→ Go to ${esc(n.module)}</a>` : ''}
        <span style="margin-left:auto">${esc(n.time_ago||'')}</span>
      </div>
    </div>
    <div class="notif-actions">
      ${!n.is_read ? `<button class="notif-act-btn" onclick="markRead(${n.id})">Mark read</button>` : ''}
      <button class="notif-act-btn" style="color:var(--red)" onclick="dismiss(${n.id})">Dismiss</button>
    </div>
  </div>`;
}

async function markRead(id) {
  await fetch(`/api/v1/notifications/${id}/read`, { method: 'PATCH' }).catch(()=>{});
  const card = document.getElementById('notif-' + id);
  if (card) card.classList.add('is-read');
  // Update badge
  const unread = document.querySelectorAll('.notif-card:not(.is-read)').length;
  const badge = document.getElementById('unreadBadge');
  badge.textContent = unread;
  badge.style.display = unread ? '' : 'none';
}

async function markAllRead() {
  await fetch('/api/v1/notifications/read-all', { method: 'PATCH' }).catch(()=>{});
  document.querySelectorAll('.notif-card').forEach(c => c.classList.add('is-read'));
  const badge = document.getElementById('unreadBadge');
  badge.textContent = '0';
  badge.style.display = 'none';
}

async function dismiss(id) {
  await fetch(`/api/v1/notifications/${id}`, { method: 'DELETE' }).catch(()=>{});
  const card = document.getElementById('notif-' + id);
  if (card) { card.style.opacity = '0'; setTimeout(() => card.remove(), 200); }
}

document.addEventListener('DOMContentLoaded', loadNotifs);
</script>
</body>
</html>
