<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notifications — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .notif-list { padding: 8px 16px 100px; }

    .notif-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 8px;
      transition: opacity .2s, border-color .15s;
    }
    .notif-card.is-read { opacity: .55; }
    .notif-card:hover { border-color: var(--border2); }

    .notif-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; margin-top: 4px;
    }
    .notif-dot.overdue { background: var(--red); box-shadow: 0 0 0 3px rgba(239,68,68,.15); }
    .notif-dot.pending { background: var(--amber); }
    .notif-dot.info    { background: var(--accent); }
    .notif-dot.ok      { background: var(--green); }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .notif-card.is-read .notif-title { color: var(--text2); font-weight: 500; }
    .notif-desc  { font-size: 12px; color: var(--text3); line-height: 1.5; }
    .notif-meta  { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; gap: 8px; }

    .notif-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 99px; white-space: nowrap;
    }
    .badge-overdue { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
    .badge-pending { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
    .badge-info    { background: rgba(59,130,246,.12); color: var(--accent); border: 1px solid rgba(59,130,246,.2); }
    .badge-ok      { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }

    .notif-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .notif-act-btn {
      padding: 3px 8px; font-size: 11px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text3); cursor: pointer; white-space: nowrap;
    }
    .notif-act-btn:hover { border-color: var(--accent); color: var(--accent); }

    .notif-group-hdr {
      font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text3);
      padding: 16px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }

    .module-link {
      font-size: 11px; color: var(--accent); text-decoration: none;
      padding: 2px 6px; border-radius: 4px;
    }
    .module-link:hover { background: var(--accent-bg); }

    .controls-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 0;
    }
    .unread-badge {
      background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 99px; margin-left: 4px;
    }
  </style>
</head>
<body class="module-settings">
<div id="app">

  <!-- Top-level tabs: Notifications | Inbox (folded from former watcher-inbox.html) -->
  <div class="view-tabs" id="topNotifTabs" style="--tab-color:#ef4444;border-bottom:1px solid var(--border);background:transparent">
    <button class="view-tab active" data-view="notifs">🔔 Notifications <span id="unreadBadge" class="unread-badge" style="display:none">0</span></button>
    <button class="view-tab" data-view="inbox">📥 Smart Inbox <span id="inboxBadge" class="unread-badge" style="display:none">0</span></button>
  </div>

  <!-- VIEW: Notifications -->
  <div id="notifView">
  <div class="controls-bar">
    <span style="font-size:15px;font-weight:700;color:var(--text)">Notifications</span>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-ghost" style="font-size:12px" onclick="markAllRead()">✓ Mark all read</button>
      <button class="btn btn-ghost" style="font-size:12px" onclick="loadNotifs()">↺ Refresh</button>
    </div>
  </div>

  <div class="notif-list" id="notifList">
    <div class="spinner"><div class="spin"></div>Loading…</div>
  </div>
  </div>

  <!-- VIEW: Smart Inbox (folded from former watcher-inbox.html) -->
  <div id="inboxView" style="display:none">
    <div style="max-width:800px;margin:0 auto;padding:0 16px 80px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 0 16px">
        <div class="sum-card"><div class="sum-val" id="pendingCount" style="color:var(--amber)">—</div><div class="sum-lbl">Pending</div></div>
        <div class="sum-card"><div class="sum-val" id="failedCount" style="color:var(--red)">—</div><div class="sum-lbl">Failed</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-ghost" style="flex:1" onclick="loadInbox()">🔄 Refresh</button>
        <a href="/settings.html" class="btn btn-ghost" style="flex:1;text-align:center">⚙️ Configure Rules</a>
      </div>
      <div id="inboxList"><div class="spinner"><div class="spin"></div>Loading…</div></div>
    </div>
  </div>

</div>

<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script>
window.GH_PAGE = { module: 'notifications', title: 'Notifications' };

const MODULE_LINKS = {
  inventory:  '/inventory.html',
  hsa:        '/finance.html',
  daily_log:  '/daily-log.html',
  medical:    '/medical.html',
  todos:      '/todos.html',
  career:     '/career.html',
  property:   '/property.html',
  finance:    '/finance.html',
  documents:  '/documents.html',
};

const SEV_LABEL  = { overdue:'Overdue', pending:'Due soon', info:'Info', ok:'OK' };

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function loadNotifs() {
  const el = document.getElementById('notifList');
  el.innerHTML = '<div class="spinner"><div class="spin"></div>Loading…</div>';
  try {
    const notifs = await window.api('GET', '/notifications');
    const unread = notifs.filter(n => !n.is_read).length;
    const badge  = document.getElementById('unreadBadge');
    badge.textContent = unread;
    badge.style.display = unread ? '' : 'none';

    if (!notifs.length) {
      el.innerHTML = `<div style="text-align:center;padding:48px 0">
        <div style="font-size:48px;margin-bottom:12px">🔔</div>
        <div style="font-size:16px;font-weight:700;color:var(--text)">All clear</div>
        <div style="font-size:13px;color:var(--text3);margin-top:6px">No notifications right now</div>
      </div>`;
      return;
    }

    // Group by severity
    const groups = { overdue: [], pending: [], info: [], ok: [] };
    notifs.forEach(n => { (groups[n.severity] || groups.info).push(n); });

    let html = '';
    const groupOrder = [['overdue','Overdue'], ['pending','Upcoming'], ['info','Info'], ['ok','OK']];
    for (const [sev, label] of groupOrder) {
      const items = groups[sev];
      if (!items.length) continue;
      html += `<div class="notif-group-hdr">${label} (${items.length})</div>`;
      html += items.map(n => notifCard(n)).join('');
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div style="padding:24px;color:var(--text3)">Could not load notifications: ${esc(e.message)}</div>`;
  }
}

function notifCard(n) {
  const link = MODULE_LINKS[n.module];
  const badgeClass = `badge-${n.severity}`;
  return `<div class="notif-card${n.is_read ? ' is-read' : ''}" id="notif-${n.id}">
    <div class="notif-dot ${n.severity}"></div>
    <div class="notif-body">
      <div class="notif-title">${esc(n.title)}</div>
      ${n.body ? `<div class="notif-desc">${esc(n.body)}</div>` : ''}
      <div class="notif-meta">
        <span class="notif-badge ${badgeClass}">${SEV_LABEL[n.severity]||n.severity}</span>
        ${link ? `<a href="${link}" class="module-link" onclick="markRead(${n.id})">→ Go to ${esc(n.module)}</a>` : ''}
        <span style="margin-left:auto">${esc(n.time_ago||'')}</span>
      </div>
    </div>
    <div class="notif-actions">
      ${!n.is_read ? `<button class="notif-act-btn" onclick="markRead(${n.id})">Mark read</button>` : ''}
      <button class="notif-act-btn" style="color:var(--red)" onclick="dismiss(${n.id})">Dismiss</button>
    </div>
  </div>`;
}

async function markRead(id) {
  await window.api('PATCH', `/notifications/${id}/read`).catch(()=>{});
  const card = document.getElementById('notif-' + id);
  if (card) card.classList.add('is-read');
  // Update badge
  const unread = document.querySelectorAll('.notif-card:not(.is-read)').length;
  const badge = document.getElementById('unreadBadge');
  badge.textContent = unread;
  badge.style.display = unread ? '' : 'none';
}

async function markAllRead() {
  await window.api('PATCH', '/notifications/read-all').catch(()=>{});
  document.querySelectorAll('.notif-card').forEach(c => c.classList.add('is-read'));
  const badge = document.getElementById('unreadBadge');
  badge.textContent = '0';
  badge.style.display = 'none';
}

async function dismiss(id) {
  await window.api('DELETE', `/notifications/${id}`).catch(()=>{});
  const card = document.getElementById('notif-' + id);
  if (card) { card.style.opacity = '0'; setTimeout(() => card.remove(), 200); }
}

document.addEventListener('DOMContentLoaded', loadNotifs);

// ── Top tab switcher: Notifications | Smart Inbox ─────────────
(function(){
  const tabs = document.querySelectorAll('#topNotifTabs .view-tab[data-view]');
  function setView(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.view === name));
    document.getElementById('notifView').style.display = name === 'notifs' ? '' : 'none';
    document.getElementById('inboxView').style.display = name === 'inbox' ? '' : 'none';
    if (name === 'inbox') loadInbox();
    if (name === 'notifs' && location.hash === '#inbox') history.replaceState(null,'',location.pathname);
    if (name === 'inbox'  && location.hash !== '#inbox') history.replaceState(null,'','#inbox');
  }
  tabs.forEach(t => t.addEventListener('click', () => setView(t.dataset.view)));
  if (location.hash === '#inbox') {
    document.addEventListener('DOMContentLoaded', () => setView('inbox'));
  }
  window._notifSetView = setView;
})();

// ── Smart Inbox: wrapped IIFE (folded from former watcher-inbox.html) ──
(function(){
  const FILE_ICONS = { pdf:'📄', csv:'📊', xlsx:'📈', ofx:'💱', qfx:'💱', txt:'📝' };
  function fileIcon(name){ const ext=(name||'').split('.').pop().toLowerCase(); return FILE_ICONS[ext]||'📎'; }
  function suggest(p) {
    const f = (p||'').toLowerCase();
    if (/eob|explanation/.test(f)) return { module:'eob', label:'EOB Statement' };
    if (/statement|chase|schwab|navy|usaa/.test(f)) return { module:'statement', label:'Bank Statement' };
    if (/receipt|pharmacy|cvs|walgreen/.test(f)) return { module:'receipt', label:'Receipt' };
    return null;
  }
  function fmtSize(b){ if(!b) return ''; if(b<1048576) return (b/1024).toFixed(0)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
  function ibEsc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function load() {
    try {
      const data  = await window.api('GET', '/watcher/pending?limit=100');
      const stats = await window.api('GET', '/watcher/status');
      document.getElementById('pendingCount').textContent = data.total || 0;
      document.getElementById('failedCount').textContent  = stats.stats?.failed || 0;
      const ibBadge = document.getElementById('inboxBadge');
      if (ibBadge) {
        if (data.total) { ibBadge.textContent = data.total; ibBadge.style.display = 'inline-block'; }
        else ibBadge.style.display = 'none';
      }
      const el = document.getElementById('inboxList');
      if (!data.files?.length) {
        el.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)"><div style="font-size:48px;margin-bottom:16px">📭</div><h3 style="margin-bottom:8px">Inbox Zero!</h3><p style="font-size:13px">All files processed. New files will appear here automatically.</p></div>';
        return;
      }
      el.innerHTML = data.files.map(f => {
        const fname = f.file_path.split('/').pop();
        const folder = f.file_path.split('/').slice(0,-1).join('/');
        const hint = suggest(f.file_path);
        return `
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px">
            <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
              <span style="font-size:24px;flex-shrink:0">${fileIcon(fname)}</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;color:var(--text);word-break:break-all">${ibEsc(fname)}</div>
                <div style="font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${ibEsc(folder)}">${ibEsc(folder)}</div>
                ${f.file_size?`<div style="font-size:11px;color:var(--text3)">${fmtSize(f.file_size)}</div>`:''}
              </div>
            </div>
            ${hint?`
            <div style="background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:13px;color:var(--accent)">💡 Looks like: ${hint.label}</span>
              <button class="btn btn-primary" style="padding:4px 12px;font-size:12px" onclick="ibAccept(${f.id})">✓ Accept</button>
            </div>`:''}
            <div style="display:flex;gap:8px">
              <select class="form-select" id="mod_${f.id}" style="flex:1;font-size:13px">
                <option value="">— Choose module —</option>
                <option value="eob"       ${hint?.module==='eob'?'selected':''}>📋 EOB Statement</option>
                <option value="statement" ${hint?.module==='statement'?'selected':''}>🏦 Bank Statement</option>
                <option value="document">📄 Document</option>
                <option value="ignore">🚫 Ignore</option>
              </select>
              <button class="btn btn-primary" onclick="ibProcess(${f.id})">Import</button>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('inboxList').innerHTML = `<div style="color:var(--red);padding:20px">${ibEsc(e.message)}</div>`;
    }
  }
  async function process(id) {
    const mod = document.getElementById(`mod_${id}`)?.value;
    if (!mod) { if (typeof toast==='function') toast('Select a module first','err'); return; }
    try {
      await window.api('POST', '/watcher/process', { file_id: id, action: mod === 'ignore' ? 'ignore' : 'import' });
      if (typeof toast==='function') toast(mod === 'ignore' ? 'Ignored' : 'Processing…');
      load();
    } catch(e) { if (typeof toast==='function') toast(e.message,'err'); }
  }
  window.loadInbox = load;
  window.ibAccept = async (id) => process(id);
  window.ibProcess = process;
})();
</script>
</body>
</html>
