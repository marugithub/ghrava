<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Ghrava</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/theme.js"></script>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;color:var(--text)">
  <div style="font-size:64px;margin-bottom:20px">📡</div>
  <h1 style="font-size:22px;font-weight:700;margin-bottom:10px">You're offline</h1>
  <p style="font-size:14px;color:var(--text2);max-width:300px;line-height:1.6;margin-bottom:24px">
    Ghrava needs your NAS to be reachable. Check your Wi-Fi connection and try again.
  </p>
  <button onclick="window.location.reload()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:600;cursor:pointer">
    Try Again
  </button>
</div>
</body>
</html>
