<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0f4f8">
<meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
<title>Career — Ghrava</title>
<link rel="stylesheet" href="/shared.css">
<script src="/theme.js"></script>
<script>
  // Apply nav-collapsed before first paint to prevent sidebar flash
  if (localStorage.getItem('gh_nav_collapsed') === '1') {
    document.documentElement.classList.add('nav-collapsed-init');
  }
</script>
<style>
/* view-tab styles from shared.css */
.view-panel { display:none; }
.view-panel.active { display:block; }

/* Cards */
/* career cards use shared .card system */

/* Status badges */
.badge-active   { background:var(--green-bg,#052a10);color:var(--green);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600; }
.badge-expired  { background:#2a0508;color:var(--red);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600; }
.badge-progress { background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600; }
.badge-current  { background:var(--accent-bg,#0a1a2a);color:var(--accent);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600; }

/* Skills grid */
.skills-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:8px 16px 0; }
.skill-chip {
  background:var(--bg2);border-radius:var(--r);padding:10px 12px;
  cursor:pointer;transition:background .15s;
}
.skill-chip:active { background:var(--bg3); }
.skill-chip-name { font-size:13px;font-weight:600;color:var(--text); }
.skill-chip-meta { font-size:11px;color:var(--text3);margin-top:2px; }

/* Proficiency dots */
.prof-dots { display:flex;gap:3px;margin-top:4px; }
.prof-dot { width:8px;height:8px;border-radius:50%;background:var(--bg3); }
.prof-dot.lit { background:var(--accent); }

.cert-grid-wrap {
  display: grid;
  grid-template-columns: repeat(var(--cert-cols, 2), 1fr);
  gap: 10px;
  padding: 4px 0 100px;
}
.cert-list-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 4px 0 100px;
}
@media (max-width: 500px) {
  .cert-grid-wrap { grid-template-columns: repeat(1, 1fr); }
}

/* ── Cert card v2 ─────────────────────────────────────── */
.cc {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-left: 3px solid var(--text3);
  border-radius: 0 10px 10px 0;
  overflow: hidden;
  cursor: pointer;
  transition: background .15s;
}
.cc:hover { background: var(--bg3); }
.cc.cc-active   { border-left-color: var(--green); }
.cc.cc-expiring { border-left-color: var(--amber); }
.cc.cc-expired  { border-left-color: var(--red); }
.cc-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:10px 12px 6px; }
.cc-title { font-size:13px; font-weight:600; flex:1; min-width:0; line-height:1.3; color:var(--text); }
.cc-issuer { font-size:11px; color:var(--text3); padding:0 12px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cc-divider { height:0.5px; background:var(--border); }
.cc-body { display:flex; gap:10px; padding:8px 12px; align-items:flex-start; }
.cc-ring { position:relative; width:48px; height:48px; flex-shrink:0; }
.cc-ring svg { width:48px; height:48px; }
.cc-ring-lbl { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:11px; font-weight:600; color:var(--text); text-align:center; line-height:1; pointer-events:none; }
.cc-kv { flex:1; display:flex; flex-direction:column; gap:4px; min-width:0; }
.cc-row { display:flex; justify-content:space-between; gap:6px; font-size:11px; }
.cc-row .k { color:var(--text3); flex-shrink:0; }
.cc-row .v { color:var(--text); font-weight:600; text-align:right; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cc-row .v.warn { color:var(--amber); }
.cc-row .v.ok   { color:var(--green); }
.cc-row .v.dim  { color:var(--text3); font-weight:400; }
.cc-footer { display:flex; align-items:center; justify-content:space-between; padding:5px 10px; border-top:0.5px solid var(--border); background:var(--bg); }
.cc-tags { display:flex; flex-wrap:wrap; gap:3px; min-width:0; overflow:hidden; }
.cc-actions { display:flex; gap:5px; flex-shrink:0; }
.cc-btn { width:26px; height:26px; border-radius:6px; border:0.5px solid var(--border); background:var(--bg2); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text3); flex-shrink:0; }
.cc-btn:hover { background:var(--bg3); color:var(--text); }
</style>
</head>
<body>
<script>
window.GH_PAGE = { module: 'career', title: 'Career' };
</script>
<script src="/nav.js"></script>
<script src="/js/lt-core.js"></script>
<script src="/js/lt-refs.js"></script>
<script src="/js/lt-messages.js"></script>
<script src="/js/lt-shared-data.js"></script>
<div id="nav-container"></div>

<div id="app" style="padding-bottom:80px">

  <!-- Tabs -->
  <div class="view-tabs" style="--tab-color:#f97316;display:flex;align-items:center" id="careerTabs">
    <button class="view-tab active" onclick="switchTab('certs',this)">Certs</button>
    <button class="view-tab" onclick="switchTab('jobs',this)">Jobs</button>
    <button class="view-tab" onclick="switchTab('skills',this)">Skills</button>
    <button class="view-tab" onclick="switchTab('learning',this)">Learning</button>
    <button class="view-tab" onclick="switchTab('goals',this)">Goals</button>

  </div>

  <!-- Search bar -->
  <div class="search-wrap" style="margin:8px 16px 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="careerSearch" type="search" placeholder="Search certs, jobs, skills…" autocomplete="off">
  </div>

  <!-- ══════════════════════════════════════════════
       CERTIFICATIONS
       ══════════════════════════════════════════════ -->
  <div class="view-panel active" id="panel-certs">
    <div style="padding:10px 16px 0;display:flex;align-items:center;gap:8px">
      <div style="flex:1"></div>
      <div id="certViewToolbar" style="display:flex;align-items:center"></div>
      <button class="btn btn-primary" style="padding:5px 14px;font-size:13px" onclick="openCertDrawer()">+ Add</button>
    </div>
    <div id="certsList" style="padding:8px 16px 0;box-sizing:border-box">
      <div class="spinner"><div class="spin"></div>Loading…</div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       JOBS
       ══════════════════════════════════════════════ -->
  <div class="view-panel" id="panel-jobs">
    <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)">Employment History</span>
      <button class="btn btn-primary" style="padding:5px 14px;font-size:13px" onclick="openJobDrawer()">+ Add</button>
    </div>
    <div id="jobsList" style="padding:8px 16px 0"></div>
  </div>

  <!-- ══════════════════════════════════════════════
       SKILLS
       ══════════════════════════════════════════════ -->
  <div class="view-panel" id="panel-skills">
    <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)">Skills</span>
      <button class="btn btn-primary" style="padding:5px 14px;font-size:13px" onclick="openSkillDrawer()">+ Add</button>
    </div>
    <div id="skillsList" style="padding:4px 0 0"></div>
  </div>

  <!-- ══════════════════════════════════════════════
       EDUCATION
       ══════════════════════════════════════════════ -->
  <div class="view-panel" id="panel-learning">
    <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1">
        <button class="filter-chip active" onclick="setLearningType('',this)">All</button>
        <button class="filter-chip" onclick="setLearningType('Course',this)">Course</button>
        <button class="filter-chip" onclick="setLearningType('Seminar',this)">Seminar</button>
        <button class="filter-chip" onclick="setLearningType('Conference',this)">Conference</button>
        <button class="filter-chip" onclick="setLearningType('Webinar',this)">Webinar</button>
        <button class="filter-chip" onclick="setLearningType('Reading',this)">Reading</button>
        <button class="filter-chip" onclick="setLearningType('On-the-Job',this)">On-the-Job</button>
        <button class="filter-chip" onclick="setLearningType('Volunteering',this)">Volunteering</button>
        <button class="filter-chip" onclick="setLearningType('Presenting/Teaching',this)">Presenting</button>
        <button class="filter-chip" onclick="setLearningType('Self-Study',this)">Self-Study</button>
        <button class="filter-chip" onclick="setLearningType('Other',this)">Other</button>
      </div>
      <button class="btn btn-primary" style="padding:5px 14px;font-size:13px;flex-shrink:0" onclick="openLearningDrawer()">+ Add</button>
    </div>
    <div id="learningList" style="padding:8px 16px 100px"></div>
  </div>

  <!-- ══════════════════════════════════════════════
       GOALS / NOTES
       ══════════════════════════════════════════════ -->
  <div class="view-panel" id="panel-goals">
    <div style="padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)">Goals</span>
      <button class="btn btn-primary" style="padding:5px 14px;font-size:13px" onclick="openGoalDrawer()">+ Add</button>
    </div>
    <!-- Status filter -->
    <div style="display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;scrollbar-width:none">
      <button class="filter-chip active" onclick="setGoalFilter('active',this)">Active</button>
      <button class="filter-chip" onclick="setGoalFilter('achieved',this)">Achieved</button>
      <button class="filter-chip" onclick="setGoalFilter('dropped',this)">Dropped</button>
      <button class="filter-chip" onclick="setGoalFilter('',this)">All</button>
    </div>
    <div id="goalsList" style="padding:4px 16px 100px">
      <div class="spinner"><div class="spin"></div>Loading…</div>
    </div>
  </div>

</div><!-- #app -->

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="onFab()" title="Add">+</button>

<!-- ════════════════════════════════════════════════════════════
     CERT DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="certDrawer" onclick="onDrawerBg('certDrawer')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="certDrawerTitle">Add Certification</div>
    <div class="form-group">
      <label class="form-label">Name <span class="req">*</span></label>
      <input class="form-input" id="certName" placeholder="e.g. PMP, Security+, FAC-PPM Level II"
        oninput="onCertNameInput(this.value)">
      <div id="certPresetBanner" style="display:none;margin-top:6px;padding:8px 10px;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--r);font-size:12px;color:var(--text2)"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Issuing Body</label><input class="form-input" id="certIssuer" placeholder="PMI, DAU, CompTIA…"></div>
      <div class="form-group"><label class="form-label">Cert / Badge #</label><input class="form-input" id="certCredId"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Issue Date</label><input class="form-input" type="date" id="certIssueDate"></div>
      <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" type="date" id="certExpiry"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" id="certStatus"></select>
    </div>

    <!-- CE / Renewal tracking -->
    <div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:12px 0 6px">Renewal &amp; CE Tracking</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">CE Hours Required</label><input class="form-input" type="number" id="certCeHours" placeholder="60" min="0" step="1"></div>
      <div class="form-group"><label class="form-label">Cycle (months)</label><input class="form-input" type="number" id="certRenewalMonths" placeholder="36" min="0" step="1"></div>
    </div>
    <div class="form-group"><label class="form-label">Current Cycle Start</label><input class="form-input" type="date" id="certCycleStart"></div>

    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="certNotes" style="min-height:50px"></textarea></div>
    <div style="font-size:12px;color:var(--text3);padding:0 0 8px">⏰ A renewal reminder Todo will be created 60 days before expiry.</div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tags-input-wrap" id="certTagsWrap" onclick="document.getElementById('certTagInput').focus()">
        <input id="certTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" id="certSave" style="flex:1" onclick="saveCert()">Save</button>
      <button class="btn btn-ghost" id="certDeleteBtn" style="color:var(--red);display:none" onclick="deleteCert()">Delete</button>
      <button class="btn btn-ghost" onclick="$('certDrawer').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     JOB DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="jobDrawer" onclick="onDrawerBg('jobDrawer')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="jobDrawerTitle">Add Job</div>
    <div class="form-group"><label class="form-label">Company <span class="req">*</span></label><select class="form-select" id="jobCompany"></select></div>
    <div class="form-group"><label class="form-label">Title <span class="req">*</span></label><input class="form-input" id="jobTitle"></div>
    <div class="form-group"><label class="form-label">Employment Type</label>
      <select class="form-select" id="jobType" onchange="triggerJobSuggest()">
        <option>Full-time</option><option>Part-time</option><option>Contract</option><option>Freelance</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" type="date" id="jobStart"></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date" id="jobEnd" placeholder="Leave blank if current"></div>
    </div>
    <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="jobLocation"></div>
    <div class="form-group"><label class="form-label">Description / Responsibilities</label><textarea class="form-textarea" id="jobDesc" style="min-height:80px"></textarea></div>
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0 10px">
      <input type="checkbox" id="jobIsCurrent" style="width:16px;height:16px;accent-color:var(--accent)">
      <label for="jobIsCurrent" style="font-size:13px;color:var(--text2)">Current position</label>
    </div>
    <div style="display:flex;gap:8px">
          <div class="form-group">
      <label class="form-label">Tags</label>
      <div id="jobFamilyWrap" style="margin-bottom:12px"></div>
      <div class="tags-input-wrap" id="jobTagsWrap" onclick="document.getElementById('jobTagInput').focus()">
        <input id="jobTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
<button class="btn btn-primary" id="jobSave" style="flex:1" onclick="saveJob()">Save</button>
      <button class="btn btn-ghost" id="jobDeleteBtn" style="color:var(--red);display:none" onclick="deleteJob()">Delete</button>
      <button class="btn btn-ghost" onclick="$('jobDrawer').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     SKILL DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="skillDrawer" onclick="onDrawerBg('skillDrawer')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="skillDrawerTitle">Add Skill</div>
    <div class="form-group"><label class="form-label">Skill Name <span class="req">*</span></label><input class="form-input" id="skillName" placeholder="e.g. Python, Project Management"></div>
    <div class="form-group"><label class="form-label">Category</label><select class="form-select" id="skillCat"></select></div>
    <div class="form-group"><label class="form-label">Proficiency</label>
      <select class="form-select" id="skillProf"></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Years Experience</label><input class="form-input" type="number" id="skillYears" min="0" step="0.5"></div>
      <div class="form-group"><label class="form-label">Last Used Year</label><input class="form-input" type="number" id="skillLastUsed" placeholder="2024"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="skillNotes" style="min-height:60px"></textarea></div>
    <div style="display:flex;gap:8px">
          <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tags-input-wrap" id="skillTagsWrap" onclick="document.getElementById('skillTagInput').focus()">
        <input id="skillTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
<button class="btn btn-primary" id="skillSave" style="flex:1" onclick="saveSkill()">Save</button>
      <button class="btn btn-ghost" id="skillDeleteBtn" style="color:var(--red);display:none" onclick="deleteSkill()">Delete</button>
      <button class="btn btn-ghost" onclick="$('skillDrawer').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     LEARNING DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="learningDrawer" onclick="onDrawerBg('learningDrawer')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="learningDrawerTitle">Add Learning Record</div>
    <div class="form-group"><label class="form-label">Title <span class="req">*</span></label><input class="form-input" id="lnTitle" placeholder="e.g. PMP Exam Prep, AWS Cloud Practitioner"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-select" id="lnType"></select>
      </div>
      <div class="form-group"><label class="form-label">Hours</label><input class="form-input" type="number" id="lnHours" placeholder="8" step="0.5" min="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Provider / Organization</label><input class="form-input" id="lnProvider" placeholder="PMI, Coursera, DAU, employer…"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" type="date" id="lnStartDate"></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date" id="lnEndDate" placeholder="leave blank if ongoing"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Location</label><input class="form-input" id="lnLocation" placeholder="Online, Washington DC…"></div>
      <div class="form-group"><label class="form-label">Cost</label><input class="form-input" type="number" id="lnCost" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Link / URL</label><input class="form-input" type="url" id="lnUrl" placeholder="https://…"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="lnDesc" style="min-height:60px" placeholder="What was covered, key takeaways…"></textarea></div>

    <!-- Applies toward certifications -->
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between">
        Applies Toward Certifications
        <span style="font-size:11px;color:var(--text3);font-weight:400">Optional</span>
      </label>
      <div id="lnCertLinks" style="display:flex;flex-direction:column;gap:6px;margin-bottom:6px"></div>
      <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="addCertLinkRow()">+ Add Cert</button>
    </div>

    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="lnNotes" style="min-height:50px"></textarea></div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tags-input-wrap" id="lnTagsWrap" onclick="document.getElementById('lnTagInput').focus()">
        <input id="lnTagInput" class="tags-input" placeholder="Add tag…" autocomplete="off">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" id="lnSave" style="flex:1" onclick="saveLearning()">Save</button>
      <button class="btn btn-ghost" id="lnDeleteBtn" style="color:var(--red);display:none" onclick="deleteLearning()">Delete</button>
      <button class="btn btn-ghost" onclick="$('learningDrawer').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     GOALS DRAWER
     ════════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="goalDrawer" onclick="onDrawerBg('goalDrawer')">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="goalDrawerTitle">Add Goal</div>
    <div class="form-group">
      <label class="form-label">Goal <span class="req">*</span></label>
      <input class="form-input" id="goalTitle" placeholder="e.g. Get AWS certification">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="goalCategory"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="goalStatus"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Target Date</label>
      <input class="form-input" type="date" id="goalTargetDate">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="goalNotes" style="min-height:80px"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <div id="goalFamilyWrap" style="margin-bottom:12px"></div>
      <button class="btn btn-primary" id="goalSaveBtn" style="flex:1" onclick="saveGoal()">Save</button>
      <button class="btn btn-ghost" id="goalDeleteBtn" style="color:var(--red);display:none" onclick="deleteGoal()">Delete</button>
      <button class="btn btn-ghost" onclick="$('goalDrawer').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/career';
const $ = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const api = window.makeApi('/career');
function onDrawerBg(id) { if (event.target === $id(id)) $id(id).classList.remove('open'); }
function $id(id) { return document.getElementById(id); }

let _careerSearch = '';
window._careerFilters = {};
let currentTab = 'certs';
let certView = localStorage.getItem('career_cert_view') || 'grid';
let certCols = parseInt(localStorage.getItem('career_cert_cols')) || (window.innerWidth >= 600 ? 3 : 2);
let editingCertId = null, editingJobId = null, editingSkillId = null, editingEduId = null;

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('#careerTabs .view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#app .view-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'certs')        loadCerts();
  else if (tab === 'jobs')    loadJobs();
  else if (tab === 'skills')  loadSkills();
  else if (tab === 'learning') loadLearning();
  else if (tab === 'goals')   loadGoals();
}

function onFab() {
  if (currentTab === 'certs')          openCertDrawer();
  else if (currentTab === 'jobs')      openJobDrawer();
  else if (currentTab === 'skills')    openSkillDrawer();
  else if (currentTab === 'learning')  openLearningDrawer();
  else if (currentTab === 'goals')     openGoalDrawer();
}

// ── CERTS ────────────────────────────────────────────────────
async function loadCerts() {
  const el = $('certsList'); if (!el) return;
  try {
    const rows = await api('GET', '/certifications');
    let _filtered_certifications = _careerSearch
      ? rows.filter(r => ['name','issuing_body','credential_id','notes'].some(k => (r[k]||'').toLowerCase().includes(_careerSearch)))
      : rows;
    if (window._careerFilters?.status) _filtered_certifications = _filtered_certifications.filter(r => r.status === window._careerFilters.status);
    if (window._careerFilters?.tags?.length) _filtered_certifications = _filtered_certifications.filter(r => window._careerFilters.tags.every(t => (r.tags||[]).includes(t)));
    if (!_filtered_certifications.length) { el.innerHTML = emptyState(...GH_EMPTY.certs); return; }
    // Render cards, then async-fill cycle detail rows
    setTimeout(() => loadCertCycleDetails(_filtered_certifications), 0);
    const today = new Date();
    const isGrid = certView !== 'list';
    const wrapCls = isGrid ? 'cert-grid-wrap' : 'cert-list-wrap';
    el.innerHTML = `<div class="${wrapCls}" style="--cert-cols:${certCols}">${
      _filtered_certifications.map(c => {
      const exp = c.expiry_date ? new Date(c.expiry_date) : null;
      const daysLeft = exp ? Math.ceil((exp-today)/(1000*60*60*24)) : null;
      const expStr = daysLeft !== null
        ? (daysLeft < 0 ? 'Expired' : `Expires ${formatDate(c.expiry_date)}`)
        : 'No renewal required';
      const expColor = daysLeft !== null && daysLeft < 60 ? 'var(--red)' : 'var(--text3)';
      const badgeClass = c.status === 'Active' ? 'badge-active' : c.status === 'In Progress' ? 'badge-progress' : 'badge-expired';
      const cycleStr = c.renewal_period_months ? ` · ${c.renewal_period_months}mo cycle` : '';


      const certIdSafe = parseInt(c.id);

      // Left border class
      const ccCls = daysLeft === null ? 'cc-active'
        : daysLeft < 0 ? 'cc-expired'
        : daysLeft < 90 ? 'cc-expiring'
        : 'cc-active';

      // Progress ring (r=19, circ≈119.4)
      let bodyHtml = '';
      if (c.ce_hours_required > 0 && c.current_cycle_start) {
        const applied   = parseFloat(c.pdu_applied_this_cycle) || 0;
        const required  = parseFloat(c.ce_hours_required);
        const pct       = Math.min(100, Math.round(applied / required * 100));
        const remaining = Math.max(0, required - applied);
        const circ      = 119.4;
        const filled    = circ * pct / 100;
        const ringColor = pct >= 100 ? 'var(--green)' : pct < 30 ? 'var(--amber)' : 'var(--accent)';
        const vClass    = pct >= 100 ? 'ok' : pct < 30 ? 'warn' : '';
        const cycleRange = c.current_cycle_start
          ? formatDate(c.current_cycle_start) + (c.current_cycle_end ? ' – ' + formatDate(c.current_cycle_end) : '+')
          : '';
        bodyHtml = `<div class="cc-ring">
            <svg viewBox="0 0 48 48" style="transform:rotate(-90deg)">
              <circle cx="24" cy="24" r="19" fill="none" stroke="var(--bg3)" stroke-width="4"/>
              <circle cx="24" cy="24" r="19" fill="none" stroke="${ringColor}" stroke-width="4"
                stroke-dasharray="${filled} ${circ - filled}" stroke-linecap="round"/>
            </svg>
            <div class="cc-ring-lbl">${pct}%</div>
          </div>
          <div class="cc-kv">
            <div class="cc-row"><span class="k">Applied</span><span class="v ${vClass}">${applied}&thinsp;/&thinsp;${required} PDUs</span></div>
            <div class="cc-row"><span class="k">Remaining</span><span class="v ${vClass}">${remaining} needed</span></div>
            <div class="cc-row"><span class="k">Cycle</span><span class="v dim">${cycleRange}</span></div>
            <div class="cc-row"><span class="k">Expires</span><span class="v" style="color:${expColor}">${expStr}</span></div>
          </div>`;
      } else {
        bodyHtml = `<div class="cc-kv" style="padding:2px 0">
            <div class="cc-row"><span class="k">Status</span><span class="v">${esc(c.status)}</span></div>
            <div class="cc-row"><span class="k">Expires</span><span class="v" style="color:${expColor}">${expStr}</span></div>
            ${c.credential_id ? `<div class="cc-row"><span class="k">Credential</span><span class="v dim">${esc(c.credential_id)}</span></div>` : ''}
          </div>`;
      }

      const tagsHtml = c.tags && c.tags.length
        ? c.tags.map(t => { const s = window.GH_TAGS ? GH_TAGS.chipStyle(t) : ''; return `<span class="tag-chip" style="font-size:10px;padding:1px 5px${s?';'+s:''}">${esc(t)}</span>`; }).join('')
        : `<span style="font-size:11px;color:var(--text3)">no tags</span>`;

      const icoLogHours = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
      const icoAttach   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>`;
      const icoEdit     = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

      const issuerParts = [c.issuing_body, c.credential_id ? '#' + c.credential_id : null].filter(Boolean);

      return `<div class="cc ${ccCls}" onclick="openCertDrawer(${certIdSafe})">
        <div class="cc-head">
          <span class="cc-title">${esc(c.name)}</span>
          <span class="${badgeClass}" style="flex-shrink:0;font-size:10px">${esc(c.status)}</span>
        </div>
        ${issuerParts.length ? `<div class="cc-issuer">${issuerParts.map(esc).join(' · ')}</div>` : ''}
        <div class="cc-divider"></div>
        <div class="cc-body">${bodyHtml}</div>
        <div class="cc-footer">
          <div class="cc-tags">${tagsHtml}</div>
          <div class="cc-actions">
            <div class="cc-btn" title="Log hours" onclick="event.stopPropagation();logHoursForCert(${certIdSafe})">${icoLogHours}</div>
            <div class="cc-btn" title="Attachments" onclick="event.stopPropagation();openCertDrawer(${certIdSafe})">${icoAttach}</div>
            <div class="cc-btn" title="Edit" onclick="event.stopPropagation();openCertDrawer(${certIdSafe})">${icoEdit}</div>
          </div>
        </div>
      </div>`;
    }).join('')
    }</div>`;
  } catch(e) { el.innerHTML = errorState(e.message, ''); }
}

async function openCertDrawer(id) {
  editingCertId = id||null;
  let c = {};
  if (id) { try { const all = await api('GET', '/certifications'); c = all.find(x=>x.id===id)||{}; } catch(e){} }
  $('certDrawerTitle').textContent = id ? 'Edit Certification' : 'Add Certification';
  $('certName').value          = c.name||'';
  $('certIssuer').value        = c.issuing_body||'';
  $('certCredId').value        = c.credential_id||'';
  $('certIssueDate').value     = c.issue_date||'';
  $('certExpiry').value        = c.expiry_date||'';
  $('certStatus').value        = c.status||'Active';
  await GH_SELECT.init('certStatus', 'career_cert_status', c.status||'Active', { placeholder: '— status —' });
  $('certCeHours').value       = c.ce_hours_required != null ? c.ce_hours_required : '';
  $('certRenewalMonths').value = c.renewal_period_months != null ? c.renewal_period_months : '';
  $('certCycleStart').value    = c.current_cycle_start||'';
  $('certNotes').value         = c.notes||'';
  $('certPresetBanner').style.display = 'none';
  $('certDeleteBtn').style.display = id ? 'inline-flex' : 'none';
  initCertTags(c?.tags||[]);
  await loadCareerDropdowns();
  // Show renew button if cert has an active cycle
  const renewBtn = $('certRenewBtn');
  if (renewBtn) renewBtn.style.display = (id && c.current_cycle_start && c.renewal_period_months) ? 'inline-flex' : 'none';
  $('certDrawer').classList.add('open');
  setTimeout(() => $('certName').focus(), 300);
}

async function saveCert() {
  const btn = $('certSave'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const payload = {
      name:                $('certName').value.trim(),
      issuing_body:        $('certIssuer').value||null,
      credential_id:       $('certCredId').value||null,
      issue_date:          $('certIssueDate').value||null,
      expiry_date:         $('certExpiry').value||null,
      status:              $('certStatus').value,
      ce_hours_required:   $('certCeHours').value ? parseFloat($('certCeHours').value) : null,
      renewal_period_months: $('certRenewalMonths').value ? parseInt($('certRenewalMonths').value) : null,
      current_cycle_start: $('certCycleStart').value||null,
      notes:               $('certNotes').value||null,
      tags:                certFormTags
    };
    if (!payload.name) { toast('Name required','err'); return; }
    const url = editingCertId ? `/certifications/${editingCertId}` : '/certifications';
    const method = editingCertId ? 'PUT' : 'POST';
    const res = await api(method, url, payload);
    toast(editingCertId ? 'Updated' : 'Certification added' + (res.todo_id ? ' · Renewal Todo created' : ''));
    $('certDrawer').classList.remove('open'); loadCerts();
  } catch(e) { toast(ghErrorMsg(e),'err'); }
  finally { btn.textContent='Save'; btn.disabled=false; }
}

async function deleteCert() {
  if (!await LT.confirm('Delete this certification?')) return;
  await api('DELETE', `/certifications/${editingCertId}`);
  toast('Deleted'); $('certDrawer').classList.remove('open'); loadCerts();
}

// ── JOBS ─────────────────────────────────────────────────────
async function loadJobs() {
  const el = $('jobsList'); if (!el) return;
  try {
    const rows = await api('GET', '/jobs');
    const _filtered_jobs = _careerSearch
      ? rows.filter(r => ['title','company','location','notes'].some(k => (r[k]||'').toLowerCase().includes(_careerSearch)))
      : rows;
    if (!_filtered_jobs.length) { el.innerHTML = emptyState(...GH_EMPTY.jobs); return; }
    el.innerHTML = _filtered_jobs.map(j => `
      <div class="card" onclick="openJobDrawer(${j.id})">
        <div class="card-body">
          <div class="card-title">${esc(j.title)}</div>
          <div class="card-sub">${esc(j.company)}${j.location?' · '+esc(j.location):''}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px">${j.start_date||''}${j.end_date?' – '+j.end_date:j.is_current?' – Present':''}</div>
        </div>
        <div class="card-right">
          ${j.is_current ? '<span class="badge-current">Current</span>' : `<span style="font-size:11px;color:var(--text3)">${esc(j.employment_type||'')}</span>`}
        </div>
      </div>`).join('');

async function openJobDrawer(id) {

}

async function saveJob() {
  const btn = $('jobSave'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const payload = {
      employer_contact_id: $('jobCompany').value ? parseInt($('jobCompany').value) : null,
      company: $('jobCompany').value ? ($('jobCompany').options[$('jobCompany').selectedIndex]?.text || '') : '',
      title:$('jobTitle').value.trim(),
      employment_type:$('jobType').value, start_date:$('jobStart').value||null,
      end_date:$('jobEnd').value||null, location:$('jobLocation').value||null,
      description:$('jobDesc').value||null, is_current:$('jobIsCurrent').checked,

  } catch(e) { toast(ghErrorMsg(e),'err'); }

async function deleteJob() {
  if (!await LT.confirm('Delete this job entry?')) return;
  await api('DELETE', `/jobs/${editingJobId}`);
  toast('Deleted'); $('jobDrawer').classList.remove('open'); loadJobs();
}

// ── SKILLS ───────────────────────────────────────────────────
const PROF_LEVELS = ['Beginner','Intermediate','Advanced','Expert'];

async function loadSkills() {
  const el = $('skillsList'); if (!el) return;
  try {
    const rows = await api('GET', '/skills');
    const _filtered_skills = _careerSearch
      ? rows.filter(r => ['name','category','notes'].some(k => (r[k]||'').toLowerCase().includes(_careerSearch)))
      : rows;
    if (!_filtered_skills.length) { el.innerHTML = emptyState(...GH_EMPTY.skills); return; }
    const grouped = {};
    _filtered_skills.forEach(s => { const cat = s.category||'Other'; (grouped[cat]=grouped[cat]||[]).push(s); });
    el.innerHTML = Object.entries(grouped).map(([cat, skills]) => `
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:12px 16px 4px">${esc(cat)}</div>
      <div class="skills-grid">
        ${skills.map(s => {
          const lvl = PROF_LEVELS.indexOf(s.proficiency)+1;
          const dots = PROF_LEVELS.map((_,i) => `<div class="prof-dot${i<lvl?' lit':''}"></div>`).join('');
          return `<div class="skill-chip" onclick="openSkillDrawer(${s.id})">
            <div class="skill-chip-name">${esc(s.name)}</div>
            <div class="prof-dots">${dots}</div>
            <div class="skill-chip-meta">${esc(s.proficiency)}${s.years_experience?' · '+s.years_experience+'y':''}</div>
          </div>`;
        }).join('')}
      </div>
    `).join('');
  } catch(e) { el.innerHTML = errorState(e.message, ''); }
}

async function openSkillDrawer(id) {

  if (id) { try { const all = await api('GET', '/skills'); s = all.find(x=>x.id===id)||{}; } catch(e){} }

  $('skillYears').value    = s.years_experience||'';
  $('skillLastUsed').value = s.last_used_year||'';
  $('skillNotes').value    = s.notes||'';

async function saveSkill() {

  try {
    const payload = { name:$('skillName').value.trim(), category:$('skillCat').value||null,
      proficiency:$('skillProf').value, years_experience:parseFloat($('skillYears').value)||null,

async function deleteSkill() {

  await api('DELETE', `/skills/${editingSkillId}`);

// ── LEARNING & DEVELOPMENT ───────────────────────────────────
let _learningType = '';
let editingLearningId = null;
let lnFormTags = [];
let _allCerts = []; // cache for cert link dropdowns

function setLearningType(type, btn) {
  _learningType = type;
  document.querySelectorAll('#panel-learning .filter-chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadLearning();
}

async function loadLearning() {
  const el = $('learningList'); if (!el) return;
  try {
    let url = '/learning';
    const params = [];
    if (_learningType) params.push('type=' + encodeURIComponent(_learningType));
    if (_careerSearch) params.push('search=' + encodeURIComponent(_careerSearch));
    if (params.length) url += '?' + params.join('&');
    const rows = await api('GET', url);
    if (!rows.length) { el.innerHTML = emptyState('📚', 'No learning records', 'Track courses, seminars, reading, and any continuing education.', ''); return; }

    const TYPE_ICONS = {
      'Course':'🎓','Seminar':'📋','Conference':'🏛','Webinar':'💻',
      'Reading':'📖','On-the-Job':'💼','Volunteering':'🤝',
      'Presenting/Teaching':'🎤','Self-Study':'🧠','Other':'📝'
    };

    el.innerHTML = rows.map(r => {
      const icon = TYPE_ICONS[r.learning_type] || '📝';
      const dateStr = r.start_date
        ? r.start_date + (r.end_date && r.end_date !== r.start_date ? ' → ' + r.end_date : '')
        : '';
      const meta = [r.provider, dateStr, r.hours_total ? r.hours_total + ' hrs' : ''].filter(Boolean).join(' · ');
      return `<div class="card" onclick="openLearningDrawer(${r.id})">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="font-size:22px;flex-shrink:0;padding-top:2px">${icon}</div>
          <div style="flex:1;min-width:0">
            <div class="card-title">${esc(r.title)}</div>
            <div class="card-sub">${esc(r.learning_type)}${meta?' · '+esc(meta):''}</div>
            ${r.linked_certs ? `<div style="font-size:11px;color:var(--accent);margin-top:3px">→ ${esc(r.linked_certs)}</div>` : ''}
            ${r.tags&&r.tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${r.tags.map(t=>{const s=window.GH_TAGS?GH_TAGS.chipStyle(t):'';return`<span class="tag-chip" style="font-size:10px;padding:1px 6px${s?';'+s:''}">${esc(t)}</span>`;}).join('')}</div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = errorState(e.message, ''); }
}

async function openLearningDrawer(id, preLinkCerts) {
  editingLearningId = id||null;
  lnFormTags = [];
  let r = {};
  if (id) { try { r = await api('GET', `/learning/${id}`); } catch(e){} }
  // Pre-link certs passed from cert card button
  if (!id && preLinkCerts) r.cert_links = preLinkCerts;
  $('learningDrawerTitle').textContent = id ? 'Edit Learning Record' : 'Add Learning Record';
  $('lnTitle').value     = r.title||'';
  await GH_SELECT.init('lnType', 'learning_type', r.learning_type||'Course', { placeholder: '— type —' });
  $('lnProvider').value  = r.provider||'';
  $('lnStartDate').value = r.start_date||'';
  $('lnEndDate').value   = r.end_date||'';
  $('lnHours').value     = r.hours_total != null ? r.hours_total : '';
  $('lnLocation').value  = r.location||'';
  $('lnUrl').value       = r.url||'';
  $('lnCost').value      = r.cost != null ? r.cost : '';
  $('lnDesc').value      = r.description||'';
  $('lnNotes').value     = r.notes||'';
  $('lnDeleteBtn').style.display = id ? 'inline-flex' : 'none';
  lnFormTags = r.tags || [];
  renderLnTags();
  // Load certs for link rows
  if (!_allCerts.length) {
    try { _allCerts = await api('GET', '/certifications'); } catch {}
  }
  renderCertLinkRows(r.cert_links || []);
  GH_TAGS.init({ inputId:'lnTagInput', wrapId:'lnTagsWrap', module:'career_learning', getFormTags:()=>lnFormTags, addTag:t=>{ lnFormTags.push(t); renderLnTags(); }, allowCreate:true });
  $('learningDrawer').classList.add('open');
  setTimeout(() => $('lnTitle').focus(), 300);
}

function renderLnTags() {
  const wrap = $('lnTagsWrap'); if (!wrap) return;
  wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
  const input = $('lnTagInput');
  lnFormTags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.textContent = t;
    const rm = document.createElement('span');
    rm.className = 'tag-chip-remove';
    rm.textContent = '×';
    rm.onclick = () => { lnFormTags = lnFormTags.filter(x=>x!==t); renderLnTags(); };
    chip.appendChild(rm);
    wrap.insertBefore(chip, input);
  });
}

function renderCertLinkRows(links) {
  const container = $('lnCertLinks'); if (!container) return;
  container.innerHTML = '';
  (links.length ? links : []).forEach((lk, i) => addCertLinkRow(lk));
}

function addCertLinkRow(existing) {
  const container = $('lnCertLinks'); if (!container) return;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;align-items:center';
  const opts = _allCerts.map(c => `<option value="${c.id}"${existing?.certification_id===c.id?' selected':''}>${esc(c.name)}</option>`).join('');
  row.innerHTML = `
    <select class="form-select" style="flex:2" data-ln-cert-id>
      <option value="">— select cert —</option>${opts}
    </select>
    <input class="form-input" type="number" step="0.5" min="0" placeholder="hrs" style="flex:1" data-ln-hours
      value="${existing?.hours_applied != null ? existing.hours_applied : ''}">
    <input class="form-input" placeholder="category" style="flex:1;font-size:12px" data-ln-category
      value="${esc(existing?.ce_category||'')}">
    <button class="btn btn-ghost" style="padding:4px 8px;color:var(--red);flex-shrink:0"
      onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}

function getCertLinks() {
  return Array.from($('lnCertLinks')?.children||[]).map(row => ({
    certification_id: parseInt(row.querySelector('[data-ln-cert-id]')?.value)||null,
    hours_applied:    parseFloat(row.querySelector('[data-ln-hours]')?.value)||null,
    ce_category:      row.querySelector('[data-ln-category]')?.value?.trim()||null,
  })).filter(lk => lk.certification_id);
}

async function saveLearning() {
  const btn = $('lnSave'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const title = $('lnTitle').value.trim();
    if (!title) { toast('Title required','err'); return; }
    const payload = {
      title, learning_type: $('lnType').value,
      provider:   $('lnProvider').value.trim()||null,
      start_date: $('lnStartDate').value||null,
      end_date:   $('lnEndDate').value||null,
      hours_total: $('lnHours').value ? parseFloat($('lnHours').value) : null,
      location:   $('lnLocation').value.trim()||null,
      url:        $('lnUrl').value.trim()||null,
      cost:       $('lnCost').value ? parseFloat($('lnCost').value) : null,
      description: $('lnDesc').value.trim()||null,
      notes:      $('lnNotes').value.trim()||null,
      tags:       lnFormTags,
      cert_links: getCertLinks(),
    };
    const url = editingLearningId ? `/learning/${editingLearningId}` : '/learning';
    await api(editingLearningId ? 'PUT' : 'POST', url, payload);
    toast(editingLearningId ? 'Updated' : 'Learning record added');
    $('learningDrawer').classList.remove('open');
    loadLearning();
    // Refresh cert cards if we linked something
    if (payload.cert_links.length && currentTab === 'certs') loadCerts();
  } catch(err) { toast(ghErrorMsg(err),'err'); }
  finally { btn.textContent='Save'; btn.disabled=false; }
}

async function deleteLearning() {
  if (!await LT.confirm('Delete this learning record?')) return;
  await api('DELETE', `/learning/${editingLearningId}`);
  toast('Deleted'); $('learningDrawer').classList.remove('open'); loadLearning();
}

// ── Cert name auto-fill preset ────────────────────────────────
let _certPresetTimer = null;
async function onCertNameInput(val) {
  clearTimeout(_certPresetTimer);
  if (!val || val.length < 3) { $('certPresetBanner').style.display='none'; return; }
  _certPresetTimer = setTimeout(async () => {
    try {
      const p = await api('GET', '/certifications/preset?name=' + encodeURIComponent(val));
      if (p && (p.ce_hours_required != null || p.renewal_period_months)) {
        $('certCeHours').value       = p.ce_hours_required ?? '';
        $('certRenewalMonths').value  = p.renewal_period_months ?? '';
        $('certIssuer').value         = $('certIssuer').value || p.issuing_body || '';
        $('certPresetBanner').textContent = `✦ Auto-filled from ${p.issuing_body||val} — edit if needed`;
        $('certPresetBanner').style.display = 'block';
      } else {
        $('certPresetBanner').style.display = 'none';
      }
    } catch {}
  }, 500);
}

// ── GOALS ────────────────────────────────────────────────────
// ── GOALS ─────────────────────────────────────────────────────
let _goalFilter = 'active';
let _editGoalId = null;

function setGoalFilter(status, btn) {
  _goalFilter = status;
  document.querySelectorAll('#panel-goals .filter-chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadGoals();
}

async function loadGoals() {
  const el = $('goalsList'); if (!el) return;
  try {
    const params = _goalFilter ? `?status=${_goalFilter}` : '';
    const goals = await api('GET', `/goals${params}`);
    if (!goals.length) {
      el.innerHTML = emptyState(...GH_EMPTY.goals);
      return;
    }
    const statusColor = { active:'var(--accent)', achieved:'var(--green)', dropped:'var(--text3)' };
    const statusIcon  = { active:'🎯', achieved:'✅', dropped:'🚫' };
    el.innerHTML = goals.map(g => `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;margin-bottom:8px;cursor:pointer"
           onclick="openGoalDrawer(${g.id})">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:16px;flex-shrink:0">${statusIcon[g.status]||'🎯'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px;color:var(--text)">${esc(g.title)}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
              <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${esc(g.category||'General')}</span>
              ${g.target_date ? `<span style="font-size:11px;color:var(--text3)">📅 ${g.target_date}</span>` : ''}
              <span style="font-size:11px;font-weight:600;color:${statusColor[g.status]||'var(--accent)'}">${g.status}</span>
            </div>
            ${g.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5">${esc(g.notes)}</div>` : ''}
          </div>
        </div>
      </div>`).join('');
  } catch(e) { el.innerHTML = errorState(e.message, ''); }
}

async function openGoalDrawer(id) {
  _editGoalId = id || null;
  $('goalDrawerTitle').textContent = id ? 'Edit Goal' : 'Add Goal';
  $('goalDeleteBtn').style.display = id ? 'inline-flex' : 'none';
  let g = {};
  if (id) {
    try { const goals = await api('GET', `${API}/goals`); g = goals.find(x => x.id === id) || {}; } catch {}
  }
  $('goalTitle').value      = g.title || '';
  $('goalTargetDate').value = g.target_date || '';
  $('goalNotes').value      = g.notes || '';
  await GH_SELECT.init('goalCategory', 'career_goal_category', g.category||'Short-term', { allowAdd: true, placeholder: '— category —' });
  await GH_SELECT.init('goalStatus',   'career_goal_status',   g.status||'active',        { placeholder: '— status —' });
  GH_FAMILY.init('goalFamilyWrap', g.family_members || []);
  $('goalDrawer').classList.add('open');
}

async function saveGoal() {
  const title = $('goalTitle').value.trim();
  if (!title) { toast('Title required','err'); return; }
  const btn = $('goalSaveBtn'); btn.textContent='Saving…'; btn.disabled=true;
  const body = {
    title,
    category:    $('goalCategory').value,
    status:      $('goalStatus').value,
    target_date: $('goalTargetDate').value || null,
    notes:       $('goalNotes').value.trim() || null,
    family_member_ids: GH_FAMILY.getIds('goalFamilyWrap'),
  };
  try {
    if (_editGoalId) await api('PUT', `/goals/${_editGoalId}`, body);
    else             await api('POST', '/goals', body);
    toast(_editGoalId ? 'Goal updated' : 'Goal added');
    closeDrawer('goalDrawer');
    loadGoals();
  } catch(e) { toast(e.message||'Save failed','err'); }
  finally { btn.textContent='Save'; btn.disabled=false; }
}

async function deleteGoal() {
  if (!_editGoalId) return;
  if (!await LT.confirm('Delete this goal?')) return;
  await api('DELETE', `/goals/${_editGoalId}`);
  toast('Deleted'); closeDrawer('goalDrawer'); loadGoals();
}

// ── Tags (career) ───────────────────────────────────────────
let certFormTags = [];
function renderCertTags() {
  const wrap=$('certTagsWrap'),input=$('certTagInput'); if(!wrap||!input)return;
  wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
  certFormTags.forEach(t=>{
    const chip=document.createElement('span'); chip.className='tag-chip';
    const cs=window.GH_TAGS?GH_TAGS.chipStyle(t):''; if(cs)chip.style.cssText=cs;
    chip.innerHTML=esc(t)+'<span class="tag-chip-remove">&times;</span>';
    chip.querySelector('.tag-chip-remove').addEventListener('click',()=>{certFormTags=certFormTags.filter(x=>x!==t);renderCertTags();});
    wrap.insertBefore(chip,input);
  });
}
function addCertTag(raw){
  raw.split(',').map(t=>t.trim().toLowerCase()).filter(t=>t&&!certFormTags.includes(t)).forEach(t=>certFormTags.push(t));
  renderCertTags(); const inp=$('certTagInput'); if(inp)inp.value='';
}
function initCertTags(existing){
  certFormTags=(existing||[]).slice(); renderCertTags();
  const inp=$('certTagInput'); if(!inp)return; inp.value='';
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();if(inp.value.trim())addCertTag(inp.value);}else if(e.key==='Backspace'&&!inp.value&&certFormTags.length){certFormTags.pop();renderCertTags();}};
  inp.onblur=()=>{if(inp.value.trim())addCertTag(inp.value);};
  GH_TAGS.init({inputId:'certTagInput',wrapId:'certTagsWrap',module:'career',getFormTags:()=>certFormTags,addTag:t=>addCertTag(t),allowCreate:true});
function triggerCertSuggest() {
  const cat  = document.getElementById('certStatus')?.value || '';
  const name = document.getElementById('certName')?.value || '';
  GH_TAGS.suggest('certTagsWrap', ()=>certFormTags, t=>addCertTag(t), { category: cat, name });
}

}

async function loadCareerDropdowns(currentJobType, currentGoalCat, currentSkillCat) {
  await GH_SELECT.init('jobType',      'career_job_type',        currentJobType  ||'Full-time', { allowAdd: true });
  await GH_SELECT.init('goalCategory', 'career_goal_category',   currentGoalCat  ||'General',   { allowAdd: true });

document.addEventListener('DOMContentLoaded', () => {
  loadCerts();
  GH_VIEW.init('certViewToolbar', 'career_cert', state => {
    certView = state.view;
    certCols = state.cols;
    loadCerts();
  }, { defaultView: 'grid' });
  $('careerSearch').addEventListener('input', e => {
    _careerSearch = e.target.value.trim().toLowerCase();
    _reloadCurrentTab();
  });

});

function _reloadCurrentTab() {
  if (currentTab === 'certs')          loadCerts();
  else if (currentTab === 'jobs')      loadJobs();
  else if (currentTab === 'skills')    loadSkills();
  else if (currentTab === 'learning') loadLearning();
  else if (currentTab === 'goals')     loadGoals();
}

// Cert name debounce → suggest
let _certNameTimer = null;
document.addEventListener('input', e => {
  if (e.target?.id === 'certName') { clearTimeout(_certNameTimer); _certNameTimer = setTimeout(triggerCertSuggest, 600); }
});


// ── Cert cycle detail: load linked learning per cert ──────────
async function loadCertCycleDetails(certs) {
  for (const c of certs) {
    if (!c.ce_hours_required) continue;
    const el = document.querySelector(`.cert-cycle-rows[data-cert-id="${c.id}"]`);
    if (!el) continue;
    try {
      const rows = await api('GET', `/learning?cert_id=${c.id}&in_cycle=1`);
      if (!rows.length) {
        el.textContent = 'No training logged this cycle yet.';
        continue;
      }
      el.innerHTML = rows.map(r => {
        const hrs = r.hours_applied_to_cert != null ? r.hours_applied_to_cert : (r.hours_total||0);
        return `<div style="display:flex;justify-content:space-between;padding:2px 0">
          <span style="color:var(--text)">${esc(r.title)}</span>
          <span style="font-weight:500;color:var(--text2)">${hrs} hrs</span>
        </div>`;
      }).join('');
    } catch { el.textContent = ''; }
  }
}

// ── Log training hours pre-linked to a cert ────────────────────
function logHoursFromCard(btn) {
  const certId = parseInt(btn.dataset.certId);
  const certName = _allCerts.find(c => c.id === certId)?.name || '';
  logHoursForCert(certId, certName);
}
function logHoursForCert(certId, certName) {
  openLearningDrawer(null, [{ certification_id: certId, cert_name: certName, hours_applied: null }]);
}
